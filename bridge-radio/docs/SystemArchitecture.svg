<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#0a0a0a" />
  
  <!-- Client Side -->
  <rect x="50" y="100" width="300" height="400" rx="10" fill="#1a1a1a" stroke="#e8ff3c" stroke-width="2" />
  <text x="200" y="130" fill="#e8ff3c" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">CLIENT (React 19)</text>
  
  <rect x="80" y="160" width="240" height="60" rx="5" fill="#2a2a2a" stroke="#ffffff33" />
  <text x="200" y="195" fill="white" font-family="Arial" font-size="14" text-anchor="middle">UI Components (Tailwind)</text>
  
  <rect x="80" y="240" width="240" height="60" rx="5" fill="#2a2a2a" stroke="#ffffff33" />
  <text x="200" y="275" fill="white" font-family="Arial" font-size="14" text-anchor="middle">HLS.js Engine</text>
  
  <rect x="80" y="320" width="240" height="60" rx="5" fill="#2a2a2a" stroke="#ffffff33" />
  <text x="200" y="355" fill="white" font-family="Arial" font-size="14" text-anchor="middle">Web Audio API (EQ)</text>
  
  <rect x="80" y="400" width="240" height="60" rx="5" fill="#2a2a2a" stroke="#ffffff33" />
  <text x="200" y="435" fill="white" font-family="Arial" font-size="14" text-anchor="middle">Admin Diagnostics</text>

  <!-- Server Side -->
  <rect x="450" y="100" width="300" height="400" rx="10" fill="#1a1a1a" stroke="#ff6b35" stroke-width="2" />
  <text x="600" y="130" fill="#ff6b35" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">SERVER (Express)</text>
  
  <rect x="480" y="160" width="240" height="60" rx="5" fill="#2a2a2a" stroke="#ffffff33" />
  <text x="600" y="195" fill="white" font-family="Arial" font-size="14" text-anchor="middle">HLS Proxy Handler</text>
  
  <rect x="480" y="240" width="240" height="60" rx="5" fill="#2a2a2a" stroke="#ffffff33" />
  <text x="600" y="275" fill="white" font-family="Arial" font-size="14" text-anchor="middle">Manifest Rewriter</text>
  
  <rect x="480" y="320" width="240" height="60" rx="5" fill="#2a2a2a" stroke="#ffffff33" />
  <text x="600" y="355" fill="white" font-family="Arial" font-size="14" text-anchor="middle">Static File Serving</text>

  <!-- Connections -->
  <path d="M 350 200 L 450 200" stroke="#e8ff3c" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <text x="400" y="190" fill="white" font-family="Arial" font-size="10" text-anchor="middle">HTTP/HLS Requests</text>
  
  <path d="M 450 300 L 350 300" stroke="#ff6b35" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <text x="400" y="290" fill="white" font-family="Arial" font-size="10" text-anchor="middle">Proxied Streams</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="white" />
    </marker>
  </defs>
</svg>
