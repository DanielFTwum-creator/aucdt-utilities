# =============================================================================
# bridge-radio — Apache vhost SSL custom config (radio.techbridge.edu.gh)
# =============================================================================
# CANONICAL COPY — version-controlled because Plesk stores the live file outside
# the repo and would lose it on a vhost rebuild/migration. deploy.ps1 writes this
# to the server and runs `plesk sbin httpdmng --reconfigure-domain`.
#
# Live location:
#   /var/www/vhosts/system/radio.techbridge.edu.gh/conf/vhost_ssl.conf
# Apply after editing:
#   plesk sbin httpdmng --reconfigure-domain radio.techbridge.edu.gh
#
# WHY (see fleet PATTERNS.md #15):
#   - Root vhost: this file overrides .htaccess. SPA fallback MUST use
#     %{DOCUMENT_ROOT}%{REQUEST_URI} — %{REQUEST_FILENAME} is unmapped at
#     VirtualHost context and would rewrite real assets to index.html (text/html).
#   - /api/* is excluded with a LEADING SLASH (server context keeps it) and
#     proxied to the bridge-radio PM2 backend on 127.0.0.1:3021 (server.ts binds
#     0.0.0.0, so IPv4 loopback works — no [::1] needed).
# =============================================================================

ProxyRequests Off
ProxyPreserveHost On

<Location /api>
    ProxyPass http://127.0.0.1:3021/api
    ProxyPassReverse http://127.0.0.1:3021/api
</Location>

RewriteEngine On
RewriteCond %{REQUEST_URI} !^/api/
RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} !-f
RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} !-d
RewriteRule ^ /index.html [L]
