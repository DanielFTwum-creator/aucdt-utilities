<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#a8edea"/>

  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#grad1)"/>

  <!-- Book/Dictionary icon -->
  <g transform="translate(256, 256)">
    <!-- Book spine -->
    <rect x="150" y="50" width="50" height="400" fill="#4a5568" rx="5"/>

    <!-- Left page -->
    <rect x="50" y="50" width="150" height="400" fill="#f7fafc" stroke="#2d3748" stroke-width="3" rx="5"/>

    <!-- Right page -->
    <rect x="220" y="50" width="150" height="400" fill="#edf2f7" stroke="#2d3748" stroke-width="3" rx="5"/>

    <!-- Text lines on left page -->
    <line x1="70" y1="100" x2="190" y2="100" stroke="#4a5568" stroke-width="4" stroke-linecap="round"/>
    <line x1="70" y1="140" x2="190" y2="140" stroke="#4a5568" stroke-width="3" stroke-linecap="round"/>
    <line x1="70" y1="175" x2="190" y2="175" stroke="#cbd5e0" stroke-width="3" stroke-linecap="round"/>
    <line x1="70" y1="210" x2="190" y2="210" stroke="#cbd5e0" stroke-width="3" stroke-linecap="round"/>

    <!-- Text lines on right page -->
    <line x1="240" y1="100" x2="360" y2="100" stroke="#4a5568" stroke-width="4" stroke-linecap="round"/>
    <line x1="240" y1="140" x2="360" y2="140" stroke="#4a5568" stroke-width="3" stroke-linecap="round"/>
    <line x1="240" y1="175" x2="360" y2="175" stroke="#cbd5e0" stroke-width="3" stroke-linecap="round"/>
    <line x1="240" y1="210" x2="360" y2="210" stroke="#cbd5e0" stroke-width="3" stroke-linecap="round"/>

    <!-- Accent dot -->
    <circle cx="200" cy="320" r="30" fill="#667eea"/>
  </g>
</svg>