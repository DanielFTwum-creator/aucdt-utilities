packages:
  - '.'

# pnpm 11: build-script approval lives here (Pattern 18). Makes this app a
# self-contained workspace root so pnpm does not walk up to the monorepo root
# (and its cypress). Static SPA — no build scripts need approval.
allowBuilds:
  # esbuild (transitive via vite) fetches its platform binary in a build script;
  # allow it, like every fleet app. Without this pnpm 11 fails ERR_PNPM_IGNORED_BUILDS.
  esbuild: true
  # motion (framer-motion) pulls core-js, whose postinstall is a funding notice; deny it.
  core-js: false
