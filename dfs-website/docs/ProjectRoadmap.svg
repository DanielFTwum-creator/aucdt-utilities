<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#f8fafc"/>
  
  <text x="400" y="50" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#1e293b">Project Roadmap &amp; Success Metrics</text>

  <!-- Phase 1-2 -->
  <rect x="50" y="100" width="220" height="120" rx="16" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="160" y="130" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1e40af">Foundations</text>
  <text x="160" y="160" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3b82f6">React 19.2.4 Core</text>
  <text x="160" y="180" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3b82f6">Admin Security &amp; Auth</text>
  <text x="160" y="200" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3b82f6">Audit Logging System</text>

  <!-- Phase 3 -->
  <rect x="290" y="100" width="220" height="120" rx="16" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
  <text x="400" y="130" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#166534">Quality Assurance</text>
  <text x="400" y="160" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#22c55e">Playwright E2E Suite</text>
  <text x="400" y="180" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#22c55e">Self-Testing Admin UI</text>
  <text x="400" y="200" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#22c55e">100% Critical Path Coverage</text>

  <!-- Phase 4-5 -->
  <rect x="530" y="100" width="220" height="120" rx="16" fill="#faf5ff" stroke="#e9d5ff" stroke-width="2"/>
  <text x="640" y="130" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#6b21a8">Handover</text>
  <text x="640" y="160" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a855f7">SVG Architecture Visuals</text>
  <text x="640" y="180" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a855f7">Full Documentation Suite</text>
  <text x="640" y="200" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a855f7">100% Alignment Verified</text>

  <!-- Success Metrics -->
  <rect x="50" y="260" width="700" height="100" rx="16" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <text x="70" y="290" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b">Key Performance Indicators:</text>
  
  <circle cx="100" cy="320" r="6" fill="#22c55e"/>
  <text x="115" y="325" font-family="sans-serif" font-size="12" fill="#475569">Performance: &lt; 2s Load Time</text>
  
  <circle cx="300" cy="320" r="6" fill="#22c55e"/>
  <text x="315" y="325" font-family="sans-serif" font-size="12" fill="#475569">Accessibility: WCAG AA Compliant</text>
  
  <circle cx="550" cy="320" r="6" fill="#22c55e"/>
  <text x="565" y="325" font-family="sans-serif" font-size="12" fill="#475569">Security: 100% Protected Admin</text>
</svg>
