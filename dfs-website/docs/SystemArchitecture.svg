<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f8fafc"/>
  
  <!-- Client Side -->
  <rect x="50" y="50" width="300" height="500" rx="20" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <text x="200" y="80" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Client (Browser)</text>
  
  <rect x="75" y="110" width="250" height="100" rx="12" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="200" y="140" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#334155">React 19.2.4 Application</text>
  <text x="200" y="165" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Shadcn UI + Tailwind CSS</text>
  <text x="200" y="185" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Lucide Icons + Motion</text>

  <rect x="75" y="230" width="250" height="80" rx="12" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="200" y="260" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#334155">State &amp; Services</text>
  <text x="200" y="285" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">AuditLogService (LocalStorage)</text>

  <rect x="75" y="330" width="250" height="80" rx="12" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="200" y="360" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#334155">Admin Portal</text>
  <text x="200" y="385" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">ProtectedRoute + Auth State</text>
  
  <!-- Server Side -->
  <rect x="450" y="50" width="300" height="500" rx="20" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <text x="600" y="80" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Server (Node.js)</text>

  <rect x="475" y="110" width="250" height="100" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="600" y="140" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Express.js Backend</text>
  <text x="600" y="165" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3b82f6">API Routes (/api/admin/*)</text>
  <text x="600" y="185" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3b82f6">Vite Middleware (Dev Mode)</text>

  <rect x="475" y="230" width="250" height="120" rx="12" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="600" y="260" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#166534">Testing Engine</text>
  <text x="600" y="285" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#22c55e">Playwright Test Runner</text>
  <text x="600" y="305" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#22c55e">Chromium Browser Instance</text>
  <text x="600" y="325" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#22c55e">JSON Reporter</text>

  <!-- Connections -->
  <path d="M 350 160 L 450 160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="400" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">HTTP/JSON</text>
  
  <path d="M 350 370 L 475 290" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowhead)"/>
  <text x="400" y="320" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b" transform="rotate(-30, 400, 320)">Trigger Tests</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
</svg>
