<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#f8fafc"/>
  
  <text x="400" y="40" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Data Architecture (Client-Side Persistence)</text>

  <!-- Audit Logs Table -->
  <rect x="50" y="80" width="300" height="250" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="50" y="80" width="300" height="40" rx="12 12 0 0" fill="#1e293b"/>
  <text x="200" y="105" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">AuditLogEntry (LocalStorage)</text>
  
  <text x="70" y="145" font-family="monospace" font-size="12" fill="#334155">id: string (UUID)</text>
  <text x="70" y="170" font-family="monospace" font-size="12" fill="#334155">timestamp: number (ms)</text>
  <text x="70" y="195" font-family="monospace" font-size="12" fill="#334155">action: string</text>
  <text x="70" y="220" font-family="monospace" font-size="12" fill="#334155">user: string</text>
  <text x="70" y="245" font-family="monospace" font-size="12" fill="#334155">details: string</text>
  
  <line x1="50" y1="120" x2="350" y2="120" stroke="#e2e8f0"/>

  <!-- Auth State -->
  <rect x="450" y="80" width="300" height="120" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="450" y="80" width="300" height="40" rx="12 12 0 0" fill="#334155"/>
  <text x="600" y="105" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">Auth State (LocalStorage)</text>
  
  <text x="470" y="145" font-family="monospace" font-size="12" fill="#334155">admin_auth: "true" | null</text>
  <text x="470" y="170" font-family="monospace" font-size="12" fill="#64748b">// Controls ProtectedRoute access</text>

  <!-- Theme State -->
  <rect x="450" y="230" width="300" height="100" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="450" y="230" width="300" height="40" rx="12 12 0 0" fill="#475569"/>
  <text x="600" y="255" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">Theme State (next-themes)</text>
  
  <text x="470" y="295" font-family="monospace" font-size="12" fill="#334155">theme: "light" | "dark" | "system"</text>
</svg>
