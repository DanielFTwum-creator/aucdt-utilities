<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8fafc"/>
  
  <!-- Data Sources -->
  <rect x="50" y="100" width="200" height="200" rx="15" fill="#ffffff" stroke="#4f46e5" stroke-width="2"/>
  <text x="150" y="130" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1e293b">Static Data (TS)</text>
  <text x="150" y="160" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#64748b">/src/data/shortcuts.ts</text>
  <path d="M 70 180 H 230 M 70 210 H 230 M 70 240 H 230" stroke="#e2e8f0" stroke-width="1"/>
  <text x="150" y="200" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#475569">Docs Shortcuts</text>
  <text x="150" y="230" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#475569">Sheets Shortcuts</text>
  <text x="150" y="260" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#475569">Slides Shortcuts</text>

  <!-- State Management -->
  <rect x="300" y="100" width="200" height="200" rx="15" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="130" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1e293b">Runtime State</text>
  <text x="400" y="160" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#64748b">React Context API</text>
  <rect x="320" y="180" width="160" height="40" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="400" y="205" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#065f46">ThemeContext (Theme State)</text>
  <rect x="320" y="230" width="160" height="40" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="400" y="255" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#065f46">AdminContext (Logs/Auth)</text>

  <!-- External Persistence -->
  <rect x="550" y="100" width="200" height="200" rx="15" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="650" y="130" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1e293b">Persistence</text>
  <text x="650" y="160" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#64748b">Browser Storage</text>
  <rect x="570" y="180" width="160" height="80" rx="8" fill="#fffbeb" stroke="#fde68a"/>
  <text x="650" y="210" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#92400e">LocalStorage</text>
  <text x="650" y="230" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#b45309">key: 'shortcut_master_theme'</text>
  <text x="650" y="245" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#b45309">key: 'shortcut_master_logs'</text>

  <!-- Arrows -->
  <path d="M 250 200 H 300" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 500 200 H 550" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
</svg>
