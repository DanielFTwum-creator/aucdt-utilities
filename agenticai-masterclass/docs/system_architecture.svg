<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8fafc"/>
  <rect x="50" y="50" width="700" height="400" rx="10" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="40" text-anchor="middle" font-family="sans-serif" font-weight="bold" fill="#334155">AI Agent Masterclass - System Architecture</text>
  
  <!-- Client Browser -->
  <rect x="100" y="100" width="200" height="300" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="200" y="130" text-anchor="middle" font-family="sans-serif" font-weight="bold" fill="#1e40af">Client Browser (SPA)</text>
  
  <!-- Components -->
  <rect x="120" y="150" width="160" height="40" rx="3" fill="white" stroke="#93c5fd"/>
  <text x="200" y="175" text-anchor="middle" font-family="sans-serif" font-size="12">React 19.2.4 (App.tsx)</text>
  
  <rect x="120" y="200" width="160" height="40" rx="3" fill="white" stroke="#93c5fd"/>
  <text x="200" y="225" text-anchor="middle" font-family="sans-serif" font-size="12">Admin Dashboard</text>
  
  <rect x="120" y="250" width="160" height="40" rx="3" fill="white" stroke="#93c5fd"/>
  <text x="200" y="275" text-anchor="middle" font-family="sans-serif" font-size="12">LocalStorage (Logs)</text>
  
  <!-- External Services -->
  <rect x="450" y="150" width="200" height="80" rx="5" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="550" y="180" text-anchor="middle" font-family="sans-serif" font-weight="bold" fill="#15803d">SMTP Gateway</text>
  <text x="550" y="200" text-anchor="middle" font-family="sans-serif" font-size="12">portal.aucdt.edu.gh</text>

  <rect x="450" y="280" width="200" height="80" rx="5" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="550" y="310" text-anchor="middle" font-family="sans-serif" font-weight="bold" fill="#c2410c">CDN Services</text>
  <text x="550" y="330" text-anchor="middle" font-family="sans-serif" font-size="12">Assets / React Libs</text>

  <!-- Connections -->
  <line x1="300" y1="170" x2="450" y2="190" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <text x="375" y="170" text-anchor="middle" font-family="sans-serif" font-size="10">HTTPS / POST</text>

  <line x1="300" y1="300" x2="450" y2="320" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="375" y="300" text-anchor="middle" font-family="sans-serif" font-size="10">Asset Load</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
    </marker>
  </defs>
</svg>