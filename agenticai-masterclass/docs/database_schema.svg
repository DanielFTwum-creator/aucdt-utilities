<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#f8fafc"/>
  <text x="300" y="40" text-anchor="middle" font-family="sans-serif" font-weight="bold" fill="#334155">Client-Side Data Persistence (LocalStorage)</text>
  
  <!-- Tables -->
  <g transform="translate(50, 80)">
    <rect width="200" height="200" fill="white" stroke="#64748b" stroke-width="2"/>
    <rect width="200" height="30" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
    <text x="100" y="20" text-anchor="middle" font-family="sans-serif" font-weight="bold">audit_logs</text>
    
    <text x="10" y="50" font-family="monospace" font-size="12">id (UUID)</text>
    <text x="10" y="70" font-family="monospace" font-size="12">timestamp (ISO)</text>
    <text x="10" y="90" font-family="monospace" font-size="12">action (String)</text>
    <text x="10" y="110" font-family="monospace" font-size="12">user (String)</text>
    <text x="10" y="130" font-family="monospace" font-size="12">category (Enum)</text>
    <text x="10" y="150" font-family="monospace" font-size="12">details (Text)</text>
  </g>

  <g transform="translate(350, 80)">
    <rect width="200" height="120" fill="white" stroke="#64748b" stroke-width="2"/>
    <rect width="200" height="30" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
    <text x="100" y="20" text-anchor="middle" font-family="sans-serif" font-weight="bold">app_preferences</text>
    
    <text x="10" y="50" font-family="monospace" font-size="12">app_theme (Enum)</text>
    <text x="10" y="70" font-family="monospace" font-size="12">auth_token (Session)</text>
    <text x="10" y="90" font-family="monospace" font-size="12">user_role (Session)</text>
  </g>
</svg>