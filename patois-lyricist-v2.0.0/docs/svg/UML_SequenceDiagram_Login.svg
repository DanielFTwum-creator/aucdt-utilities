<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
    <style>
        .lifeline { stroke: #a0aec0; stroke-width: 1.5; stroke-dasharray: 5 5; }
        .lifeline-box { fill: #2d3748; stroke: #a0aec0; stroke-width: 1.5; rx: 5; }
        .lifeline-text { fill: #ffffff; font-size: 14px; text-anchor: middle; dominant-baseline: middle; font-weight: bold; }
        .message { stroke: #a0aec0; stroke-width: 1.5; marker-end: url(#seq-arrowhead); fill: none; }
        .reply-message { stroke: #a0aec0; stroke-width: 1.5; stroke-dasharray: 5 5; marker-end: url(#seq-arrowhead); fill: none; }
        .message-label { fill: #cbd5e0; font-size: 12px; }
        .activation { fill: #3182ce; stroke: #a0aec0; stroke-width: 1; }
    </style>
    <defs>
        <marker id="seq-arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#a0aec0" />
        </marker>
    </defs>
    <title>UML Sequence Diagram - User Login</title>

    <!-- Lifelines -->
    <g id="user">
        <rect x="50" y="30" width="100" height="40" class="lifeline-box" />
        <text x="100" y="50" class="lifeline-text">👤 User</text>
        <line x1="100" y1="70" x2="100" y2="550" class="lifeline" />
    </g>
    <g id="browser">
        <rect x="250" y="30" width="100" height="40" class="lifeline-box" />
        <text x="300" y="50" class="lifeline-text">Browser</text>
        <line x1="300" y1="70" x2="300" y2="550" class="lifeline" />
    </g>
    <g id="react-app">
        <rect x="450" y="30" width="100" height="40" class="lifeline-box" />
        <text x="500" y="50" class="lifeline-text">React App</text>
        <line x1="500" y1="70" x2="500" y2="550" class="lifeline" />
    </g>
    <g id="local-storage">
        <rect x="650" y="30" width="100" height="40" class="lifeline-box" />
        <text x="700" y="50" class="lifeline-text">Local Storage</text>
        <line x1="700" y1="70" x2="700" y2="550" class="lifeline" />
    </g>

    <!-- Activations -->
    <rect x="295" y="100" width="10" height="380" class="activation" />
    <rect x="495" y="130" width="10" height="320" class="activation" />
    <rect x="695" y="160" width="10" height="50" class="activation" />
    <rect x="695" y="310" width="10" height="50" class="activation" />

    <!-- Messages -->
    <path d="M 100,100 H 295" class="message" />
    <text x="130" y="95" class="message-label">1. Enters credentials & clicks Login</text>

    <path d="M 305,130 H 495" class="message" />
    <text x="340" y="125" class="message-label">2. onSubmit(credentials)</text>

    <path d="M 505,160 H 695" class="message" />
    <text x="520" y="155" class="message-label">3. getItem('patoisLyricistUsers')</text>
    
    <path d="M 695,190 H 505" class="reply-message" />
    <text x="580" y="185" class="message-label">4. Returns user data</text>

    <path d="M 500,220 C 550,220 550,250 500,250" class="message" style="marker-end: none;" />
    <polygon points="500 250, 495 245, 505 245" fill="#a0aec0" />
    <text x="520" y="235" class="message-label">5. Verifies password (client-side)</text>
    
    <text x="500" y="280" class="message-label" fill="#38a169">[Auth Success]</text>
    
    <path d="M 505,310 H 695" class="message" />
    <text x="510" y="305" class="message-label">6. setItem('patoisLyricistCurrentUser', ...)</text>

    <path d="M 695,340 H 505" class="reply-message" />
    
    <path d="M 505,370 C 450,370 450,400 505,400" class="message" style="marker-end: none;" />
    <polygon points="505 400, 500 395, 510 395" fill="#a0aec0" />
    <text x="390" y="385" class="message-label">7. Updates UI state</text>

    <path d="M 495,430 H 305" class="reply-message" />
    <text x="350" y="425" class="message-label">8. Renders main application view</text>
    
</svg>
