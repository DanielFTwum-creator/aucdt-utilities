<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" rx="16" fill="#111827"/>
  <text x="400" y="40" text-anchor="middle" fill="#D4AF37" font-family="Arial" font-size="22" font-weight="bold">Sequence Diagram: User Login Flow</text>
  
  <line x1="100" y1="80" x2="100" y2="450" stroke="#4B5563" stroke-dasharray="4"/>
  <rect x="50" y="80" width="100" height="30" rx="4" fill="#1F2937" stroke="#4B5563"/>
  <text x="100" y="100" text-anchor="middle" fill="#F3F4F6" font-family="Arial" font-size="12">User</text>

  <line x1="300" y1="80" x2="300" y2="450" stroke="#4B5563" stroke-dasharray="4"/>
  <rect x="250" y="80" width="100" height="30" rx="4" fill="#1F2937" stroke="#4B5563"/>
  <text x="300" y="100" text-anchor="middle" fill="#F3F4F6" font-family="Arial" font-size="12">React UI</text>

  <line x1="500" y1="80" x2="500" y2="450" stroke="#4B5563" stroke-dasharray="4"/>
  <rect x="450" y="80" width="100" height="30" rx="4" fill="#1F2937" stroke="#4B5563"/>
  <text x="500" y="100" text-anchor="middle" fill="#F3F4F6" font-family="Arial" font-size="12">Auth Service</text>

  <line x1="700" y1="80" x2="700" y2="450" stroke="#4B5563" stroke-dasharray="4"/>
  <rect x="650" y="80" width="100" height="30" rx="4" fill="#1F2937" stroke="#4B5563"/>
  <text x="700" y="100" text-anchor="middle" fill="#F3F4F6" font-family="Arial" font-size="12">LocalStorage</text>

  <path d="M 100 140 H 295" stroke="#D4AF37" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="200" y="135" text-anchor="middle" fill="#9CA3AF" font-family="Arial" font-size="10">Submit Credentials</text>

  <path d="M 300 170 H 495" stroke="#D4AF37" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="400" y="165" text-anchor="middle" fill="#9CA3AF" font-family="Arial" font-size="10">Verify Identity</text>

  <path d="M 500 200 H 695" stroke="#D4AF37" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="600" y="195" text-anchor="middle" fill="#9CA3AF" font-family="Arial" font-size="10">Get Encrypted Key</text>

  <path d="M 700 240 H 505" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="2"/>
  <text x="600" y="235" text-anchor="middle" fill="#9CA3AF" font-family="Arial" font-size="10">Base64 Data</text>

  <path d="M 500 280 H 305" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="400" y="275" text-anchor="middle" fill="#9CA3AF" font-family="Arial" font-size="10">Session Authorized</text>

  <path d="M 300 320 H 105" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="2"/>
  <text x="200" y="315" text-anchor="middle" fill="#9CA3AF" font-family="Arial" font-size="10">Grant Access</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9CA3AF" />
    </marker>
  </defs>
</svg>