<svg width="700" height="500" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="14">
    <style>
        .bg { fill: #1a202c; }
        .box { fill: #2d3748; stroke: #4a5568; stroke-width: 1.5; rx: 8; }
        .key { fill: #D4AF37; font-weight: bold; }
        .val { fill: #48bb78; }
        .meta { fill: #718096; font-size: 11px; }
        .title { fill: #ffffff; font-family: sans-serif; font-weight: 900; text-anchor: middle; }
        .obf-label { fill: #f56565; font-size: 10px; font-weight: bold; }
    </style>
    <rect width="100%" height="100%" class="bg" />
    <text x="350" y="40" class="title">SECURE PERSISTENCE SCHEMA (SOC 2)</text>
    
    <g transform="translate(50, 80)">
        <rect width="600" height="80" class="box" />
        <text x="20" y="30" class="key">patoisLyricistUsers</text>
        <text x="20" y="55" class="val">Base64Enc({ username: { password, role, consent } })</text>
        <text x="580" y="30" class="obf-label" text-anchor="end">CONFIDENTIAL</text>
    </g>
    
    <g transform="translate(50, 180)">
        <rect width="600" height="80" class="box" />
        <text x="20" y="30" class="key">patoisLyricistHistory_[Identity]</text>
        <text x="20" y="55" class="val">Base64Enc(Array&lt;RiddimMetadata&gt;)</text>
        <text x="580" y="30" class="obf-label" text-anchor="end">CONFIDENTIAL</text>
    </g>
    
    <g transform="translate(50, 280)">
        <rect width="600" height="80" class="box" />
        <text x="20" y="30" class="key">patoisLyricistAuditLog</text>
        <text x="20" y="55" class="val">RawJSON([ { id, user, action, forensic_metadata } ])</text>
        <text x="580" y="30" class="meta" text-anchor="end">GOVERNANCE TRAIL</text>
    </g>
    
    <g transform="translate(50, 380)">
        <rect width="600" height="60" class="box" />
        <text x="20" y="35" class="key">patoisLyricistTheme</text>
        <text x="200" y="35" class="val">'dark' | 'light' | 'high-contrast'</text>
    </g>
</svg>