  <path d="M 690 150 Q 750 150 750 210 T 690 270 H 670 V 150 H 690" fill="#1F2937" stroke="#FBBF24" stroke-width="2"/>
  <text x="710" y="215" text-anchor="middle" fill="#F3F4F6" font-family="Arial" font-size="12">Storage</text>

