<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" rx="16" fill="#111827"/>
  <text x="400" y="45" text-anchor="middle" fill="#D4AF37" font-family="Arial" font-size="24" font-weight="bold">LocalStorage Database Schema v1.1</text>

  <!-- Users Table -->
  <g transform="translate(50, 100)">
    <rect width="320" height="180" rx="8" fill="#1F2937" stroke="#10B981" stroke-width="2"/>
    <rect width="320" height="40" rx="8" fill="#10B981" clip-path="inset(0 0 140 0)"/>
    <text x="160" y="27" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="bold">patoisLyricistUsers</text>
    <text x="15" y="65" fill="#F3F4F6" font-family="Courier New" font-size="12">PK username: string</text>
    <text x="15" y="85" fill="#D1D5DB" font-family="Courier New" font-size="12">   password: string</text>
    <text x="15" y="105" fill="#D1D5DB" font-family="Courier New" font-size="12">   role: "user" | "admin"</text>
    <text x="15" y="125" fill="#D1D5DB" font-family="Courier New" font-size="12">   privacyAccepted: boolean</text>
    <text x="15" y="145" fill="#D1D5DB" font-family="Courier New" font-size="12">   failedAttempts: number</text>
    <text x="160" y="170" text-anchor="middle" fill="#6EE7B7" font-family="Arial" font-size="10" font-style="italic">Encoded: Base64(JSON.stringify)</text>
  </g>

  <!-- History Table -->
  <g transform="translate(430, 100)">
    <rect width="320" height="230" rx="8" fill="#1F2937" stroke="#3B82F6" stroke-width="2"/>
    <rect width="320" height="40" rx="8" fill="#3B82F6" clip-path="inset(0 0 190 0)"/>
    <text x="160" y="27" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="bold">patoisLyricistHistory_[user]</text>
    <text x="15" y="65" fill="#F3F4F6" font-family="Courier New" font-size="12">PK id: number (Epoch)</text>
    <text x="15" y="85" fill="#D1D5DB" font-family="Courier New" font-size="12">   theme: string</text>
    <text x="15" y="105" fill="#D1D5DB" font-family="Courier New" font-size="12">   songTitle: string</text>
    <text x="15" y="125" fill="#D1D5DB" font-family="Courier New" font-size="12">   lyrics: string</text>
    <text x="15" y="145" fill="#D1D5DB" font-family="Courier New" font-size="12">   rhymeScheme: string</text>
    <text x="15" y="165" fill="#D1D5DB" font-family="Courier New" font-size="12">   djPersona: string</text>
    <text x="15" y="185" fill="#D1D5DB" font-family="Courier New" font-size="12">   structure: Array&lt;string&gt;</text>
    <text x="160" y="220" text-anchor="middle" fill="#93C5FD" font-family="Arial" font-size="10" font-style="italic">Encoded: Base64(JSON.stringify)</text>
  </g>

  <!-- Audit Table -->
  <g transform="translate(50, 360)">
    <rect width="700" height="180" rx="8" fill="#1F2937" stroke="#EF4444" stroke-width="2"/>
    <rect width="700" height="40" rx="8" fill="#EF4444" clip-path="inset(0 0 140 0)"/>
    <text x="350" y="27" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-size="14" font-weight="bold">patoisLyricistAuditLog</text>
    <text x="15" y="65" fill="#F3F4F6" font-family="Courier New" font-size="12">PK id: number</text>
    <text x="15" y="85" fill="#D1D5DB" font-family="Courier New" font-size="12">   timestamp: ISOString</text>
    <text x="15" y="105" fill="#D1D5DB" font-family="Courier New" font-size="12">   user: string (FK -> Users.username)</text>
    <text x="15" y="125" fill="#D1D5DB" font-family="Courier New" font-size="12">   action: string</text>
    <text x="15" y="145" fill="#D1D5DB" font-family="Courier New" font-size="12">   metadata: { userAgent, resolution }</text>
    <text x="350" y="170" text-anchor="middle" fill="#F87171" font-family="Arial" font-size="10" font-style="italic">Storage Layer: Raw JSON (Internal Governance Only)</text>
  </g>

  <!-- Relationships -->
  <path d="M 370 190 H 430" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="4"/>
  <text x="400" y="185" text-anchor="middle" fill="#9CA3AF" font-family="Arial" font-size="10">1:M</text>
  
  <path d="M 210 280 V 360" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="4"/>
</svg>