
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 12; }
      .core { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 3; rx: 12; }
      .util { fill: #f0fdf4; stroke: #15803d; stroke-width: 2; rx: 8; }
      .text-main { font-family: sans-serif; font-size: 16px; font-weight: bold; fill: #0f172a; text-anchor: middle; }
      .text-sub { font-family: sans-serif; font-size: 12px; fill: #64748b; text-anchor: middle; }
      .connector { stroke: #94a3b8; stroke-width: 2; }
    </style>
  </defs>

  <text x="400" y="40" class="text-main" style="font-size: 24px;">Technology Stack Architecture</text>

  <!-- Core Runtime -->
  <rect x="250" y="80" width="300" height="100" class="core" />
  <text x="400" y="120" class="text-main" style="fill: #1d4ed8;">React 19.2.4</text>
  <text x="400" y="145" class="text-sub">Core Framework (ESM)</text>

  <!-- Dependencies -->
  <line x1="400" y1="180" x2="200" y2="240" class="connector" />
  <line x1="400" y1="180" x2="400" y2="240" class="connector" />
  <line x1="400" y1="180" x2="600" y2="240" class="connector" />

  <!-- UI Layer -->
  <rect x="100" y="240" width="200" height="80" class="util" />
  <text x="200" y="275" class="text-main">Tailwind CSS</text>
  <text x="200" y="295" class="text-sub">Utility-First Styling</text>

  <!-- Visualization -->
  <rect x="300" y="240" width="200" height="80" class="util" />
  <text x="400" y="275" class="text-main">Recharts 2.12</text>
  <text x="400" y="295" class="text-sub">Data Visualization</text>

  <!-- Utilities -->
  <rect x="500" y="240" width="200" height="80" class="util" />
  <text x="600" y="275" class="text-main">Lucide React</text>
  <text x="600" y="295" class="text-sub">Iconography</text>

  <!-- Export -->
  <rect x="300" y="340" width="200" height="40" class="box" />
  <text x="400" y="365" class="text-sub">html-to-image (Export Engine)</text>

  <line x1="400" y1="320" x2="400" y2="340" class="connector" />

</svg>
