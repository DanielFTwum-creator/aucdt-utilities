
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <style>
      .step { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 8; }
      .process { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 8; }
      .storage { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 0; }
      .txt { font-family: sans-serif; font-size: 12px; text-anchor: middle; font-weight: bold; }
      .arrow { stroke: #475569; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
    </marker>
  </defs>

  <text x="400" y="30" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">System Data Flow</text>

  <!-- Input -->
  <rect x="50" y="100" width="120" height="60" class="step" />
  <text x="110" y="135" class="txt">User Input</text>
  <text x="110" y="150" font-size="10" text-anchor="middle" fill="#64748b">(Control Panel)</text>

  <path d="M 170 130 L 230 130" class="arrow" />

  <!-- URL Hash -->
  <rect x="230" y="80" width="120" height="100" class="storage" />
  <text x="290" y="135" class="txt">URL Hash</text>
  <text x="290" y="150" font-size="10" text-anchor="middle" fill="#64748b">(State Persistence)</text>

  <path d="M 350 130 L 410 130" class="arrow" />

  <!-- Engine -->
  <rect x="410" y="100" width="140" height="60" class="process" />
  <text x="480" y="135" class="txt" fill="#0284c7">Calc Engine</text>
  <text x="480" y="150" font-size="10" text-anchor="middle" fill="#0284c7">(Velocity/Gaps)</text>

  <path d="M 550 130 L 610 130" class="arrow" />

  <!-- Output -->
  <rect x="610" y="70" width="140" height="120" class="step" />
  <text x="680" y="100" class="txt">Dashboard View</text>
  <text x="680" y="120" class="txt">Admin Logs</text>
  <text x="680" y="140" class="txt">Export (PDF/PNG)</text>

</svg>
