<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <style>
      .table { fill: #e9ecef; stroke: #495057; stroke-width: 1; }
      .header { fill: #343a40; }
      .header-text { fill: #fff; font-family: monospace; font-weight: bold; font-size: 14px; }
      .row-text { fill: #212529; font-family: monospace; font-size: 12px; }
      .line { stroke: #495057; stroke-width: 1; }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="30" style="font-family: sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle;">Database Schema</text>

  <!-- Patients Table -->
  <g transform="translate(50, 100)">
    <rect width="200" height="120" class="table" />
    <rect width="200" height="30" class="header" />
    <text x="10" y="20" class="header-text">patients</text>
    <text x="10" y="50" class="row-text">id (PK)</text>
    <text x="10" y="70" class="row-text">name</text>
    <text x="10" y="90" class="row-text">target_fasting_min</text>
    <text x="10" y="110" class="row-text">target_fasting_max</text>
  </g>

  <!-- Readings Table -->
  <g transform="translate(350, 100)">
    <rect width="250" height="200" class="table" />
    <rect width="250" height="30" class="header" />
    <text x="10" y="20" class="header-text">glucose_readings</text>
    <text x="10" y="50" class="row-text">id (PK)</text>
    <text x="10" y="70" class="row-text">patient_id (FK)</text>
    <text x="10" y="90" class="row-text">date</text>
    <text x="10" y="110" class="row-text">time_slot</text>
    <text x="10" y="130" class="row-text">value</text>
    <text x="10" y="150" class="row-text">meal_description</text>
    <text x="10" y="170" class="row-text">medication_taken</text>
    <text x="10" y="190" class="row-text">notes</text>
  </g>

  <!-- Relationship -->
  <line x1="250" y1="160" x2="350" y2="160" style="stroke: #000; stroke-width: 2; marker-end: url(#arrow);" />
  <text x="300" y="150" style="font-family: sans-serif; font-size: 12px; text-anchor: middle;">1:N</text>

</svg>
