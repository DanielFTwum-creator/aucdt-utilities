<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa" />
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">TechBridge Database Schema</text>

  <!-- Table: Patients -->
  <g transform="translate(50, 80)">
    <rect width="200" height="180" fill="#fff" stroke="#333" stroke-width="2" rx="5" />
    <rect width="200" height="30" fill="#2196f3" rx="5" />
    <text x="100" y="20" font-family="Arial" font-size="14" text-anchor="middle" fill="white" font-weight="bold">patients</text>
    
    <text x="10" y="50" font-family="Monospace" font-size="12">PK id (INTEGER)</text>
    <text x="10" y="70" font-family="Monospace" font-size="12">   name (TEXT)</text>
    <text x="10" y="90" font-family="Monospace" font-size="12">   target_fasting_min</text>
    <text x="10" y="110" font-family="Monospace" font-size="12">   target_fasting_max</text>
    <text x="10" y="130" font-family="Monospace" font-size="12">   target_pre_meal_min</text>
    <text x="10" y="150" font-family="Monospace" font-size="12">   target_pre_meal_max</text>
  </g>

  <!-- Table: Glucose Readings -->
  <g transform="translate(300, 80)">
    <rect width="220" height="240" fill="#fff" stroke="#333" stroke-width="2" rx="5" />
    <rect width="220" height="30" fill="#4caf50" rx="5" />
    <text x="110" y="20" font-family="Arial" font-size="14" text-anchor="middle" fill="white" font-weight="bold">glucose_readings</text>
    
    <text x="10" y="50" font-family="Monospace" font-size="12">PK id (INTEGER)</text>
    <text x="10" y="70" font-family="Monospace" font-size="12">FK patient_id (INT)</text>
    <text x="10" y="90" font-family="Monospace" font-size="12">   date (TEXT)</text>
    <text x="10" y="110" font-family="Monospace" font-size="12">   time_slot (TEXT)</text>
    <text x="10" y="130" font-family="Monospace" font-size="12">   value (REAL)</text>
    <text x="10" y="150" font-family="Monospace" font-size="12">   meal_description</text>
    <text x="10" y="170" font-family="Monospace" font-size="12">   medication_taken</text>
    <text x="10" y="190" font-family="Monospace" font-size="12">   activity_logged</text>
    <text x="10" y="210" font-family="Monospace" font-size="12">   notes (TEXT)</text>
  </g>

  <!-- Table: Audit Logs -->
  <g transform="translate(550, 80)">
    <rect width="200" height="140" fill="#fff" stroke="#333" stroke-width="2" rx="5" />
    <rect width="200" height="30" fill="#ff9800" rx="5" />
    <text x="100" y="20" font-family="Arial" font-size="14" text-anchor="middle" fill="white" font-weight="bold">audit_logs</text>
    
    <text x="10" y="50" font-family="Monospace" font-size="12">PK id (INTEGER)</text>
    <text x="10" y="70" font-family="Monospace" font-size="12">   action (TEXT)</text>
    <text x="10" y="90" font-family="Monospace" font-size="12">   details (TEXT)</text>
    <text x="10" y="110" font-family="Monospace" font-size="12">   user (TEXT)</text>
    <text x="10" y="130" font-family="Monospace" font-size="12">   timestamp (TEXT)</text>
  </g>

  <!-- Relationships -->
  <path d="M 250 100 L 300 100" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <text x="275" y="95" font-family="Arial" font-size="10" text-anchor="middle">1:N</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>
</svg>
