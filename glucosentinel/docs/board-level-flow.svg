<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <!-- Background -->
  <rect width="1000" height="600" fill="#ffffff" />
  
  <!-- Header -->
  <rect width="1000" height="80" fill="#0F0C07" />
  <text x="500" y="50" font-family="Georgia, serif" font-size="32" text-anchor="middle" fill="#C8A84B" font-weight="bold">TechBridge Clinical Platform</text>
  
  <!-- Patient Journey Flow -->
  <g transform="translate(50, 150)">
    <!-- Step 1: Input -->
    <circle cx="100" cy="100" r="80" fill="#f8f9fa" stroke="#C8A84B" stroke-width="3" />
    <text x="100" y="90" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">Data Input</text>
    <text x="100" y="115" font-family="Arial" font-size="12" text-anchor="middle">Manual Entry</text>
    <text x="100" y="135" font-family="Arial" font-size="12" text-anchor="middle">AI Image Scan</text>
    <text x="100" y="155" font-family="Arial" font-size="12" text-anchor="middle">JSON Import</text>

    <!-- Arrow -->
    <path d="M 190 100 L 250 100" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Step 2: Processing -->
    <rect x="260" y="20" width="200" height="160" fill="#0F0C07" rx="10" />
    <text x="360" y="60" font-family="Arial" font-size="16" text-anchor="middle" fill="#C8A84B" font-weight="bold">Core Engine</text>
    <text x="360" y="90" font-family="Arial" font-size="12" text-anchor="middle" fill="#F2EBD9">Pattern Recognition</text>
    <text x="360" y="110" font-family="Arial" font-size="12" text-anchor="middle" fill="#F2EBD9">Audit Logging</text>
    <text x="360" y="130" font-family="Arial" font-size="12" text-anchor="middle" fill="#F2EBD9">Target Analysis</text>

    <!-- Arrow -->
    <path d="M 470 100 L 530 100" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Step 3: Output -->
    <circle cx="620" cy="100" r="80" fill="#f8f9fa" stroke="#C8A84B" stroke-width="3" />
    <text x="620" y="90" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">Clinical Insights</text>
    <text x="620" y="115" font-family="Arial" font-size="12" text-anchor="middle">Dashboard Trends</text>
    <text x="620" y="135" font-family="Arial" font-size="12" text-anchor="middle">CSV Export</text>
    <text x="620" y="155" font-family="Arial" font-size="12" text-anchor="middle">Pattern Alerts</text>
  </g>

  <!-- Admin Oversight Layer -->
  <g transform="translate(50, 400)">
    <rect x="0" y="0" width="900" height="120" fill="#f0f0f0" stroke="#999" stroke-dasharray="5,5" rx="10" />
    <text x="450" y="30" font-family="Arial" font-size="18" text-anchor="middle" fill="#333" font-weight="bold">Administrative Oversight & Compliance</text>
    
    <g transform="translate(100, 50)">
      <rect width="150" height="40" fill="#fff" stroke="#333" rx="5" />
      <text x="75" y="25" font-family="Arial" font-size="12" text-anchor="middle">System Diagnostics</text>
    </g>

    <g transform="translate(375, 50)">
      <rect width="150" height="40" fill="#fff" stroke="#333" rx="5" />
      <text x="75" y="25" font-family="Arial" font-size="12" text-anchor="middle">Automated Testing</text>
    </g>

    <g transform="translate(650, 50)">
      <rect width="150" height="40" fill="#fff" stroke="#333" rx="5" />
      <text x="75" y="25" font-family="Arial" font-size="12" text-anchor="middle">Security Audits</text>
    </g>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>
</svg>
