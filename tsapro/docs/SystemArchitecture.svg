
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
    <title>Techbridge TSAP System Architecture V3.1</title>
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
        </marker>
        <style>
            .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
            .layer { fill: #f8fafc; stroke: #475569; stroke-width: 1; rx: 5; }
            .component { fill: #ffffff; stroke: #64748b; stroke-width: 1; rx: 4; filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.1)); }
            .external { fill: #fefce8; stroke: #ca8a04; stroke-width: 2; stroke-dasharray: 4,4; rx: 8; }
            .storage { fill: #ecfdf5; stroke: #10b981; stroke-width: 2; rx: 8; }
            .text-title { font-weight: bold; font-size: 16px; text-anchor: middle; fill: #1e293b; }
            .text-label { font-size: 12px; text-anchor: middle; fill: #334155; }
            .arrow { stroke: #475569; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
            .ai-component { fill: #eff6ff; stroke: #3b82f6; stroke-width: 1.5; }
        </style>
    </defs>

    <!-- Main App Container (Browser) -->
    <rect x="40" y="40" width="720" height="520" class="box" />
    <text x="400" y="25" class="text-title" font-size="18">Techbridge TSAP - Client-Side Architecture (Version 3.1)</text>

    <!-- UI Layer -->
    <rect x="70" y="70" width="660" height="130" class="layer" />
    <text x="400" y="90" class="text-title">1. Presentation Layer (React 19)</text>
    
    <rect x="90" y="110" width="120" height="70" class="component" />
    <text x="150" y="145" class="text-label" font-weight="bold">Pages</text>
    <text x="150" y="160" class="text-label" font-size="10">Dashboard, Admin</text>

    <rect x="230" y="110" width="120" height="70" class="component" />
    <text x="290" y="145" class="text-label" font-weight="bold">Contexts</text>
    <text x="290" y="160" class="text-label" font-size="10">Auth, Theme, Grades</text>

    <rect x="370" y="110" width="120" height="70" class="component" />
    <text x="430" y="145" class="text-label" font-weight="bold">Self-Test</text>
    <text x="430" y="160" class="text-label" font-size="10">Puppeteer Sim</text>

    <rect x="510" y="110" width="190" height="70" class="component ai-component" />
    <text x="605" y="145" class="text-label" font-weight="bold" style="fill:#1d4ed8;">CLAUDE AI UI</text>
    <text x="605" y="160" class="text-label" font-size="10" style="fill:#1d4ed8;">Floating Chat Interface</text>

    <!-- Logic Layer -->
    <rect x="70" y="230" width="660" height="110" class="layer" />
    <text x="400" y="250" class="text-title">2. Business Logic Layer (Services)</text>

    <rect x="100" y="270" width="160" height="55" class="component" />
    <text x="180" y="303" class="text-label" font-weight="bold">Salary Engine</text>
    <text x="180" y="315" class="text-label" font-size="9">GRA Tax & SSNIT Logic</text>

    <rect x="280" y="270" width="160" height="55" class="component" />
    <text x="360" y="303" class="text-label" font-weight="bold">Audit Log Service</text>
    <text x="360" y="315" class="text-label" font-size="9">Immutable Event Record</text>

    <rect x="460" y="270" width="240" height="55" class="component ai-component" />
    <text x="580" y="303" class="text-label" font-weight="bold" style="fill:#1d4ed8;">Gemini Service</text>
    <text x="580" y="315" class="text-label" font-size="9" style="fill:#1d4ed8;">PDF Parsing & LLM Tools</text>

    <!-- Data Layer -->
    <rect x="70" y="370" width="660" height="120" class="layer" />
    <text x="400" y="390" class="text-title">3. Data Persistence Layer</text>

    <rect x="150" y="410" width="500" height="65" class="storage" />
    <text x="400" y="440" class="text-label" font-weight="bold" font-size="14">Browser localStorage</text>
    <text x="400" y="455" class="text-label">Key:Value Store (Encrypted-at-rest concept)</text>

    <!-- External AI Service -->
    <rect x="300" y="515" width="200" height="40" class="external" />
    <text x="400" y="540" class="text-label" font-weight="bold">Google Gemini API</text>

    <!-- Flow Connectors -->
    <path d="M 150 180 L 180 270" class="arrow" />
    <path d="M 290 180 L 360 270" class="arrow" />
    <path d="M 605 180 L 580 270" class="arrow" />
    <path d="M 180 325 L 250 410" class="arrow" />
    <path d="M 360 325 L 360 410" class="arrow" />
    <path d="M 580 325 L 400 515" class="arrow" style="stroke-dasharray: 4,4;" />

</svg>
