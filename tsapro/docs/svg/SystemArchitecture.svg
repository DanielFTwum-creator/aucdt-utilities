
<svg width="700" height="360" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
    <title>Techbridge TSAP System Architecture</title>
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
        </marker>
    </defs>
    
    <!-- UI Layer -->
    <rect x="20" y="20" width="660" height="100" rx="10" fill="#f0f9ff" stroke="#bae6fd" stroke-width="2"/>
    <text x="260" y="40" font-weight="bold" font-size="14">UI Layer (React Components)</text>
    <rect x="40" y="60" width="120" height="40" rx="5" fill="#e0f2fe" stroke="#7dd3fc" /><text x="50" y="85">Login / Header</text>
    <rect x="180" y="60" width="120" height="40" rx="5" fill="#e0f2fe" stroke="#7dd3fc" /><text x="195" y="85">DashboardPage</text>
    <rect x="320" y="60" width="120" height="40" rx="5" fill="#e0f2fe" stroke="#7dd3fc" /><text x="345" y="85">AdminPage</text>
    <rect x="460" y="60" width="120" height="40" rx="5" fill="#e0f2fe" stroke="#7dd3fc" /><text x="480" y="85">SelfTestPage</text>
    <rect x="600" y="60" width="60" height="40" rx="5" fill="#e0f2fe" stroke="#7dd3fc" /><text x="610" y="85">Common</text>

    <!-- Logic Layer -->
    <rect x="20" y="130" width="660" height="100" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
    <text x="240" y="150" font-weight="bold" font-size="14">Business Logic (Hooks & Services)</text>
    <rect x="30" y="170" width="100" height="40" rx="5" fill="#dcfce7" stroke="#86efac" /><text x="45" y="195">AuthContext</text>
    <rect x="140" y="170" width="110" height="40" rx="5" fill="#dcfce7" stroke="#86efac" /><text x="150" y="195">ThemeContext</text>
    <rect x="260" y="170" width="120" height="40" rx="5" fill="#dcfce7" stroke="#86efac" /><text x="265" y="195">StepCodesContext</text>
    <rect x="390" y="170" width="130" height="40" rx="5" fill="#dcfce7" stroke="#86efac" /><text x="400" y="195">salaryCalculations.ts</text>
    <rect x="530" y="170" width="130" height="40" rx="5" fill="#dcfce7" stroke="#86efac" /><text x="540" y="195">auditLogService.ts</text>
    
    <!-- Data Layer -->
    <rect x="20" y="240" width="660" height="100" rx="10" fill="#fefce8" stroke="#fde047" stroke-width="2"/>
    <text x="210" y="260" font-weight="bold" font-size="14">Data Persistence (Browser localStorage)</text>
    <rect x="30" y="280" width="140" height="40" rx="5" fill="#fef9c3" stroke="#facc15" /><text x="40" y="305">'...-password'</text>
    <rect x="180" y="280" width="140" height="40" rx="5" fill="#fef9c3" stroke="#facc15" /><text x="190" y="305">'...-audit-log'</text>
    <rect x="330" y="280" width="140" height="40" rx="5" fill="#fef9c3" stroke="#facc15" /><text x="340" y="305">'...-theme'</text>
    <rect x="480" y="280" width="180" height="40" rx="5" fill="#fef9c3" stroke="#facc15" /><text x="490" y="305">'...-step-codes'</text>

    <!-- Arrows -->
    <path d="M 350 120 V 130" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
    <path d="M 350 230 V 240" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>