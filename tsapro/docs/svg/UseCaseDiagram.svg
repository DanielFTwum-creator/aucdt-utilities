
<svg width="700" height="500" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="14">
    <title>UML Use Case Diagram</title>
    <style>
        .actor { font-weight: bold; }
        .use-case { fill: #e0f2fe; stroke: #38bdf8; }
        .system-boundary { fill: none; stroke: #94a3b8; stroke-dasharray: 5 5; }
        .title { font-size: 16px; font-weight: bold; text-anchor: middle; }
    </style>
    
    <text x="350" y="30" class="title">Techbridge TSAP - Use Case Diagram</text>

    <!-- System Boundary -->
    <rect x="200" y="50" width="450" height="440" rx="15" class="system-boundary" />
    <text x="425" y="75" text-anchor="middle" font-weight="bold">TSAP System</text>
    
    <!-- Actor -->
    <g transform="translate(80, 200)">
        <circle cx="25" cy="25" r="20" fill="none" stroke="#000" stroke-width="2" />
        <line x1="25" y1="45" x2="25" y2="85" stroke="#000" stroke-width="2" />
        <line x1="5" y1="55" x2="45" y2="55" stroke="#000" stroke-width="2" />
        <line x1="25" y1="85" x2="5" y2="125" stroke="#000" stroke-width="2" />
        <line x1="25" y1="85" x2="45" y2="125" stroke="#000" stroke-width="2" />
        <text x="25" y="145" text-anchor="middle" class="actor">Administrator</text>
    </g>
    
    <!-- Use Cases -->
    <g transform="translate(350, 100)">
        <ellipse cx="0" cy="0" rx="100" ry="25" class="use-case" /><text x="0" y="5" text-anchor="middle">Authenticate</text>
    </g>
    <g transform="translate(350, 160)">
        <ellipse cx="0" cy="0" rx="100" ry="25" class="use-case" /><text x="0" y="5" text-anchor="middle">Calculate Salary</text>
    </g>
    <g transform="translate(350, 220)">
        <ellipse cx="0" cy="0" rx="100" ry="25" class="use-case" /><text x="0" y="5" text-anchor="middle">Manage Grades</text>
    </g>
    <g transform="translate(350, 280)">
        <ellipse cx="0" cy="0" rx="100" ry="25" class="use-case" /><text x="0" y="5" text-anchor="middle">Manage Password</text>
    </g>
    <g transform="translate(350, 340)">
        <ellipse cx="0" cy="0" rx="100" ry="25" class="use-case" /><text x="0" y="5" text-anchor="middle">View Audit Log</text>
    </g>
     <g transform="translate(350, 400)">
        <ellipse cx="0" cy="0" rx="100" ry="25" class="use-case" /><text x="0" y="5" text-anchor="middle">Run Self-Tests</text>
    </g>
    <g transform="translate(350, 460)">
        <ellipse cx="0" cy="0" rx="100" ry="25" class="use-case" /><text x="0" y="5" text-anchor="middle">Change Theme</text>
    </g>
    
    <!-- Connections -->
    <line x1="130" y1="265" x2="250" y2="100" stroke="#000" stroke-width="1.5" />
    <line x1="130" y1="265" x2="250" y2="160" stroke="#000" stroke-width="1.5" />
    <line x1="130" y1="265" x2="250" y2="220" stroke="#000" stroke-width="1.5" />
    <line x1="130" y1="265" x2="250" y2="280" stroke="#000" stroke-width="1.5" />
    <line x1="130" y1="265" x2="250" y2="340" stroke="#000" stroke-width="1.5" />
    <line x1="130" y1="265" x2="250" y2="400" stroke="#000" stroke-width="1.5" />
    <line x1="130" y1="265" x2="250" y2="460" stroke="#000" stroke-width="1.5" />
</svg>