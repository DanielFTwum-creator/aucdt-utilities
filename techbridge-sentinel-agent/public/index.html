    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }

        .header h1 {
            color: #2d3748;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #718096;
            font-size: 16px;
        }

        .status-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .status-card h2 {
            font-size: 24px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            background: #48bb78;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
        }

        .info-label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 20px;
            font-weight: 600;
        }

        .endpoints {
            background: #f7fafc;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .endpoints h3 {
            color: #2d3748;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .endpoint {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .endpoint:last-child {
            margin-bottom: 0;
        }

        .endpoint-method {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .endpoint-path {
            color: #4a5568;
            font-family: 'Courier New', monospace;
            flex-grow: 1;
            margin-left: 15px;
        }

        .test-button {
            background: #48bb78;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .test-button:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.3);
        }

        .footer {
            text-align: center;
            color: #718096;
            font-size: 14px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🏥</div>
            <h1>Techbridge Sentinel Agent</h1>
            <p>AI monitoring and alert management service</p>
        </div>

        <div class="status-card">
            <h2>
                <span class="status-indicator"></span>
                Service Status: Healthy
            </h2>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Status</div>
                    <div class="info-value" id="status">Running</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Uptime</div>
                    <div class="info-value" id="uptime">--</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Port</div>
                    <div class="info-value">3003</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Last Check</div>
                    <div class="info-value" id="timestamp">--</div>
                </div>
            </div>
        </div>

        <div class="endpoints">
            <h3>API Endpoints</h3>
            <div class="endpoint">
                <span class="endpoint-method">GET</span>
                <span class="endpoint-path">/health</span>
                <button class="test-button" onclick="testEndpoint('/health')">Test</button>
            </div>
            <div class="endpoint">
                <span class="endpoint-method">GET</span>
                <span class="endpoint-path">/api/status</span>
                <button class="test-button" onclick="testEndpoint('/api/status')">Test</button>
            </div>
            <div class="endpoint">
                <span class="endpoint-method">GET</span>
                <span class="endpoint-path">/api/info</span>
                <button class="test-button" onclick="testEndpoint('/api/info')">Test</button>
            </div>
        </div>

        <div class="footer">
            <p><strong>Techbridge Sentinel Agent</strong></p>
            <p>Techbridge University College</p>
            <p id="current-time">Loading...</p>
        </div>
    </div>

    <script>
        // Update timestamp
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleString();
            document.getElementById('timestamp').textContent = now.toLocaleTimeString();
        }

        // Fetch health data
        async function fetchHealth() {
            try {
                const response = await fetch('/health');
                const data = await response.json();

                if (data.status === 'healthy') {
                    document.getElementById('status').textContent = 'Healthy';
                    document.getElementById('status').style.color = '#48bb78';
                }

                if (data.uptime) {
                    const uptime = Math.floor(data.uptime);
                    const hours = Math.floor(uptime / 3600);
                    const minutes = Math.floor((uptime % 3600) / 60);
                    const seconds = uptime % 60;
                    document.getElementById('uptime').textContent =
                        `${hours}h ${minutes}m ${seconds}s`;
                }
            } catch (error) {
                console.error('Health check failed:', error);
                document.getElementById('status').textContent = 'Error';
                document.getElementById('status').style.color = '#f56565';
            }
        }

        // Test endpoint
        async function testEndpoint(path) {
            try {
                const response = await fetch(path);
                const data = await response.json();
                alert(`✅ Success!\n\n${JSON.stringify(data, null, 2)}`);
            } catch (error) {
                alert(`❌ Error: ${error.message}`);
            }
        }

        // Initialize
        updateTime();
        fetchHealth();
        setInterval(updateTime, 1000);
        setInterval(fetchHealth, 5000);
    </script>
</body>
