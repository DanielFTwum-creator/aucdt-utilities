<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #0F0C07; }
      .node { fill: #141210; stroke: #06b6d4; stroke-width: 2; rx: 15; }
      .db { fill: #141210; stroke: #C8A84B; stroke-width: 2; }
      .text { fill: #F2EBD9; font-family: 'Inter', sans-serif; font-size: 14px; text-anchor: middle; }
      .label { fill: #999; font-family: 'Inter', sans-serif; font-size: 12px; text-anchor: middle; }
      .title { fill: #C8A84B; font-family: 'Playfair Display', serif; font-size: 24px; font-weight: bold; }
      .path { stroke: #06b6d4; stroke-width: 2; fill: none; marker-end: url(#arrow-blue); }
      .path-ai { stroke: #f43f5e; stroke-width: 2; fill: none; marker-end: url(#arrow-red); stroke-dasharray: 4; }
    </style>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f43f5e" />
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="400" y="40" class="title" text-anchor="middle">Data Flow Diagram</text>

  <!-- Nodes -->
  <rect x="100" y="100" width="160" height="50" class="node"/>
  <text x="180" y="130" class="text">User Input (Form)</text>

  <rect x="540" y="100" width="160" height="50" class="node"/>
  <text x="620" y="130" class="text">Gemini API (GenAI)</text>

  <rect x="320" y="250" width="160" height="50" class="node"/>
  <text x="400" y="280" class="text">React State (formData)</text>

  <rect x="320" y="400" width="160" height="50" class="node"/>
  <text x="400" y="430" class="text">HTML Generator</text>

  <rect x="320" y="520" width="160" height="50" class="node"/>
  <text x="400" y="550" class="text">Exported .html File</text>

  <!-- Paths -->
  <path d="M 180 150 L 180 275 L 320 275" class="path" />
  <text x="250" y="265" class="label">Updates state</text>

  <path d="M 540 125 L 260 125" class="path-ai" />
  <text x="400" y="115" class="label" fill="#f43f5e">Generates content JSON</text>

  <path d="M 400 300 L 400 400" class="path" />
  <text x="445" y="355" class="label">Passes data</text>

  <path d="M 400 450 L 400 520" class="path" />
  <text x="460" y="490" class="label">Triggers download</text>

</svg>
