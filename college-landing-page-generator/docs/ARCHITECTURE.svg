<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #0F0C07; }
      .box { fill: #141210; stroke: #333; stroke-width: 2; rx: 8; }
      .text { fill: #F2EBD9; font-family: 'Inter', sans-serif; font-size: 14px; text-anchor: middle; }
      .title { fill: #C8A84B; font-family: 'Playfair Display', serif; font-size: 24px; font-weight: bold; }
      .line { stroke: #C8A84B; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 5, 5; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C8A84B" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg"/>
  <text x="400" y="40" class="title" text-anchor="middle">College Landing Page Generator - System Architecture</text>

  <!-- Client Layer -->
  <rect x="50" y="100" width="700" height="150" class="box" stroke="#C8A84B" stroke-dasharray="4" fill="none" />
  <text x="400" y="125" class="text" fill="#C8A84B" font-weight="bold">Client Layer (React 19.2.5 + Vite)</text>
  
  <rect x="100" y="150" width="150" height="60" class="box"/>
  <text x="175" y="185" class="text">Landing Page Builder</text>

  <rect x="325" y="150" width="150" height="60" class="box"/>
  <text x="400" y="185" class="text">Theme Context</text>

  <rect x="550" y="150" width="150" height="60" class="box"/>
  <text x="625" y="185" class="text">Admin Portal Routes</text>

  <!-- Business Logic & Services Layer -->
  <rect x="50" y="300" width="700" height="120" class="box" stroke="#06b6d4" stroke-dasharray="4" fill="none" />
  <text x="400" y="325" class="text" fill="#06b6d4" font-weight="bold">Services & Logic Layer</text>

  <rect x="150" y="340" width="180" height="60" class="box"/>
  <text x="240" y="375" class="text">HTML Generator Engine</text>

  <rect x="470" y="340" width="180" height="60" class="box"/>
  <text x="560" y="375" class="text">Gemini AI Service</text>

  <!-- Local Storage / State Layer -->
  <rect x="300" y="470" width="200" height="80" class="box"/>
  <text x="400" y="505" class="text" font-weight="bold">Browser LocalStorage</text>
  <text x="400" y="525" class="text" font-size="12px">Auth Tokens & Audit Logs</text>

  <!-- Connections -->
  <path d="M 175 210 L 175 275 L 240 275 L 240 340" class="line" />
  <path d="M 625 210 L 625 275 L 560 275 L 560 340" class="line" />
  <path d="M 400 210 L 400 470" class="line dashed" />
  <path d="M 625 210 L 625 510 L 500 510" class="line dashed" />

</svg>
