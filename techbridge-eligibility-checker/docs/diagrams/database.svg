<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .db { fill: #ffffff; stroke: #0F172A; stroke-width: 2; rx: 8; }
      .text-title { fill: #0F172A; font-family: sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
      .text-field { fill: #475569; font-family: monospace; font-size: 11px; }
      .line { stroke: #C8A84B; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C8A84B" />
    </marker>
  </defs>

  <rect width="1000" height="600" class="bg" />

  <text x="400" y="40" fill="#0F172A" font-family="serif" font-size="24" font-weight="bold" text-anchor="middle" letter-spacing="2">ELIGIBILITY DATA SCHEMAS</text>
  <text x="400" y="60" fill="#64748b" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="2">TUC ELIGIBILITY CHECKER v3.0.0</text>

  <!-- User Input -->
  <rect x="50" y="100" width="220" height="350" class="db" />
  <rect x="50" y="100" width="220" height="40" fill="#0F172A" rx="8" />
  <rect x="50" y="120" width="220" height="20" fill="#0F172A" />
  <text x="160" y="125" fill="#C8A84B" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">CandidateData</text>
  
  <text x="70" y="170" class="text-field" font-weight="bold">examination:</text>
  <text x="90" y="190" class="text-field">type: WASSCE|SSSCE|...</text>
  <text x="90" y="210" class="text-field">year: number</text>
  
  <text x="70" y="240" class="text-field" font-weight="bold">grades:</text>
  <text x="90" y="260" class="text-field">core: { math, eng, sci }</text>
  <text x="90" y="280" class="text-field">electives: Array[3]</text>

  <text x="70" y="310" class="text-field" font-weight="bold">programme:</text>
  <text x="90" y="330" class="text-field">targetId: string</text>

  <!-- Transformation -->
  <rect x="350" y="220" width="100" height="40" fill="#C8A84B" rx="20" />
  <text x="400" y="245" fill="#0F172A" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="1">VALIDATE</text>

  <!-- Processed Data -->
  <rect x="530" y="150" width="240" height="250" class="db" />
  <rect x="530" y="150" width="240" height="40" fill="#C8A84B" rx="8" />
  <rect x="530" y="170" width="240" height="20" fill="#C8A84B" />
  <text x="650" y="175" fill="#0F172A" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">EligibilityResult</text>

  <text x="550" y="220" class="text-field" font-weight="bold">isEligible: boolean</text>
  <text x="550" y="240" class="text-field">totalAggregate: number</text>
  <text x="550" y="260" class="text-field">status: Success|Warning|Fail</text>
  
  <text x="550" y="290" class="text-field" font-weight="bold">messages: Array</text>
  <text x="570" y="310" class="text-field">- "Meets Math Core"</text>
  <text x="570" y="330" class="text-field">- "Aggregate within range"</text>

  <!-- Connectors -->
  <path d="M 270 240 L 340 240" class="line" marker-end="url(#arrowhead)" />
  <path d="M 450 240 L 520 240" class="line" marker-end="url(#arrowhead)" />

</svg>