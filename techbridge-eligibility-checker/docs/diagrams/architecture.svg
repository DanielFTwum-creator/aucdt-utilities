<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: rgba(200,168,75,0.05); stroke: #C8A84B; stroke-width: 2; rx: 8; }
      .text-title { fill: #0F172A; font-family: sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
      .text-sub { fill: #C8A84B; font-family: sans-serif; font-size: 12px; letter-spacing: 2px; text-anchor: middle; }
      .line { stroke: #C8A84B; stroke-width: 2; stroke-dasharray: 4; fill: none; }
      .arrow { fill: #C8A84B; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
    </marker>
  </defs>
  
  <rect width="1000" height="600" class="bg" />
  
  <!-- Presentation Title -->
  <text x="400" y="40" fill="#C8A84B" font-family="serif" font-size="24" font-weight="bold" text-anchor="middle" letter-spacing="4">ELIGIBILITY CHECKER ARCHITECTURE</text>
  <text x="400" y="60" fill="#0F172A" opacity="0.6" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="2">PATH TO ADMISSION • REACT 19.2.4</text>

  <!-- Presentation Layer -->
  <rect x="50" y="100" width="200" height="300" class="box" />
  <text x="150" y="130" class="text-title">User UI</text>
  <text x="150" y="150" class="text-sub">REACT 19.2.4 SPA</text>
  
  <rect x="70" y="180" width="160" height="40" fill="rgba(15,23,42,0.05)" rx="4" />
  <text x="150" y="205" fill="#0F172A" font-family="sans-serif" font-size="12" text-anchor="middle">Multi-Exam Forms</text>

  <rect x="70" y="240" width="160" height="40" fill="rgba(15,23,42,0.05)" rx="4" />
  <text x="150" y="265" fill="#0F172A" font-family="sans-serif" font-size="12" text-anchor="middle">Radix UI Primitives</text>

  <rect x="70" y="300" width="160" height="40" fill="rgba(15,23,42,0.05)" rx="4" />
  <text x="150" y="325" fill="#0F172A" font-family="sans-serif" font-size="12" text-anchor="middle">Staff Portal View</text>

  <!-- Logic Layer -->
  <rect x="300" y="100" width="200" height="300" class="box" />
  <text x="400" y="130" class="text-title">Verification</text>
  <text x="400" y="150" class="text-sub">ALGORITHMS</text>

  <rect x="320" y="180" width="160" height="40" fill="rgba(200,168,75,0.2)" rx="4" />
  <text x="400" y="205" fill="#C8A84B" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Grade Matchers</text>

  <rect x="320" y="240" width="160" height="40" fill="rgba(200,168,75,0.2)" rx="4" />
  <text x="400" y="265" fill="#C8A84B" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Logic Simulator</text>

  <rect x="320" y="300" width="160" height="40" fill="rgba(200,168,75,0.2)" rx="4" />
  <text x="400" y="325" fill="#C8A84B" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Audit Persistence</text>

  <!-- Integration Layer -->
  <rect x="550" y="100" width="200" height="300" class="box" />
  <text x="650" y="130" class="text-title">System Links</text>
  <text x="650" y="150" class="text-sub">ADMISSIONS</text>

  <rect x="570" y="180" width="160" height="40" fill="#0F172A" rx="4" />
  <text x="650" y="205" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Program Metadata</text>

  <rect x="570" y="240" width="160" height="40" fill="#0F172A" rx="4" />
  <text x="650" y="265" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">TUC Main Portal</text>

  <!-- Connections -->
  <path d="M 250 200 L 310 200" class="line" marker-end="url(#arrowhead)" />
  <path d="M 500 200 L 560 200" class="line" marker-end="url(#arrowhead)" />
  
  <path d="M 250 260 L 310 260" class="line" marker-end="url(#arrowhead)" />
  <path d="M 500 260 L 560 260" class="line" marker-end="url(#arrowhead)" />

  <path d="M 250 320 L 310 320" class="line" marker-end="url(#arrowhead)" />
  <path d="M 310 320 L 250 320" class="line" marker-end="url(#arrowhead)" />
</svg>