<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#1e293b">SmartScale Data Model</text>

  <!-- SlideContent -->
  <rect x="50" y="100" width="200" height="200" rx="8" fill="#fff" stroke="#C97064" stroke-width="2"/>
  <text x="150" y="125" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#C97064">SlideContent</text>
  <line x1="50" y1="135" x2="250" y2="135" stroke="#cbd5e1"/>
  <text x="60" y="155" font-family="monospace" font-size="12" fill="#475569">- id: number</text>
  <text x="60" y="175" font-family="monospace" font-size="12" fill="#475569">- type: SlideType</text>
  <text x="60" y="195" font-family="monospace" font-size="12" fill="#475569">- title: string</text>
  <text x="60" y="215" font-family="monospace" font-size="12" fill="#475569">- interactions[]</text>
  <text x="60" y="235" font-family="monospace" font-size="12" fill="#475569">- useCases[]</text>

  <!-- Interaction -->
  <rect x="350" y="100" width="180" height="120" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="2"/>
  <text x="440" y="125" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#475569">Interaction</text>
  <line x1="350" y1="135" x2="530" y2="135" stroke="#cbd5e1"/>
  <text x="360" y="155" font-family="monospace" font-size="12" fill="#475569">- id: string</text>
  <text x="360" y="175" font-family="monospace" font-size="12" fill="#475569">- label: string</text>
  <text x="360" y="195" font-family="monospace" font-size="12" fill="#475569">- template: string</text>

  <!-- UseCase -->
  <rect x="350" y="250" width="180" height="120" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="2"/>
  <text x="440" y="275" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#475569">UseCase</text>
  <line x1="350" y1="285" x2="530" y2="285" stroke="#cbd5e1"/>
  <text x="360" y="305" font-family="monospace" font-size="12" fill="#475569">- industry: string</text>
  <text x="360" y="325" font-family="monospace" font-size="12" fill="#475569">- prompt: string</text>

  <!-- Relationship Lines -->
  <path d="M 250 150 L 350 150" stroke="#94a3b8" stroke-dasharray="5,5" fill="none"/>
  <text x="300" y="145" font-family="sans-serif" font-size="10" text-anchor="middle">1..*</text>
  
  <path d="M 250 280 L 350 280" stroke="#94a3b8" stroke-dasharray="5,5" fill="none"/>
  <text x="300" y="275" font-family="sans-serif" font-size="10" text-anchor="middle">1..*</text>
</svg>