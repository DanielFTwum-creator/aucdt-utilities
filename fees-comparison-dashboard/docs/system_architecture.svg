<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <style>
      .box { fill: #f8fafc; stroke: #1e293b; stroke-width: 2; rx: 8; }
      .provider { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .component { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .external { fill: #f3f4f6; stroke: #9ca3af; stroke-width: 2; stroke-dasharray: 5,5; rx: 8; }
      .text { font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #1e293b; text-anchor: middle; }
      .title { font-family: 'Segoe UI', sans-serif; font-size: 18px; font-weight: bold; fill: #1e293b; text-anchor: middle; }
      .arrow { stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#ffffff" />
  <text x="400" y="30" class="title">System Architecture - EduData Ghana</text>

  <!-- Client Browser Boundary -->
  <rect x="50" y="60" width="700" height="500" class="external" />
  <text x="400" y="85" class="text" font-weight="bold">Client Browser (React SPA)</text>

  <!-- Entry Point -->
  <rect x="325" y="110" width="150" height="50" class="box" />
  <text x="400" y="140" class="text">index.tsx (Entry)</text>

  <!-- App Container -->
  <rect x="325" y="200" width="150" height="50" class="box" />
  <text x="400" y="230" class="text">App.tsx (Layout)</text>

  <!-- Connectors -->
  <line x1="400" y1="160" x2="400" y2="200" class="arrow" />

  <!-- Context Layer -->
  <g transform="translate(0, 50)">
    <rect x="100" y="280" width="180" height="60" class="provider" />
    <text x="190" y="305" class="text" font-weight="bold">AuthContext</text>
    <text x="190" y="325" class="text" font-size="12px">Security & Audit Logs</text>

    <rect x="310" y="280" width="180" height="60" class="provider" />
    <text x="400" y="305" class="text" font-weight="bold">DataContext</text>
    <text x="400" y="325" class="text" font-size="12px">Fee Structures</text>

    <rect x="520" y="280" width="180" height="60" class="provider" />
    <text x="610" y="305" class="text" font-weight="bold">ThemeContext</text>
    <text x="610" y="325" class="text" font-size="12px">UI State</text>
  </g>

  <!-- Arrows from App to Contexts -->
  <line x1="400" y1="250" x2="190" y2="330" class="arrow" />
  <line x1="400" y1="250" x2="400" y2="330" class="arrow" />
  <line x1="400" y1="250" x2="610" y2="330" class="arrow" />

  <!-- UI Components Layer -->
  <g transform="translate(0, 100)">
    <rect x="150" y="380" width="200" height="60" class="component" />
    <text x="250" y="405" class="text" font-weight="bold">AdminPanel</text>
    <text x="250" y="425" class="text" font-size="12px">Mgmt, Logs, TestRunner</text>

    <rect x="450" y="380" width="200" height="60" class="component" />
    <text x="550" y="405" class="text" font-weight="bold">FeesDashboard</text>
    <text x="550" y="425" class="text" font-size="12px">Visualization & Charts</text>
  </g>

  <!-- Logic Flows -->
  <line x1="190" y1="390" x2="250" y2="480" class="arrow" stroke-dasharray="4" />
  <line x1="400" y1="390" x2="250" y2="480" class="arrow" stroke-dasharray="4" />
  
  <line x1="400" y1="390" x2="550" y2="480" class="arrow" stroke-dasharray="4" />
  <line x1="610" y1="390" x2="550" y2="480" class="arrow" stroke-dasharray="4" />

</svg>