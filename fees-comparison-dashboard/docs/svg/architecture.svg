<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .box { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; rx: 8; }
      .container { fill: #fff; stroke: #334155; stroke-width: 2; stroke-dasharray: 5,5; rx: 12; }
      .context { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 6; }
      .component { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 6; }
      .label { font-family: 'Segoe UI', sans-serif; text-anchor: middle; fill: #1e293b; }
      .title { font-size: 18px; font-weight: bold; }
      .small { font-size: 12px; }
      .arrow { stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <rect width="800" height="500" fill="#ffffff" />
  <text x="400" y="30" class="label title">High-Level System Architecture</text>

  <!-- Client Browser Boundary -->
  <rect x="50" y="60" width="700" height="400" class="container" />
  <text x="400" y="85" class="label" font-weight="bold">Client Web Browser (SPA)</text>

  <!-- Entry -->
  <rect x="350" y="110" width="100" height="40" class="box" />
  <text x="400" y="135" class="label">Entry (index.tsx)</text>

  <!-- Layout -->
  <rect x="350" y="180" width="100" height="40" class="box" />
  <text x="400" y="205" class="label">App Layout</text>

  <!-- Context Layer -->
  <g transform="translate(0, 30)">
    <rect x="100" y="250" width="180" height="60" class="context" />
    <text x="190" y="275" class="label" font-weight="bold">AuthContext</text>
    <text x="190" y="295" class="label small">Security &amp; Audit</text>

    <rect x="310" y="250" width="180" height="60" class="context" />
    <text x="400" y="275" class="label" font-weight="bold">DataContext</text>
    <text x="400" y="295" class="label small">Fee Models</text>

    <rect x="520" y="250" width="180" height="60" class="context" />
    <text x="610" y="275" class="label" font-weight="bold">ThemeContext</text>
    <text x="610" y="295" class="label small">UI State</text>
  </g>

  <!-- Component Layer -->
  <g transform="translate(0, 50)">
    <rect x="150" y="350" width="200" height="50" class="component" />
    <text x="250" y="380" class="label" font-weight="bold">Admin Panel</text>

    <rect x="450" y="350" width="200" height="50" class="component" />
    <text x="550" y="380" class="label" font-weight="bold">Public Dashboard</text>
  </g>

  <!-- Connectors -->
  <line x1="400" y1="150" x2="400" y2="180" class="arrow" />
  <line x1="400" y1="220" x2="400" y2="280" class="arrow" />
  <line x1="400" y1="220" x2="190" y2="280" class="arrow" />
  <line x1="400" y1="220" x2="610" y2="280" class="arrow" />
  
  <line x1="190" y1="340" x2="250" y2="400" class="arrow" stroke-dasharray="4" />
  <line x1="400" y1="340" x2="250" y2="400" class="arrow" stroke-dasharray="4" />
  <line x1="400" y1="340" x2="550" y2="400" class="arrow" stroke-dasharray="4" />
</svg>