<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <defs>
    <style>
      .actor-head { fill: #ffffff; stroke: #0f172a; stroke-width: 2; }
      .actor-body { stroke: #0f172a; stroke-width: 2; fill: none; }
      .usecase { fill: #ffffff; stroke: #3b82f6; stroke-width: 2; rx: 30; ry: 20; }
      .system { fill: #f8fafc; stroke: #64748b; stroke-width: 2; }
      .text { font-family: sans-serif; font-size: 13px; text-anchor: middle; fill: #0f172a; }
      .line { stroke: #64748b; stroke-width: 1.5; }
    </style>
  </defs>
  <rect x="150" y="50" width="300" height="420" class="system"/>
  <text x="300" y="75" font-weight="bold" text-anchor="middle" font-family="sans-serif">Ghana News Aggregator</text>
  <g transform="translate(60, 150)">
    <circle cx="20" cy="0" r="15" class="actor-head"/>
    <line x1="20" y1="15" x2="20" y2="50" class="actor-body"/>
    <line x1="0" y1="25" x2="40" y2="25" class="actor-body"/>
    <line x1="20" y1="50" x2="0" y2="80" class="actor-body"/>
    <line x1="20" y1="50" x2="40" y2="80" class="actor-body"/>
    <text x="20" y="105" class="text" font-weight="bold">Admin</text>
  </g>
  <g transform="translate(60, 350)">
    <circle cx="20" cy="0" r="15" class="actor-head"/>
    <line x1="20" y1="15" x2="20" y2="50" class="actor-body"/>
    <line x1="0" y1="25" x2="40" y2="25" class="actor-body"/>
    <line x1="20" y1="50" x2="0" y2="80" class="actor-body"/>
    <line x1="20" y1="50" x2="40" y2="80" class="actor-body"/>
    <text x="20" y="105" class="text" font-weight="bold">AI Agent</text>
  </g>
  <g transform="translate(500, 250)">
    <circle cx="20" cy="0" r="15" class="actor-head"/>
    <line x1="20" y1="15" x2="20" y2="50" class="actor-body"/>
    <line x1="0" y1="25" x2="40" y2="25" class="actor-body"/>
    <line x1="20" y1="50" x2="0" y2="80" class="actor-body"/>
    <line x1="20" y1="50" x2="40" y2="80" class="actor-body"/>
    <text x="20" y="105" class="text" font-weight="bold">Social API</text>
  </g>
  <ellipse cx="300" cy="120" rx="80" ry="25" class="usecase"/><text x="300" y="125" class="text">Configure Sources</text>
  <ellipse cx="300" cy="190" rx="80" ry="25" class="usecase"/><text x="300" y="195" class="text">Moderate Feed</text>
  <ellipse cx="300" cy="260" rx="80" ry="25" class="usecase"/><text x="300" y="265" class="text">Run Self-Test</text>
  <ellipse cx="300" cy="330" rx="80" ry="25" class="usecase"/><text x="300" y="335" class="text">Search Grounding</text>
  <ellipse cx="300" cy="400" rx="80" ry="25" class="usecase"/><text x="300" y="405" class="text">Automated Post</text>
  <line x1="100" y1="160" x2="220" y2="120" class="line"/>
  <line x1="100" y1="160" x2="220" y2="190" class="line"/>
  <line x1="100" y1="160" x2="220" y2="260" class="line"/>
  <line x1="100" y1="360" x2="220" y2="330" class="line"/>
  <line x1="100" y1="360" x2="220" y2="400" class="line"/>
  <line x1="380" y1="400" x2="500" y2="260" class="line"/>
</svg>