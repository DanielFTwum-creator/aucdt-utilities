<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.2" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#0f172a">System Architecture: Tier Overview</text>
  
  <g filter="url(#shadow)">
    <rect x="50" y="80" width="700" height="100" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="70" y="110" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1">Presentation Tier (React 19)</text>
    <rect x="250" y="120" width="300" height="40" rx="8" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="400" y="145" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#0f172a">Admin Dashboard & Modular UI</text>
  </g>
  
  <g filter="url(#shadow)">
    <rect x="50" y="240" width="700" height="160" rx="12" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
    <text x="70" y="270" font-family="sans-serif" font-size="16" font-weight="bold" fill="#7e22ce">Nexus Intelligence Tier (Autonomous Agent)</text>
    <rect x="80" y="295" width="140" height="70" rx="8" fill="#ffffff" stroke="#a855f7" stroke-width="2"/>
    <text x="150" y="335" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">AI Synthesis</text>
    <rect x="240" y="295" width="140" height="70" rx="8" fill="#ffffff" stroke="#a855f7" stroke-width="2"/>
    <text x="310" y="335" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Search Grounding</text>
    <rect x="400" y="295" width="140" height="70" rx="8" fill="#ffffff" stroke="#a855f7" stroke-width="2"/>
    <text x="470" y="335" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Self-Test Suite</text>
    <rect x="560" y="295" width="150" height="70" rx="8" fill="#ffffff" stroke="#a855f7" stroke-width="2"/>
    <text x="635" y="335" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Graph API Dispatch</text>
  </g>
  
  <g filter="url(#shadow)">
    <rect x="50" y="460" width="700" height="100" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="70" y="490" font-family="sans-serif" font-size="16" font-weight="bold" fill="#15803d">Data & External Service Tier</text>
    <rect x="120" y="505" width="150" height="40" rx="6" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
    <text x="195" y="530" font-family="sans-serif" font-size="12" text-anchor="middle">MariaDB Persistence</text>
    <rect x="325" y="505" width="150" height="40" rx="6" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
    <text x="400" y="530" font-family="sans-serif" font-size="12" text-anchor="middle">Google Gemini API</text>
    <rect x="530" y="505" width="150" height="40" rx="6" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
    <text x="605" y="530" font-family="sans-serif" font-size="12" text-anchor="middle">Meta Graph API</text>
  </g>
  
  <path d="M 400 180 L 400 240" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 400 400 L 400 460" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
</svg>