<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <style>
      .process { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 20; }
      .store { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
      .external { fill: #f1f5f9; stroke: #475569; stroke-width: 2; rx: 5; }
      .text { font-family: sans-serif; font-size: 12px; fill: #0f172a; text-anchor: middle; }
      .path { stroke: #475569; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="400" y="30" font-family="sans-serif" font-weight="bold" font-size="18" text-anchor="middle">Data Flow Diagram - News Processing</text>

  <!-- External Entities -->
  <rect x="50" y="150" width="100" height="60" class="external"/>
  <text x="100" y="185" class="text">News Sources</text>

  <rect x="650" y="150" width="100" height="60" class="external"/>
  <text x="700" y="185" class="text">Facebook API</text>

  <!-- Processes -->
  <rect x="200" y="150" width="100" height="60" class="process"/>
  <text x="250" y="185" class="text">Aggregation</text>

  <rect x="350" y="50" width="100" height="60" class="process"/>
  <text x="400" y="85" class="text">AI Processing</text>

  <rect x="500" y="150" width="100" height="60" class="process"/>
  <text x="550" y="185" class="text">Publishing</text>

  <!-- Data Stores -->
  <path d="M 350 250 L 450 250" class="store" stroke-width="4"/> <!-- Visual fake for data store lines -->
  <rect x="350" y="240" width="100" height="50" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="270" class="text">Database</text>

  <!-- Flows -->
  <!-- Sources -> Aggregation -->
  <path d="M 150 180 L 200 180" class="path"/>
  <text x="175" y="175" font-size="10" text-anchor="middle">Raw HTML/RSS</text>

  <!-- Aggregation -> Database -->
  <path d="M 250 210 L 250 265 L 350 265" class="path"/>
  <text x="280" y="260" font-size="10" text-anchor="middle">Store Raw</text>

  <!-- Database -> AI -->
  <path d="M 400 240 L 400 110" class="path"/>
  <text x="405" y="225" font-size="10" text-anchor="start">Pending Articles</text>

  <!-- AI -> Database -->
  <path d="M 350 80 L 320 80 L 320 250 L 350 250" class="path"/>
  <text x="315" y="150" font-size="10" text-anchor="end">Summaries</text>

  <!-- Database -> Publisher -->
  <path d="M 450 265 L 550 265 L 550 210" class="path"/>
  <text x="520" y="260" font-size="10" text-anchor="middle">Approved Posts</text>

  <!-- Publisher -> Facebook -->
  <path d="M 600 180 L 650 180" class="path"/>
  <text x="625" y="175" font-size="10" text-anchor="middle">Post Data</text>

</svg>