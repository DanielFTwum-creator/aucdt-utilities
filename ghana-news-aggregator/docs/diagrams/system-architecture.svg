<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="#f8fafc"/>
  <text x="400" y="40" font-family="Merriweather, serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#0f172a">Ghana News Aggregator: System Architecture</text>
  
  <!-- Client Layer -->
  <g filter="url(#shadow)">
    <rect x="50" y="80" width="700" height="120" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="70" y="110" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1">Client Layer (Web UI)</text>
    <rect x="250" y="125" width="300" height="50" rx="8" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="400" y="155" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#0f172a">React Admin Dashboard (SPA)</text>
  </g>
  
  <!-- Service Layer -->
  <g filter="url(#shadow)">
    <rect x="50" y="240" width="700" height="160" rx="12" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
    <text x="70" y="270" font-family="sans-serif" font-size="16" font-weight="bold" fill="#7e22ce">Backend / Agent Layer (Node.js)</text>
    
    <rect x="80" y="290" width="150" height="80" rx="8" fill="#ffffff" stroke="#a855f7" stroke-width="2"/>
    <text x="155" y="325" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">API Gateway</text>
    <text x="155" y="345" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#64748b">Express / JWT Auth</text>
    
    <rect x="250" y="290" width="150" height="80" rx="8" fill="#ffffff" stroke="#a855f7" stroke-width="2"/>
    <text x="325" y="325" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Nexus AI Agent</text>
    <text x="325" y="345" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#64748b">Gemini 2.5 Logic</text>
    
    <rect x="420" y="290" width="150" height="80" rx="8" fill="#ffffff" stroke="#a855f7" stroke-width="2"/>
    <text x="495" y="325" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Puppeteer Runner</text>
    <text x="495" y="345" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#64748b">Headless Testing</text>
    
    <rect x="590" y="290" width="140" height="80" rx="8" fill="#ffffff" stroke="#a855f7" stroke-width="2"/>
    <text x="660" y="325" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Social Publisher</text>
    <text x="660" y="345" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#64748b">FB Graph API</text>
  </g>

  <!-- Persistence Layer -->
  <g filter="url(#shadow)">
    <rect x="50" y="440" width="700" height="120" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="70" y="470" font-family="sans-serif" font-size="16" font-weight="bold" fill="#15803d">Persistence Layer</text>
    
    <rect x="200" y="490" width="120" height="50" rx="6" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
    <text x="260" y="520" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#0f172a">MariaDB (Primary)</text>
    
    <rect x="340" y="490" width="120" height="50" rx="6" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
    <text x="400" y="520" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#0f172a">Redis (Cache)</text>
    
    <rect x="480" y="490" width="120" height="50" rx="6" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
    <text x="540" y="520" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#0f172a">Local Session Store</text>
  </g>

  <!-- Flow Lines -->
  <line x1="400" y1="200" x2="160" y2="290" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="155" y1="370" x2="260" y2="490" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="325" y1="370" x2="325" y2="440" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <text x="180" y="240" font-family="sans-serif" font-size="10" fill="#64748b" transform="rotate(-25 180 240)">HTTPS / WebSocket</text>
  <text x="500" y="430" font-family="sans-serif" font-size="10" fill="#64748b">SQL / Key-Value</text>
</svg>