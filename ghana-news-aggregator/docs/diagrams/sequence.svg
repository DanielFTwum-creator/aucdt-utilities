<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <defs>
    <style>
      .lifeline { stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 4; }
      .box { fill: #ffffff; stroke: #0f172a; stroke-width: 2; }
      .text { font-family: monospace; font-size: 12px; text-anchor: middle; }
      .message { stroke: #334155; stroke-width: 1.5; marker-end: url(#arrow); }
      .activation { fill: #cbd5e1; stroke: #94a3b8; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
  </defs>

  <!-- Lifelines -->
  <line x1="100" y1="50" x2="100" y2="450" class="lifeline"/>
  <line x1="250" y1="50" x2="250" y2="450" class="lifeline"/>
  <line x1="400" y1="50" x2="400" y2="450" class="lifeline"/>
  <line x1="550" y1="50" x2="550" y2="450" class="lifeline"/>

  <!-- Headers -->
  <rect x="50" y="20" width="100" height="30" class="box"/>
  <text x="100" y="40" class="text">Aggregator</text>

  <rect x="200" y="20" width="100" height="30" class="box"/>
  <text x="250" y="40" class="text">Database</text>

  <rect x="350" y="20" width="100" height="30" class="box"/>
  <text x="400" y="40" class="text">AI Service</text>

  <rect x="500" y="20" width="100" height="30" class="box"/>
  <text x="550" y="40" class="text">Publisher</text>

  <!-- Sequence -->
  
  <!-- 1. Fetch News -->
  <rect x="95" y="70" width="10" height="40" class="activation"/>
  <line x1="105" y1="80" x2="245" y2="80" class="message"/>
  <text x="175" y="75" class="text">saveArticle(raw)</text>

  <!-- 2. Processing Trigger -->
  <rect x="245" y="80" width="10" height="20" class="activation"/>
  
  <!-- 3. AI Processing -->
  <line x1="250" y1="120" x2="395" y2="120" class="message"/>
  <text x="325" y="115" class="text">requestSummary(content)</text>
  
  <rect x="395" y="120" width="10" height="50" class="activation"/>
  
  <line x1="395" y1="160" x2="255" y2="160" class="message" stroke-dasharray="4"/>
  <text x="325" y="155" class="text">return(summary, tags)</text>

  <!-- 4. Update DB -->
  <rect x="245" y="160" width="10" height="20" class="activation"/>
  <line x1="255" y1="180" x2="100" y2="180" class="message" stroke-dasharray="4"/>
  
  <!-- 5. Schedule Post -->
  <line x1="250" y1="220" x2="545" y2="220" class="message"/>
  <text x="400" y="215" class="text">queuePost(approvedArticle)</text>

  <rect x="545" y="220" width="10" height="40" class="activation"/>
  
  <!-- 6. Publish -->
  <text x="620" y="240" class="text" fill="#64748b">[Scheduled Time]</text>
  <line x1="555" y1="250" x2="650" y2="250" class="message"/>
  <text x="600" y="245" class="text">POST /feed</text>

</svg>