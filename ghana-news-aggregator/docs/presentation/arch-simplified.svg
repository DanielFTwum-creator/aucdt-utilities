<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#1e293b"/>
  <text x="400" y="60" font-family="sans-serif" font-weight="bold" font-size="32" fill="#ffffff" text-anchor="middle">Ghana News Hub: Platform Flow</text>
  <g transform="translate(50, 150)">
    <rect width="180" height="150" rx="25" fill="#3b82f6" opacity="0.9"/>
    <text x="90" y="85" font-family="sans-serif" font-weight="bold" font-size="22" fill="white" text-anchor="middle">NEWS SOURCES</text>
  </g>
  <g transform="translate(300, 100)">
    <rect width="200" height="250" rx="30" fill="#10b981" opacity="0.9"/>
    <text x="100" y="130" font-family="sans-serif" font-weight="bold" font-size="28" fill="white" text-anchor="middle">NEXUS</text>
    <text x="100" y="170" font-family="sans-serif" font-weight="bold" font-size="28" fill="white" text-anchor="middle">AI AGENT</text>
    <text x="100" y="210" font-family="sans-serif" font-size="14" fill="#ecfdf5" text-anchor="middle">GEMINI POWERED</text>
