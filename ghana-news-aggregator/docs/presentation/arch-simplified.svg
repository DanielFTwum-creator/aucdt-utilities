  </g>
  <path d="M 230 225 L 300 225" stroke="white" stroke-width="6" marker-end="url(#w-arrow)"/>
  <path d="M 500 225 L 570 225" stroke="white" stroke-width="6" marker-end="url(#w-arrow)"/>
  <defs>
    <marker id="w-arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="white"/>
    </marker>
  </defs>
  <text x="400" y="400" font-family="sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">Automated Discovery • AI Ingestion • Social Deployment</text>
