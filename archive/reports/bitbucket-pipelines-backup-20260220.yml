pipelines:
  # This defines the default pipeline that runs on push to any branch.
  default:
    - parallel:
        - step:
            name: Build and Deploy Fees Comparison Dashboard
            image: node:20-alpine
            caches:
              - node
              - pnpm
            script:
              - cd fees-comparison-dashboard
              - corepack enable
              - corepack prepare pnpm@latest --activate
              - pnpm install --frozen-lockfile
              - pnpm run build
              - echo "Checking dist directory..."
              - ls -la dist/
              - mkdir -p dist/WEB-INF
              - cp -varf ./WEB-INF/* dist/WEB-INF/
              - apk add --no-cache zip openssh-client
              - cd ./dist/
              - zip -r fees-comparison.war *
              - scp fees-comparison.war root@66.226.72.199:/opt/tomcat/webapps/fees-comparison.war
            artifacts:
              - fees-comparison-dashboard/dist/**
            changesets:
              - include: 'fees-comparison-dashboard/**'
              
