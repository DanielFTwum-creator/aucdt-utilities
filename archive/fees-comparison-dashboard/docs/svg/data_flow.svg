<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      .entity { fill: #f3f4f6; stroke: #1f2937; stroke-width: 2; rx: 0; }
      .process { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 25; ry: 25; }
      .store { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
      .label { font-family: 'Segoe UI', sans-serif; text-anchor: middle; font-size: 14px; }
      .arrow { stroke: #4b5563; stroke-width: 1.5; marker-end: url(#arrowhead); fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563" />
    </marker>
  </defs>

  <rect width="800" height="400" fill="#ffffff" />
  <text x="400" y="30" class="label" font-size="18px" font-weight="bold">DFD: Admin Fee Update Process</text>

  <!-- External Entity: Admin -->
  <rect x="50" y="150" width="100" height="60" class="entity" />
  <text x="100" y="185" class="label" font-weight="bold">Administrator</text>

  <!-- Process 1: Validate -->
  <rect x="230" y="150" width="120" height="60" class="process" rx="30" />
  <text x="290" y="175" class="label">1.0 Validate</text>
  <text x="290" y="195" class="label">Input</text>

  <!-- Process 2: Update State -->
  <rect x="430" y="150" width="120" height="60" class="process" rx="30" />
  <text x="490" y="175" class="label">2.0 Update</text>
  <text x="490" y="195" class="label">State</text>

  <!-- Process 3: Log Action -->
  <rect x="430" y="280" width="120" height="60" class="process" rx="30" />
  <text x="490" y="305" class="label">3.0 Log</text>
  <text x="490" y="325" class="label">Action</text>

  <!-- Data Store: DataContext -->
  <path d="M650,140 L750,140 L750,220 L650,220 M660,140 L660,220" class="store" />
  <text x="710" y="185" class="label">Fee Data Store</text>
  
  <!-- Data Store: AuditContext -->
  <path d="M650,270 L750,270 L750,350 L650,350 M660,270 L660,350" class="store" />
  <text x="710" y="315" class="label">Audit Logs</text>

  <!-- Flows -->
  <path d="M150,180 L230,180" class="arrow" />
  <text x="190" y="170" class="label" font-size="10px">Fee Changes</text>

  <path d="M350,180 L430,180" class="arrow" />
  <text x="390" y="170" class="label" font-size="10px">Valid Data</text>

  <path d="M550,180 L650,180" class="arrow" />
  <text x="600" y="170" class="label" font-size="10px">Update</text>

  <path d="M490,210 L490,280" class="arrow" />
  <text x="500" y="245" class="label" font-size="10px">Trigger</text>

  <path d="M550,310 L650,310" class="arrow" />
  <text x="600" y="300" class="label" font-size="10px">New Log</text>

</svg>