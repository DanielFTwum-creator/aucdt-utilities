<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <style>
      .table { fill: #FFFFFF; stroke: #A0A0A0; stroke-width: 1; filter: url(#dropshadow); }
      .header { fill: #5C4033; stroke: #5C4033; stroke-width: 1; }
      .header-text { fill: #FFFFFF; font-weight: bold; font-size: 14px; }
      .field-text { font-size: 12px; fill: #333333; }
      .type-text { font-size: 11px; fill: #777777; }
      .pk-text { font-weight: bold; fill: #8E24AA; }
      .fk-text { font-style: italic; fill: #007BFF; }
      .title { font-size: 24px; font-weight: bold; fill: #5C4033; text-anchor: middle; }
      .relation { stroke: #555555; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <filter id="dropshadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#00000030"/>
    </filter>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555555"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="600" fill="#F9FAFB" />
  <text x="400" y="40" class="title">MySQL Database Schema</text>

  <!-- Users Table -->
  <g id="users-table" transform="translate(50, 80)">
    <rect class="table" width="200" height="150" rx="5"/>
    <rect class="header" width="200" height="30" rx="5"/>
    <text x="100" y="20" class="header-text" text-anchor="middle">users</text>
    <text x="10" y="50" class="field-text"><tspan class="pk-text">id (PK)</tspan>: INT</text>
    <text x="10" y="70" class="field-text">email: VARCHAR(255)</text>
    <text x="10" y="90" class="field-text">password_hash: VARCHAR(255)</text>
    <text x="10" y="110" class="field-text">role: ENUM('student', 'admin')</text>
    <text x="10" y="130" class="field-text">created_at: TIMESTAMP</text>
  </g>

  <!-- Exams Table -->
  <g id="exams-table" transform="translate(300, 80)">
    <rect class="table" width="220" height="170" rx="5"/>
    <rect class="header" width="220" height="30" rx="5"/>
    <text x="110" y="20" class="header-text" text-anchor="middle">exams</text>
    <text x="10" y="50" class="field-text"><tspan class="pk-text">id (PK)</tspan>: INT</text>
    <text x="10" y="70" class="field-text">name: VARCHAR(255)</text>
    <text x="10" y="90" class="field-text">description: TEXT</text>
    <text x="10" y="110" class="field-text">subject: VARCHAR(255)</text>
    <text x="10" y="130" class="field-text">questions: JSON</text>
    <text x="10" y="150" class="field-text"><tspan class="fk-text">created_by (FK)</tspan>: INT</text>
  </g>

  <!-- Exam Progress Table -->
  <g id="progress-table" transform="translate(50, 280)">
    <rect class="table" width="200" height="130" rx="5"/>
    <rect class="header" width="200" height="30" rx="5"/>
    <text x="100" y="20" class="header-text" text-anchor="middle">exam_progress</text>
    <text x="10" y="50" class="field-text"><tspan class="pk-text">id (PK)</tspan>: INT</text>
    <text x="10" y="70" class="field-text"><tspan class="fk-text">user_id (FK)</tspan>: INT</text>
    <text x="10" y="90" class="field-text"><tspan class="fk-text">exam_id (FK)</tspan>: INT</text>
    <text x="10" y="110" class="field-text">answers: JSON</text>
  </g>

  <!-- Audit Logs Table -->
  <g id="logs-table" transform="translate(550, 80)">
    <rect class="table" width="200" height="130" rx="5"/>
    <rect class="header" width="200" height="30" rx="5"/>
    <text x="100" y="20" class="header-text" text-anchor="middle">audit_logs</text>
    <text x="10" y="50" class="field-text"><tspan class="pk-text">id (PK)</tspan>: INT</text>
    <text x="10" y="70" class="field-text"><tspan class="fk-text">user_id (FK)</tspan>: INT</text>
    <text x="10" y="90" class="field-text">action: VARCHAR(255)</text>
    <text x="10" y="110" class="field-text">details: JSON</text>
  </g>

  <!-- Relationships -->
  <path class="relation" d="M 250 165 C 275 165, 275 165, 300 165" />
  <text x="275" y="160" class="fk-text" font-size="10" text-anchor="middle">created by</text>
  
  <path class="relation" d="M 150 230 V 280" />
  <text x="165" y="260" class="fk-text" font-size="10">has progress</text>
  
  <path class="relation" d="M 250 345 C 275 345, 275 200, 300 200" />
  <text x="275" y="280" class="fk-text" font-size="10">progress for</text>
  
  <path class="relation" d="M 250 145 C 375 145, 425 145, 550 145" />
  <text x="400" y="140" class="fk-text" font-size="10">logs actions of</text>

</svg>