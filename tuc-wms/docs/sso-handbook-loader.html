<!doctype html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>SSO Ecosystem Handbook · TUC-WMS</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Spectral:wght@400;600&display=swap" />
<style>
  :root{--navy:#1a1f3c;--crimson:#8b1a1a;--gold:#f5c518;--paper:#f7f5f0}
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;display:grid;place-items:center;background:var(--paper);font-family:'Spectral',Georgia,serif;color:#23263a}
  .card{background:#fff;border:1px solid #e2e0d8;border-top:5px solid var(--gold);max-width:430px;width:92%;
    padding:38px 36px;text-align:center;box-shadow:0 10px 36px rgba(26,31,60,.1)}
  .seal{width:60px;height:60px;border-radius:50%;background:var(--gold);margin:0 auto 16px;display:flex;align-items:center;justify-content:center}
  h1{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.05em;font-size:26px;color:var(--navy);line-height:1.05;margin-bottom:6px}
  p{font-size:15px;color:#5a5d78;margin-top:8px}
  .err{color:var(--crimson);font-weight:600}
  a{color:var(--crimson)}
  .dots::after{content:"";animation:d 1.2s steps(4,end) infinite}
  @keyframes d{0%{content:""}25%{content:"."}50%{content:".."}75%{content:"..."}}
</style>
</head>
<body>
<div class="card">
  <div class="seal" aria-hidden="true">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M12 2.5 4.5 5.4v6.1c0 4.6 3.2 8.4 7.5 9.9 4.3-1.5 7.5-5.3 7.5-9.9V5.4L12 2.5Z" fill="#1a1f3c"/><path d="m8.6 11.8 2.3 2.4 4.6-4.9" stroke="#f5c518" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <h1>SSO Ecosystem Handbook</h1>
  <p id="msg" class="dots">Verifying your session</p>
</div>
<script>
(async () => {
  const msg = document.getElementById('msg');
  const fail = (html) => { msg.classList.remove('dots'); msg.classList.add('err'); msg.innerHTML = html; };
  try {
    const r = await fetch('/api/auth/refresh', { method: 'POST', credentials: 'include' });
    if (!r.ok) { fail('You are not signed in. <a href="/">Sign in to WMS</a>, then reopen this page.'); return; }
    const { access_token } = await r.json();
    const doc = await fetch('/api/admin/docs/sso-handbook', { headers: { Authorization: 'Bearer ' + access_token } });
    if (doc.status === 403) { fail('This document is restricted to System Administrators.'); return; }
    if (!doc.ok) { fail('Could not load the handbook (HTTP ' + doc.status + '). Try again shortly.'); return; }
    const html = await doc.text();
    document.open(); document.write(html); document.close();
  } catch (e) {
    fail('Network error — is WMS reachable? Try again shortly.');
  }
})();
</script>
</body>
</html>
