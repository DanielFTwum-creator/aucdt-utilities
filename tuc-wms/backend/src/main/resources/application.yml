server:
  port: ${PORT:8080}
  forward-headers-strategy: framework   # behind the Plesk/nginx reverse proxy

spring:
  application:
    name: tuc-wms

  # Local/dev default: H2 in-memory so the app + mock-OAuth E2E (AC-001) run with
  # no external DB. Production overrides via env to MariaDB (TUC stack, port 3307).
  datasource:
    url: ${DB_URL:jdbc:h2:mem:tucwms;DB_CLOSE_DELAY=-1;MODE=MySQL}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    hikari:
      max-lifetime: 120000         # 2 min — well under MariaDB wait_timeout (300s)
      keepalive-time: 60000        # 1 min — proactively ping idle connections
      connection-test-query: SELECT 1
      connection-timeout: 30000    # fail fast rather than queue indefinitely
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    open-in-view: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder-client-secret}
            scope:
              - openid
              - email
              - profile
            # SRS §3.3 — redirect URI registered in the Google Workspace console
            redirect-uri: ${GOOGLE_REDIRECT_URI:https://wms.techbridge.edu.gh/api/auth/google/callback}
        provider:
          google:
            issuer-uri: https://accounts.google.com

# TUC-WMS auth settings (FR-AUTH-002, 008, 009) — see .env.example
tucwms:
  auth:
    allowed-domain: ${ALLOWED_DOMAIN:@techbridge.edu.gh}   # FR-AUTH-009
    jwt-secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-min-32-bytes-long!!}
    jwt-expiry-minutes: ${JWT_EXPIRY_MINUTES:15}
    jwt-refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:7}
    totp-issuer: ${TOTP_ISSUER:TUC-WMS}
    # Frontend origin for the post-login redirect + CORS (UI delivered separately).
    frontend-base: ${FRONTEND_BASE:https://wms.techbridge.edu.gh}
  # Notification email via the TUC hosted gateway (same as RMS/dmcdai). Blank gateway-url
  # = disabled (dev default): TaskMailService logs and no-ops. Set MAIL_GATEWAY_URL in prod.
  mail:
    gateway-url: ${MAIL_GATEWAY_URL:}
    sender: ${MAIL_SENDER:noreply@techbridge.edu.gh}
  # Central Gemini key proxy (Phase 2: PM2→WMS). The API key lives ONLY here, never in
  # any client bundle. Blank api-key = disabled (dev default): /api/gemini/generate returns
  # 503 so local runs need no key or network. Set GEMINI_API_KEY in prod.
  gemini:
    api-key: ${GEMINI_API_KEY:}
    # Service credential for server-side fleet-app relays (X-Gemini-Proxy-Key header).
    # Blank = only logged-in WMS users may call /generate. Set GEMINI_PROXY_KEY in prod.
    proxy-key: ${GEMINI_PROXY_KEY:}
    default-model: ${GEMINI_DEFAULT_MODEL:gemini-2.5-flash}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}

# OpenAPI/Swagger — OFF by default so the production auth API is never exposed.
# Devs self-serve by running with SWAGGER_ENABLED=true (dev/staging), then visiting
# /swagger-ui.html. Security permits the doc paths only; nothing is served when disabled.
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger-ui.html

logging:
  level:
    gh.edu.techbridge.wms: INFO
