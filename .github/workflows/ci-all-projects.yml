name: AUCDT Multi-Project CI/CD Pipeline

# Trigger on commits to main/develop, PRs, and manual dispatch
on:
  push:
    branches: [ main, develop, master ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ main, develop, master ]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to staging after build?'
        required: false
        default: 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '18'

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # DETECT CHANGES (Which projects are affected)
  # ════════════════════════════════════════════════════════════════════════════

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed projects
        id: set-matrix
        run: |
          # Projects to monitor (top 12)
          declare -a projects=(
            "services/ghana-news-api"
            "brand-guideline-checker"
            "aucdt-msee-aptitude-test"
            "lecturer-assessment-portal"
            "ai-utilities/asapro6"
            "techbridge-sentinel-agent"
            "analytics-refactor"
            "tsapro"
            "techbridge-dashboard"
            "GhanaNewsAI"
            "modern-product-dev-lifecycle"
            "aucdt-dashboard"
          )

          changed_projects='[]'
          
          for project in "${projects[@]}"; do
            if git diff --name-only origin/${GITHUB_BASE_REF:-main} $GITHUB_SHA | grep -q "^$project"; then
              project_json="{\"path\":\"$project\",\"name\":\"$(basename $project)\"}"
              changed_projects=$(echo "$changed_projects" | jq --argjson obj "$project_json" '. += [$obj]')
            fi
          done

          # If no specific project changed, build all
          if [ "$changed_projects" == "[]" ]; then
            for project in "${projects[@]}"; do
              project_json="{\"path\":\"$project\",\"name\":\"$(basename $project)\"}"
              changed_projects=$(echo "$changed_projects" | jq --argjson obj "$project_json" '. += [$obj]')
            done
          fi

          echo "matrix=$changed_projects" >> $GITHUB_OUTPUT
          echo "Detected projects: $changed_projects"

  # ════════════════════════════════════════════════════════════════════════════
  # LINT & FORMAT CHECK
  # ════════════════════════════════════════════════════════════════════════════

  lint:
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ matrix.project.path }}/package-lock.json'

      - name: Install dependencies
        working-directory: ${{ matrix.project.path }}
        run: npm ci || npm install

      - name: Run ESLint
        working-directory: ${{ matrix.project.path }}
        run: npm run lint 2>/dev/null || echo "No lint script found"

      - name: Check formatting
        working-directory: ${{ matrix.project.path }}
        run: npm run format:check 2>/dev/null || echo "No format check script found"

  # ════════════════════════════════════════════════════════════════════════════
  # UNIT TESTS
  # ════════════════════════════════════════════════════════════════════════════

  test:
    runs-on: ubuntu-latest
    needs: [ detect-changes, lint ]
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ matrix.project.path }}/package-lock.json'

      - name: Install dependencies
        working-directory: ${{ matrix.project.path }}
        run: npm ci || npm install

      - name: Run unit tests
        working-directory: ${{ matrix.project.path }}
        run: npm test -- --coverage 2>/dev/null || echo "No test script found"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.project.name }}
          path: ${{ matrix.project.path }}/coverage/
          retention-days: 5

  # ════════════════════════════════════════════════════════════════════════════
  # BUILD DOCKER IMAGE
  # ════════════════════════════════════════════════════════════════════════════

  build:
    runs-on: ubuntu-latest
    needs: [ detect-changes, test ]
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.project.path }}
          file: ${{ matrix.project.path }}/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.project.name }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.project.name }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.project.name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.project.name }}:buildcache,mode=max

  # ════════════════════════════════════════════════════════════════════════════
  # INTEGRATION & E2E TESTS
  # ════════════════════════════════════════════════════════════════════════════

  e2e:
    runs-on: ubuntu-latest
    needs: [ detect-changes, build ]
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ matrix.project.path }}/package-lock.json'

      - name: Install dependencies
        working-directory: ${{ matrix.project.path }}
        run: npm ci || npm install

      - name: Install Playwright browsers (if applicable)
        working-directory: ${{ matrix.project.path }}
        run: npx playwright install --with-deps 2>/dev/null || true

      - name: Run E2E tests
        working-directory: ${{ matrix.project.path }}
        run: npm run test:e2e 2>/dev/null || npm run test:integration 2>/dev/null || echo "No E2E tests found"

      - name: Upload E2E reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ matrix.project.name }}
          path: ${{ matrix.project.path }}/playwright-report/
          retention-days: 5

  # ════════════════════════════════════════════════════════════════════════════
  # SECURITY SCAN
  # ════════════════════════════════════════════════════════════════════════════

  security:
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '${{ matrix.project.path }}'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: npm audit
        working-directory: ${{ matrix.project.path }}
        continue-on-error: true
        run: npm audit --production 2>/dev/null || true

  # ════════════════════════════════════════════════════════════════════════════
  # STAGING DEPLOYMENT (Optional)
  # ════════════════════════════════════════════════════════════════════════════

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [ test, build, e2e ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging (Ubuntu Server)
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          echo "Deploying ${{ matrix.project.name }} to staging..."
          # Example: SSH into server and pull latest image
          # mkdir -p ~/.ssh
          # echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          # chmod 600 ~/.ssh/deploy_key
          # ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST "cd /opt/aucdt-utilities && docker-compose pull && docker-compose up -d"
          
          echo "Deployment script would run here (configure in GitHub Secrets)"

  # ════════════════════════════════════════════════════════════════════════════
  # NOTIFICATION & SUMMARY
  # ════════════════════════════════════════════════════════════════════════════

  summary:
    runs-on: ubuntu-latest
    needs: [ lint, test, build, e2e, security ]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.lint.result }}" == "failure" ] || \
             [ "${{ needs.test.result }}" == "failure" ] || \
             [ "${{ needs.build.result }}" == "failure" ]; then
            echo "❌ Pipeline failed. Check logs above."
            exit 1
          fi
          echo "✅ All checks passed!"

      - name: Post to Slack (Optional)
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            AUCDT CI/CD Pipeline: ${{ job.status }}
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
