<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Email Extractor</title>
    <!-- Load PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        /* Basic reset for consistent styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body styling with a gradient background and Inter font (default for Canvas) */
        body {
            font-family: 'Inter', sans-serif; /* Using Inter font as per guidelines */
            /* TUC branding: Deep Brown background gradient */
            background: linear-gradient(135deg, #654321 0%, #8B4513 100%); /* Deep Brown to SaddleBrown */
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Main container for the application */
        .container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95); /* White background with slight transparency */
            backdrop-filter: blur(10px); /* Frosted glass effect */
            border-radius: 20px; /* Rounded corners for the container */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1); /* Soft shadow */
            overflow: hidden; /* Ensures content stays within rounded corners */
        }

        /* Header section styling */
        .header {
            /* TUC branding: Gold gradient */
            background: linear-gradient(135deg, #DAA520 0%, #FFD700 100%); /* Goldenrod to Gold */
            padding: 30px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3); /* Text shadow for depth */
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Content area padding */
        .content {
            padding: 40px;
        }

        /* File upload section styling */
        .upload-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* Hide default file input */
        .file-input {
            position: absolute;
            left: -9999px;
        }

        /* Custom label for file input to act as a button */
        .file-input-label {
            display: inline-block;
            padding: 15px 30px;
            /* TUC branding: Gold gradient for input label */
            background: linear-gradient(135deg, #DAA520 0%, #FFD700 100%); /* Goldenrod to Gold */
            color: white;
            border-radius: 50px; /* Pill-shaped button */
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease; /* Smooth hover effects */
            box-shadow: 0 8px 20px rgba(218, 165, 32, 0.3); /* Shadow based on gold */
        }

        .file-input-label:hover {
            transform: translateY(-2px); /* Slight lift on hover */
            box-shadow: 0 12px 25px rgba(218, 165, 32, 0.4); /* Enhanced shadow on hover */
        }

        .file-info {
            margin-top: 15px;
            font-size: 1rem;
            color: #666; /* Retaining a neutral dark grey for readability */
        }

        /* Loading indicator styling */
        .loading {
            display: none; /* Hidden by default */
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3; /* Light border */
            /* TUC branding: Gold for spinner top border */
            border-top: 4px solid #DAA520; /* Goldenrod for loading spinner color */
            border-radius: 50%;
            animation: spin 1s linear infinite; /* Rotation animation */
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Results section styling */
        .results {
            display: none; /* Hidden by default */
            margin-top: 30px;
        }

        .results h2 {
            color: #333; /* Retaining a neutral dark grey for readability */
            margin-bottom: 20px;
            font-size: 1.8rem;
            /* TUC branding: Gold underline */
            border-bottom: 3px solid #DAA520; /* Goldenrod underline effect */
            padding-bottom: 10px;
        }

        .email-count {
            /* TUC branding: Gold gradient for email count box */
            background: linear-gradient(135deg, #DAA520 0%, #FFD700 100%); /* Goldenrod to Gold */
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
        }

        /* List of extracted emails */
        .email-list {
            background: #f8f9fa; /* Light grey background */
            border-radius: 10px;
            padding: 20px;
            max-height: 400px; /* Max height with scrolling */
            overflow-y: auto;
            border: 2px solid #e9ecef; /* Light border */
        }

        .email-item {
            background: white;
            padding: 12px 18px;
            margin-bottom: 8px;
            border-radius: 8px;
            /* TUC branding: Gold left border for email items */
            border-left: 4px solid #DAA520; /* Goldenrod left border for visual accent */
            font-family: 'Courier New', monospace; /* Monospace font for emails */
            font-size: 0.95rem;
            color: #495057; /* Dark grey for readability */
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .email-item:hover {
            background: #FFF8E1; /* Very light yellow/gold on hover */
            transform: translateX(5px); /* Slide effect on hover */
        }

        .email-item:last-child {
            margin-bottom: 0;
        }

        /* Download and Copy buttons section */
        .download-section {
            margin-top: 25px;
            text-align: center;
        }

        .download-btn {
            /* TUC branding: Green gradient for download button (success/action) */
            background: linear-gradient(135deg, #228B22 0%, #3CB371 100%); /* ForestGreen to MediumSeaGreen */
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(34, 139, 34, 0.3); /* Shadow based on green */
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(34, 139, 34, 0.4);
        }
        
        .copy-btn {
            /* TUC branding: Darker Gold gradient for copy button */
            background: linear-gradient(135deg, #B8860B 0%, #DAA520 100%); /* DarkGoldenrod to Goldenrod */
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-left: 15px; /* Spacing from download button */
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            transform: translateY(-1px);
        }

        /* Error message styling */
        .error {
            background: #f8d7da; /* Light red background (kept for error visibility) */
            color: #721c24; /* Dark red text */
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px solid #f5c6cb;
            display: none; /* Hidden by default */
        }

        /* Custom Message Box Styles */
        .message-box-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none; /* Hidden by default */
        }

        .message-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: fadeIn 0.3s ease-out;
        }

        .message-box h3 {
            margin-bottom: 20px;
            color: #333;
            font-size: 1.5rem;
        }

        .message-box p {
            margin-bottom: 25px;
            color: #555;
            line-height: 1.6;
        }

        .message-box button {
            /* TUC branding: Gold gradient for message box button */
            background: linear-gradient(135deg, #DAA520 0%, #FFD700 100%); /* Goldenrod to Gold */
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .message-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(218, 165, 32, 0.3); /* Shadow based on gold */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📧 PDF Email Extractor</h1>
            <p>Extract unique email addresses from PDF documents with ease</p>
        </div>
        
        <div class="content">
            <div class="upload-section">
                <div class="file-input-wrapper">
                    <input type="file" id="pdfFile" class="file-input" accept=".pdf">
                    <label for="pdfFile" class="file-input-label">
                        📄 Choose PDF File
                    </label>
                </div>
                <div class="file-info" id="fileInfo"></div>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Processing PDF file...</p>
            </div>
            
            <div class="error" id="error" style="display: none;"></div>
            
            <div class="results" id="results">
                <h2>📋 Extracted Email Addresses</h2>
                <div class="email-count" id="emailCount"></div>
                <div class="email-list" id="emailList"></div>
                <div class="download-section">
                    <button class="download-btn" id="downloadBtn" onclick="downloadEmails()">
                        💾 Download as TXT
                    </button>
                    <button class="copy-btn" id="copyBtn" onclick="copyEmails()">
                        📋 Copy All
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Message Box HTML -->
    <div class="message-box-overlay" id="messageBoxOverlay">
        <div class="message-box">
            <h3 id="messageBoxTitle"></h3>
            <p id="messageBoxContent"></p>
            <button onclick="hideMessageBox()">OK</button>
        </div>
    </div>
    
    <script>
        // Configure PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let extractedEmails = [];
        
        // Event listener for file input change
        document.getElementById('pdfFile').addEventListener('change', handleFileSelect);
        
        /**
         * Handles the selection of a PDF file.
         * @param {Event} event - The change event from the file input.
         */
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const fileInfo = document.getElementById('fileInfo');
            fileInfo.textContent = `Selected: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
            
            extractEmails(file); // Start email extraction
        }
        
        /**
         * Extracts email addresses from the given PDF file.
         * @param {File} file - The PDF file to process.
         */
        async function extractEmails(file) {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const results = document.getElementById('results');
            
            // Reset UI and show loading spinner
            loading.style.display = 'block';
            error.style.display = 'none';
            results.style.display = 'none';
            extractedEmails = []; // Clear previous results
            
            try {
                // Read PDF file as an ArrayBuffer
                const arrayBuffer = await file.arrayBuffer();
                // Load PDF document using PDF.js
                const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                
                let allText = '';
                
                // Iterate through all pages to extract text
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    // Join text items, accounting for potential spacing issues in PDF text extraction
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    allText += pageText + ' ';
                }
                
                // Regex to find email addresses (simple pattern)
                const emailRegex = /\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b/g;
                const emails = allText.match(emailRegex) || [];
                
                // Remove duplicates and sort the emails alphabetically
                extractedEmails = [...new Set(emails.map(email => email.toLowerCase()))].sort(); // Convert to lower case for better deduplication
                
                loading.style.display = 'none'; // Hide loading spinner
                
                if (extractedEmails.length > 0) {
                    displayResults(); // Show results if emails are found
                } else {
                    showMessageBox('No Emails Found', 'No email addresses were found in the PDF file.');
                }
                
            } catch (err) {
                loading.style.display = 'none'; // Hide loading spinner on error
                showError('Error processing PDF: ' + err.message + '. Please ensure it is a valid PDF file and try again.');
            }
        }
        
        /**
         * Displays the extracted email addresses in the UI.
         */
        function displayResults() {
            const results = document.getElementById('results');
            const emailCount = document.getElementById('emailCount');
            const emailList = document.getElementById('emailList');
            
            emailCount.textContent = `Found ${extractedEmails.length} unique email address${extractedEmails.length !== 1 ? 'es' : ''}`;
            
            emailList.innerHTML = ''; // Clear previous list items
            extractedEmails.forEach(email => {
                const emailItem = document.createElement('div');
                emailItem.className = 'email-item';
                emailItem.textContent = email;
                emailItem.title = 'Click to copy'; // Tooltip for copying
                emailItem.onclick = () => copyToClipboard(email, emailItem); // Pass the element for visual feedback
                emailList.appendChild(emailItem);
            });
            
            results.style.display = 'block'; // Show results section
        }
        
        /**
         * Displays an error message in the UI.
         * @param {string} message - The error message to display.
         */
        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.style.display = 'block';
        }
        
        /**
         * Downloads the extracted email addresses as a TXT file.
         */
        function downloadEmails() {
            if (extractedEmails.length === 0) {
                showMessageBox('No Emails to Download', 'There are no email addresses extracted to download. Please upload a PDF first.');
                return;
            }
            
            try {
                const content = extractedEmails.join('\n'); // Join emails with newlines
                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob); // Create a URL for the blob
                
                const a = document.createElement('a');
                a.href = url;
                a.download = 'extracted_unique_emails.txt'; // Suggested filename
                a.style.display = 'none'; // Hide the anchor element
                
                document.body.appendChild(a); // Append to body to make it clickable
                a.click(); // Programmatically click the anchor
                
                // Clean up the URL and element after a short delay
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 200); // Increased delay slightly
                
                // Visual feedback for the button
                const btn = document.getElementById('downloadBtn');
                const originalText = btn.textContent;
                btn.textContent = '✓ Downloaded!';
                btn.style.background = 'linear-gradient(135deg, #228B22 0%, #3CB371 100%)';
                
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = ''; // Reset background
                }, 2000);
                
            } catch (error) {
                console.error('Download failed:', error);
                showMessageBox('Download Failed', 'The download could not be initiated. This might be due to browser security restrictions. Please try copying the emails instead.');
            }
        }
        
        /**
         * Copies all extracted email addresses to the clipboard.
         */
        function copyEmails() {
            if (extractedEmails.length === 0) {
                showMessageBox('No Emails to Copy', 'There are no email addresses extracted to copy. Please upload a PDF first.');
                return;
            }
            
            const content = extractedEmails.join('\n');
            copyToClipboard(content, document.getElementById('copyBtn'), 'All emails copied to clipboard!');
        }
        
        /**
         * Copies text to the clipboard with fallback for unsupported environments.
         * Provides visual feedback on the target element.
         * @param {string} text - The text to copy.
         * @param {HTMLElement} targetElement - The element to provide visual feedback on (e.g., a button).
         * @param {string} [successMessage='Copied!'] - Message to show on success.
         */
        function copyToClipboard(text, targetElement, successMessage = 'Copied!') {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    // Show temporary feedback
                    const originalText = targetElement.textContent;
                    targetElement.textContent = '✓ ' + successMessage.split(' ')[0]; // Show "✓ Copied!" or "✓ All"
                    targetElement.style.background = 'linear-gradient(135deg, #228B22 0%, #3CB371 100%)'; /* Green for success */
                    
                    setTimeout(() => {
                        targetElement.textContent = originalText;
                        targetElement.style.background = ''; // Reset background
                    }, 1500);
                }).catch(err => {
                    console.error('Failed to copy using navigator.clipboard: ', err);
                    // Fallback to execCommand for environments where clipboard API is restricted
                    fallbackCopyToClipboard(text, targetElement, successMessage);
                });
            } else {
                // Fallback for older browsers or restricted environments
                fallbackCopyToClipboard(text, targetElement, successMessage);
            }
        }

        /**
         * Fallback function to copy text to clipboard using document.execCommand.
         * @param {string} text - The text to copy.
         * @param {HTMLElement} targetElement - The element to provide visual feedback on.
         * @param {string} successMessage - Message to show on success.
         */
        function fallbackCopyToClipboard(text, targetElement, successMessage) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed'; // Avoid scrolling to bottom
            textArea.style.left = '-9999px';
            document.body.appendChild(textArea);
            textArea.select();
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    // Show temporary feedback
                    const originalText = targetElement.textContent;
                    targetElement.textContent = '✓ ' + successMessage.split(' ')[0];
                    targetElement.style.background = 'linear-gradient(135deg, #228B22 0%, #3CB371 100%)'; /* Green for success */
                    
                    setTimeout(() => {
                        targetElement.textContent = originalText;
                        targetElement.style.background = '';
                    }, 1500);
                } else {
                    showMessageBox('Copy Failed', 'Unable to copy text. Please try manually selecting and copying.');
                }
            } catch (err) {
                console.error('Fallback copy failed: ', err);
                showMessageBox('Copy Failed', 'Unable to copy text. Your browser may not support this function.');
            }
            document.body.removeChild(textArea);
        }

        /**
         * Displays a custom message box.
         * @param {string} title - The title of the message box.
         * @param {string} content - The content/message to display.
         */
        function showMessageBox(title, content) {
            document.getElementById('messageBoxTitle').textContent = title;
            document.getElementById('messageBoxContent').textContent = content;
            document.getElementById('messageBoxOverlay').style.display = 'flex';
        }

        /**
         * Hides the custom message box.
         */
        function hideMessageBox() {
            document.getElementById('messageBoxOverlay').style.display = 'none';
        }
    </script>
</body>
</html>
