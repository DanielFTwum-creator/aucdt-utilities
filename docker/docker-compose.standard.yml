# Docker Compose Standard Template — Development Mode
# Usage: docker-compose -f docker-compose.yml up
# For production: docker-compose -f docker-compose.prod.yml up
#
# Version: 3.9 (compatible with Docker Engine 20.10+)
# Updated: 2026-05-11

version: '3.9'

# === NETWORKS ===
networks:
  tuc-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# === VOLUMES (persistent storage, local dev only) ===
volumes:
  postgres-data:
  redis-cache:
  elasticsearch-data:

# === SERVICES ===
services:
  # ============================================================================
  # REVERSE PROXY / GATEWAY (entry point for all traffic)
  # ============================================================================
  nginx-gateway:
    image: nginx:1.27-alpine
    container_name: tuc-gateway
    ports:
      - "8080:80"      # HTTP
      - "8443:443"     # HTTPS (if using SSL)
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/html:/usr/share/nginx/html:ro
    networks:
      - tuc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - app-core-1
      - app-core-2
      - app-standard-1

  # ============================================================================
  # SAMPLE APP SERVICES (Vite/React)
  # ============================================================================
  app-core-1:
    build:
      context: ./analytics-refactor
      dockerfile: Dockerfile
      args:
        ENV: dev
        NODE_VERSION: 24
    container_name: app-analytics-refactor
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8080/api
    networks:
      - tuc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  app-core-2:
    build:
      context: ./tuc-analytics-dashboard
      dockerfile: Dockerfile
      args:
        ENV: dev
        NODE_VERSION: 24
    container_name: app-tuc-analytics
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8080/api
    networks:
      - tuc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  app-standard-1:
    build:
      context: ./kanban-app
      dockerfile: Dockerfile
      args:
        ENV: dev
        NODE_VERSION: 24
    container_name: app-kanban
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8080/api
    networks:
      - tuc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # DATABASE SERVICES (optional, for backend apps)
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: tuc-postgres
    environment:
      POSTGRES_DB: tuc_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres-dev-only
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - tuc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tuc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-cache:/data
    networks:
      - tuc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # MONITORING / LOGGING (optional, for debugging)
  # ============================================================================
  # Example: Add Prometheus, ELK stack, Jaeger as needed

# ============================================================================
# USAGE GUIDE
# ============================================================================
#
# Start all services:
#   docker-compose up --build
#
# Start specific service:
#   docker-compose up app-core-1
#
# View logs:
#   docker-compose logs -f app-core-1
#
# Stop all:
#   docker-compose down
#
# Reset volumes (careful!):
#   docker-compose down -v
#
# Rebuild after code changes:
#   docker-compose build && docker-compose up
