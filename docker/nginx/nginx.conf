# Master Nginx Reverse Proxy Configuration
# Routes all 78 apps to their respective containers

upstream dashboard {
    server localhost:3000;
}

# Generate upstream blocks for all apps
# This will be auto-generated by the setup script

server {
    listen 80;
    server_name localhost;

    # Landing page - shows all available apps
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "All systems operational\n";
        add_header Content-Type text/plain;
    }

    # Reverse proxy for each app
    # Format: /app-name -> http://app-name:80

    # High Priority Apps
    location /scholarship/ {
        proxy_pass http://techbridge-scholarship-portal/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /registry/ {
        proxy_pass http://techbridge-student-population-register/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
