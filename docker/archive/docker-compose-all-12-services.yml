  # ════════════════════════════════════════════════════════════════════════════
  # MONITORING & OBSERVABILITY STACK
  # ════════════════════════════════════════════════════════════════════════════

  # Prometheus — Metrics collection & storage
  prometheus:
    image: prom/prometheus:latest
    container_name: tuc-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - tuc-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Elasticsearch — Centralized logging backend
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: tuc-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 5
    networks:
      - tuc-network
    restart: unless-stopped

  # Kibana — Log visualization & exploration
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: tuc-kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - tuc-network
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════════════════════
  # REVERSE PROXY & LOAD BALANCER
  # ════════════════════════════════════════════════════════════════════════════

  nginx:
    image: nginx:alpine
    container_name: tuc-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./monitoring/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - ghana-news-api
      - brand-checker-api
      - msee-aptitude-api
      - lecture-assessment-api
      - asapro-api
      - sentinel-api
      - analytics-api
      - tsapro-api
      - newsfeed-api
      - dashboard-api
      - product-lifecycle-api
      - mapping-review-api
      - lead-generator-api
      - analytics-dashboard-api
      - fees-comparison-api
      - timetable-management-api
      - counselor-pro-api
      - presentation-platform-api
      - applicant-dashboard-api
      - candidate-broadsheet-api
      - institution-dashboard-api
      - timetable-insights-api
      - expense-tracker-api
      - enrollment-management-api
      - media-club-api
      - code-reviewer-api
      - kanban-tasks-api
      - lecture-assessment-api
      - pdf-extractor-api
      - url-monitoring-api
      - prometheus
      - kibana
    networks:
      - tuc-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  tuc-network:
    driver: bridge

volumes:
  mariadb-data:
    driver: local
  prometheus-data:
    driver: local
  elasticsearch-data:
    driver: local
