version: '3.9'

# Master Docker Compose Orchestration for AUCDT Utilities
# Production-ready stack for 36 backend services + monitoring infrastructure
#
# Usage:
#   docker-compose -f docker-compose-all-12-services.yml up -d
#
# Includes:
#   - 36 Production Backend Services (ports 4000-4035)
#   - MariaDB 11.4 (shared database)
#   - Prometheus (metrics)
#   - Elasticsearch + Kibana (centralized logging)
#   - Nginx (reverse proxy)

services:

  # ════════════════════════════════════════════════════════════════════════════
  # SHARED DATABASE
  # ════════════════════════════════════════════════════════════════════════════

  mariadb:
    image: mariadb:11.4-jammy
    container_name: tuc-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123!
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass123!
      MYSQL_DATABASE: aucdt_main
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mariadb-admin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tuc-network
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════════════════════
  # BACKEND SERVICES (8 Core + 4 Additional)
  # ════════════════════════════════════════════════════════════════════════════

  # 1. GhanaNewsAPI — News feed aggregation
  ghana-news-api:
    build:
      context: ./services/ghana-news-api
      dockerfile: Dockerfile.prod
    container_name: ghana-news-api
    environment:
      PORT: 4000
      DB_HOST: mariadb
      DB_USER: appuser
      DB_PASSWORD: apppass123!
      DB_NAME: ghana_news
      NODE_ENV: production
      LOG_LEVEL: info
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "4000:4000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4000/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - tuc-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=ghana-news-api"

