version: '3.8'

# Docker Compose for TUC Utilities - Full Profile Deployment
# Total Projects in Monorepo: 109
# Services in this file: 69 (63.3% coverage)
# NOTE: For complete coverage (101 services), use docker-compose-all-apps.yml instead
#
# Usage:
#   Default (High Priority): docker-compose up
#   All Projects: docker-compose --profile full up
#   Development: docker-compose --profile dev up <service>-dev
#
# Access: http://localhost:8080

services:
  # ====================
  # Reverse Proxy (Gateway)
  # ====================
  nginx-gateway:
    image: nginx:alpine
    container_name: tuc-gateway
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/nginx-full.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/html:/usr/share/nginx/html:ro
    networks:
      - tuc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ====================
  # High Priority Apps
  # ====================

  analytics-refactor:
    build:
      context: ./analytics-refactor
      dockerfile: ../Dockerfile.vite
    container_name: analytics-refactor
