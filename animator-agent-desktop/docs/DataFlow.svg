<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0F0C07" />
  
  <!-- User Action -->
  <circle cx="100" cy="200" r="40" fill="#3b6bff" opacity="0.2" />
  <text x="100" y="205" fill="#3b6bff" font-family="Inter, sans-serif" font-size="14" text-anchor="middle">User Action</text>
  
  <!-- Arrow -->
  <path d="M150 200 H250" stroke="#C8A84B" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Context Logic -->
  <rect x="250" y="150" width="200" height="100" rx="8" fill="#141210" stroke="#C8A84B" />
  <text x="350" y="185" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="16" text-anchor="middle">AnimatorContext</text>
  <text x="350" y="215" fill="#8b9ab7" font-family="Inter, sans-serif" font-size="12" text-anchor="middle">Undo/Redo Dispatcher</text>
  
  <!-- Arrow -->
  <path d="M450 200 H550" stroke="#C8A84B" stroke-width="2" />
  
  <!-- Local Storage -->
  <rect x="550" y="160" width="180" height="80" rx="4" fill="#0f1117" stroke="#34d399" />
  <text x="640" y="205" fill="#34d399" font-family="Inter, sans-serif" font-size="14" text-anchor="middle">LocalStorage</text>
  
  <!-- Feedback Loop -->
  <path d="M640 240 V300 H350 V250" stroke="#34d399" stroke-width="1" stroke-dasharray="4 4" />
  <text x="500" y="320" fill="#34d399" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">Automatic Hydration on Load</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C8A84B" />
    </marker>
  </defs>
</svg>
