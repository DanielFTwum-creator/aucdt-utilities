<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Interactive chronicle reader and drafting workshop platform for the 'Deliberate Magic' tech philosophy chronicles. Explore systems metaphors, metabolic compute, and software design." />
    <meta name="keywords" content="Deliberate Magic, Tech Philosophy, Software Systems Metaphors, Essay Reader, TUC, Google AI Studio" />
    <meta name="author" content="Techbridge University College" />
    <meta name="publisher" content="TUC ICT Operations" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Deliberate Magic | Essay Reader & Drafting Workshop" />
    <meta property="og:description" content="Dive into the tech philosophy essay chronicles. Experience an interactive drafting workshop, telemetry graphs, and terminal diagnostics." />
    <meta property="og:locale" content="en_GB" />
    
    <title>Deliberate Magic | Essay Reader & Drafting Workshop</title>

    <!-- Google Fonts: Inter & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <style>
      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
      #root {
        min-height: 100vh;
      }
      .skip-to-main {
        position: absolute;
        left: -9999px;
        top: auto;
        width: 1px;
        height: 1px;
        overflow: hidden;
        z-index: 9999;
      }
      .skip-to-main:focus {
        left: 8px;
        width: auto;
        height: auto;
      }
    </style>

    <!-- Splash Screen Styles -->
    <style id="magic-splash-styles">
      body { 
        background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%) !important; 
        margin: 0; 
        padding: 0; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        min-height: 100vh; 
        font-family: 'Inter', sans-serif; 
        overflow: hidden; 
      }
      .magic-splash { 
        text-align: center; 
        border: 1px solid rgba(148, 163, 184, 0.1); 
        padding: 60px 80px; 
        background: rgba(15, 23, 42, 0.75); 
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-radius: 24px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        position: relative; 
      }
      .magic-splash::before { 
        content: ""; 
        position: absolute; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 4px; 
        background: linear-gradient(90deg, #6366f1, #a855f7, #6366f1); 
        border-top-left-radius: 24px;
        border-top-right-radius: 24px;
      }
      .magic-logo { 
        color: #f8fafc; 
        font-size: 2.5rem; 
        font-weight: 800; 
        letter-spacing: -0.025em; 
        margin-bottom: 8px; 
        display: block; 
      }
      .magic-logo span {
        color: #818cf8;
        font-family: 'JetBrains Mono', monospace;
      }
      .magic-status { 
        color: #94a3b8; 
        text-transform: uppercase; 
        letter-spacing: 0.4em; 
        font-size: 0.75rem; 
        font-weight: 600;
        opacity: 0.8; 
      }
      .magic-loading { 
        margin-top: 30px; 
        height: 2px; 
        width: 160px; 
        background: rgba(99, 102, 241, 0.1); 
        margin-left: auto; 
        margin-right: auto; 
        position: relative; 
        overflow: hidden; 
        border-radius: 2px;
      }
      .magic-loading::after { 
        content: ""; 
        position: absolute; 
        left: -100%; 
        width: 50%; 
        height: 100%; 
        background: linear-gradient(90deg, #6366f1, #a855f7); 
        animation: magic-load 1.8s infinite cubic-bezier(0.4, 0, 0.2, 1); 
      }
      @keyframes magic-load { 
        0% { left: -100%; } 
        100% { left: 150%; } 
      }
    </style>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <a href="#main-content" class="skip-to-main">Skip to main content</a>
    
    <div id="root">
      <div class="magic-splash">
        <span class="magic-logo">Deliberate <span>Magic</span></span>
        <div class="magic-status">Chronicle Reader &amp; Workshop</div>
        <div class="magic-loading"></div>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
