spring:
  application:
    name: tuc-netscan

  datasource:
    url: jdbc:mariadb://localhost:3307/netscan?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.MariaDBDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 500ms

  cache:
    type: redis

  shell:
    interactive:
      enabled: true

server:
  port: 8080
  ssl:
    enabled: false  # SSL terminated at Nginx

netscan:
  mock:
    enabled: false
  jwt:
    secret: ${JWT_SECRET}
    expiry-hours: 8
  scan:
    default-subnets: ${SCAN_SUBNETS:192.168.1.0/24}
    interval-seconds: 60
    max-concurrent-threads: 4
  snmp:
    community: ${SNMP_COMMUNITY_ENCRYPTED}
    timeout-ms: 1500
    retries: 3
  alert:
    bandwidth-threshold-pct: 80
    latency-threshold-ms: 200
    packet-loss-threshold-pct: 5

logging:
  level:
    edu.techbridge.netscan: INFO
    root: WARN
