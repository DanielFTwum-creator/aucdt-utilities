
<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#ffffff" rx="10"/>
  <text x="300" y="30" text-anchor="middle" font-weight="bold" font-size="18">SCHEMA: CORE ENTITIES</text>
  
  <!-- Tables -->
  <rect x="50" y="60" width="150" height="120" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="60" y="80" font-weight="bold" font-size="12">EXPENSES</text>
  <text x="60" y="100" font-size="10">id (PK)</text>
  <text x="60" y="115" font-size="10">amount</text>
  <text x="60" y="130" font-size="10">catId (FK)</text>
  <text x="60" y="145" font-size="10">tags[]</text>

  <rect x="250" y="60" width="150" height="100" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="260" y="80" font-weight="bold" font-size="12">CATEGORIES</text>
  <text x="260" y="100" font-size="10">id (PK)</text>
  <text x="260" y="115" font-size="10">name</text>
  <text x="260" y="130" font-size="10">color</text>

  <rect x="50" y="220" width="150" height="100" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="60" y="240" font-weight="bold" font-size="12">BUDGETS</text>
  <text x="60" y="260" font-size="10">id (PK)</text>
  <text x="60" y="275" font-size="10">amount</text>
  <text x="60" y="290" font-size="10">catId (FK/Null)</text>

  <rect x="250" y="220" width="150" height="100" fill="#fef2f2" stroke="#fecaca"/>
  <text x="260" y="240" font-weight="bold" font-size="12" fill="#991b1b">AUDIT_LOGS</text>
  <text x="260" y="260" font-size="10">id (PK)</text>
  <text x="260" y="275" font-size="10">action</text>
  <text x="260" y="290" font-size="10">timestamp</text>

  <!-- Relations -->
  <line x1="200" y1="130" x2="250" y2="100" stroke="#94a3b8" stroke-dasharray="4"/>
  <line x1="200" y1="290" x2="250" y2="100" stroke="#94a3b8" stroke-dasharray="4"/>
</svg>
