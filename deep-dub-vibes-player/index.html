    <style id="vibes-splash-styles">
      .loading body {
        background: #050200 !important;
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: 'Trebuchet MS', 'Lucida Grande', sans-serif;
        overflow: hidden;
      }
      .vibes-splash {
        text-align: center;
        border: 1px solid rgba(255, 215, 0, 0.15);
        padding: 50px 70px;
        background: linear-gradient(145deg, #0f0800 0%, #0a0500 100%);
        border-radius: 20px;
        box-shadow: 0 0 60px rgba(255, 100, 0, 0.1);
        position: relative;
      }
      .vibes-splash::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: linear-gradient(90deg, #D2143A, #FFD700, #009E60);
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
      }
      .vibes-logo {
        color: #FFD700;
        font-size: 2.2rem;
        font-weight: 900;
        letter-spacing: 2px;
        margin-bottom: 8px;
        display: block;
        text-transform: uppercase;
      }
      .vibes-logo span {
        background: linear-gradient(to right, #D2143A, #FFD700, #009E60);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .vibes-status {
        color: #FF8C00;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        font-size: 0.75rem;
        font-weight: 600;
        opacity: 0.8;
      }
      .vibes-loading {
        margin-top: 25px;
        height: 3px;
        width: 160px;
        background: rgba(255, 215, 0, 0.1);
        margin-left: auto;
        margin-right: auto;
        position: relative;
        overflow: hidden;
        border-radius: 2px;
      }
      .vibes-loading::after {
        content: "";
        position: absolute;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(90deg, #D2143A, #FFD700, #009E60);
        animation: vibes-load 1.6s infinite ease-in-out;
      }
      @keyframes vibes-load {
        to { left: 150%; }
      }
    </style>
    <script>
      document.documentElement.classList.add('loading');
      document.addEventListener('DOMContentLoaded', () => {
        document.documentElement.classList.remove('loading');
      });
      window.addEventListener('load', () => {
        document.documentElement.classList.remove('loading');
      });
    </script>
  </head>
  <body>
    <div id="root">
      <div class="vibes-splash">
        <span class="vibes-logo">Deep <span>Dub Vibes</span></span>
        <div class="vibes-status">Hologram AI Records</div>
        <div class="vibes-loading"></div>
      </div>
    </div>
    <script>
      (function() {
        var theme = localStorage.getItem('deep-dub-vibes-player-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
