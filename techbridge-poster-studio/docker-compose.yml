version: '3.9'

services:
  # TechBridge Poster Studio Application
  poster-studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: techbridge-poster-studio
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      # Persist generated exports
      - poster_outputs:/app/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - poster-network

  # Optional: Nginx reverse proxy for /poster/ subdirectory routing
  nginx:
    image: nginx:alpine
    container_name: techbridge-poster-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - poster-studio
    restart: unless-stopped
    networks:
      - poster-network

volumes:
  poster_outputs:
    driver: local

networks:
  poster-network:
    driver: bridge
