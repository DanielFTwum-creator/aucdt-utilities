# Nginx Reverse Proxy Configuration for AUCDT Services
# Provides unified access to all 8 APIs, Prometheus, and Kibana

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 20M;

  # ────────────────────────────────────────────────────────────────────────
  # Upstream Backend Services
  # ────────────────────────────────────────────────────────────────────────

  upstream ghana_news {
    server ghana-news-api:4000;
  }

  upstream brand_checker {
    server brand-checker-api:4001;
  }

  upstream msee_aptitude {
    server msee-aptitude-api:4002;
  }

  upstream lecture_assessment {
    server lecture-assessment-api:4003;
  }

  upstream asapro {
    server asapro-api:4004;
  }

  upstream sentinel {
    server sentinel-api:4005;
  }

  upstream analytics {
    server analytics-api:4006;
  }

  upstream tsapro {
    server tsapro-api:4007;
  }

  upstream prometheus_upstream {
    server prometheus:9090;
  }

  upstream kibana_upstream {
    server kibana:5601;
  }

  # ────────────────────────────────────────────────────────────────────────
  # HTTP Server (Redirect to HTTPS in production)
  # ────────────────────────────────────────────────────────────────────────

  server {
    listen 80;
    server_name _;

    # Kubernetes health probe
    location /health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }

    # API Endpoints
    location /api/news/ {
      proxy_pass http://ghana_news/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/brand/ {
      proxy_pass http://brand_checker/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/msee/ {
      proxy_pass http://msee_aptitude/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/assessment/ {
      proxy_pass http://lecture_assessment/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/asapro/ {
      proxy_pass http://asapro/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/sentinel/ {
      proxy_pass http://sentinel/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/analytics/ {
      proxy_pass http://analytics/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/tsa/ {
      proxy_pass http://tsapro/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Monitoring
    location /monitoring/prometheus/ {
      proxy_pass http://prometheus_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_redirect off;
    }

    location /monitoring/kibana/ {
      proxy_pass http://kibana_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_redirect off;
    }

    # Status page
    location /status {
      access_log off;
      default_type text/html;
      return 200 '
        <!DOCTYPE html>
        <html>
        <head>
          <title>AUCDT Services Status</title>
          <style>body{font-family:Arial}</style>
        </head>
        <body>
          <h1>AUCDT Utilities Status</h1>
          <ul>
            <li><a href="/api/news/health">Ghana News API</a></li>
            <li><a href="/api/brand/health">Brand Checker</a></li>
            <li><a href="/api/msee/health">MSEE Aptitude</a></li>
            <li><a href="/api/assessment/health">Lecture Assessment</a></li>
            <li><a href="/api/asapro/health">ASAPro</a></li>
            <li><a href="/api/sentinel/health">Sentinel</a></li>
            <li><a href="/api/analytics/health">Analytics</a></li>
            <li><a href="/api/tsa/health">TSAPro</a></li>
            <li><a href="/monitoring/prometheus/">Prometheus</a></li>
            <li><a href="/monitoring/kibana/">Kibana</a></li>
          </ul>
        </body>
        </html>
      ';
    }

    # Metrics endpoint (for monitoring tools)
    location /metrics {
      access_log off;
      # Restrict to internal IPs
      allow 127.0.0.1;
      allow 172.17.0.0/16;  # Docker bridge network
      deny all;
      proxy_pass http://prometheus_upstream/metrics;
    }

    # Default
    location / {
      return 301 /status;
    }
  }

  # ────────────────────────────────────────────────────────────────────────
  # HTTPS Server (Production)
  # ────────────────────────────────────────────────────────────────────────
  # Note: Uncomment below and add SSL certificates in ./certs/

  # server {
  #   listen 443 ssl http2;
  #   server_name api.aucdt.edu.gh;
  #
  #   ssl_certificate /etc/nginx/certs/cert.pem;
  #   ssl_certificate_key /etc/nginx/certs/key.pem;
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   ssl_ciphers HIGH:!aNULL:!MD5;
  #
  #   # Same location blocks as above...
  # }
}
