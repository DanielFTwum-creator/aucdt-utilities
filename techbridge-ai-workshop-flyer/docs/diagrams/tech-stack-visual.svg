<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#1e293b" />
  <text x="400" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" font-weight="bold" fill="#ffffff">Technology Stack</text>

  <!-- React -->
  <g transform="translate(100, 100)">
    <circle cx="50" cy="50" r="40" fill="none" stroke="#61dafb" stroke-width="4"/>
    <circle cx="50" cy="50" r="10" fill="#61dafb"/>
    <ellipse cx="50" cy="50" rx="40" ry="15" fill="none" stroke="#61dafb" stroke-width="2" transform="rotate(60, 50, 50)"/>
    <ellipse cx="50" cy="50" rx="40" ry="15" fill="none" stroke="#61dafb" stroke-width="2" transform="rotate(120, 50, 50)"/>
    <text x="50" y="110" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#ffffff" font-weight="bold">React 19</text>
  </g>

  <!-- TypeScript -->
  <g transform="translate(260, 100)">
    <rect x="10" y="10" width="80" height="80" rx="10" fill="#3178c6"/>
    <text x="50" y="65" text-anchor="middle" font-family="sans-serif" font-size="40" fill="#ffffff" font-weight="bold">TS</text>
    <text x="50" y="110" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#ffffff" font-weight="bold">TypeScript</text>
  </g>

  <!-- Tailwind -->
  <g transform="translate(420, 100)">
    <path d="M20,60 C40,40 60,40 80,60 C60,80 40,80 20,60 M20,40 C40,20 60,20 80,40" stroke="#38bdf8" stroke-width="5" fill="none"/>
    <text x="50" y="110" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#ffffff" font-weight="bold">Tailwind CSS</text>
  </g>

  <!-- Puppeteer -->
  <g transform="translate(580, 100)">
    <rect x="10" y="10" width="80" height="80" rx="10" fill="#40b5a4"/>
    <path d="M30,30 L70,30 L70,70 L30,70 Z" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="50" cy="50" r="10" fill="#ffffff"/>
    <text x="50" y="110" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#ffffff" font-weight="bold">Puppeteer</text>
  </g>

</svg>