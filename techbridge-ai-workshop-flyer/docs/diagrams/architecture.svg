<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc" />
  
  <!-- Header -->
  <text x="400" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" font-weight="bold" fill="#0f172a">System Architecture: Techbridge AI Flyer</text>
  
  <!-- Client Layer -->
  <rect x="50" y="100" width="700" height="450" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="70" y="130" font-family="sans-serif" font-size="16" fill="#64748b" font-weight="bold">Client Browser (Runtime Environment)</text>

  <!-- React Application Context -->
  <rect x="100" y="160" width="600" height="350" rx="10" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
  <text x="400" y="190" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#0369a1" font-weight="bold">Single Page Application (React 19)</text>

  <!-- Components Layer -->
  <g transform="translate(150, 220)">
    <rect width="140" height="80" rx="5" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
    <text x="70" y="30" font-family="sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Flyer.tsx</text>
    <text x="70" y="50" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#64748b">Presentation Layer</text>
    
    <rect x="160" y="0" width="140" height="80" rx="5" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
    <text x="230" y="30" font-family="sans-serif" font-size="14" text-anchor="middle" font-weight="bold">AdminPanel.tsx</text>
    <text x="230" y="50" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#64748b">Secure Module</text>

    <rect x="320" y="0" width="140" height="80" rx="5" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
    <text x="390" y="30" font-family="sans-serif" font-size="14" text-anchor="middle" font-weight="bold">ThemeSwitcher.tsx</text>
    <text x="390" y="50" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#64748b">Accessibilty Controls</text>
  </g>

  <!-- Service Layer (Utils) -->
  <g transform="translate(150, 350)">
    <rect width="200" height="100" rx="5" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="100" y="30" font-family="sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#15803d">Logic &amp; State</text>
    <line x1="20" y1="40" x2="180" y2="40" stroke="#22c55e" stroke-width="1"/>
    
    <text x="30" y="60" font-family="sans-serif" font-size="12" fill="#166534">• AuditLogger (Memory)</text>
    <text x="30" y="80" font-family="sans-serif" font-size="12" fill="#166534">• Diagnostics Engine</text>
  </g>

  <!-- Static Data -->
  <g transform="translate(400, 350)">
    <rect width="200" height="100" rx="5" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
    <text x="100" y="30" font-family="sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#b45309">Data Layer</text>
    <line x1="20" y1="40" x2="180" y2="40" stroke="#f59e0b" stroke-width="1"/>
    
    <text x="30" y="60" font-family="sans-serif" font-size="12" fill="#92400e">• Constants.ts (Events)</text>
    <text x="30" y="80" font-family="sans-serif" font-size="12" fill="#92400e">• CSS Variables (Theme)</text>
  </g>

  <!-- External Resources -->
  <g transform="translate(600, 50)">
    <path d="M0,0 L150,0 L150,60 L0,60 Z" fill="#cbd5e1" />
    <text x="75" y="25" font-family="sans-serif" font-size="12" text-anchor="middle">External CDNs</text>
    <text x="75" y="45" font-family="sans-serif" font-size="10" text-anchor="middle">(Tailwind, Fonts, Images)</text>
  </g>

  <!-- Connections -->
  <line x1="400" y1="160" x2="600" y2="80" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4"/>
</svg>