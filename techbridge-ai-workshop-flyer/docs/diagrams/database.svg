<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#ffffff" />
  
  <text x="400" y="40" font-family="monospace" font-size="24" text-anchor="middle" font-weight="bold" fill="#334155">In-Memory Data Models (Schema)</text>

  <!-- Table: AuditLogEntry -->
  <g transform="translate(50, 100)">
    <rect width="220" height="180" fill="#f1f5f9" stroke="#475569" stroke-width="2" />
    <rect width="220" height="30" fill="#475569" />
    <text x="110" y="20" font-family="monospace" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">AuditLogEntry</text>
    
    <text x="10" y="60" font-family="monospace" font-size="12">PK id: string (UUID)</text>
    <line x1="0" y1="70" x2="220" y2="70" stroke="#cbd5e1"/>
    <text x="10" y="90" font-family="monospace" font-size="12">   timestamp: ISOString</text>
    <line x1="0" y1="100" x2="220" y2="100" stroke="#cbd5e1"/>
    <text x="10" y="120" font-family="monospace" font-size="12">   action: string</text>
    <line x1="0" y1="130" x2="220" y2="130" stroke="#cbd5e1"/>
    <text x="10" y="150" font-family="monospace" font-size="12">   details: string?</text>
  </g>

  <!-- Table: Speaker -->
  <g transform="translate(320, 100)">
    <rect width="220" height="210" fill="#f1f5f9" stroke="#ea580c" stroke-width="2" />
    <rect width="220" height="30" fill="#ea580c" />
    <text x="110" y="20" font-family="monospace" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">Speaker (Constant)</text>
    
    <text x="10" y="60" font-family="monospace" font-size="12">PK name: string</text>
    <line x1="0" y1="70" x2="220" y2="70" stroke="#fed7aa"/>
    <text x="10" y="90" font-family="monospace" font-size="12">   title: string</text>
    <line x1="0" y1="100" x2="220" y2="100" stroke="#fed7aa"/>
    <text x="10" y="120" font-family="monospace" font-size="12">   topic: string</text>
    <line x1="0" y1="130" x2="220" y2="130" stroke="#fed7aa"/>
    <text x="10" y="150" font-family="monospace" font-size="12">   isAi: boolean</text>
    <line x1="0" y1="160" x2="220" y2="160" stroke="#fed7aa"/>
    <text x="10" y="180" font-family="monospace" font-size="12">   variant: enum</text>
  </g>

  <!-- Table: TestResult -->
  <g transform="translate(50, 320)">
    <rect width="220" height="150" fill="#f1f5f9" stroke="#22c55e" stroke-width="2" />
    <rect width="220" height="30" fill="#22c55e" />
    <text x="110" y="20" font-family="monospace" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">TestResult</text>
    
    <text x="10" y="60" font-family="monospace" font-size="12">PK id: string (UUID)</text>
    <line x1="0" y1="70" x2="220" y2="70" stroke="#bbf7d0"/>
    <text x="10" y="90" font-family="monospace" font-size="12">   status: enum</text>
    <line x1="0" y1="100" x2="220" y2="100" stroke="#bbf7d0"/>
    <text x="10" y="120" font-family="monospace" font-size="12">   message: string</text>
  </g>

  <!-- Config -->
  <g transform="translate(560, 200)">
    <rect width="180" height="100" fill="#f1f5f9" stroke="#64748b" stroke-width="2" stroke-dasharray="4" />
    <rect width="180" height="30" fill="#64748b" />
    <text x="90" y="20" font-family="monospace" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">Environment</text>
    
    <text x="10" y="60" font-family="monospace" font-size="12">   THEME: CSSVar</text>
    <text x="10" y="80" font-family="monospace" font-size="12">   AUTH: Hardcoded</text>
  </g>

</svg>