<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign-in Error — LEMS | Techbridge University College</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #6b1020;
    overflow: hidden;
  }

  .bg-video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    pointer-events: none;
  }

  .bg-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 0, 8, 0.72);
    z-index: 1;
  }

  .card {
    position: relative;
    z-index: 2;
    background: rgba(255, 255, 255, 0.07);
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 16px;
    padding: 44px 40px 36px;
    max-width: 440px;
    width: calc(100% - 32px);
    text-align: center;
    color: #fff;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
  }

  .logo {
    display: block;
    width: 56px;
    height: 56px;
    object-fit: contain;
    margin: 0 auto 18px;
    filter: brightness(0) invert(1);
  }

  .icon {
    font-size: 2.8rem;
    line-height: 1;
    margin-bottom: 14px;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 14px;
  }

  .body-text {
    font-size: 0.95rem;
    line-height: 1.65;
    opacity: 0.85;
    margin-bottom: 10px;
  }

  .body-text strong { color: #f0c060; opacity: 1; }

  .hint {
    font-size: 0.83rem;
    opacity: 0.6;
    line-height: 1.55;
    margin-bottom: 28px;
    border-top: 1px solid rgba(255, 255, 255, 0.12);
    padding-top: 14px;
    margin-top: 4px;
  }

  .hint strong { color: #f0c060; opacity: 1; }

  .btn-retry {
    display: block;
    width: 100%;
    padding: 0.85rem;
    background: #6b1020;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s;
    margin-bottom: 14px;
  }

  .btn-retry:hover {
    background: #8b1a2e;
    transform: translateY(-1px);
  }

  .contact-link {
    display: block;
    font-size: 0.82rem;
    color: rgba(255, 255, 255, 0.45);
    text-decoration: none;
    transition: color 0.15s;
  }

  .contact-link:hover { color: #c9a84c; }
</style>
</head>
<body>

<video class="bg-video"
  src="https://techbridge.edu.gh/static/campus_tour.mp4"
  autoplay muted loop playsinline preload="auto">
</video>
<div class="bg-overlay"></div>

<div class="card" id="card">
  <img
    class="logo"
    src="https://techbridge.edu.gh/static/TUC_LOGO_small.png"
    alt="Techbridge University College"
    onerror="this.style.display='none'"
  />
  <div class="icon" id="icon">⛔</div>
  <h1 id="title">Access Restricted</h1>
  <p class="body-text" id="body">
    LEMS is only accessible to <strong>@techbridge.edu.gh</strong>
    institutional accounts. Personal Gmail addresses are not permitted.
  </p>
  <p class="hint" id="hint">
    In the Google sign-in window, make sure you select your
    <strong>TUC Workspace</strong> account, not a personal account.
  </p>
  <a class="btn-retry" href="https://wms.techbridge.edu.gh/api/auth/google?app=lems">
    Try a different account
  </a>
  <a class="contact-link" href="mailto:ict@techbridge.edu.gh">
    Contact ICT Support
  </a>
</div>

<script>
  // Unregister stale service workers so the next LEMS visit loads cleanly
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs) {
      regs.forEach(function(r) { r.unregister(); });
    });
  }

  // Tailor the copy to the specific error code
  var params  = new URLSearchParams(window.location.search);
  var err     = params.get('error') || '';
  var icon    = document.getElementById('icon');
  var title   = document.getElementById('title');
  var body    = document.getElementById('body');
  var hint    = document.getElementById('hint');

  if (err === 'deactivated') {
    icon.textContent  = '🔒';
    title.textContent = 'Account Deactivated';
    body.innerHTML    = 'Your TUC account has been deactivated. Please contact the ICT Division to restore access.';
    hint.style.display = 'none';
  } else if (err === 'oauth' || err === 'domain') {
    // default copy already set above — no changes needed
  } else if (err) {
    icon.textContent  = '⚠️';
    title.textContent = 'Sign-in Failed';
    body.innerHTML    = 'An error occurred during sign-in. Please try again or contact ICT if the problem persists.';
    hint.style.display = 'none';
  }
</script>
</body>
</html>
