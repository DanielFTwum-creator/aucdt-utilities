spring:
  application:
    name: lems-backend
  datasource:
    # Prod: MariaDB on the shared box (10.3 on 3306, localhost-only grants).
    # Credentials come from the environment — never committed.
    url: ${DB_URL:jdbc:mariadb://127.0.0.1:3306/lems}
    username: ${DB_USER:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never

server:
  port: ${PORT:8086}
  servlet:
    context-path: /api

lems:
  # IdP base for the WMS SSO /api/me relay (TUC-ICT-SRS-2026-013 archetype C).
  wms:
    base: ${WMS_BASE:https://wms.techbridge.edu.gh}
  # Salt for the anonymising one-submission-per-student dedupe hash.
  dedupe-salt: ${LEMS_DEDUPE_SALT:change-me-in-prod}

logging:
  level:
    root: INFO
    com.lems: INFO
