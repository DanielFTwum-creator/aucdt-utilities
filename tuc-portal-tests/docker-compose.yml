services:
  playwright-tests:
    build: .
    container_name: aucdt-portal-tests
    environment:
      - TEST_USERNAME=${TEST_USERNAME}
      - TEST_PASSWORD=${TEST_PASSWORD}
      - TEST_EMAIL=${TEST_EMAIL}
      - BASE_URL=${BASE_URL}
      - HEADLESS=true
      - CI=true
    volumes:
      - ./test-results:/app/test-results
      - ./tests:/app/tests
    networks:
      - test-network

  # Optional: Add MySQL database for test data management
  mysql:
    image: mysql:8.4-alpine
    container_name: test-database
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test_db
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - test-network
    profiles:
      - database

volumes:
  mysql-data:

networks:
  test-network:
    driver: bridge
