<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Peace & One Love Vinyl - AI-powered music generation and curation platform" />
    <meta name="keywords" content="music generation, AI music, vinyl, audio production, MusicGen, creative studio, TUC" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Peace Vinyl | AI Music Generation Studio" />
    <meta property="og:description" content="Create and discover music with AI. Generate unique tracks, explore new sounds, and curate your perfect collection." />
    <meta property="og:locale" content="en_US" />
    <meta name="theme-color" content="#0891b2" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Peace Vinyl — AI Music Generation</title>
    <style id="peace-splash-styles">
      body.loading {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%) !important;
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
      }
      .peace-splash {
        text-align: center;
        border: 1px solid rgba(139, 92, 246, 0.2);
        padding: 60px 80px;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        position: relative;
      }
      .peace-splash::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: linear-gradient(90deg, #ec4899, #8b5cf6);
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
      }
      .peace-logo {
        color: #f0f9ff;
        font-size: 2.6rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 8px;
        display: block;
      }
      .peace-logo span {
        color: #ec4899;
      }
      .peace-status {
        color: #cbd5e1;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        font-size: 0.75rem;
        font-weight: 600;
        opacity: 0.8;
      }
      .peace-loading {
        margin-top: 25px;
        height: 2px;
        width: 140px;
        background: rgba(236, 72, 153, 0.1);
        margin-left: auto;
        margin-right: auto;
        position: relative;
        overflow: hidden;
        border-radius: 2px;
      }
      .peace-loading::after {
        content: "";
        position: absolute;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(90deg, #ec4899, #8b5cf6);
        animation: peace-load 1.6s infinite ease-in-out;
      }
      @keyframes peace-load {
        to { left: 150%; }
      }
    </style>
    <script>
      document.body.classList.add('loading');
      document.addEventListener('DOMContentLoaded', () => {
        document.body.classList.remove('loading');
      });
      window.addEventListener('load', () => {
        document.body.classList.remove('loading');
      });
    </script>
  </head>
  <body>
    <div id="root">
      <div class="peace-splash">
        <span class="peace-logo">Peace <span>Vinyl</span></span>
        <div class="peace-status">Music Generation Studio</div>
        <div class="peace-loading"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
