# Docker Compose for ALL TUC Applications
# Generated: 2026-03-22
# Total Services: 300 (302 apps + gateway)

networks:
  tuc-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  ajumapro-sms-data:

services:

  nginx-gateway:
    image: nginx:alpine
    container_name: nginx-gateway
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/nginx-all-apps.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/html:/usr/share/nginx/html:ro
    networks:
      - tuc-network
    restart: unless-stopped
    depends_on:
      - 6r-product-design-workshop-portal
      - academic-integrity-detector
      - academic-performance-app
      - adaptive-curriculum-engine
      - agent-collaboration-framework
      - agenticai-masterclass
      - ai-code-reviewer
      - ai-exam-generator
      - ai-explainability-console
      - ai-governance-analytics-hub

  6r-product-design-workshop-portal:
    build:
      context: ./6r-product-design-workshop-portal
      dockerfile: ../Dockerfile.vite
    container_name: 6r-product-design-workshop-portal
    environment:
      NODE_ENV: production
    networks:
      - tuc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD","wget","--quiet","--tries=1","--spider","http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  academic-integrity-detector:
