<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .db { fill: #F8FAFC; stroke: #4285f4; stroke-width: 2; rx: 8; }
      .text-title { fill: #08080a; font-family: sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
      .text-field { fill: #475569; font-family: monospace; font-size: 11px; }
      .line { stroke: #4285f4; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4285f4" />
    </marker>
  </defs>

  <rect width="1000" height="600" class="bg" />

  <text x="400" y="40" fill="#08080a" font-family="serif" font-size="24" font-weight="bold" text-anchor="middle" letter-spacing="2">AI SLINGSHOT DATA FLOW</text>
  <text x="400" y="60" fill="#64748b" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="2">GEMINI SLINGSHOT v3.0.0</text>

  <!-- Prompt State -->
  <rect x="50" y="100" width="220" height="350" class="db" />
  <rect x="50" y="100" width="220" height="40" fill="#4285f4" rx="8" />
  <rect x="50" y="120" width="220" height="20" fill="#4285f4" />
  <text x="160" y="125" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">PayloadContext (Live)</text>
  
  <text x="70" y="170" class="text-field" font-weight="bold">vision_buffer:</text>
  <text x="90" y="190" class="text-field">base64: tactical_capture</text>
  <text x="90" y="210" class="text-field">landmarks: hand_geometry</text>
  
  <text x="70" y="240" class="text-field" font-weight="bold">prompt_meta:</text>
  <text x="90" y="260" class="text-field">strategy: hint_generation</text>
  <text x="90" y="280" class="text-field">constraints: max_tokens_512</text>

  <text x="70" y="310" class="text-field" font-weight="bold">telemetry:</text>
  <text x="90" y="330" class="text-field">velocity: float (force)</text>
  <text x="90" y="350" class="text-field">latency: number (ms)</text>

  <!-- AI Synthesis -->
  <rect x="350" y="220" width="100" height="40" fill="#08080a" rx="20" />
  <text x="400" y="245" fill="#fff" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="1">SLINGSHOT</text>

  <!-- Results -->
  <rect x="530" y="120" width="240" height="310" class="db" />
  <rect x="530" y="120" width="240" height="40" fill="#08080a" rx="8" />
  <rect x="530" y="140" width="240" height="20" fill="#08080a" />
  <text x="650" y="145" fill="#4285f4" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">AI Intelligence</text>

  <text x="550" y="190" class="text-field" font-weight="bold">inference:</text>
  <text x="570" y="210" class="text-field">hint: strategic_text</text>
  <text x="570" y="230" class="text-field">rationale: analytical_insight</text>
  
  <text x="550" y="270" class="text-field" font-weight="bold">quality_assurance:</text>
  <text x="570" y="290" class="text-field">accuracy_score: 0-100</text>
  <text x="570" y="310" class="text-field">compliance: institutional</text>

  <text x="550" y="350" class="text-field" font-weight="bold">audit:</text>
  <text x="570" y="370" class="text-field">- LocalStorage Persistence</text>

  <!-- Connectors -->
  <path d="M 270 240 L 340 240" class="line" marker-end="url(#arrowhead)" />
  <path d="M 450 240 L 520 240" class="line" marker-end="url(#arrowhead)" />

</svg>