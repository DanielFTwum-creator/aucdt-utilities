<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#0F0C07"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Playfair Display, serif" font-size="28" fill="#C8A84B" text-anchor="middle" font-weight="bold">dmcdAI SYSTEM ARCHITECTURE</text>
  <text x="400" y="65" font-family="Inter, sans-serif" font-size="14" fill="#F2EBD9" text-anchor="middle" opacity="0.7">Techbridge University College — Institutional AI Sandbox</text>

  <!-- Frontend Layer -->
  <rect x="50" y="100" width="700" height="150" rx="10" fill="#141210" stroke="#C8A84B" stroke-width="2"/>
  <text x="70" y="130" font-family="Bebas Neue, sans-serif" font-size="20" fill="#C8A84B">FRONTEND LAYER (React 19 / Vite 6)</text>
  
  <!-- Contexts -->
  <rect x="70" y="150" width="120" height="70" rx="5" fill="#1C1A17" stroke="#333"/>
  <text x="130" y="185" font-family="Inter, sans-serif" font-size="12" fill="#F2EBD9" text-anchor="middle">AuthContext</text>
  
  <rect x="200" y="150" width="120" height="70" rx="5" fill="#1C1A17" stroke="#333"/>
  <text x="260" y="185" font-family="Inter, sans-serif" font-size="12" fill="#F2EBD9" text-anchor="middle">ThemeContext</text>
  
  <!-- Modules & Components -->
  <rect x="340" y="150" width="380" height="70" rx="5" fill="#1C1A17" stroke="#333"/>
  <text x="530" y="180" font-family="Inter, sans-serif" font-size="12" fill="#C8A84B" text-anchor="middle" font-weight="bold">Interactive Learning Modules (1-10)</text>
  <text x="530" y="200" font-family="Inter, sans-serif" font-size="10" fill="#F2EBD9" text-anchor="middle" opacity="0.8">Visual, Video, Content, UX/UI, Ethics, Sentiment, Storytelling</text>

  <!-- Service Layer -->
  <rect x="50" y="280" width="700" height="180" rx="10" fill="#141210" stroke="#C8A84B" stroke-width="2"/>
  <text x="70" y="310" font-family="Bebas Neue, sans-serif" font-size="20" fill="#C8A84B">SERVICE LAYER (Logic & Integration)</text>

  <!-- Services -->
  <rect x="70" y="330" width="150" height="100" rx="5" fill="#1C1A17" stroke="#C8A84B" stroke-dasharray="4"/>
  <text x="145" y="370" font-family="Inter, sans-serif" font-size="14" fill="#C8A84B" text-anchor="middle" font-weight="bold">geminiService</text>
  <text x="145" y="390" font-family="Inter, sans-serif" font-size="10" fill="#F2EBD9" text-anchor="middle">AI Generation SDK</text>

  <rect x="230" y="330" width="150" height="100" rx="5" fill="#1C1A17" stroke="#333"/>
  <text x="305" y="370" font-family="Inter, sans-serif" font-size="14" fill="#F2EBD9" text-anchor="middle" font-weight="bold">simulationService</text>
  <text x="305" y="390" font-family="Inter, sans-serif" font-size="10" fill="#F2EBD9" text-anchor="middle">Diagnostic Hooks</text>

  <rect x="390" y="330" width="150" height="100" rx="5" fill="#1C1A17" stroke="#333"/>
  <text x="465" y="370" font-family="Inter, sans-serif" font-size="14" fill="#F2EBD9" text-anchor="middle" font-weight="bold">auditLogService</text>
  <text x="465" y="390" font-family="Inter, sans-serif" font-size="10" fill="#F2EBD9" text-anchor="middle">Institutional Logs</text>

  <rect x="550" y="330" width="150" height="100" rx="5" fill="#1C1A17" stroke="#333"/>
  <text x="625" y="370" font-family="Inter, sans-serif" font-size="14" fill="#F2EBD9" text-anchor="middle" font-weight="bold">dbService</text>
  <text x="625" y="390" font-family="Inter, sans-serif" font-size="10" fill="#F2EBD9" text-anchor="middle">IndexedDB Wrapper</text>

  <!-- External & Storage -->
  <path d="M 145 430 L 145 500" stroke="#C8A84B" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="70" y="510" width="150" height="60" rx="10" fill="#C8A84B"/>
  <text x="145" y="545" font-family="Inter, sans-serif" font-size="14" fill="#0F0C07" text-anchor="middle" font-weight="bold">GOOGLE GEMINI API</text>

  <path d="M 625 430 L 625 500" stroke="#F2EBD9" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="550" y="510" width="150" height="60" rx="10" fill="#333" stroke="#F2EBD9"/>
  <text x="625" y="545" font-family="Inter, sans-serif" font-size="14" fill="#F2EBD9" text-anchor="middle" font-weight="bold">INDEXED DB</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C8A84B" />
    </marker>
  </defs>
</svg>
