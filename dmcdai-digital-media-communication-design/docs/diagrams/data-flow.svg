<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="14">
    <style>
        .box { fill: #1f2937; stroke: #4b5563; stroke-width: 2; rx: 8; }
        .actor { fill: #111827; stroke: #22d3ee; stroke-width: 2; rx: 8; }
        .api { fill: #374151; stroke: #059669; stroke-width: 2; rx: 8; }
        .storage { fill: #4b5563; stroke: #f59e0b; stroke-width: 2; rx: 8; }
        .text { fill: #f9fafb; text-anchor: middle; }
        .text-small { font-size: 11px; }
        .arrow { stroke: #9ca3af; stroke-width: 2; marker-end: url(#arrowhead); }
        .arrow-dashed { stroke: #6b7280; stroke-width: 2; stroke-dasharray: 5,5; marker-end: url(#arrowhead-dashed); }
        .arrow-text { fill: #9ca3af; font-size: 12px; text-anchor: middle; }
    </style>
    <defs>
        <marker id="arrowhead" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ca3af" />
        </marker>
        <marker id="arrowhead-dashed" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280" />
        </marker>
    </defs>

    <!-- Nodes -->
    <rect x="20" y="175" width="100" height="100" class="actor" />
    <text x="70" y="215" class="text">User</text>
    <text x="70" y="235" class="text text-small">(Student/Admin)</text>

    <rect x="180" y="175" width="160" height="100" class="box" />
    <text x="260" y="215" class="text">React UI</text>
    <text x="260" y="235" class="text text-small">(Components & Hooks)</text>

    <rect x="400" y="50" width="160" height="100" class="box" />
    <text x="480" y="90" class="text">State Management</text>
    <text x="480" y="110" class="text text-small">(Auth/Theme Contexts)</text>

    <rect x="400" y="300" width="160" height="100" class="box" />
    <text x="480" y="340" class="text">Services Layer</text>
    <text x="480" y="360" class="text text-small">(geminiService, etc.)</text>

    <rect x="620" y="50" width="160" height="100" class="storage" />
    <text x="700" y="90" class="text">Browser Storage</text>
    <text x="700" y="110" class="text text-small">(localStorage)</text>

    <rect x="620" y="300" width="160" height="100" class="api" />
    <text x="700" y="340" class="text">Google Gemini API</text>
    <text x="700" y="360" class="text text-small">(External)</text>

    <!-- Arrows -->
    <path d="M 125 225 L 175 225" class="arrow" />
    <text x="150" y="215" class="arrow-text">Clicks, Inputs</text>

    <path d="M 345 200 C 370 170, 380 150, 400 130" class="arrow" />
    <text x="360" y="170" class="arrow-text">Update/Read State</text>
    <path d="M 395 100 C 375 140, 365 160, 345 190" class="arrow" />
    <text x="395" y="160" class="arrow-text">Re-render UI</text>

    <path d="M 345 250 C 370 280, 380 300, 400 320" class="arrow" />
    <text x="360" y="290" class="arrow-text">Call Service</text>
    <path d="M 395 350 C 375 310, 365 290, 345 260" class="arrow" />
    <text x="400" y="295" class="arrow-text">Return Data</text>

    <path d="M 565 350 L 615 350" class="arrow" />
    <text x="590" y="340" class="arrow-text">HTTP Req</text>
    <path d="M 615 360 L 565 360" class="arrow" />
    <text x="590" y="375" class="arrow-text">HTTP Res</text>
    
    <path d="M 565 100 L 615 100" class="arrow-dashed" />
    <text x="590" y="90" class="arrow-text">Save Theme</text>
    <path d="M 615 110 L 565 110" class="arrow-dashed" />
    <text x="590" y="125" class="arrow-text">Load Theme</text>
</svg>
