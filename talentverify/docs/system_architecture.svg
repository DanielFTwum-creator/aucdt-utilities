<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa" />
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">TalentVerify System Architecture</text>

  <!-- Client Layer -->
  <rect x="50" y="80" width="700" height="120" rx="10" fill="#e3f2fd" stroke="#2196f3" stroke-width="2" />
  <text x="400" y="105" font-family="Arial" font-size="18" text-anchor="middle" fill="#1565c0">Client Layer (Browser)</text>
  
  <g transform="translate(100, 120)">
    <rect width="180" height="60" rx="5" fill="#ffffff" stroke="#2196f3" />
    <text x="90" y="35" font-family="Arial" font-size="14" text-anchor="middle">React 19.2.4 SPA</text>
  </g>
  
  <g transform="translate(310, 120)">
    <rect width="180" height="60" rx="5" fill="#ffffff" stroke="#2196f3" />
    <text x="90" y="25" font-family="Arial" font-size="14" text-anchor="middle">Tailwind CSS</text>
    <text x="90" y="45" font-family="Arial" font-size="14" text-anchor="middle">Lucide Icons</text>
  </g>
  
  <g transform="translate(520, 120)">
    <rect width="180" height="60" rx="5" fill="#ffffff" stroke="#2196f3" />
    <text x="90" y="35" font-family="Arial" font-size="14" text-anchor="middle">Framer Motion</text>
  </g>

  <!-- Communication -->
  <path d="M 400 200 L 400 250" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Server Layer -->
  <rect x="50" y="250" width="700" height="150" rx="10" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" />
  <text x="400" y="275" font-family="Arial" font-size="18" text-anchor="middle" fill="#2e7d32">Server Layer (Node.js)</text>

  <g transform="translate(100, 290)">
    <rect width="180" height="90" rx="5" fill="#ffffff" stroke="#4caf50" />
    <text x="90" y="30" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Express API</text>
    <text x="90" y="55" font-family="Arial" font-size="12" text-anchor="middle">Auth / Admin Routes</text>
    <text x="90" y="75" font-family="Arial" font-size="12" text-anchor="middle">Puppeteer Runner</text>
  </g>

  <g transform="translate(310, 290)">
    <rect width="180" height="90" rx="5" fill="#ffffff" stroke="#4caf50" />
    <text x="90" y="30" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Business Logic</text>
    <text x="90" y="55" font-family="Arial" font-size="12" text-anchor="middle">Assessment Engine</text>
    <text x="90" y="75" font-family="Arial" font-size="12" text-anchor="middle">Audit Logging</text>
  </g>
  
  <g transform="translate(520, 290)">
    <rect width="180" height="90" rx="5" fill="#ffffff" stroke="#4caf50" />
    <text x="90" y="30" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">AI Service</text>
    <text x="90" y="55" font-family="Arial" font-size="12" text-anchor="middle">Gemini Integration</text>
    <text x="90" y="75" font-family="Arial" font-size="12" text-anchor="middle">Video/Text Analysis</text>
  </g>

  <!-- Data & External -->
  <path d="M 250 400 L 250 450" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 550 400 L 550 450" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Database -->
  <g transform="translate(150, 450)">
    <path d="M 0 20 C 0 10 200 10 200 20 L 200 100 C 200 110 0 110 0 100 Z" fill="#fff3e0" stroke="#ff9800" stroke-width="2" />
    <ellipse cx="100" cy="20" rx="100" ry="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2" />
    <text x="100" y="65" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">SQLite Database</text>
    <text x="100" y="85" font-family="Arial" font-size="12" text-anchor="middle">Better-SQLite3</text>
  </g>

  <!-- External API -->
  <g transform="translate(450, 450)">
    <rect width="200" height="100" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" />
    <text x="100" y="40" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Google Gemini API</text>
    <text x="100" y="65" font-family="Arial" font-size="12" text-anchor="middle">Generative AI Models</text>
    <text x="100" y="85" font-family="Arial" font-size="12" text-anchor="middle">(@google/genai)</text>
  </g>

  <!-- Definitions -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>
</svg>
