<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc" />
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold" fill="#1e293b">FashionPrompt AI - System Architecture</text>
  
  <!-- Client Layer -->
  <rect x="50" y="100" width="700" height="150" rx="10" fill="#e0e7ff" stroke="#4338ca" stroke-width="2" />
  <text x="400" y="130" font-family="Arial" font-size="18" text-anchor="middle" fill="#3730a3" font-weight="bold">Client Layer (React/Browser)</text>
  
  <rect x="100" y="150" width="150" height="80" rx="5" fill="#ffffff" stroke="#cbd5e1" />
  <text x="175" y="195" font-family="Arial" font-size="14" text-anchor="middle">UI Components</text>
  
  <rect x="325" y="150" width="150" height="80" rx="5" fill="#ffffff" stroke="#cbd5e1" />
  <text x="400" y="195" font-family="Arial" font-size="14" text-anchor="middle">State Management</text>
  
  <rect x="550" y="150" width="150" height="80" rx="5" fill="#ffffff" stroke="#cbd5e1" />
  <text x="625" y="195" font-family="Arial" font-size="14" text-anchor="middle">Theme Engine</text>
  
  <!-- Logic Layer -->
  <rect x="50" y="300" width="700" height="150" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2" />
  <text x="400" y="330" font-family="Arial" font-size="18" text-anchor="middle" fill="#166534" font-weight="bold">Logic Layer</text>
  
  <rect x="100" y="350" width="250" height="80" rx="5" fill="#ffffff" stroke="#cbd5e1" />
  <text x="225" y="395" font-family="Arial" font-size="14" text-anchor="middle">Prompt Generation Engine</text>
  
  <rect x="450" y="350" width="250" height="80" rx="5" fill="#ffffff" stroke="#cbd5e1" />
  <text x="575" y="395" font-family="Arial" font-size="14" text-anchor="middle">Diversity Guardrails</text>
  
  <!-- Admin/Data -->
  <rect x="50" y="500" width="700" height="80" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2" />
  <text x="400" y="545" font-family="Arial" font-size="16" text-anchor="middle" fill="#334155">Admin & Audit Logs (Local State / Persistence)</text>
  
  <!-- Connections -->
  <line x1="400" y1="250" x2="400" y2="300" stroke="#94a3b8" stroke-width="2" />
  <line x1="400" y1="450" x2="400" y2="500" stroke="#94a3b8" stroke-width="2" />
</svg>