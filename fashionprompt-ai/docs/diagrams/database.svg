<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#f8fafc" />
  <text x="300" y="40" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold" fill="#1e293b">Application State Schema</text>
  
  <!-- DesignState -->
  <rect x="50" y="80" width="200" height="280" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
  <rect x="50" y="80" width="200" height="40" fill="#3b82f6" />
  <text x="150" y="105" font-family="Arial" font-size="16" text-anchor="middle" fill="white" font-weight="bold">DesignState</text>
  
  <text x="70" y="140" font-family="monospace" font-size="12">garment: string</text>
  <text x="70" y="160" font-family="monospace" font-size="12">style: string</text>
  <text x="70" y="180" font-family="monospace" font-size="12">color: string</text>
  <text x="70" y="200" font-family="monospace" font-size="12">fabric: string</text>
  <text x="70" y="220" font-family="monospace" font-size="12">setting: string</text>
  <text x="70" y="240" font-family="monospace" font-size="12">lighting: string</text>
  <text x="70" y="260" font-family="monospace" font-size="12">mood: string</text>
  <text x="70" y="280" font-family="monospace" font-size="12">ethnicities: Map&lt;id, bool&gt;</text>
  
  <!-- AuditLog -->
  <rect x="350" y="80" width="200" height="160" fill="#ffffff" stroke="#10b981" stroke-width="2" />
  <rect x="350" y="80" width="200" height="40" fill="#10b981" />
  <text x="450" y="105" font-family="Arial" font-size="16" text-anchor="middle" fill="white" font-weight="bold">AuditLog</text>
  
  <text x="370" y="140" font-family="monospace" font-size="12">id: string (PK)</text>
  <text x="370" y="160" font-family="monospace" font-size="12">timestamp: ISO8601</text>
  <text x="370" y="180" font-family="monospace" font-size="12">user: string</text>
  <text x="370" y="200" font-family="monospace" font-size="12">action: string</text>
  <text x="370" y="220" font-family="monospace" font-size="12">details: text</text>

  <!-- Relationship -->
  <line x1="250" y1="160" x2="350" y2="160" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5" />
  <text x="300" y="150" font-family="Arial" font-size="10" text-anchor="middle" fill="#64748b">Generates</text>
</svg>