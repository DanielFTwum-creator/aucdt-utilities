<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .entity { fill: #fff; stroke: #0f172a; stroke-width: 2; }
      .header { fill: #0f172a; }
      .header-text { fill: #fff; font-family: monospace; font-weight: bold; font-size: 14px; anchor: middle; }
      .field { font-family: monospace; font-size: 12px; fill: #334155; }
      .line { stroke: #64748b; stroke-width: 2; }
    </style>
  </defs>

  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold">Logical Data Model (Client-Side)</text>

  <!-- Property Entity -->
  <g transform="translate(50, 80)">
    <rect width="200" height="220" class="entity" />
    <rect width="200" height="30" class="header" />
    <text x="100" y="20" text-anchor="middle" class="header-text">Property</text>
    
    <text x="10" y="50" class="field">PK id: string</text>
    <text x="10" y="70" class="field">   title: string</text>
    <text x="10" y="90" class="field">   type: enum(RENT|SALE)</text>
    <text x="10" y="110" class="field">   price: number</text>
    <text x="10" y="130" class="field">   location: string</text>
    <text x="10" y="150" class="field">   description: string</text>
    <text x="10" y="170" class="field">   bedrooms: number?</text>
    <text x="10" y="190" class="field">   image: string</text>
    <text x="10" y="210" class="field">   driveToViewPrice: number</text>
  </g>

  <!-- Cart Item Entity -->
  <g transform="translate(350, 80)">
    <rect width="200" height="140" class="entity" />
    <rect width="200" height="30" class="header" />
    <text x="100" y="20" text-anchor="middle" class="header-text">CartItem</text>
    
    <text x="10" y="50" class="field">PK id: string</text>
    <text x="10" y="70" class="field">FK propertyId: string</text>
    <text x="10" y="90" class="field">   serviceType: string</text>
    <text x="10" y="110" class="field">   title: string</text>
    <text x="10" y="130" class="field">   price: number</text>
  </g>

  <!-- Audit Log Entity -->
  <g transform="translate(350, 250)">
    <rect width="200" height="140" class="entity" />
    <rect width="200" height="30" class="header" />
    <text x="100" y="20" text-anchor="middle" class="header-text">AuditLogEntry</text>
    
    <text x="10" y="50" class="field">PK id: string</text>
    <text x="10" y="70" class="field">   timestamp: Date</text>
    <text x="10" y="90" class="field">   action: string</text>
    <text x="10" y="110" class="field">   user: string</text>
    <text x="10" y="130" class="field">   details: string</text>
  </g>

  <!-- User (Implicit) -->
  <g transform="translate(600, 150)">
    <rect width="150" height="80" class="entity" stroke-dasharray="4" />
    <rect width="150" height="30" class="header" fill="#64748b" />
    <text x="75" y="20" text-anchor="middle" class="header-text">User (Ephemeral)</text>
    <text x="10" y="50" class="field">   name: string</text>
    <text x="10" y="70" class="field">   role: enum(Guest|Admin)</text>
  </g>

  <!-- Relationships -->
  <path d="M250 120 L350 120" class="line" marker-end="url(#arrow)" />
  <circle cx="250" cy="120" r="3" fill="#000" />
  <text x="300" y="110" font-size="10" font-family="sans-serif">1:N</text>

</svg>