<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .category { fill: #f1f5f9; stroke: #475569; stroke-width: 2; rx: 8; }
      .item { fill: #ffffff; stroke: #94a3b8; stroke-width: 1; rx: 4; }
      .header { font-family: sans-serif; font-weight: bold; font-size: 16px; fill: #334155; text-anchor: middle; }
      .label { font-family: sans-serif; font-size: 14px; fill: #1e293b; text-anchor: middle; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="400" y="40" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#0f172a">Technology Stack</text>

  <!-- Frontend -->
  <g transform="translate(50, 80)">
    <rect width="200" height="350" class="category" />
    <text x="100" y="30" class="header">Frontend Core</text>
    
    <g transform="translate(25, 50)">
      <rect width="150" height="40" class="item" />
      <text x="75" y="25" class="label">React 18.3.1</text>
    </g>
    <g transform="translate(25, 100)">
      <rect width="150" height="40" class="item" />
      <text x="75" y="25" class="label">TypeScript</text>
    </g>
    <g transform="translate(25, 150)">
      <rect width="150" height="40" class="item" />
      <text x="75" y="25" class="label">Tailwind CSS</text>
    </g>
    <g transform="translate(25, 200)">
      <rect width="150" height="40" class="item" />
      <text x="75" y="25" class="label">Lucide Icons</text>
    </g>
  </g>

  <!-- Utilities -->
  <g transform="translate(300, 80)">
    <rect width="200" height="350" class="category" />
    <text x="100" y="30" class="header">Tools & Utils</text>
    
    <g transform="translate(25, 50)">
      <rect width="150" height="40" class="item" />
      <text x="75" y="25" class="label">ESM.sh CDN</text>
    </g>
    <g transform="translate(25, 100)">
      <rect width="150" height="40" class="item" />
      <text x="75" y="25" class="label">Puppeteer</text>
    </g>
    <g transform="translate(25, 150)">
      <rect width="150" height="40" class="item" />
      <text x="75" y="25" class="label">html2canvas</text>
    </g>
  </g>

  <!-- Services -->
  <g transform="translate(550, 80)">
    <rect width="200" height="350" class="category" />
    <text x="100" y="30" class="header">Services</text>
    
    <g transform="translate(25, 50)">
      <rect width="150" height="40" class="item" stroke="#3b82f6" />
      <text x="75" y="25" class="label">Google GenAI</text>
    </g>
    <g transform="translate(25, 100)">
      <rect width="150" height="40" class="item" />
      <text x="75" y="25" class="label">Lorem Picsum</text>
    </g>
    <g transform="translate(25, 150)">
      <rect width="150" height="40" class="item" />
      <text x="75" y="25" class="label">Unsplash</text>
    </g>
  </g>

</svg>