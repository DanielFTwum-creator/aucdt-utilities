<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <style>
      .actor { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; }
      .usecase { fill: #fff; stroke: #3b82f6; stroke-width: 2; rx: 25; ry: 25; }
      .system { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 5,5; }
      .text { font-family: sans-serif; font-size: 14px; text-anchor: middle; }
      .line { stroke: #0f172a; stroke-width: 1; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="400" y="40" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold">UML Use Case Diagram</text>

  <!-- System Boundary -->
  <rect x="200" y="80" width="400" height="480" class="system" />
  <text x="400" y="110" font-family="sans-serif" font-weight="bold" text-anchor="middle">Pama Realtor App</text>

  <!-- Actors -->
  <circle cx="100" cy="200" r="15" class="actor" />
  <path d="M100 215 L100 250 M80 230 L120 230 M100 250 L80 280 M100 250 L120 280" class="actor" fill="none" />
  <text x="100" y="300" class="text">Guest User</text>

  <circle cx="700" cy="200" r="15" class="actor" />
  <path d="M700 215 L700 250 M680 230 L720 230 M700 250 L680 280 M700 250 L720 280" class="actor" fill="none" />
  <text x="700" y="300" class="text">Admin</text>

  <!-- Use Cases -->
  <ellipse cx="400" cy="160" rx="80" ry="25" class="usecase" />
  <text x="400" y="165" class="text">Browse Properties</text>

  <ellipse cx="400" cy="230" rx="80" ry="25" class="usecase" />
  <text x="400" y="235" class="text">Search & Filter</text>

  <ellipse cx="400" cy="300" rx="80" ry="25" class="usecase" />
  <text x="400" y="305" class="text">Add to Cart</text>

  <ellipse cx="400" cy="370" rx="80" ry="25" class="usecase" />
  <text x="400" y="375" class="text">Ask AI Agent</text>

  <ellipse cx="400" cy="440" rx="80" ry="25" class="usecase" />
  <text x="400" y="445" class="text">Manage Listings</text>

  <!-- Links -->
  <line x1="120" y1="230" x2="320" y2="160" class="line" />
  <line x1="120" y1="230" x2="320" y2="230" class="line" />
  <line x1="120" y1="230" x2="320" y2="300" class="line" />
  <line x1="120" y1="230" x2="320" y2="370" class="line" />

  <line x1="680" y1="230" x2="480" y2="440" class="line" />
  <line x1="680" y1="230" x2="480" y2="160" class="line" />

</svg>