<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .process { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 20; }
      .store { fill: #e0e7ff; stroke: #4338ca; stroke-width: 2; }
      .entity { fill: #dcfce7; stroke: #15803d; stroke-width: 2; }
      .text { font-family: sans-serif; font-size: 14px; text-anchor: middle; }
      .path { fill: none; stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="400" y="40" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold">Data Flow: Order Processing</text>

  <!-- Entities -->
  <rect x="50" y="150" width="100" height="60" class="entity" />
  <text x="100" y="185" class="text">User</text>

  <rect x="650" y="150" width="100" height="60" class="entity" />
  <text x="700" y="185" class="text">Admin/Log</text>

  <!-- Processes -->
  <rect x="250" y="150" width="120" height="60" class="process" />
  <text x="310" y="175" class="text">Add to</text>
  <text x="310" y="195" class="text">Cart</text>

  <rect x="450" y="150" width="120" height="60" class="process" />
  <text x="510" y="175" class="text">Process</text>
  <text x="510" y="195" class="text">Checkout</text>

  <!-- Data Store -->
  <path d="M300 280 L500 280 L500 330 L300 330 Z" class="store" />
  <line x1="320" y1="280" x2="320" y2="330" stroke="#4338ca" stroke-width="2" />
  <text x="410" y="310" class="text">React State (Cart)</text>

  <!-- Flows -->
  <path d="M150 180 L250 180" class="path" />
  <text x="200" y="170" font-family="sans-serif" font-size="10" text-anchor="middle">Selection</text>

  <path d="M370 180 L450 180" class="path" />
  <text x="410" y="170" font-family="sans-serif" font-size="10" text-anchor="middle">Order Details</text>

  <path d="M570 180 L650 180" class="path" />
  <text x="610" y="170" font-family="sans-serif" font-size="10" text-anchor="middle">Audit Log</text>

  <path d="M310 210 L310 280" class="path" />
  <path d="M490 280 L490 210" class="path" />

</svg>