<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
    <style>
      .lifeline { stroke: #000; stroke-width: 1; stroke-dasharray: 5,5; }
      .box { fill: #f8fafc; stroke: #000; stroke-width: 1; }
      .activation { fill: #e2e8f0; stroke: #000; stroke-width: 1; }
      .message { stroke: #000; stroke-width: 1; marker-end: url(#arrow); }
      .text { font-family: sans-serif; font-size: 14px; text-anchor: middle; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="400" y="40" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold">Sequence: Add to Cart</text>

  <!-- Lifelines -->
  <rect x="100" y="80" width="100" height="40" class="box" />
  <text x="150" y="105" class="text">User</text>
  <line x1="150" y1="120" x2="150" y2="500" class="lifeline" />

  <rect x="350" y="80" width="100" height="40" class="box" />
  <text x="400" y="105" class="text">App (UI)</text>
  <line x1="400" y1="120" x2="400" y2="500" class="lifeline" />

  <rect x="600" y="80" width="100" height="40" class="box" />
  <text x="650" y="105" class="text">Cart State</text>
  <line x1="650" y1="120" x2="650" y2="500" class="lifeline" />

  <!-- Activations -->
  <rect x="395" y="150" width="10" height="250" class="activation" />
  <rect x="645" y="180" width="10" height="150" class="activation" />

  <!-- Messages -->
  <line x1="150" y1="150" x2="395" y2="150" class="message" />
  <text x="275" y="140" class="text">Click "Rent Now"</text>

  <line x1="405" y1="180" x2="645" y2="180" class="message" />
  <text x="525" y="170" class="text">addItem(property)</text>

  <line x1="645" y1="220" x2="645" y2="240" stroke="#000" stroke-width="1" />
  <line x1="645" y1="240" x2="655" y2="240" class="message" />
  <text x="700" y="245" class="text">validate()</text>

  <line x1="645" y1="280" x2="405" y2="280" class="message" stroke-dasharray="5,5" />
  <text x="525" y="270" class="text">cartUpdated</text>

  <line x1="405" y1="320" x2="150" y2="320" class="message" stroke-dasharray="5,5" />
  <text x="275" y="310" class="text">Open Cart Drawer</text>

</svg>