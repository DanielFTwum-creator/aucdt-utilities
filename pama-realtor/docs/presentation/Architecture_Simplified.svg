<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .block { fill: #3b82f6; stroke: none; rx: 10; }
      .text-w { fill: #fff; font-family: sans-serif; font-size: 24px; font-weight: bold; text-anchor: middle; }
      .text-b { fill: #1e293b; font-family: sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
      .line { stroke: #94a3b8; stroke-width: 4; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <rect x="50" y="150" width="200" height="200" class="block" />
  <text x="150" y="260" class="text-w">Frontend</text>

  <rect x="550" y="150" width="200" height="200" class="block" fill="#22c55e" />
  <text x="650" y="260" class="text-w">AI Services</text>

  <line x1="250" y1="250" x2="550" y2="250" class="line" />

  <text x="400" y="230" class="text-b">API</text>

</svg>