<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techbridge University College - Header</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Lato:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 0;
        }

        .header-container {
            width: 100%;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        /* Main Header Section */
        .header-main {
            background: white;
            padding: 40px 5%;
            position: relative;
        }

        .header-main::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #C8991F 0%, #D4A843 50%, #C8991F 100%);
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 32px;
            position: relative;
            z-index: 1;
        }

        .logo-container {
            flex-shrink: 0;
        }

        .logo {
            width: 100px;
            height: 100px;
            padding: 8px;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.03);
        }

        .text-content {
            flex: 1;
        }

        .institution-name {
            font-family: 'Playfair Display', Georgia, serif;
            color: #C8991F;
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 14px;
            line-height: 1.2;
            text-transform: uppercase;
        }

        .former-name {
            font-family: 'Lato', sans-serif;
            color: #6B1C23;
            font-size: 28px;
            font-weight: 400;
            font-style: italic;
            line-height: 1.3;
            letter-spacing: 0.5px;
        }

        /* Navigation Bar */
        .header-nav {
            background: #FAFAFA;
            padding: 0 5%;
            border-top: 1px solid #E8E8E8;
            border-bottom: 1px solid #E8E8E8;
        }

        .nav-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            gap: 36px;
            padding: 16px 0;
        }

        .nav-link {
            font-family: 'Lato', sans-serif;
            color: #5A5A5A;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            padding: 8px 0;
            transition: all 0.3s ease;
            position: relative;
            letter-spacing: 0.3px;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: #C8991F;
            transition: width 0.3s ease;
        }

        .nav-link:hover {
            color: #C8991F;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            .header-main {
                padding: 32px 4%;
            }

            .header-content {
                flex-direction: column;
                text-align: center;
                gap: 20px;
            }

            .logo {
                width: 80px;
                height: 80px;
            }

            .institution-name {
                font-size: 36px;
                letter-spacing: 1px;
            }

            .former-name {
                font-size: 22px;
            }

            .nav-content {
                flex-wrap: wrap;
                justify-content: center;
                gap: 20px 28px;
            }

            .nav-link {
                font-size: 14px;
            }
        }

        @media (max-width: 600px) {
            .institution-name {
                font-size: 28px;
                letter-spacing: 0.5px;
            }

            .former-name {
                font-size: 18px;
            }

            .nav-content {
                gap: 16px 20px;
            }
        }
    </style>
</head>
<body>
    <header class="header-container">
        <!-- Main Header -->
        <div class="header-main">
            <div class="header-content">
                <div class="logo-container">
                    <svg class="logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                        <!-- Outer gold ring -->
                        <circle cx="100" cy="100" r="95" fill="none" stroke="#C8991F" stroke-width="8"/>
                        <circle cx="100" cy="100" r="88" fill="white"/>
                        
                        <!-- Shield -->
                        <path d="M100,40 L140,60 L140,120 Q140,140 100,155 Q60,140 60,120 L60,60 Z" fill="#6B1C23" stroke="#C8991F" stroke-width="3"/>
                        
                        <!-- Top left quadrant (yellow) -->
                        <path d="M100,60 L120,70 L120,95 L100,95 Z" fill="#F4D03F"/>
                        <circle cx="110" cy="82.5" r="8" fill="#C8991F"/>
                        
                        <!-- Top right quadrant (yellow) -->
                        <path d="M100,60 L80,70 L80,95 L100,95 Z" fill="#F4D03F"/>
                        <path d="M90,82.5 L85,87.5 L90,92.5 L95,87.5 Z" fill="#4A90E2"/>
                        
                        <!-- Bottom left quadrant (green) -->
                        <path d="M100,95 L120,95 L120,120 Q120,130 100,140 Z" fill="#2ECC71"/>
                        <circle cx="110" cy="110" r="6" fill="#27AE60"/>
                        <rect x="108" y="116" width="4" height="10" fill="#8B4513"/>
                        
                        <!-- Bottom right quadrant (yellow) -->
                        <path d="M100,95 L80,95 L80,120 Q80,130 100,140 Z" fill="#F4D03F"/>
                        <path d="M85,110 Q87,105 90,110 Q92,105 95,110" fill="none" stroke="#C8991F" stroke-width="2"/>
                        
                        <!-- Banner -->
                        <path d="M50,165 Q100,155 150,165" fill="#6B1C23"/>
                        <text x="100" y="167" text-anchor="middle" font-size="8" fill="#C8991F" font-weight="bold">DESIGN AND BUILD A NATION</text>
                    </svg>
                </div>

                <div class="text-content">
                    <h1 class="institution-name">Techbridge University College</h1>
                    <p class="former-name">Formerly AsanSka University College of Design and Technology</p>
                </div>
            </div>
        </div>

        <!-- Navigation Bar -->
        <nav class="header-nav">
            <div class="nav-content">
                <a href="#home" class="nav-link">Home</a>
                <a href="#about" class="nav-link">About Us</a>
                <a href="#admissions" class="nav-link">Admissions</a>
                <a href="#programs" class="nav-link">Programs</a>
                <a href="#campus" class="nav-link">Campus Life</a>
                <a href="#contact" class="nav-link">Contact</a>
            </div>
        </nav>
    </header>
</body>
</html>
