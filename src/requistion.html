<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Requisition Form</title>
  <style>
    /* Container for the form */
    .form-container {
      max-width: 400px;
      margin: 0 auto;
      padding: 20px;
      background-color: #f8f8f8;
      border-radius: 4px;
      box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
    }

    /* Form styles */
    form {
      display: grid;
      grid-gap: 10px;
    }

    /* Label styles */
    label {
      font-weight: bold;
    }

    /* Input styles */
    input,
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      margin-bottom: 10px;
      font-size: 16px;
    }

    /* Submit button styles */
    input[type="submit"] {
      background-color: #007bff;
      color: #fff;
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    /* Responsive styles for small screens */
    @media (max-width: 600px) {
      .form-container {
        padding: 10px;
      }
    }
  </style>


</head>

<body>
  <h1>Requisition Form</h1>
  <form action="/submit_requisition" method="post">
    <label for="item_name">Item Name:</label>
    <input type="text" id="item_name" name="item_name" required><br>
    <label for="quantity">Quantity:</label>
    <input type="number" id="quantity" name="quantity" required><br>
    <label for="vendor">Vendor:</label>
    <input type="text" id="vendor" name="vendor" required><br>
    <label for="budget_code">Budget Code:</label>
    <input type="text" id="budget_code" name="budget_code" required><br>
    <label for="justification">Justification:</label><br>
    <textarea id="justification" name="justification" rows="4" cols="50" required></textarea><br>
    <input type="submit" value="Submit">
  </form>
</body>

</html>
