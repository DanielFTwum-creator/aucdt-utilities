<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Poppins, sans-serif" font-size="14">
    <style>
        .title { font-size: 24px; font-weight: bold; fill: #2C1810; }
        .box { stroke: #6B1028; stroke-width: 2; fill: #FFFFFF; }
        .actor { stroke: #2E4034; stroke-width: 2; fill: #FFFFFF; }
        .store { stroke: #D4AF37; stroke-width: 2; fill: #F8F6F0; border-bottom: 2px solid #D4AF37; }
        .label { font-size: 16px; font-weight: 600; fill: #2C1810; }
        .text { font-size: 14px; fill: #2C1810; }
        .arrow { stroke: #8B1538; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
    </style>
    <defs>
        <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#8B1538" />
        </marker>
    </defs>

    <text x="400" y="40" text-anchor="middle" class="title">Application Data Flow Diagram</text>

    <!-- Elements -->
    <g transform="translate(80, 220)">
        <circle cx="0" cy="-15" r="15" class="actor"/>
        <path d="M -20 10 C -20 30, 20 30, 20 10" class="actor" fill="none"/>
        <text y="40" text-anchor="middle" class="label">User</text>
    </g>

    <rect x="200" y="200" width="180" height="80" rx="5" class="box" />
    <text x="290" y="235" text-anchor="middle" class="label">React Components</text>
    <text x="290" y="255" text-anchor="middle" class="text">(UI / Event Handlers)</text>
    
    <rect x="450" y="200" width="180" height="80" rx="5" class="box" />
    <text x="540" y="235" text-anchor="middle" class="label">AppContext</text>
    <text x="540" y="255" text-anchor="middle" class="text">(Global State)</text>

    <rect x="200" y="350" width="180" height="60" rx="5" class="actor" />
    <text x="290" y="385" text-anchor="middle" class="label">Browser DOM</text>

    <rect x="450" y="350" width="180" height="60" rx="5" class="store" />
    <line x1="450" y1="380" x2="630" y2="380" stroke="#D4AF37" stroke-width="1.5" />
    <text x="540" y="385" text-anchor="middle" class="label">localStorage</text>

    <!-- Arrows -->
    <!-- User -> Components -->
    <path class="arrow" d="M 120 230 C 150 230, 180 230, 200 230" />
    <text x="160" y="220" text-anchor="middle" class="text">1. Interaction</text>
    <text x="160" y="235" text-anchor="middle" class="text">(Click, Input)</text>

    <!-- Components -> AppContext -->
    <path class="arrow" d="M 380 230 C 400 230, 430 230, 450 230" />
    <text x="415" y="220" text-anchor="middle" class="text">2. Dispatch Action</text>

    <!-- AppContext -> Components -->
    <path class="arrow" d="M 450 260 C 430 260, 400 260, 380 260" />
    <text x="415" y="275" text-anchor="middle" class="text">3. State Update</text>

    <!-- Components -> DOM -->
    <path class="arrow" d="M 290 280 L 290 350" />
    <text x="320" y="320" class="text">4. Re-render</text>

    <!-- AppContext -> localStorage -->
    <path class="arrow" d="M 540 280 L 540 350" />
    <text x="510" y="320" class="text">5. Persist Theme</text>
</svg>