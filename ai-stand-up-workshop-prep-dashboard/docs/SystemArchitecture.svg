<svg width="800" height="550" viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg" font-family="Poppins, sans-serif" font-size="14">
    <style>
        .title { font-size: 24px; font-weight: bold; fill: #2C1810; }
        .box { stroke: #6B1028; stroke-width: 2; fill: #F8F6F0; }
        .box-inner { stroke: #D4AF37; stroke-width: 1.5; fill: #FFFFFF; }
        .box-lib { stroke: #2E4034; stroke-width: 1.5; fill: #FFFFFF; }
        .label { font-size: 16px; font-weight: 600; fill: #2C1810; }
        .text { font-size: 14px; fill: #2C1810; }
        .arrow { stroke: #8B1538; stroke-width: 2; marker-end: url(#arrowhead); }
        .arrow-dashed { stroke: #8B1538; stroke-width: 2; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }
    </style>
    <defs>
        <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#8B1538" />
        </marker>
    </defs>

    <text x="400" y="40" text-anchor="middle" class="title">System Architecture Diagram</text>
    <text x="400" y="65" text-anchor="middle" class="text">AI Stand-up & Workshop Prep Dashboard</text>

    <!-- Main Browser Box -->
    <rect x="20" y="100" width="760" height="430" rx="10" class="box" />
    <text x="400" y="130" text-anchor="middle" class="label">Client's Web Browser</text>

    <!-- React Application Box -->
    <rect x="200" y="160" width="400" height="250" rx="5" class="box-inner" />
    <text x="400" y="185" text-anchor="middle" class="label">React Application (SPA)</text>

    <!-- Components within React App -->
    <rect x="220" y="210" width="170" height="50" rx="3" class="box-inner" />
    <text x="305" y="240" text-anchor="middle" class="text">index.tsx (Root)</text>
    
    <rect x="220" y="270" width="170" height="50" rx="3" class="box-inner" />
    <text x="305" y="300" text-anchor="middle" class="text">App.tsx (Router/State)</text>

    <rect x="410" y="210" width="170" height="50" rx="3" class="box-inner" />
    <text x="495" y="240" text-anchor="middle" class="text">Components/*</text>
    
    <rect x="410" y="270" width="170" height="50" rx="3" class="box-inner" />
    <text x="495" y="300" text-anchor="middle" class="text">AppContext (Global State)</text>

    <!-- Browser APIs -->
    <rect x="50" y="250" width="120" height="60" rx="5" class="box-lib" />
    <text x="110" y="285" text-anchor="middle" class="label">Browser DOM</text>

    <rect x="50" y="350" width="120" height="60" rx="5" class="box-lib" />
    <text x="110" y="385" text-anchor="middle" class="label">localStorage</text>

    <!-- External Libraries -->
    <rect x="630" y="250" width="120" height="60" rx="5" class="box-lib" />
    <text x="690" y="285" text-anchor="middle" class="label">Chart.js</text>

    <rect x="630" y="350" width="120" height="60" rx="5" class="box-lib" />
    <text x="690" y="385" text-anchor="middle" class="label">Tailwind CSS</text>

    <!-- User -->
    <g transform="translate(400, 480)">
      <circle cx="0" cy="-15" r="15" fill="#fff" stroke="#6B1028" stroke-width="2"/>
      <path d="M -20 10 C -20 30, 20 30, 20 10" fill="none" stroke="#6B1028" stroke-width="2"/>
      <text y="40" text-anchor="middle" class="label">User</text>
    </g>

    <!-- Arrows -->
    <path class="arrow" d="M 400 450 Q 400 430 400 410" />
    <text x="420" y="440" class="text">Interacts</text>

    <path class="arrow" d="M 200 285 L 170 285" />
    <text x="180" y="275" class="text" text-anchor="middle">Renders to</text>

    <path class="arrow-dashed" d="M 320 320 Q 250 350 170 370" />
    <text x="260" y="355" class="text">Persists Theme</text>

    <path class="arrow-dashed" d="M 580 280 L 630 280" />
    <text x="605" y="270" class="text" text-anchor="middle">Uses</text>

    <path class="arrow-dashed" d="M 580 370 Q 600 380 630 380" />
    <text x="605" y="395" class="text" text-anchor="middle">Styled by</text>
</svg>
