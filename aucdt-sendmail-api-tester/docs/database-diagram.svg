<svg xmlns="http://www.w3.org/2000/svg" width="500" height="200" viewBox="0 0 500 200">
    <style>
        .box { fill: #f0f0f0; stroke: #ccc; stroke-width: 1; }
        .text { font-family: 'Poppins', sans-serif; font-size: 16px; text-anchor: middle; line-height: 1.5; }
    </style>
    <rect x="10" y="10" width="480" height="180" rx="15" class="box" />
    <text x="250" y="80" class="text">
        <tspan x="250" dy="0">No Database Diagram Applicable</tspan>
        <tspan x="250" dy="1.4em">This application is a stateless frontend client.</tspan>
