<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
    <style>
        .box { fill: #fff; stroke: #333; stroke-width: 2; }
        .text { font-family: 'Poppins', sans-serif; font-size: 14px; text-anchor: middle; }
        .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
        .small-text { font-family: 'Poppins', sans-serif; font-size: 12px; text-anchor: middle; }
    </style>
    <defs>
        <marker id="arrowhead" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
        </marker>
    </defs>
    
    <!-- User -->
    <rect x="20" y="110" width="120" height="60" rx="10" class="box" />
    <text x="80" y="145" class="text">User</text>

    <!-- Browser -->
    <rect x="240" y="110" width="120" height="60" rx="10" class="box" />
    <text x="300" y="135" class="text">Browser</text>
    <text x="300" y="155" class="small-text">(React App)</text>

    <!-- Backend -->
    <rect x="460" y="50" width="120" height="180" rx="10" class="box" />
    <text x="520" y="70" class="text">AUCDT Backend</text>
    <rect x="470" y="90" width="100" height="30" rx="5" class="box" style="fill:#e6f7ff;" />
    <text x="520" y="110" class="small-text">DEV API</text>
    <rect x="470" y="130" width="100" height="30" rx="5" class="box" style="fill:#e6f7ff;" />
    <text x="520" y="150" class="small-text">QA API</text>
    <rect x="470" y="170" width="100" height="30" rx="5" class="box" style="fill:#e6f7ff;" />
    <text x="520" y="190" class="small-text">UAT API</text>

    <!-- Arrows -->
    <path class="arrow" d="M 140 140 H 240" />
    <text x="190" y="130" class="small-text">Interacts</text>

    <path class="arrow" d="M 360 140 H 460" />
    <text x="410" y="130" class="small-text">HTTP POST</text>
    <path class="arrow" d="M 460 160 H 360" />
    <text x="410" y="175" class="small-text">API Response</text>
</svg>