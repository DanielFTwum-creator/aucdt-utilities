<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #0F0C07; }
      .text-title { fill: #C8A84B; font-family: 'Playfair Display', serif; font-size: 24px; font-weight: bold; }
      .text-subtitle { fill: #F2EBD9; font-family: 'Cormorant Garamond', serif; font-size: 16px; font-style: italic; }
      .text-node { fill: #0F0C07; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; }
      .text-label { fill: #F2EBD9; font-family: 'Inter', sans-serif; font-size: 12px; }
      .box-gold { fill: #C8A84B; stroke: #E8C96A; stroke-width: 2; rx: 4; }
      .box-outline { fill: transparent; stroke: #C8A84B; stroke-width: 2; stroke-dasharray: 4 4; rx: 4; }
      .line { stroke: #C8A84B; stroke-width: 2; fill: none; }
      .arrow { fill: #C8A84B; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" class="text-title">DATA FLOW &amp; STATE MANAGEMENT</text>
  <text x="400" y="75" text-anchor="middle" class="text-subtitle">TechBridge University College - Retrospective Archive</text>

  <!-- State Container -->
  <rect x="250" y="150" width="300" height="180" class="box-outline" style="stroke-dasharray:none;" />
  <text x="400" y="180" text-anchor="middle" class="text-title" style="font-size: 16px;">APP CONTEXT (REACT)</text>

  <!-- State Nodes -->
  <rect x="280" y="210" width="100" height="40" class="box-gold" />
  <text x="330" y="235" text-anchor="middle" class="text-node">AUTH</text>

  <rect x="420" y="210" width="100" height="40" class="box-gold" />
  <text x="470" y="235" text-anchor="middle" class="text-node">THEME</text>

  <rect x="350" y="270" width="100" height="40" class="box-gold" />
  <text x="400" y="295" text-anchor="middle" class="text-node">AUDIT LOGS</text>

  <!-- LocalStorage -->
  <rect x="250" y="420" width="300" height="80" class="box-outline" style="stroke-dasharray: 4 4;" />
  <text x="400" y="450" text-anchor="middle" class="text-title" style="font-size: 16px;">BROWSER LOCALSTORAGE</text>
  
  <rect x="280" y="470" width="240" height="20" class="box-gold" style="fill:#F5E6B8; stroke:none;" />
  <text x="400" y="485" text-anchor="middle" class="text-node" style="font-size: 14px;">JSON SERIALIZED DATA</text>

  <!-- Components -->
  <rect x="50" y="210" width="120" height="40" class="box-gold" style="fill:#E8C96A;" />
  <text x="110" y="235" text-anchor="middle" class="text-node">UI COMPONENTS</text>

  <rect x="630" y="210" width="120" height="40" class="box-gold" style="fill:#E8C96A;" />
  <text x="690" y="235" text-anchor="middle" class="text-node">ADMIN PORTAL</text>

  <!-- Flow Lines -->
  <!-- UI to Context -->
  <path d="M 170 220 L 280 220" class="line" marker-end="url(#arrowhead)" />
  <path d="M 280 240 L 170 240" class="line" marker-end="url(#arrowhead)" />
  <text x="225" y="210" text-anchor="middle" class="text-label">Read/Set</text>

  <!-- Admin to Context -->
  <path d="M 630 220 L 520 220" class="line" marker-end="url(#arrowhead)" />
  <path d="M 520 240 L 630 240" class="line" marker-end="url(#arrowhead)" />
  <text x="575" y="210" text-anchor="middle" class="text-label">Read/Set</text>

  <!-- Admin to Logs -->
  <path d="M 690 250 L 690 290 L 450 290" class="line" marker-end="url(#arrowhead)" />
  <text x="570" y="280" text-anchor="middle" class="text-label">Append Action</text>

  <!-- Context to Storage -->
  <path d="M 380 330 L 380 420" class="line" marker-end="url(#arrowhead)" />
  <path d="M 420 420 L 420 330" class="line" marker-end="url(#arrowhead)" />
  <text x="330" y="380" class="text-label">Hydrate</text>
  <text x="470" y="380" class="text-label">Persist</text>

</svg>
