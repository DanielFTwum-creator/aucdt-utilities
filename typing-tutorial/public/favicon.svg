<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Touch Typing Tutorial - Shield with Keyboard -->
  <rect width="256" height="256" fill="#f5f0e8"/>

  <!-- Shield shape -->
  <path d="M 128 20 L 180 50 L 180 120 C 180 160 128 220 128 220 C 128 220 76 160 76 120 L 76 50 Z" fill="#2563EB" stroke="#1D4ED8" stroke-width="2"/>

  <!-- Keyboard symbol -->
  <rect x="100" y="90" width="56" height="35" fill="none" stroke="#f8fafc" stroke-width="2" rx="2"/>

  <!-- Keys row 1 -->
  <rect x="104" y="94" width="6" height="6" fill="#f8fafc" opacity="0.8"/>
  <rect x="113" y="94" width="6" height="6" fill="#f8fafc" opacity="0.8"/>
  <rect x="122" y="94" width="6" height="6" fill="#f8fafc" opacity="0.8"/>
  <rect x="131" y="94" width="6" height="6" fill="#f8fafc" opacity="0.8"/>
  <rect x="140" y="94" width="6" height="6" fill="#f8fafc" opacity="0.8"/>

  <!-- Keys row 2 -->
  <rect x="104" y="105" width="6" height="6" fill="#f8fafc" opacity="0.8"/>
  <rect x="113" y="105" width="6" height="6" fill="#f8fafc" opacity="0.8"/>
  <rect x="122" y="105" width="6" height="6" fill="#f8fafc" opacity="0.8"/>
  <rect x="131" y="105" width="6" height="6" fill="#f8fafc" opacity="0.8"/>
  <rect x="140" y="105" width="6" height="6" fill="#f8fafc" opacity="0.8"/>
</svg>
