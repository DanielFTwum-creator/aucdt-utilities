<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #142520; }
      .box { fill: rgba(124,58,237,0.05); stroke: #7C3AED; stroke-width: 2; rx: 8; }
      .text-title { fill: #ffffff; font-family: sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
      .text-sub { fill: #0EA5E9; font-family: sans-serif; font-size: 12px; letter-spacing: 2px; text-anchor: middle; }
      .line { stroke: #7C3AED; stroke-width: 2; stroke-dasharray: 4; fill: none; }
      .arrow { fill: #7C3AED; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
    </marker>
  </defs>
  
  <rect width="1000" height="600" class="bg" />
  
  <!-- Presentation Title -->
  <text x="400" y="40" fill="#7C3AED" font-family="serif" font-size="24" font-weight="bold" text-anchor="middle" letter-spacing="4">BRAINIAC CHALLENGE ARCHITECTURE</text>
  <text x="400" y="60" fill="#ffffff" opacity="0.6" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="2">GAMIFIED EXCELLENCE • REACT 19.2.4</text>

  <!-- Presentation Layer -->
  <rect x="50" y="100" width="200" height="300" class="box" />
  <text x="150" y="130" class="text-title">Player UI</text>
  <text x="150" y="150" class="text-sub">REACT 19.2.4 SPA</text>
  
  <rect x="70" y="180" width="160" height="40" fill="rgba(255,255,255,0.1)" rx="4" />
  <text x="150" y="205" fill="#fff" font-family="sans-serif" font-size="12" text-anchor="middle">Quiz View &amp; Motion</text>

  <rect x="70" y="240" width="160" height="40" fill="rgba(255,255,255,0.1)" rx="4" />
  <text x="150" y="265" fill="#fff" font-family="sans-serif" font-size="12" text-anchor="middle">KaTeX Renderer</text>

  <rect x="70" y="300" width="160" height="40" fill="rgba(255,255,255,0.1)" rx="4" />
  <text x="150" y="325" fill="#fff" font-family="sans-serif" font-size="12" text-anchor="middle">Refresh Status</text>

  <!-- Intelligence Layer -->
  <rect x="300" y="100" width="200" height="300" class="box" />
  <text x="400" y="130" class="text-title">Quiz Engine</text>
  <text x="400" y="150" class="text-sub">AI &amp; LOGIC</text>

  <rect x="320" y="180" width="160" height="40" fill="rgba(124,58,237,0.2)" rx="4" />
  <text x="400" y="205" fill="#7C3AED" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Gemini 3.0 Flash</text>

  <rect x="320" y="240" width="160" height="40" fill="rgba(124,58,237,0.2)" rx="4" />
  <text x="400" y="265" fill="#7C3AED" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Puppeteer E2E</text>

  <rect x="320" y="300" width="160" height="40" fill="rgba(124,58,237,0.2)" rx="4" />
  <text x="400" y="325" fill="#7C3AED" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Firebase Auth</text>

  <!-- Data Layer -->
  <rect x="550" y="100" width="200" height="300" class="box" />
  <text x="650" y="130" class="text-title">Persistence</text>
  <text x="650" y="150" class="text-sub">STORAGE</text>

  <rect x="570" y="180" width="160" height="40" fill="#ffffff" rx="4" />
  <text x="650" y="205" fill="#000" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Firestore Logs</text>

  <rect x="570" y="240" width="160" height="40" fill="#ffffff" rx="4" />
  <text x="650" y="265" fill="#000" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">LocalStorage Sync</text>

  <!-- Connections -->
  <path d="M 250 200 L 310 200" class="line" marker-end="url(#arrowhead)" />
  <path d="M 500 200 L 560 200" class="line" marker-end="url(#arrowhead)" />
  
  <path d="M 250 260 L 310 260" class="line" marker-end="url(#arrowhead)" />
  <path d="M 500 260 L 560 260" class="line" marker-end="url(#arrowhead)" />

  <path d="M 250 320 L 310 320" class="line" marker-end="url(#arrowhead)" />
  <path d="M 310 320 L 250 320" class="line" marker-end="url(#arrowhead)" />
</svg>