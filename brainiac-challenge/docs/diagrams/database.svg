<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .db { fill: #F8FAFC; stroke: #0EA5E9; stroke-width: 2; rx: 8; }
      .text-title { fill: #1e1b4b; font-family: sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
      .text-field { fill: #475569; font-family: monospace; font-size: 11px; }
      .line { stroke: #0EA5E9; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0EA5E9" />
    </marker>
  </defs>

  <rect width="1000" height="600" class="bg" />

  <text x="400" y="40" fill="#1e1b4b" font-family="serif" font-size="24" font-weight="bold" text-anchor="middle" letter-spacing="2">GAMIFIED DATA FLOW</text>
  <text x="400" y="60" fill="#64748b" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="2">BRAINIAC CHALLENGE v3.0.0</text>

  <!-- Quiz Settings -->
  <rect x="50" y="100" width="220" height="350" class="db" />
  <rect x="50" y="100" width="220" height="40" fill="#0EA5E9" rx="8" />
  <rect x="50" y="120" width="220" height="20" fill="#0EA5E9" />
  <text x="160" y="125" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">QuizSettings (JSON)</text>
  
  <text x="70" y="170" class="text-field" font-weight="bold">parameters:</text>
  <text x="90" y="190" class="text-field">topic: string</text>
  <text x="90" y="210" class="text-field">level: AcademicLevel</text>
  <text x="90" y="230" class="text-field">difficulty: Difficulty</text>
  
  <text x="70" y="270" class="text-field" font-weight="bold">constraints:</text>
  <text x="90" y="290" class="text-field">numQuestions: number</text>
  <text x="90" y="310" class="text-field">timeLimit: string</text>

  <!-- AI Processing -->
  <rect x="350" y="220" width="100" height="40" fill="#7C3AED" rx="20" />
  <text x="400" y="245" fill="#fff" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="1">GENERATE</text>

  <!-- Processed Quiz -->
  <rect x="530" y="120" width="240" height="310" class="db" />
  <rect x="530" y="120" width="240" height="40" fill="#7C3AED" rx="8" />
  <rect x="530" y="140" width="240" height="20" fill="#7C3AED" />
  <text x="650" y="145" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Quiz (Live State)</text>

  <text x="550" y="190" class="text-field" font-weight="bold">questions:</text>
  <text x="570" y="210" class="text-field">- text: string</text>
  <text x="570" y="230" class="text-field">- options: Array</text>
  <text x="570" y="250" class="text-field">- correctIdx: number</text>
  
  <text x="550" y="290" class="text-field" font-weight="bold">results:</text>
  <text x="570" y="310" class="text-field">- score: percentage</text>
  <text x="570" y="330" class="text-field">- explanation: string</text>

  <text x="550" y="370" class="text-field" font-weight="bold">auditLogs:</text>
  <text x="570" y="390" class="text-field">- Firestore/Local Persistence</text>

  <!-- Connectors -->
  <path d="M 270 240 L 340 240" class="line" marker-end="url(#arrowhead)" />
  <path d="M 450 240 L 520 240" class="line" marker-end="url(#arrowhead)" />

</svg>