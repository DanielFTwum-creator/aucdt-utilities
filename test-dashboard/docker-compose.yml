version: '3.8'

services:
  test-dashboard:
    build: .
    container_name: cypress-test-dashboard
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    volumes:
      - ./public:/app/public:ro
    restart: unless-stopped
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # Optional: API server (for test results)
  # api:
  #   build:
  #     context: ../api
  #   container_name: cypress-test-api
  #   ports:
  #     - "3001:3001"
  #   environment:
  #     NODE_ENV: production
  #     DATABASE_URL: postgresql://user:password@db:5432/tests
  #   depends_on:
  #     - db
  #   networks:
  #     - test-network
  #
  # Optional: Database (for storing test results)
  # db:
  #   image: postgres:15-alpine
  #   container_name: test-results-db
  #   environment:
  #     POSTGRES_USER: user
  #     POSTGRES_PASSWORD: password
  #     POSTGRES_DB: tests
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - test-network

networks:
  test-network:
    driver: bridge

