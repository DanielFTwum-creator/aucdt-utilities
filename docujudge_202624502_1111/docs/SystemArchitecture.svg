<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <rect x="50" y="50" width="200" height="500" rx="10" fill="#e9ecef" stroke="#333" stroke-width="2"/>
  <text x="150" y="40" text-anchor="middle" font-family="sans-serif" font-weight="bold">Client (Browser)</text>
  
  <rect x="70" y="80" width="160" height="60" rx="5" fill="#fff" stroke="#666"/>
  <text x="150" y="115" text-anchor="middle" font-family="sans-serif">React App (Vite)</text>
  
  <rect x="70" y="160" width="160" height="60" rx="5" fill="#fff" stroke="#666"/>
  <text x="150" y="195" text-anchor="middle" font-family="sans-serif">Local Storage</text>
  
  <rect x="400" y="50" width="350" height="500" rx="10" fill="#e9ecef" stroke="#333" stroke-width="2"/>
  <text x="575" y="40" text-anchor="middle" font-family="sans-serif" font-weight="bold">External Services</text>
  
  <rect x="450" y="100" width="250" height="80" rx="5" fill="#dbeafe" stroke="#2563eb"/>
  <text x="575" y="145" text-anchor="middle" font-family="sans-serif">Email API Endpoint</text>
  <text x="575" y="165" text-anchor="middle" font-family="sans-serif" font-size="12">(portal.aucdt.edu.gh)</text>
  
  <line x1="230" y1="110" x2="450" y2="140" stroke="#333" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>
</svg>
