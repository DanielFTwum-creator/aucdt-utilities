
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEAP: Lecturer Assessment & Evaluation Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'high-contrast-bg': '#000000',
              'high-contrast-text': '#FFFFFF',
              'high-contrast-accent': '#FFFF00',
              'high-contrast-border': '#FFFFFF',
            },
            keyframes: {
              'fade-in': {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              'slide-in-up': {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
            },
            animation: {
              'fade-in': 'fade-in 0.5s ease-out forwards',
              'slide-in-up': 'slide-in-up 0.5s ease-out forwards',
            },
          },
        },
      }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js`;
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .high-contrast {
        background-color: #000000;
        color: #FFFFFF;
      }
      .high-contrast .bg-white, .high-contrast .bg-gray-50, .high-contrast .bg-gray-100, .high-contrast .bg-gray-200 {
        background-color: #000000 !important;
        color: #FFFFFF !important;
        border-color: #FFFF00 !important;
      }
      .high-contrast .text-gray-900, .high-contrast .text-gray-800, .high-contrast .text-gray-700, .high-contrast .text-gray-600, .high-contrast .text-gray-500 {
        color: #FFFFFF !important;
      }
      .high-contrast .border-gray-200, .high-contrast .border-gray-300 {
        border-color: #FFFF00 !important;
      }
      .high-contrast .ring-indigo-500 {
        --tw-ring-color: #FFFF00 !important;
      }
      .high-contrast button {
        background-color: #000000 !important;
        color: #FFFF00 !important;
        border: 2px solid #FFFF00 !important;
      }
      .high-contrast button:hover {
        background-color: #FFFF00 !important;
        color: #000000 !important;
      }
      .high-contrast .recharts-text, .high-contrast .recharts-legend-item-text {
        fill: #FFFFFF !important;
      }
      .high-contrast .recharts-cartesian-axis-tick-line {
        stroke: #FFFFFF !important;
      }
      .high-contrast input, .high-contrast select, .high-contrast textarea {
        background-color: #1a1a1a !important;
        color: #FFFFFF !important;
        border-color: #FFFF00 !important;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.28.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.3.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
