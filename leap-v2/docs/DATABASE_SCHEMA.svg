<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="14">
  <style>
    .table { fill: #eff6ff; stroke: #60a5fa; stroke-width: 1.5; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.1)); }
    .table-header { font-weight: bold; fill: #1e40af; padding: 5px; }
    .pk { font-weight: bold; fill: #1d4ed8; }
    .fk { font-style: italic; fill: #374151; }
    .column { fill: #1f2937; }
    .relation { stroke: #6b7280; stroke-width: 1.5; fill: none; marker-start: url(#crow-one); marker-end: url(#crow-many); }
    .title { font-size: 24px; font-weight: bold; text-anchor: middle; fill: #111827; }
    .subtitle { font-size: 16px; text-anchor: middle; fill: #4b5563; }
  </style>

  <defs>
    <marker id="crow-many" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10" stroke="#6b7280" stroke-width="1.5" fill="none" />
      <circle cx="0" cy="5" r="1.5" stroke="#6b7280" stroke-width="1.5" fill="white" />
    </marker>
    <marker id="crow-one" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#6b7280" stroke-width="1.5" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f9fafb"/>
  
  <text x="450" y="40" class="title">Target Database Schema (ERD)</text>
  <text x="450" y="65" class="subtitle">MySQL Database for LEAP</text>

  <!-- Tables -->
  <!-- Programmes Table -->
  <g transform="translate(50, 100)">
    <rect class="table" width="200" height="90" rx="5" />
    <text x="100" y="25" text-anchor="middle" class="table-header">Programmes</text>
    <line x1="10" y1="35" x2="190" y2="35" stroke="#93c5fd" />
    <text x="15" y="55" class="pk">id (PK)</text>
    <text x="15" y="75" class="column">name</text>
  </g>

  <!-- Lecturers Table -->
  <g transform="translate(650, 100)">
    <rect class="table" width="200" height="90" rx="5" />
    <text x="100" y="25" text-anchor="middle" class="table-header">Lecturers</text>
    <line x1="10" y1="35" x2="190" y2="35" stroke="#93c5fd" />
    <text x="15" y="55" class="pk">id (PK)</text>
    <text x="15" y="75" class="column">name</text>
  </g>
  
  <!-- Courses Table -->
  <g transform="translate(350, 100)">
    <rect class="table" width="200" height="110" rx="5" />
    <text x="100" y="25" text-anchor="middle" class="table-header">Courses</text>
    <line x1="10" y1="35" x2="190" y2="35" stroke="#93c5fd" />
    <text x="15" y="55" class="pk">id (PK)</text>
    <text x="15" y="75" class="column">name</text>
    <text x="15" y="95" class="fk">programme_id (FK)</text>
  </g>
  
  <!-- Evaluations Table -->
  <g transform="translate(350, 300)">
    <rect class="table" width="200" height="190" rx="5" />
    <text x="100" y="25" text-anchor="middle" class="table-header">Evaluations</text>
    <line x1="10" y1="35" x2="190" y2="35" stroke="#93c5fd" />
    <text x="15" y="55" class="pk">id (PK)</text>
    <text x="15" y="75" class="fk">lecturer_id (FK)</text>
    <text x="15" y="95" class="fk">course_id (FK)</text>
    <text x="15" y="115" class="fk">programme_id (FK)</text>
    <text x="15" y="135" class="column">semester</text>
    <text x="15" y="155" class="column">ratings (JSON)</text>
    <text x="15" y="175" class="column">timestamp</text>
  </g>
  
  <!-- Course_Lecturers Table (Junction) -->
  <g transform="translate(650, 300)">
    <rect class="table" width="200" height="90" rx="5" />
    <text x="100" y="25" text-anchor="middle" class="table-header">Course_Lecturers</text>
    <line x1="10" y1="35" x2="190" y2="35" stroke="#93c5fd" />
    <text x="15" y="55" class="fk">course_id (FK, PK)</text>
    <text x="15" y="75" class="fk">lecturer_id (FK, PK)</text>
  </g>
  
  <!-- AuditLog Table -->
  <g transform="translate(50, 300)">
    <rect class="table" width="200" height="130" rx="5" />
    <text x="100" y="25" text-anchor="middle" class="table-header">Audit_Logs</text>
    <line x1="10" y1="35" x2="190" y2="35" stroke="#93c5fd" />
    <text x="15" y="55" class="pk">id (PK)</text>
    <text x="15" y="75" class="column">timestamp</text>
    <text x="15" y="95" class="column">action</text>
    <text x="15" y="115" class="column">details</text>
  </g>
  
  <!-- Relationships -->
  <!-- Programme -> Course -->
  <path d="M 250 145 C 300 145, 300 145, 350 145" class="relation" />
  <!-- Course -> Evaluation -->
  <path d="M 450 210 C 450 250, 450 250, 450 300" class="relation" />
  <!-- Lecturer -> Course_Lecturers -->
  <path d="M 750 190 C 750 250, 750 250, 750 300" class="relation" />
  <!-- Course -> Course_Lecturers -->
  <path d="M 550 155 C 600 155, 600 345, 650 345" class="relation" />
  <!-- Lecturer -> Evaluation -->
  <path d="M 650 160 C 600 160, 600 330, 550 330" class="relation" />
  
</svg>
