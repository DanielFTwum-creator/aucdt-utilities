version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tuc-rms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Kuku12$
      MYSQL_DATABASE: tuc_rms
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - ./backend/database.sql:/docker-entrypoint-initdb.d/database.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pKuku12$"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tuc-rms-network

  backend:
    image: node:24-alpine
    container_name: tuc-rms-backend
    working_dir: /app/backend
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: Kuku12$
      DB_NAME: tuc_rms
      JWT_SECRET: tuc_rms_jwt_secret_2026_secure
      FRONTEND_URL: http://localhost:5173
      NODE_ENV: development
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - tuc-rms-network

  frontend:
    image: node:24-alpine
    container_name: tuc-rms-frontend
    working_dir: /app/frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
    networks:
      - tuc-rms-network

volumes:
  mysql_data:

networks:
  tuc-rms-network:
    driver: bridge
