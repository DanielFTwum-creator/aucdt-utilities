# =============================================================================
# tuc-rms — Apache vhost SSL custom config (rms.techbridge.edu.gh root vhost)
# =============================================================================
# CANONICAL COPY — version-controlled here because Plesk stores the live file
# OUTSIDE the repo and would lose it on a vhost rebuild/migration.
#
# Live location on server (66.226.72.199):
#   /var/www/vhosts/system/rms.techbridge.edu.gh/conf/vhost_ssl.conf
#
# To apply after editing (Plesk regenerates httpd.conf and reloads Apache):
#   plesk sbin httpdmng --reconfigure-domain rms.techbridge.edu.gh
#
# This file is the SANCTIONED place for custom Apache directives — httpd.conf is
# auto-generated and must NOT be edited directly. Plesk runs nginx -> Apache(:7081),
# so these Apache rules are authoritative for request routing.
#
# WHY IT EXISTS (see fleet PATTERNS.md #15 — "SPA text/html MIME trap"):
#   1. SPA fallback MUST use %{DOCUMENT_ROOT}%{REQUEST_URI}, NOT %{REQUEST_FILENAME}.
#      At VirtualHost (server) context REQUEST_FILENAME is not yet mapped to the
#      filesystem path, so -f/-d never match and EVERY request — including real
#      .js/.css — gets rewritten to index.html (served as text/html). This caused
#      a full outage: bundles existed on disk but the browser received HTML.
#   2. The /api exclusion uses a leading-slash anchor (REQUEST_URI !^/api/) because
#      in server context the matched path keeps its leading slash; a (?!api/)
#      lookahead would fail to exclude the API and swallow it into the SPA.
#   3. ProxyPass targets [::1]:5000 (IPv6), because the Node backend listening on
#      "localhost" binds ::1 only — an IPv4 127.0.0.1 target cannot connect and
#      /api/* would fall through to the SPA. Verify: ss -ltnp | grep :5000
# =============================================================================

ProxyRequests Off
ProxyPreserveHost On

<Location /api>
    ProxyPass http://[::1]:5000/api
    ProxyPassReverse http://[::1]:5000/api
</Location>

RewriteEngine On
# Never rewrite API calls — let them reach the ProxyPass above.
RewriteCond %{REQUEST_URI} !^/api/
# Serve real files/dirs as-is; everything else falls back to the SPA entry.
# Must use DOCUMENT_ROOT+REQUEST_URI here: at vhost level %{REQUEST_FILENAME}
# is not yet mapped to the filesystem path, so -f/-d would never match.
RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} !-f
RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} !-d
RewriteRule ^ /index.html [L]
