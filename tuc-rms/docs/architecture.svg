<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .layer-label { font-size: 14px; font-weight: bold; fill: #6B0020; }
      .box-label { font-size: 12px; fill: white; font-weight: 500; }
      .port-label { font-size: 11px; fill: #333; }
      .arrow { stroke: #F5A800; stroke-width: 2; marker-end: url(#arrowhead); }
      .legend-label { font-size: 11px; fill: #333; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#F5A800"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="#fafafa"/>

  <!-- LAYER 1: USER LAYER -->
  <text x="20" y="40" class="layer-label">USER LAYER (Client)</text>
  <line x1="20" y1="50" x2="980" y2="50" stroke="#ddd" stroke-width="1"/>

  <!-- Desktop Browser -->
  <rect x="30" y="70" width="160" height="100" rx="8" fill="white" stroke="#6B0020" stroke-width="2"/>
  <text x="110" y="110" class="box-label" text-anchor="middle">Desktop Browser</text>
  <text x="110" y="130" class="port-label" text-anchor="middle">React 19 + TypeScript</text>
  <text x="110" y="145" class="port-label" text-anchor="middle">localhost:5173</text>

  <!-- Mobile via Capacitor -->
  <rect x="250" y="70" width="160" height="100" rx="8" fill="white" stroke="#6B0020" stroke-width="2"/>
  <text x="330" y="110" class="box-label" text-anchor="middle">Mobile Apps</text>
  <text x="330" y="130" class="port-label" text-anchor="middle">Capacitor 8.3.3</text>
  <text x="330" y="145" class="port-label" text-anchor="middle">iOS / Android</text>

  <!-- LAYER 2: HTTP/TLS -->
  <text x="20" y="220" class="layer-label">TRANSPORT LAYER (HTTPS)</text>
  <line x1="20" y1="230" x2="980" y2="230" stroke="#ddd" stroke-width="1"/>

  <line class="arrow" x1="110" y1="170" x2="260" y2="260"/>
  <text x="170" y="200" class="port-label">HTTPS/TLS</text>

  <!-- LAYER 3: WEB SERVER & APPLICATION -->
  <text x="20" y="310" class="layer-label">WEB SERVER & APPLICATION LAYER (Plesk/Apache)</text>
  <line x1="20" y1="320" x2="980" y2="320" stroke="#ddd" stroke-width="1"/>

  <!-- Apache Reverse Proxy -->
  <rect x="50" y="340" width="200" height="80" rx="8" fill="white" stroke="#6B0020" stroke-width="2"/>
  <text x="150" y="365" class="box-label" text-anchor="middle">Apache Reverse Proxy</text>
  <text x="150" y="385" class="port-label" text-anchor="middle">Port 80/443</text>
  <text x="150" y="400" class="port-label" text-anchor="middle">Plesk Control Panel</text>

  <!-- Static Assets -->
  <rect x="330" y="340" width="180" height="80" rx="8" fill="white" stroke="#6B0020" stroke-width="2"/>
  <text x="420" y="365" class="box-label" text-anchor="middle">Static Assets</text>
  <text x="420" y="385" class="port-label" text-anchor="middle">Vite Build Output</text>
  <text x="420" y="400" class="port-label" text-anchor="middle">/dist Folder</text>

  <!-- Backend Express Server -->
  <rect x="580" y="340" width="200" height="80" rx="8" fill="white" stroke="#6B0020" stroke-width="2"/>
  <text x="680" y="365" class="box-label" text-anchor="middle">Express Backend</text>
  <text x="680" y="385" class="port-label" text-anchor="middle">Port 5000</text>
  <text x="680" y="400" class="port-label" text-anchor="middle">Node.js + PM2</text>

  <!-- LAYER 4: DATABASE LAYER -->
  <text x="20" y="500" class="layer-label">DATA LAYER (MySQL)</text>
  <line x1="20" y1="510" x2="980" y2="510" stroke="#ddd" stroke-width="1"/>

  <!-- MySQL Database -->
  <rect x="280" y="530" width="200" height="100" rx="8" fill="white" stroke="#6B0020" stroke-width="2"/>
  <text x="380" y="560" class="box-label" text-anchor="middle">MySQL Database</text>
  <text x="380" y="580" class="port-label" text-anchor="middle">Port 3306 / 3307</text>
  <text x="380" y="595" class="port-label" text-anchor="middle">10 Tables</text>
  <text x="380" y="610" class="port-label" text-anchor="middle">(users, students, results...)</text>

  <!-- Arrows from Web Server to Database -->
  <line class="arrow" x1="680" y1="420" x2="450" y2="530"/>
  <text x="520" y="460" class="port-label">SQL Queries</text>

  <!-- Arrows from Static Assets to Database -->
  <line class="arrow" x1="420" y1="420" x2="400" y2="530"/>
  <text x="350" y="460" class="port-label">REST API</text>

  <!-- Legend -->
  <g transform="translate(650, 540)">
    <text x="0" y="0" class="layer-label">LEGEND</text>
    <line x1="0" y1="10" x2="200" y2="10" stroke="#ddd" stroke-width="1"/>

    <rect x="0" y="20" width="30" height="30" rx="4" fill="white" stroke="#6B0020" stroke-width="2"/>
    <text x="40" y="40" class="legend-label">System Component</text>

    <line x1="0" y1="60" x2="30" y2="60" class="arrow" stroke-width="2"/>
    <text x="40" y="65" class="legend-label">Data Flow</text>

    <circle cx="15" cy="85" r="8" fill="#6B0020"/>
    <text x="40" y="90" class="legend-label">Port / Connection</text>
  </g>

  <!-- Footer -->
  <text x="20" y="680" class="legend-label">TUC Results Management System v3.0 — System Architecture</text>
  <text x="20" y="695" class="legend-label">Data flows through HTTPS/TLS from clients to Apache, then routed to static assets (React dist) or Express backend, which queries MySQL via TCP</text>
</svg>
