<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <rect width="700" height="500" fill="#ffffff" />
  <text x="350" y="30" font-family="sans-serif" font-size="20" text-anchor="middle" font-weight="bold" fill="#333">Sequence: Admin Login</text>

  <!-- Lifelines -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="100" height="40" fill="#fff" stroke="#333" />
    <text x="50" y="25" text-anchor="middle" font-family="sans-serif" font-size="14">Admin User</text>
    <line x1="50" y1="40" x2="50" y2="450" stroke="#333" stroke-dasharray="5,5" />
  </g>

  <g transform="translate(250, 60)">
    <rect x="0" y="0" width="100" height="40" fill="#fff" stroke="#333" />
    <text x="50" y="25" text-anchor="middle" font-family="sans-serif" font-size="14">App (React)</text>
    <line x1="50" y1="40" x2="50" y2="450" stroke="#333" stroke-dasharray="5,5" />
  </g>

  <g transform="translate(450, 60)">
    <rect x="0" y="0" width="120" height="40" fill="#fff" stroke="#333" />
    <text x="60" y="25" text-anchor="middle" font-family="sans-serif" font-size="14">Local Storage</text>
    <line x1="60" y1="40" x2="60" y2="450" stroke="#333" stroke-dasharray="5,5" />
  </g>

  <!-- Interactions -->
  <!-- 1. Enter Password -->
  <line x1="100" y1="120" x2="300" y2="120" stroke="#333" stroke-width="2" />
  <polygon points="300,120 290,115 290,125" fill="#333" />
  <text x="200" y="110" text-anchor="middle" font-family="sans-serif" font-size="12">Input Password</text>

  <!-- 2. Get Stored Pass -->
  <line x1="300" y1="160" x2="510" y2="160" stroke="#333" stroke-width="2" />
  <polygon points="510,160 500,155 500,165" fill="#333" />
  <text x="400" y="150" text-anchor="middle" font-family="sans-serif" font-size="12">getItem('admin_pass')</text>

  <!-- 3. Return Pass -->
  <line x1="510" y1="200" x2="300" y2="200" stroke="#333" stroke-width="2" stroke-dasharray="4,4" />
  <polygon points="300,200 310,195 310,205" fill="#333" />
  <text x="400" y="190" text-anchor="middle" font-family="sans-serif" font-size="12">return stored_hash</text>

  <!-- 4. Validate -->
  <rect x="290" y="220" width="20" height="40" fill="#ddd" />
  <text x="340" y="245" font-family="sans-serif" font-size="12" font-style="italic">Verify</text>

  <!-- 5. Log Action -->
  <line x1="300" y1="300" x2="510" y2="300" stroke="#333" stroke-width="2" />
  <polygon points="510,300 500,295 500,305" fill="#333" />
  <text x="400" y="290" text-anchor="middle" font-family="sans-serif" font-size="12">setItem('audit_log')</text>

  <!-- 6. Show Dashboard -->
  <line x1="300" y1="360" x2="100" y2="360" stroke="#333" stroke-width="2" stroke-dasharray="4,4" />
  <polygon points="100,360 110,355 110,365" fill="#333" />
  <text x="200" y="350" text-anchor="middle" font-family="sans-serif" font-size="12">Render Dashboard</text>

</svg>