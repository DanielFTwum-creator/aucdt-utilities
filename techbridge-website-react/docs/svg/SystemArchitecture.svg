<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#ffffff" />
  <text x="400" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" font-weight="bold" fill="#630F12">High-Level System Architecture</text>

  <!-- Containers -->
  <rect x="50" y="80" width="700" height="480" rx="10" fill="#f8f9fa" stroke="#333" stroke-width="2" />
  <text x="400" y="110" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#666">Client Browser Environment</text>

  <!-- Core Application -->
  <rect x="100" y="150" width="250" height="350" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="225" y="180" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0d47a1">React Application</text>
  
  <!-- Modules inside App -->
  <rect x="120" y="200" width="210" height="40" rx="4" fill="#fff" stroke="#1565c0" />
  <text x="225" y="225" text-anchor="middle" font-family="sans-serif" font-size="12">Router / State Management</text>

  <rect x="120" y="250" width="210" height="60" rx="4" fill="#fff" stroke="#1565c0" />
  <text x="225" y="275" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold">Public Interface</text>
  <text x="225" y="295" text-anchor="middle" font-family="sans-serif" font-size="10">Home, About, Programmes</text>

  <rect x="120" y="320" width="210" height="60" rx="4" fill="#ffebee" stroke="#b71c1c" />
  <text x="225" y="345" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold">Secure Admin Module</text>
  <text x="225" y="365" text-anchor="middle" font-family="sans-serif" font-size="10">Auth, Audit Logs, Self-Test</text>

  <rect x="120" y="390" width="210" height="40" rx="4" fill="#e8f5e9" stroke="#2e7d32" />
  <text x="225" y="415" text-anchor="middle" font-family="sans-serif" font-size="12">Virtual Assistant (AI)</text>

  <!-- Tailwind Engine -->
  <rect x="450" y="150" width="200" height="80" rx="8" fill="#e0f2f1" stroke="#00695c" stroke-width="2" />
  <text x="550" y="180" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#004d40">Theme Engine</text>
  <text x="550" y="205" text-anchor="middle" font-family="sans-serif" font-size="12">Tailwind CSS</text>

  <!-- Local Storage -->
  <rect x="450" y="300" width="200" height="120" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2" />
  <text x="550" y="330" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e65100">Local Storage (DB)</text>
  <line x1="450" y1="350" x2="650" y2="350" stroke="#e65100" />
  <text x="550" y="370" text-anchor="middle" font-family="monospace" font-size="10">Admin Credentials</text>
  <text x="550" y="390" text-anchor="middle" font-family="monospace" font-size="10">Audit Logs</text>
  <text x="550" y="410" text-anchor="middle" font-family="monospace" font-size="10">User Preferences</text>

  <!-- External -->
  <rect x="450" y="480" width="200" height="50" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" />
  <text x="550" y="510" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#4a148c">External CDNs</text>

  <!-- Relationships -->
  <line x1="350" y1="190" x2="450" y2="190" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="350" y1="360" x2="450" y2="360" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="550" y1="230" x2="550" y2="300" stroke="#999" stroke-width="1" stroke-dasharray="4,4" />
</svg>