<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#ffffff" />
  <text x="400" y="30" font-family="sans-serif" font-size="20" text-anchor="middle" font-weight="bold" fill="#333">UML Use Case Diagram</text>

  <!-- System Boundary -->
  <rect x="200" y="50" width="400" height="420" fill="#f5f5f5" stroke="#333" stroke-width="2" />
  <text x="400" y="75" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold">AUCDT Website System</text>

  <!-- Actors -->
  <g transform="translate(50, 200)">
    <circle cx="30" cy="30" r="20" fill="#fff" stroke="#333" stroke-width="2" />
    <line x1="30" y1="50" x2="30" y2="100" stroke="#333" stroke-width="2" />
    <line x1="0" y1="70" x2="60" y2="70" stroke="#333" stroke-width="2" />
    <line x1="30" y1="100" x2="0" y2="140" stroke="#333" stroke-width="2" />
    <line x1="30" y1="100" x2="60" y2="140" stroke="#333" stroke-width="2" />
    <text x="30" y="160" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold">Guest</text>
  </g>

  <g transform="translate(680, 200)">
    <circle cx="30" cy="30" r="20" fill="#fff" stroke="#333" stroke-width="2" />
    <line x1="30" y1="50" x2="30" y2="100" stroke="#333" stroke-width="2" />
    <line x1="0" y1="70" x2="60" y2="70" stroke="#333" stroke-width="2" />
    <line x1="30" y1="100" x2="0" y2="140" stroke="#333" stroke-width="2" />
    <line x1="30" y1="100" x2="60" y2="140" stroke="#333" stroke-width="2" />
    <text x="30" y="160" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold">Admin</text>
  </g>

  <!-- Use Cases -->
  <ellipse cx="400" cy="120" rx="100" ry="30" fill="#fff" stroke="#333" />
  <text x="400" y="125" text-anchor="middle" font-family="sans-serif" font-size="12">View Programmes</text>

  <ellipse cx="400" cy="190" rx="100" ry="30" fill="#fff" stroke="#333" />
  <text x="400" y="195" text-anchor="middle" font-family="sans-serif" font-size="12">Chat with AI</text>

  <ellipse cx="400" cy="260" rx="100" ry="30" fill="#fff" stroke="#333" />
  <text x="400" y="265" text-anchor="middle" font-family="sans-serif" font-size="12">Switch Theme</text>

  <ellipse cx="400" cy="330" rx="100" ry="30" fill="#fff" stroke="#333" />
  <text x="400" y="335" text-anchor="middle" font-family="sans-serif" font-size="12">Login to Admin</text>
  
  <ellipse cx="400" cy="400" rx="100" ry="30" fill="#fff" stroke="#333" />
  <text x="400" y="405" text-anchor="middle" font-family="sans-serif" font-size="12">View Audit Logs</text>

  <!-- Relationships -->
  <line x1="100" y1="230" x2="310" y2="130" stroke="#333" />
  <line x1="100" y1="230" x2="310" y2="200" stroke="#333" />
  <line x1="100" y1="230" x2="310" y2="270" stroke="#333" />
  
  <line x1="700" y1="230" x2="490" y2="270" stroke="#333" />
  <line x1="700" y1="230" x2="490" y2="330" stroke="#333" />
  <line x1="700" y1="230" x2="490" y2="400" stroke="#333" />

</svg>