<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#ffffff" />
  <text x="400" y="50" font-family="sans-serif" font-size="24" text-anchor="middle" font-weight="bold" fill="#333">Technology Stack</text>

  <!-- Frontend -->
  <g transform="translate(50, 100)">
    <rect width="200" height="300" rx="10" fill="#e3f2fd" stroke="#1e88e5" stroke-width="2" />
    <text x="100" y="40" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1565c0">Frontend Core</text>
    
    <rect x="25" y="70" width="150" height="40" rx="5" fill="#fff" stroke="#1e88e5" />
    <text x="100" y="95" text-anchor="middle" font-family="sans-serif" font-size="14">React 18</text>
    
    <rect x="25" y="120" width="150" height="40" rx="5" fill="#fff" stroke="#1e88e5" />
    <text x="100" y="145" text-anchor="middle" font-family="sans-serif" font-size="14">TypeScript</text>
    
    <rect x="25" y="170" width="150" height="40" rx="5" fill="#fff" stroke="#1e88e5" />
    <text x="100" y="195" text-anchor="middle" font-family="sans-serif" font-size="14">Tailwind CSS</text>
    
    <rect x="25" y="220" width="150" height="40" rx="5" fill="#fff" stroke="#1e88e5" />
    <text x="100" y="245" text-anchor="middle" font-family="sans-serif" font-size="14">Lucide Icons</text>
  </g>

  <!-- Logic/Testing -->
  <g transform="translate(300, 100)">
    <rect width="200" height="300" rx="10" fill="#f3e5f5" stroke="#8e24aa" stroke-width="2" />
    <text x="100" y="40" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#6a1b9a">Logic & QA</text>
    
    <rect x="25" y="70" width="150" height="40" rx="5" fill="#fff" stroke="#8e24aa" />
    <text x="100" y="95" text-anchor="middle" font-family="sans-serif" font-size="14">React Hooks</text>
    
    <rect x="25" y="120" width="150" height="40" rx="5" fill="#fff" stroke="#8e24aa" />
    <text x="100" y="145" text-anchor="middle" font-family="sans-serif" font-size="14">Puppeteer</text>
    
    <rect x="25" y="170" width="150" height="40" rx="5" fill="#fff" stroke="#8e24aa" />
    <text x="100" y="195" text-anchor="middle" font-family="sans-serif" font-size="14">DOM API</text>
  </g>

  <!-- Persistence -->
  <g transform="translate(550, 100)">
    <rect width="200" height="300" rx="10" fill="#e0f2f1" stroke="#00897b" stroke-width="2" />
    <text x="100" y="40" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#00695c">Persistence</text>
    
    <rect x="25" y="70" width="150" height="40" rx="5" fill="#fff" stroke="#00897b" />
    <text x="100" y="95" text-anchor="middle" font-family="sans-serif" font-size="14">Local Storage</text>
    
    <rect x="25" y="120" width="150" height="40" rx="5" fill="#fff" stroke="#00897b" />
    <text x="100" y="145" text-anchor="middle" font-family="sans-serif" font-size="14">JSON Serialization</text>
  </g>

  <text x="400" y="450" text-anchor="middle" font-family="monospace" font-size="12" fill="#666">Environment: Modern Web Browser (ES6+)</text>
</svg>