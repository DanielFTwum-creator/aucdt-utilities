    <style>
        /* Global Variables & Design System */
        :root {
          /* --- Brand Color Palette --- */
          --wp-color-primary: #A67C37;        /* Refined Warm Amber (Main Actions / Active Steps) */
          --wp-color-primary-hover: #8C652B;  /* Darker shade for hover interaction states */
          --wp-color-primary-tint: #F6F1E7;   /* Ultra-light amber tint for highlights/badges */
          
          /* Neutral Palette */
          --wp-color-bg-canvas: #F9F8F5;      /* Preserved warm off-white background canvas */
          --wp-color-bg-card: #FFFFFF;        /* Crisp white for the central form wrapper */
          --wp-color-text-main: #1C1B19;      /* High-contrast charcoal for titles and labels */
          --wp-color-text-muted: #66635F;     /* Soft slate-grey for descriptions and secondary text */
          --wp-color-border: #E6E4E0;         /* Low-contrast grey for inputs and stepper connecting lines */
          --wp-color-focus-ring: rgba(166, 124, 55, 0.2); /* 20% alpha glow for focus states */

          /* --- Typography Scale (Geometric Sans-Serif) --- */
          --wp-font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
          
          --wp-font-size-h1: 1.5rem;          /* 24px - "Testator Information" Card Header */
          --wp-font-size-body: 1rem;         /* 16px - Standard Inputs & Body Copy */
          --wp-font-size-label: 0.875rem;     /* 14px - Form Field Titles */
          --wp-font-size-stepper: 0.8125rem;  /* 13px (Originally 11px, +2px legibility) - Wizard Step Indicator Labels */

          --wp-font-weight-regular: 400;
          --wp-font-weight-medium: 500;
          --wp-font-weight-semibold: 600;

          /* --- Elevation & Border Radius --- */
          --wp-radius-card: 16px;
          --wp-radius-input: 8px;
          --wp-radius-button: 6px;
          
          --wp-shadow-card: 0px 4px 24px rgba(28, 27, 25, 0.04), 0px 1px 2px rgba(28, 27, 25, 0.02);

          /* Backward compatibility mappings for existing styles */
          --font-sans: var(--wp-font-family);
          --font-display: 'Space Grotesk', sans-serif;
          --bg-app: var(--wp-color-bg-canvas);
          --bg-card: var(--wp-color-bg-card);
          --border-card: 1px solid var(--wp-color-border);
          --text-primary: var(--wp-color-text-muted);
          --text-secondary: var(--wp-color-text-muted);
          --text-heading: var(--wp-color-text-main);
          --accent-gold: var(--wp-color-primary);
          --accent-gold-hover: var(--wp-color-primary-hover);
          --accent-gold-light: var(--wp-color-primary-tint);
          --shadow-sm: var(--wp-shadow-card);
          --shadow-md: var(--wp-shadow-card);
          --shadow-lg: var(--wp-shadow-card);
          --radius-lg: var(--wp-radius-card);
          --radius-md: var(--wp-radius-input);
          --radius-sm: var(--wp-radius-button);
        }

        /* Global Styles */
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          font-family: var(--font-sans);
          background: var(--bg-app);
          background-attachment: fixed;
          color: var(--text-primary);
          line-height: 1.6;
          min-height: 100vh;
        }
        
        #root {
            width: 100%;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* Header styling */
        .header {
          background-color: rgba(250, 249, 246, 0.85);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
          padding: 20px 40px;
          border-bottom: 1px solid rgba(181, 138, 61, 0.15);
          display: flex;
          justify-content: space-between;
          align-items: center;
          position: sticky;
          top: 0;
          z-index: 50;
        }

        .logo {
          display: flex;
          align-items: center;
          transition: transform 0.2s ease;
        }
        .logo:hover {
          transform: scale(1.02);
        }

        .audit-logs-btn {
          padding: 10px 20px;
          background-color: transparent;
          color: var(--accent-gold);
          border: 1.5px solid var(--accent-gold);
          border-radius: var(--radius-sm);
          font-weight: 600;
          font-size: 13px;
          cursor: pointer;
          transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .audit-logs-btn:hover {
          background-color: var(--accent-gold);
          color: white;
          box-shadow: 0 4px 12px rgba(181, 138, 61, 0.2);
        }

        /* Progress Steps */
        .progress-container {
          background-color: rgba(255, 255, 255, 0.6);
          backdrop-filter: blur(6px);
          padding: 24px 40px;
          border-bottom: 1px solid rgba(181, 138, 61, 0.15);
        }

        .progress-steps {
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
          max-width: 1000px;
          margin: 0 auto;
          position: relative;
        }

        .progress-steps::before {
          content: '';
          position: absolute;
          top: 20px;
          left: 0;
          right: 0;
          height: 2px;
          background-color: rgba(0, 0, 0, 0.1);
          z-index: 0;
        }
        
        .progress-line {
            position: absolute;
            top: 20px;
            left: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-gold), #D97706);
            z-index: 0;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .step {
          display: flex;
          flex-direction: column;
          align-items: center;
          position: relative;
          z-index: 1;
          width: 100px;
          cursor: pointer;
        }

        .step-number {
          width: 40px;
          height: 40px;
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          font-weight: 700;
          margin-bottom: 10px;
          background-color: white;
          border: 2px solid #CBD5E1;
          color: #64748B;
          transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
          box-shadow: var(--shadow-sm);
        }

        .step.active .step-number {
          background: linear-gradient(135deg, var(--accent-gold), #D97706);
          border-color: transparent;
          color: white;
          transform: scale(1.15);
          box-shadow: 0 0 15px rgba(181, 138, 61, 0.4);
        }

        .step.completed .step-number {
          background-color: var(--accent-gold-light);
          border-color: var(--accent-gold);
          color: var(--accent-gold);
        }

        .step-label {
          font-family: var(--wp-font-family);
          font-size: var(--wp-font-size-stepper);
          color: var(--wp-color-text-muted);
          text-align: center;
          font-weight: var(--wp-font-weight-semibold);
          text-transform: capitalize; /* Title Case stepper labels */
          height: 25px;
          transition: color 0.3s ease;
          margin-top: 4px;
        }

        .step.active .step-label {
          color: var(--accent-gold);
          font-weight: 700;
        }

        /* Main Content Glassmorphic Form Card */
        .main-content {
          background-color: var(--wp-color-bg-card);
          border-radius: var(--wp-radius-card);
          box-shadow: var(--wp-shadow-card);
          padding: 40px;
          width: 100%;
          max-width: 600px; /* Locks optimal card width on desktop */
          margin: 40px auto;
          backdrop-filter: blur(16px);
          -webkit-backdrop-filter: blur(16px);
          transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .step-title {
          font-family: var(--font-display);
          font-size: 28px;
          font-weight: 700;
          color: var(--text-heading);
          margin-bottom: 8px;
          letter-spacing: -0.02em;
        }
        
        .step-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        /* Legal Disclaimer styling (Warm warning card) */
        .disclaimer {
          background-color: #FFFBEB;
          border: 1px solid rgba(217, 119, 6, 0.2);
          border-left: 4px solid #D97706;
          border-radius: var(--radius-sm);
          padding: 20px;
          margin-bottom: 32px;
          box-shadow: var(--shadow-sm);
        }

        .disclaimer-title {
          display: flex;
          align-items: center;
          gap: 8px;
          font-weight: 700;
          color: #B45309;
          margin-bottom: 8px;
          font-size: 15px;
          font-family: var(--font-display);
        }

        .disclaimer-icon {
          font-size: 18px;
        }

        .disclaimer-text {
          color: #92400E;
          line-height: 1.6;
          font-size: 13.5px;
        }

        /* Form Controls Styling */
        .form-section {
          margin-bottom: 28px;
          max-width: 440px; /* Restrict input fields max-width */
          margin-left: auto;
          margin-right: auto;
          width: 100%;
        }

        .form-label {
          display: block;
          font-weight: 600;
          color: var(--text-heading);
          margin-bottom: 8px;
          font-size: 14px;
          letter-spacing: -0.01em;
        }

        .form-select, .form-input {
          width: 100%;
          max-width: 440px;
          height: 48px;
          padding: 12px 16px;
          border: 1px solid var(--wp-color-border);
          border-radius: var(--wp-radius-input);
          background-color: transparent;
          color: var(--wp-color-text-main);
          font-family: var(--wp-font-family);
          font-size: var(--wp-font-size-body);
          transition: border-color 0.2s ease, box-shadow 0.2s ease;
          box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
          display: block;
          margin: 0 auto;
        }

        textarea.form-input {
          height: auto;
          resize: vertical;
        }

        .form-select:focus, .form-input:focus {
          outline: none;
          border-color: var(--wp-color-primary);
          background-color: #FFFFFF;
          box-shadow: 0 0 0 4px var(--wp-color-focus-ring);
        }

        .form-select {
          cursor: pointer;
          appearance: none;
          background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23A67C37' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
          background-position: right 14px center;
          background-repeat: no-repeat;
          background-size: 16px;
          padding-right: 44px;
        }
        
        .form-checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: rgba(255, 255, 255, 0.6);
            border: 1px solid #E2E8F0;
            padding: 14px;
            border-radius: var(--radius-sm);
            transition: border-color 0.2s;
            max-width: 440px;
            margin-left: auto;
            margin-right: auto;
        }
        .form-checkbox-group:hover {
            border-color: rgba(181, 138, 61, 0.3);
        }
        
        .form-checkbox {
            width: 1.3em;
            height: 1.3em;
            accent-color: var(--accent-gold);
            cursor: pointer;
        }

        /* Action Buttons - Realigned Bottom Right */
        .button-group {
            display: flex;
            justify-content: flex-end; /* Align bottom right */
            gap: 12px;
            margin-top: 44px;
            padding-top: 24px;
            border-top: 1px solid var(--wp-color-border);
            width: 100%;
            max-width: 440px;
            margin-left: auto;
            margin-right: auto;
        }

        .continue-btn, .back-btn, .btn-primary, .btn-secondary {
          border: none;
          padding: 12px 28px;
          border-radius: var(--radius-sm);
          font-size: 14px;
          font-weight: 700;
          cursor: pointer;
          transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
          letter-spacing: 0.02em;
        }

        .continue-btn, .btn-primary {
          background-color: var(--wp-color-primary);
          color: var(--wp-color-bg-card);
          font-weight: var(--wp-font-weight-semibold);
          padding: 10px 24px;
          border: none;
          border-radius: var(--wp-radius-button);
          transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
          box-shadow: 0 4px 14px rgba(166, 124, 55, 0.2);
        }

        .continue-btn:hover, .btn-primary:hover {
          background-color: var(--wp-color-primary-hover);
          transform: translateY(-1px);
          box-shadow: 0 6px 20px rgba(140, 101, 43, 0.3);
        }

        .continue-btn:active, .btn-primary:active {
          transform: translateY(0);
        }
        
        .back-btn, .btn-secondary {
          background: transparent;
          color: var(--wp-color-text-muted);
          font-weight: var(--wp-font-weight-medium);
          padding: 10px 20px;
          border: 1px solid transparent;
          border-radius: var(--wp-radius-button);
          cursor: pointer;
          transition: all 0.2s ease;
        }
        
        .back-btn:hover, .btn-secondary:hover {
          background-color: var(--wp-color-primary-tint);
          color: var(--wp-color-primary-hover);
        }
        
        .add-item-box {
            background-color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(181, 138, 61, 0.15);
            padding: 24px;
            border-radius: var(--radius-md);
            margin-bottom: 30px;
            max-width: 440px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .item-list-container {
            margin-top: 20px;
            max-width: 440px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .item-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            background-color: rgba(255, 255, 255, 0.8);
            border: 1px solid #E2E8F0;
            margin-bottom: 10px;
            box-shadow: var(--shadow-sm);
        }

        .item-list-remove-btn {
            background-color: #FEE2E2;
            color: #EF4444;
            border: none;
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .item-list-remove-btn:hover {
            background-color: #FCA5A5;
            color: #991B1B;
        }

        .review-section {
            margin-bottom: 28px;
            max-width: 440px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .review-section h3 {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 700;
            color: var(--text-heading);
            margin-bottom: 14px;
            border-bottom: 1.5px solid rgba(181, 138, 61, 0.15);
            padding-bottom: 8px;
        }
        
        .review-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 14.5px;
            border-bottom: 1px dashed rgba(226, 232, 240, 0.8);
        }
        .review-item:last-child {
            border-bottom: none;
        }
        
        .review-item strong {
             font-weight: 600;
             color: var(--text-heading);
        }

        .review-item span {
            color: var(--text-secondary);
            text-align: right;
        }
        
        .start-over-btn {
            background: none;
            border: none;
            color: var(--accent-gold);
            text-decoration: underline;
            cursor: pointer;
            font-weight: 600;
            font-size: 13.5px;
            transition: color 0.2s;
        }
        .start-over-btn:hover {
            color: var(--accent-gold-hover);
        }

        /* Modal Overlays (Blurry backdrop and slide-up cards) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(15, 23, 42, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .modal-content {
            background-color: white;
            border-radius: var(--radius-lg);
            border: 1px solid rgba(181, 138, 61, 0.25);
            padding: 32px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(181, 138, 61, 0.25);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            animation: modalSlideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalSlideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1.5px solid rgba(181, 138, 61, 0.12);
            padding-bottom: 16px;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            margin: 0;
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 700;
            color: var(--text-heading);
        }

        .modal-body {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 4px;
        }
        
        .modal-close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #94A3B8;
            transition: color 0.2s;
        }
        .modal-close-btn:hover {
            color: #64748B;
        }

        .modal-footer {
            padding-top: 18px;
            margin-top: 18px;
            border-top: 1.5px solid rgba(181, 138, 61, 0.12);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .audit-table {
            width: 100%;
            border-collapse: collapse;
        }

        .audit-table th, .audit-table td {
            text-align: left;
            padding: 14px;
            border-bottom: 1px solid #F1F5F9;
        }
        
        .audit-table tr:last-child td {
            border-bottom: none;
        }

        .audit-table th {
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748B;
            background-color: #F8FAFC;
        }
        
        .audit-table td {
            font-size: 13.5px;
            color: var(--text-primary);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
          .header {
            padding: 15px 20px;
            flex-direction: column;
            gap: 15px;
          }
          
          .progress-container {
            padding: 15px 10px;
          }
          
          .progress-steps {
            justify-content: flex-start;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
          }
          .progress-steps::-webkit-scrollbar {
              display: none;
          }
          
          .step {
            min-width: 80px;
          }
          
          .step-number {
            width: 35px;
            height: 35px;
            font-size: 13px;
          }
          
          .step-label {
            font-size: 10px;
          }
          
          .main-content {
            padding: 24px;
            margin: 20px;
          }
          
          .step-title {
            font-size: 22px;
          }
