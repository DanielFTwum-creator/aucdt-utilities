<svg width="700" height="450" viewBox="0 0 700 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="450" fill="#f8fafc" rx="16"/>
  
  <!-- [TAB] System Branding -->
  <text x="350" y="40" font-family="Arial" font-size="16" font-weight="900" text-anchor="middle" fill="#0f172a" style="letter-spacing: 2px;">TECHBRIDGE AI BLUEPRINT [TAB]</text>
  <text x="350" y="60" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="#3b82f6" style="letter-spacing: 4px;">SYSTEM ARCHITECTURE</text>

  <!-- Client Layer -->
  <rect x="40" y="100" width="200" height="280" fill="#ffffff" stroke="#3b82f6" stroke-width="2" rx="12"/>
  <text x="140" y="130" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e293b">Client (Blueprint OS)</text>
  
  <rect x="60" y="150" width="160" height="30" fill="#eff6ff" stroke="#3b82f6" rx="6"/>
  <text x="140" y="170" font-family="Arial" font-size="11" text-anchor="middle" fill="#1d4ed8">React 18 / Vite</text>
  
  <rect x="60" y="190" width="160" height="30" fill="#eff6ff" stroke="#3b82f6" rx="6"/>
  <text x="140" y="210" font-family="Arial" font-size="11" text-anchor="middle" fill="#1d4ed8">Google Auth (Firebase SDK)</text>
  
  <rect x="60" y="230" width="160" height="30" fill="#eff6ff" stroke="#3b82f6" rx="6"/>
  <text x="140" y="250" font-family="Arial" font-size="11" text-anchor="middle" fill="#1d4ed8">Motion UI / Theme Engine</text>
  
  <rect x="60" y="270" width="160" height="30" fill="#eff6ff" stroke="#3b82f6" rx="6"/>
  <text x="140" y="290" font-family="Arial" font-size="11" text-anchor="middle" fill="#1d4ed8">Interactive Test Runner</text>

  <!-- Backend Layer -->
  <rect x="460" y="100" width="200" height="130" fill="#ffffff" stroke="#0f172a" stroke-width="2" rx="12"/>
  <text x="560" y="130" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e293b">Node Node (Express)</text>
  
  <rect x="480" y="150" width="160" height="30" fill="#f1f5f9" stroke="#475569" rx="6"/>
  <text x="560" y="170" font-family="Arial" font-size="11" text-anchor="middle" fill="#334155">Project Export (ZIP API)</text>
  
  <rect x="480" y="190" width="160" height="30" fill="#f1f5f9" stroke="#475569" rx="6"/>
  <text x="560" y="210" font-family="Arial" font-size="11" text-anchor="middle" fill="#334155">Health Diagnostics</text>

  <!-- Cloud Layer -->
  <rect x="460" y="250" width="200" height="130" fill="#ffffff" stroke="#f59e0b" stroke-width="2" rx="12"/>
  <text x="560" y="280" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e293b">Cloud Node (Firebase)</text>
  
  <rect x="480" y="300" width="160" height="30" fill="#fffbeb" stroke="#d97706" rx="6"/>
  <text x="560" y="320" font-family="Arial" font-size="11" text-anchor="middle" fill="#92400e">Firestore (Snapshots)</text>
  
  <rect x="480" y="340" width="160" height="30" fill="#fffbeb" stroke="#d97706" rx="6"/>
  <text x="560" y="360" font-family="Arial" font-size="11" text-anchor="middle" fill="#92400e">Google Audit Logs</text>

  <!-- Flows -->
  <path d="M 240 180 L 460 180" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="350" y="170" font-family="Arial" font-size="10" text-anchor="middle" fill="#64748b">Binary Export / Monitoring</text>
  
  <path d="M 240 320 L 460 320" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="350" y="310" font-family="Arial" font-size="10" text-anchor="middle" fill="#64748b">Auth / Real-time Sync</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
    </marker>
  </defs>
</svg>
