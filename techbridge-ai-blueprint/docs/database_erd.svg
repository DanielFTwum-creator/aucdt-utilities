<svg width="700" height="450" viewBox="0 0 700 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="450" fill="#f8fafc" rx="16"/>
  
  <!-- [TAB] System Branding -->
  <text x="350" y="40" font-family="Arial" font-size="16" font-weight="900" text-anchor="middle" fill="#0f172a" style="letter-spacing: 2px;">TECHBRIDGE AI BLUEPRINT [TAB]</text>
  <text x="350" y="60" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="#3b82f6" style="letter-spacing: 4px;">DATABASE ARCHITECTURE (FIRESTORE)</text>

  <!-- Users Entity -->
  <rect x="50" y="100" width="180" height="120" fill="#ffffff" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <rect x="50" y="100" width="180" height="30" fill="#eff6ff" rx="8 8 0 0"/>
  <text x="140" y="120" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#1d4ed8">/users/{userId}</text>
  <text x="65" y="150" font-family="Arial" font-size="11" fill="#475569">PK: uid (string)</text>
  <text x="65" y="170" font-family="Arial" font-size="11" fill="#475569">email (string)</text>
  <text x="65" y="190" font-family="Arial" font-size="11" fill="#475569">isAdmin (boolean)</text>
  <text x="65" y="210" font-family="Arial" font-size="11" fill="#475569">lastActive (number)</text>

  <!-- Projects Entity -->
  <rect x="300" y="100" width="180" height="160" fill="#ffffff" stroke="#0f172a" stroke-width="2" rx="8"/>
  <rect x="300" y="100" width="180" height="30" fill="#f1f5f9" rx="8 8 0 0"/>
  <text x="390" y="120" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#334155">/projects/{projectId}</text>
  <text x="315" y="150" font-family="Arial" font-size="11" fill="#475569">PK: id (string)</text>
  <text x="315" y="170" font-family="Arial" font-size="11" fill="#475569">FK: ownerId (string)</text>
  <text x="315" y="190" font-family="Arial" font-size="11" fill="#475569">name (string)</text>
  <text x="315" y="210" font-family="Arial" font-size="11" fill="#475569">checkedItems (map)</text>
  <text x="315" y="230" font-family="Arial" font-size="11" fill="#475569">updatedAt (timestamp)</text>
  <text x="315" y="250" font-family="Arial" font-size="11" fill="#475569">openPhase (int)</text>

  <!-- Audit Logs Entity -->
  <rect x="50" y="280" width="180" height="120" fill="#ffffff" stroke="#475569" stroke-width="2" rx="8"/>
  <rect x="50" y="280" width="180" height="30" fill="#f8fafc" rx="8 8 0 0"/>
  <text x="140" y="300" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#64748b">/audit_logs/{id}</text>
  <text x="65" y="330" font-family="Arial" font-size="11" fill="#475569">FK: userId (string)</text>
  <text x="65" y="350" font-family="Arial" font-size="11" fill="#475569">action (string)</text>
  <text x="65" y="370" font-family="Arial" font-size="11" fill="#475569">timestamp (timestamp)</text>
  <text x="65" y="390" font-family="Arial" font-size="11" fill="#475569">details (string)</text>

  <!-- Shares Entity -->
  <rect x="300" y="300" width="180" height="100" fill="#ffffff" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <rect x="300" y="300" width="180" height="30" fill="#fffbeb" rx="8 8 0 0"/>
  <text x="390" y="320" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#92400e">/shares/{shareId}</text>
  <text x="315" y="350" font-family="Arial" font-size="11" fill="#475569">projectName (string)</text>
  <text x="315" y="370" font-family="Arial" font-size="11" fill="#475569">sharedBy (email)</text>
  <text x="315" y="390" font-family="Arial" font-size="11" fill="#475569">createdAt (timestamp)</text>

  <!-- Relationships -->
  <path d="M 230 150 L 300 150" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4" fill="none"/>
  <circle cx="230" cy="150" r="3" fill="#3b82f6"/>
  <text x="265" y="145" font-family="Arial" font-size="10" text-anchor="middle" fill="#64748b">1:N</text>
  
  <path d="M 140 220 L 140 280" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4" fill="none"/>
  <circle cx="140" cy="220" r="3" fill="#3b82f6"/>
  <text x="155" y="250" font-family="Arial" font-size="10" fill="#64748b">1:N</text>
</svg>
