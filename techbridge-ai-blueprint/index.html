    <style>
      :root, [data-theme='gold-luxury'] {
        --font-sans: 'Lora', serif;
        --font-serif: 'Lora', serif;
        --font-mono: 'Courier New', monospace;
        --color-bg-primary: #F5F0E8;
        --color-bg-secondary: #FFFBF5;
        --color-bg-tertiary: #F0E8DC;
        --color-border-primary: #D4AF37;
        --color-border-secondary: #C9A84B;
        --color-text-primary: #3D2817;
        --color-text-secondary: #5C4033;
        --color-text-tertiary: #6D4C41;
        --color-accent-primary: #D4AF37;
        --color-accent-primary-hover: #C9A84B;
        --color-accent-secondary: #B8860B;
        --color-success: #27AE60;
        --color-error: #E74C3C;
        --color-warning: #F39C12;
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.1);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.12), 0 2px 4px -2px rgb(0 0 0 / 0.08);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.15), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      }
      [data-theme='ocean'] {
        --color-bg-primary: #0A192F;
        --color-bg-secondary: #172A45;
        --color-border-primary: #2C3E5A;
        --color-text-primary: #CCD6F6;
        --color-text-secondary: #8892B0;
        --color-accent-primary: #64FFDA;
      }
      [data-theme='dark'] {
        --color-bg-primary: #1A1A1A;
        --color-bg-secondary: #2D2D2D;
        --color-border-primary: #444444;
        --color-text-primary: #FFFFFF;
        --color-text-secondary: #CCCCCC;
        --color-accent-primary: #D4AF37;
      }
      body {
        font-family: var(--font-sans);
        background-color: var(--color-bg-primary);
        color: var(--color-text-primary);
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.4s ease-out forwards;
      }

      #blueprint-splash-styles {
        body {
          background: radial-gradient(circle at 50% 50%, #fafafa 0%, #f4f4f5 100%) !important;
          margin: 0;
          padding: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          font-family: 'Inter', sans-serif;
          overflow: hidden;
        }
        .blueprint-splash {
          text-align: center;
          border: 1px solid rgba(228, 228, 231, 0.8);
          padding: 55px 75px;
          background: rgba(255, 255, 255, 0.9);
          backdrop-filter: blur(10px);
          -webkit-backdrop-filter: blur(10px);
          border-radius: 24px;
          box-shadow: 0 10px 30px -10px rgba(9, 9, 11, 0.05);
          position: relative;
        }
        .blueprint-splash::before {
          content: "";
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 5px;
          background: linear-gradient(90deg, #2563eb, #3b82f6);
          border-top-left-radius: 24px;
          border-top-right-radius: 24px;
        }
        .blueprint-logo {
          color: #18181b;
          font-size: 2.3rem;
          font-weight: 800;
          letter-spacing: -0.02em;
          margin-bottom: 6px;
          display: block;
        }
        .blueprint-logo span {
          color: #2563eb;
        }
        .blueprint-status {
          color: #71717a;
          text-transform: uppercase;
          letter-spacing: 0.35em;
          font-size: 0.75rem;
          font-weight: 600;
          opacity: 0.9;
        }
        .blueprint-loading {
          margin-top: 25px;
          height: 3px;
          width: 130px;
          background: rgba(37, 99, 235, 0.1);
          margin-left: auto;
          margin-right: auto;
          position: relative;
          overflow: hidden;
          border-radius: 3px;
        }
        .blueprint-loading::after {
          content: "";
          position: absolute;
          left: -100%;
          width: 50%;
          height: 100%;
          background: #2563eb;
          border-radius: 3px;
          animation: blueprint-load 1.5s infinite ease-in-out;
        }
        @keyframes blueprint-load {
          0% { left: -100%; }
          100% { left: 150%; }
        }
      }
    </style>

    <script>
      (function() {
        try {
          const theme = localStorage.getItem('techbridge-ai-blueprint-theme') || 'gold-luxury';
          const themeSlug = theme.toLowerCase().replace(/\s+/g, '-');
          document.documentElement.setAttribute('data-theme', themeSlug);
        } catch (e) {
          console.error('Failed to apply theme from localStorage', e);
          document.documentElement.setAttribute('data-theme', 'gold-luxury');
        }
      })();
    </script>

    <div id="root">
      <div class="blueprint-splash">
        <span class="blueprint-logo">TechBridge <span>Blueprint</span></span>
        <div class="blueprint-status">Project Tracker</div>
        <div class="blueprint-loading"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
