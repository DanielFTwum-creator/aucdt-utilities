<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authenticating...</title>
</head>
<body>
<script>
  (function() {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const access_token = params.get('access_token');
    const error = params.get('error');
    const error_description = params.get('error_description');

    console.log('[OAuth Callback] Processing...');
    console.log('[OAuth Callback] Has token:', !!access_token);
    console.log('[OAuth Callback] Has opener:', !!window.opener);

    if (access_token && window.opener) {
      console.log('[OAuth Callback] ✓ Token found, posting to opener');
      localStorage.setItem('oauth_token_temp', access_token);
      window.opener.postMessage(
        { type: 'OAUTH_TOKEN_SUCCESS', access_token },
        window.location.origin
      );
      console.log('[OAuth Callback] ✓ Message posted');
      setTimeout(() => window.close(), 300);
    } else if (access_token) {
      // Main window redirect flow (no popup opener)
      console.log('[OAuth Callback] ✓ Token found, storing and redirecting back');
      localStorage.setItem('oauth_token_temp', access_token);
      window.location.href = window.location.origin + '/markai/';
    } else if (error && window.opener) {
      console.error('[OAuth Callback] ✗ OAuth error:', error);
      localStorage.setItem('oauth_error_temp', error);
      window.opener.postMessage(
        { type: 'OAUTH_TOKEN_ERROR', error, error_description },
        window.location.origin
      );
      setTimeout(() => window.close(), 300);
    } else if (error) {
      console.error('[OAuth Callback] ✗ OAuth error, redirecting back:', error);
      localStorage.setItem('oauth_error_temp', error);
      window.location.href = window.location.origin + '/markai/';
    } else {
      console.error('[OAuth Callback] ✗ No token/error');
      window.location.href = window.location.origin + '/markai/';
    }
  })();
</script>
</body>
</html>
