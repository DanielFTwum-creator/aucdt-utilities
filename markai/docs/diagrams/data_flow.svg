<svg width="700" height="500" viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;" />
      <stop offset="100%" style="stop-color:#1e293b;" />
    </linearGradient>
    <linearGradient id="node-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="url(#arrow-grad)" />
    </marker>
    <filter id="node-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="4" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.4" />
    </filter>
  </defs>

  <rect width="700" height="500" fill="url(#bg-grad)" />

  <text x="350" y="50" font-size="28" font-weight="bold" text-anchor="middle" fill="#e2e8f0">MarkAI Application Data Flow</text>
  <line x1="200" y1="65" x2="500" y2="65" stroke="#475569" stroke-width="1" />

  <!-- Nodes -->
  <g id="node-user" transform="translate(40, 210)" filter="url(#node-shadow)">
    <rect width="140" height="80" rx="10" fill="url(#node-grad)" stroke="#64748b" stroke-width="1"/>
    <text x="70" y="35" font-size="18" font-weight="bold" fill="#f1f5f9" text-anchor="middle">👤 User</text>
    <text x="70" y="60" font-size="12" fill="#94a3b8" text-anchor="middle">Provides Input</text>
  </g>
  
  <g id="node-react" transform="translate(220, 120)" filter="url(#node-shadow)">
    <rect width="260" height="80" rx="10" fill="url(#node-grad)" stroke="#64748b" stroke-width="1"/>
    <text x="130" y="35" font-size="18" font-weight="bold" fill="#f1f5f9" text-anchor="middle">⚛️ React UI (Frontend)</text>
    <text x="130" y="60" font-size="12" fill="#94a3b8" text-anchor="middle">Manages State & Renders Views</text>
  </g>

  <g id="node-backend" transform="translate(220, 210)" filter="url(#node-shadow)">
    <rect width="260" height="80" rx="10" fill="url(#node-grad)" stroke="#64748b" stroke-width="1"/>
    <text x="130" y="35" font-size="18" font-weight="bold" fill="#f1f5f9" text-anchor="middle">🟢 Node.js (Backend)</text>
    <text x="130" y="60" font-size="12" fill="#94a3b8" text-anchor="middle">Securely Proxies API Requests</text>
  </g>
  
  <g id="node-storage" transform="translate(220, 300)" filter="url(#node-shadow)">
    <rect width="260" height="80" rx="10" fill="url(#node-grad)" stroke="#64748b" stroke-width="1"/>
    <text x="130" y="35" font-size="18" font-weight="bold" fill="#f1f5f9" text-anchor="middle">💾 Local Storage</text>
    <text x="130" y="60" font-size="12" fill="#94a3b8" text-anchor="middle">Persists Schedules & Logs</text>
  </g>

  <g id="node-gemini" transform="translate(520, 210)" filter="url(#node-shadow)">
    <rect width="140" height="80" rx="10" fill="url(#node-grad)" stroke="#64748b" stroke-width="1"/>
    <text x="70" y="35" font-size="18" font-weight="bold" fill="#f1f5f9" text-anchor="middle">🤖 Gemini API</text>
    <text x="70" y="60" font-size="12" fill="#94a3b8" text-anchor="middle">External Service</text>
  </g>

  <!-- Arrows -->
  <path d="M 185 250 C 210 250, 210 180, 220 180" stroke="url(#arrow-grad)" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)"/>
  <text x="190" y="220" fill="#94a3b8" font-size="11" text-anchor="middle">1. UI Interaction</text>

  <path d="M 350 205 V 205" stroke="url(#arrow-grad)" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)"/>
  
  <path d="M 350 200 V 210" stroke="url(#arrow-grad)" stroke-width="2.5" marker-start="url(#arrowhead)" marker-end="url(#arrowhead)" />
  <text x="315" y="200" fill="#94a3b8" font-size="11" text-anchor="middle" transform="rotate(-90 315 200)">2. State Update</text>

  <path d="M 350 290 V 300" stroke="url(#arrow-grad)" stroke-width="2.5" marker-start="url(#arrowhead)" marker-end="url(#arrowhead)" />
  <text x="315" y="295" fill="#94a3b8" font-size="11" text-anchor="middle" transform="rotate(-90 315 295)">3. Persist Data</text>

  <path d="M 485 250 H 515" stroke="url(#arrow-grad)" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="500" y="240" fill="#94a3b8" font-size="11" text-anchor="middle">4. API Request</text>
  
  <path d="M 515 230 H 485" stroke="url(#arrow-grad)" stroke-width="2.5" marker-start="url(#arrowhead)"/>
  <text x="500" y="270" fill="#94a3b8" font-size="11" text-anchor="middle">5. AI Response</text>

  <!-- Final text -->
  <text x="350" y="450" font-size="14" fill="#64748b" text-anchor="middle" font-style="italic">
    A secure and decoupled data flow for a modern web application.
  </text>
</svg>