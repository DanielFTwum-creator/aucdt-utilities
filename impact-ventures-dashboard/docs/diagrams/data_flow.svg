<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="monospace" font-size="12">
  <rect width="800" height="500" fill="#0F0C07"/>
  <text x="400" y="34" fill="#C8A84B" font-size="15" font-weight="bold" text-anchor="middle">IMPACT VENTURES — DATA FLOW</text>
  <text x="400" y="50" fill="#64748b" font-size="10" text-anchor="middle">Techbridge University College · v1.0.0</text>

  <!-- Step boxes -->
  <!-- 1: APP_DATA -->
  <rect x="50" y="80" width="160" height="70" rx="3" fill="#141210" stroke="#22d3ee" stroke-width="1"/>
  <text x="130" y="108" fill="#22d3ee" font-size="11" font-weight="bold" text-anchor="middle">APP_DATA</text>
  <text x="130" y="124" fill="#64748b" font-size="9" text-anchor="middle">30 ventures</text>
  <text x="130" y="138" fill="#64748b" font-size="9" text-anchor="middle">data.ts (static)</text>

  <!-- 2: Filter engine -->
  <rect x="280" y="80" width="160" height="70" rx="3" fill="#141210" stroke="#f59e0b" stroke-width="1"/>
  <text x="360" y="104" fill="#f59e0b" font-size="11" font-weight="bold" text-anchor="middle">Filter Engine</text>
  <text x="360" y="120" fill="#64748b" font-size="9" text-anchor="middle">search · tier · category</text>
  <text x="360" y="135" fill="#64748b" font-size="9" text-anchor="middle">M-range · G-range</text>

  <!-- 3: filteredApps -->
  <rect x="510" y="80" width="160" height="70" rx="3" fill="#141210" stroke="#22d3ee" stroke-width="1"/>
  <text x="590" y="108" fill="#22d3ee" font-size="11" font-weight="bold" text-anchor="middle">filteredApps</text>
  <text x="590" y="124" fill="#64748b" font-size="9" text-anchor="middle">useMemo derived</text>
  <text x="590" y="138" fill="#64748b" font-size="9" text-anchor="middle">→ Venture Grid</text>

  <!-- 4: Detail Modal -->
  <rect x="50" y="220" width="160" height="70" rx="3" fill="#141210" stroke="#10b981" stroke-width="1"/>
  <text x="130" y="248" fill="#10b981" font-size="11" font-weight="bold" text-anchor="middle">Detail Modal</text>
  <text x="130" y="264" fill="#64748b" font-size="9" text-anchor="middle">selectedApp state</text>
  <text x="130" y="278" fill="#64748b" font-size="9" text-anchor="middle">click → open</text>

  <!-- 5: Gemini API -->
  <rect x="280" y="220" width="160" height="70" rx="3" fill="#141210" stroke="#10b981" stroke-width="1"/>
  <text x="360" y="248" fill="#10b981" font-size="11" font-weight="bold" text-anchor="middle">Gemini API</text>
  <text x="360" y="264" fill="#64748b" font-size="9" text-anchor="middle">generateContent()</text>
  <text x="360" y="278" fill="#64748b" font-size="9" text-anchor="middle">→ briefs state</text>

  <!-- 6: Compare -->
  <rect x="510" y="220" width="160" height="70" rx="3" fill="#141210" stroke="#f59e0b" stroke-width="1"/>
  <text x="590" y="248" fill="#f59e0b" font-size="11" font-weight="bold" text-anchor="middle">Compare Matrix</text>
  <text x="590" y="264" fill="#64748b" font-size="9" text-anchor="middle">compareIds (max 4)</text>
  <text x="590" y="278" fill="#64748b" font-size="9" text-anchor="middle">→ comparison modal</text>

  <!-- 7: Admin flow -->
  <rect x="50" y="360" width="160" height="70" rx="3" fill="#141210" stroke="#ef4444" stroke-width="1"/>
  <text x="130" y="386" fill="#f87171" font-size="11" font-weight="bold" text-anchor="middle">Admin Auth</text>
  <text x="130" y="402" fill="#64748b" font-size="9" text-anchor="middle">#/admin hash route</text>
  <text x="130" y="416" fill="#64748b" font-size="9" text-anchor="middle">sessionStorage</text>

  <!-- 8: Audit Log -->
  <rect x="280" y="360" width="160" height="70" rx="3" fill="#141210" stroke="#ef4444" stroke-width="1"/>
  <text x="360" y="386" fill="#f87171" font-size="11" font-weight="bold" text-anchor="middle">Audit Log</text>
  <text x="360" y="402" fill="#64748b" font-size="9" text-anchor="middle">appendAuditLog()</text>
  <text x="360" y="416" fill="#64748b" font-size="9" text-anchor="middle">localStorage</text>

  <!-- 9: Diagnostics -->
  <rect x="510" y="360" width="160" height="70" rx="3" fill="#141210" stroke="#ef4444" stroke-width="1"/>
  <text x="590" y="386" fill="#f87171" font-size="11" font-weight="bold" text-anchor="middle">Diagnostics</text>
  <text x="590" y="402" fill="#64748b" font-size="9" text-anchor="middle">storage test</text>
  <text x="590" y="416" fill="#64748b" font-size="9" text-anchor="middle">portfolio count · API key</text>

  <!-- Arrows row 1 -->
  <line x1="210" y1="115" x2="280" y2="115" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="115" x2="510" y2="115" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrows col 1 -->
  <line x1="590" y1="150" x2="590" y2="200" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="590" y1="200" x2="590" y2="220" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Detail → Gemini -->
  <line x1="210" y1="255" x2="280" y2="255" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="255" x2="510" y2="255" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Admin row -->
  <line x1="210" y1="395" x2="280" y2="395" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="395" x2="510" y2="395" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Admin auth → audit -->
  <line x1="130" y1="290" x2="130" y2="360" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
