  <line x1="465" y1="190" x2="465" y2="215" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="615" y1="190" x2="615" y2="215" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="195" y1="275" x2="195" y2="305" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="405" y1="275" x2="405" y2="305" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="200" y1="440" x2="200" y2="470" stroke="#10b981" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="440" y1="365" x2="440" y2="470" stroke="#475569" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="680" y1="365" x2="680" y2="470" stroke="#475569" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Legend -->
  <rect x="60" y="460" width="12" height="12" fill="none" stroke="#22d3ee" stroke-width="1"/>
