  <rect x="60" y="480" width="12" height="12" fill="none" stroke="#ef4444" stroke-width="1"/>
  <text x="78" y="491" fill="#64748b" font-size="10">Admin (protected)</text>
  <rect x="60" y="500" width="12" height="12" fill="none" stroke="#10b981" stroke-width="1"/>
  <text x="78" y="511" fill="#64748b" font-size="10">External API</text>
