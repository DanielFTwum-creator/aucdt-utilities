image: node:22-alpine

definitions:
  caches:
    pnpm: ~/.local/share/pnpm/store

  steps:
    - step: &build-and-deploy-war
        name: Build and Deploy WAR Project
        caches:
          - node
          - pnpm
        script:
          - cd $PROJECT_DIR
          - corepack enable
          - corepack prepare pnpm@latest --activate
          - pnpm install --frozen-lockfile || npm install
          - pnpm run build || npm run build
          - echo "Checking dist directory..."
          - ls -la dist/
          - mkdir -p dist/WEB-INF
          - cp -varf ./WEB-INF/* dist/WEB-INF/
          - apk add --no-cache zip openssh-client
          - cd ./dist/
          - zip -r ${WAR_NAME}.war *
          - scp ${WAR_NAME}.war root@66.226.72.199:/opt/tomcat/webapps/${WAR_NAME}.war
        artifacts:
          - ${PROJECT_DIR}/dist/**

    - step: &build-vite-project
        name: Build Vite Project
        caches:
          - node
          - pnpm
        script:
          - cd $PROJECT_DIR
          - corepack enable
          - corepack prepare pnpm@latest --activate
          - pnpm install --frozen-lockfile || npm install
          - pnpm run build || npm run build
          - echo "Build completed successfully for $PROJECT_DIR"
        artifacts:
          - ${PROJECT_DIR}/dist/**

pipelines:
  default:
    - parallel:
        # WAR Deployments (Tomcat)
        - step:
            <<: *build-and-deploy-war
            name: Build and Deploy Fees Comparison Dashboard
            script:
              - export PROJECT_DIR=fees-comparison-dashboard
              - export WAR_NAME=fees-comparison
              - cd $PROJECT_DIR
              - corepack enable
              - corepack prepare pnpm@latest --activate
              - pnpm install --frozen-lockfile || npm install
              - pnpm run build || npm run build
              - mkdir -p dist/WEB-INF
              - cp -varf ./WEB-INF/* dist/WEB-INF/
              - apk add --no-cache zip openssh-client
              - cd ./dist/
              - zip -r ${WAR_NAME}.war *
              - scp ${WAR_NAME}.war root@66.226.72.199:/opt/tomcat/webapps/${WAR_NAME}.war
            changesets:
              includePaths:
                - 'fees-comparison-dashboard/**'

        - step:
            <<: *build-and-deploy-war
            name: Build and Deploy AUCDT Analytics Dashboard
            script:
              - export PROJECT_DIR=aucdt-analytics-dashboard
              - export WAR_NAME=aucdt-analytics
              - cd $PROJECT_DIR
              - corepack enable
              - corepack prepare pnpm@latest --activate
              - pnpm install --frozen-lockfile || npm install
              - pnpm run build || npm run build
              - mkdir -p dist/WEB-INF
              - cp -varf ./WEB-INF/* dist/WEB-INF/
              - apk add --no-cache zip openssh-client
              - cd ./dist/
              - zip -r ${WAR_NAME}.war *
              - scp ${WAR_NAME}.war root@66.226.72.199:/opt/tomcat/webapps/${WAR_NAME}.war
            changesets:
              includePaths:
                - 'aucdt-analytics-dashboard/**'

        - step:
            <<: *build-and-deploy-war
            name: Build and Deploy Kanban App
            script:
              - export PROJECT_DIR=kanban-app
              - export WAR_NAME=kanban
              - cd $PROJECT_DIR
              - corepack enable
              - corepack prepare pnpm@latest --activate
              - pnpm install --frozen-lockfile || npm install
              - pnpm run build || npm run build
              - mkdir -p dist/WEB-INF
              - cp -varf ./WEB-INF/* dist/WEB-INF/
              - apk add --no-cache zip openssh-client
              - cd ./dist/
              - zip -r ${WAR_NAME}.war *
              - scp ${WAR_NAME}.war root@66.226.72.199:/opt/tomcat/webapps/${WAR_NAME}.war
            changesets:
              includePaths:
                - 'kanban-app/**'

        - step:
            <<: *build-and-deploy-war
            name: Build and Deploy Applicant Dashboard
            script:
              - export PROJECT_DIR=applicant-dashboard
              - export WAR_NAME=applicant-dashboard
              - cd $PROJECT_DIR
              - corepack enable
              - corepack prepare pnpm@latest --activate
              - pnpm install --frozen-lockfile || npm install
              - pnpm run build || npm run build
              - mkdir -p dist/WEB-INF
              - cp -varf ./WEB-INF/* dist/WEB-INF/ 2>/dev/null || echo "No WEB-INF found"
              - apk add --no-cache zip openssh-client
              - cd ./dist/
              - zip -r ${WAR_NAME}.war *
              - scp ${WAR_NAME}.war root@66.226.72.199:/opt/tomcat/webapps/${WAR_NAME}.war
            changesets:
              includePaths:
                - 'applicant-dashboard/**'

        - step:
            <<: *build-and-deploy-war
            name: Build and Deploy LEMS
            script:
              - export PROJECT_DIR=lems
              - export WAR_NAME=lems
              - cd $PROJECT_DIR
              - corepack enable
              - corepack prepare pnpm@latest --activate
              - pnpm install --frozen-lockfile || npm install
              - pnpm run build || npm run build
              - mkdir -p dist/WEB-INF
              - cp -varf ./WEB-INF/* dist/WEB-INF/ 2>/dev/null || echo "No WEB-INF found"
              - apk add --no-cache zip openssh-client
              - cd ./dist/
              - zip -r ${WAR_NAME}.war *
              - scp ${WAR_NAME}.war root@66.226.72.199:/opt/tomcat/webapps/${WAR_NAME}.war
            changesets:
              includePaths:
                - 'lems/**'

        # High Priority Static Builds
        - step:
            name: Build Analytics Refactor
            caches:
              - node
              - pnpm
            script:
              - cd analytics-refactor
              - corepack enable
              - corepack prepare pnpm@latest --activate
              - pnpm install --frozen-lockfile || npm install
              - pnpm run build
            artifacts:
              - analytics-refactor/dist/**
            changesets:
              includePaths:
                - 'analytics-refactor/**'

        - step:
            name: Build AUCDT Website React
            caches:
              - node
              - pnpm
            script:
              - cd aucdt-website-react
              - npm install
              - npm run build
            artifacts:
              - aucdt-website-react/dist/**
            changesets:
              includePaths:
                - 'aucdt-website-react/**'

        - step:
            name: Build Techbridge Product Design Portal
            caches:
              - node
              - pnpm
            script:
              - cd techbridge-product-design-6r-design-portal
              - npm install
              - npm run build
            artifacts:
              - techbridge-product-design-6r-design-portal/dist/**
            changesets:
              includePaths:
                - 'techbridge-product-design-6r-design-portal/**'

        - step:
            name: Build Techbridge Scholarship Portal
            caches:
              - node
              - pnpm
            script:
              - cd techbridge-scholarship-portal
              - npm install
              - npm run build
            artifacts:
              - techbridge-scholarship-portal/dist/**
            changesets:
              includePaths:
                - 'techbridge-scholarship-portal/**'

        - step:
            name: Build Mannequin AI Studio
            caches:
              - node
              - pnpm
            script:
              - cd mannequin-ai
              - pnpm install
              - pnpm run build
            changesets:
              includePaths:
                - 'mannequin-ai/**'

        - step:
            name: Build Directive Workflow
            caches:
              - node
              - pnpm
            script:
              - cd directive-workflow
              - pnpm install
              - pnpm run build
            changesets:
              includePaths:
                - 'directive-workflow/**'

        - step:
            name: Build DNS Copy Utility
            caches:
              - node
              - pnpm
            script:
              - cd dns-copy-utility
              - pnpm install
              - pnpm run build
            changesets:
              includePaths:
                - 'dns-copy-utility/**'

        - step:
            name: Build Techbridge Promo
            caches:
              - node
              - pnpm
            script:
              - cd techbridge-promo
              - pnpm install
              - pnpm run build
            changesets:
              includePaths:
                - 'techbridge-promo/**'

        - step:
            name: Build WhatsApp Parody
            caches:
              - node
              - pnpm
            script:
              - cd whatsapp-parody
              - pnpm install
              - pnpm run build
            changesets:
              includePaths:
                - 'whatsapp-parody/**'

        - step:
            name: Build All Other Changed Projects
            caches:
              - node
              - pnpm
            script:
              - echo "Detecting changes in other projects..."
              - |
                # Manual change detection for efficiency
                for dir in */; do
                  # Skip projects already listed above
                  case "$dir" in
                    "fees-comparison-dashboard/"|"aucdt-analytics-dashboard/"|"kanban-app/"|"applicant-dashboard/"|"lems/") continue ;;
                    "analytics-refactor/"|"aucdt-website-react/"|"techbridge-product-design-6r-design-portal/"|"techbridge-scholarship-portal/") continue ;;
                    "mannequin-ai/"|"directive-workflow/"|"dns-copy-utility/"|"techbridge-promo/"|"whatsapp-parody/") continue ;;
                    "node_modules/"|"docker/"|"dist/"|"src/") continue ;;
                  esac

                  if [ -f "${dir}package.json" ]; then
                    echo "Checking for changes in $dir"
                    # In a default pipeline, we can rely on git diff if needed, 
                    # but here we'll just build if changed in the last commit
                    # Since changesets handle the parallel steps, this catch-all 
                    # should ideally only run for the 'other' projects.
                    echo "Building ${dir}..."
                    cd "$dir"
                    npm install || true
                    npm run build || echo "Build failed for ${dir}"
                    cd ..
                  fi
                done

  # Branch-specific pipelines
  branches:
    master:
      - parallel:
          # Production deployments only on master
          - step:
              name: Build All Changed Projects
              caches:
                - node
                - pnpm
              script:
                - echo "Building all changed Vite projects..."
                - |
                  for dir in */; do
                    if [ -f "${dir}package.json" ] && [ -f "${dir}vite.config.js" ]; then
                      echo "Building ${dir}..."
                      cd "$dir"
                      npm install || true
                      npm run build || true
                      cd ..
                    fi
                  done

  # Pull request pipeline - build only, no deploy
  pull-requests:
    '**':
      - step:
          name: Build and Test Changed Projects
          caches:
            - node
            - pnpm
          script:
            - echo "Building changed projects for PR validation..."
            - |
              for dir in */; do
                if [ -f "${dir}package.json" ] && [ -f "${dir}vite.config.js" ]; then
                  echo "Building ${dir}..."
                  cd "$dir"
                  npm install || true
                  npm run build || echo "Build failed for ${dir}"
                  npm test || echo "No tests or tests failed for ${dir}"
                  cd ..
                fi
              done

  # Custom pipeline for manual deployment
  custom:
    deploy-all-war-projects:
      - parallel:
          - step:
              name: Deploy All WAR Projects
              script:
                - echo "Deploying all WAR projects to Tomcat..."
                - |
                  for project in fees-comparison-dashboard aucdt-analytics-dashboard kanban-app; do
                    if [ -d "$project" ]; then
                      echo "Deploying $project..."
                      cd "$project"
                      npm install
                      npm run build
                      mkdir -p dist/WEB-INF
                      cp -rf WEB-INF/* dist/WEB-INF/ 2>/dev/null || true
                      cd dist
                      apk add --no-cache zip openssh-client
                      zip -r "${project}.war" *
                      scp "${project}.war" root@66.226.72.199:/opt/tomcat/webapps/
                      cd ../..
                    fi
                  done

    build-all-projects:
      - step:
          name: Build All 89 Projects
          size: 2x
          caches:
            - node
            - pnpm
          script:
            - echo "Building all 89 Vite projects..."
            - apk add --no-cache bash
            - |
              SUCCESS=0
              FAILED=0
              SKIPPED=0

              for dir in */; do
                dir_name="${dir%/}"

                if [ ! -f "${dir}package.json" ]; then
                  echo "⏭️  Skipping $dir_name (no package.json)"
                  SKIPPED=$((SKIPPED + 1))
                  continue
                fi

                echo "========================================="
                echo "📦 Building: $dir_name"
                echo "========================================="

                cd "$dir"

                if npm install 2>&1; then
                  if npm run build 2>&1; then
                    echo "✅ SUCCESS: $dir_name"
                    SUCCESS=$((SUCCESS + 1))
                  else
                    echo "❌ FAILED: $dir_name (build failed)"
                    FAILED=$((FAILED + 1))
                  fi
                else
                  echo "❌ FAILED: $dir_name (install failed)"
                  FAILED=$((FAILED + 1))
                fi

                cd ..
              done

              echo "========================================="
              echo "📊 BUILD SUMMARY"
              echo "========================================="
              echo "✅ Successful: $SUCCESS"
              echo "❌ Failed: $FAILED"
              echo "⏭️  Skipped: $SKIPPED"
              echo "📦 Total Projects: $((SUCCESS + FAILED + SKIPPED))"
              echo "========================================="

              if [ $FAILED -gt 0 ]; then
                echo "⚠️  Some builds failed!"
                exit 1
              fi
