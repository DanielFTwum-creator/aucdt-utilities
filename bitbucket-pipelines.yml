# ============================================================================
#  Bitbucket Pipelines — aucdt-utilities
#
#  AUTOMATIC PIPELINES ARE DISABLED (cost incident, 2026-07-13).
#
#  The previous config ran a `default:` pipeline on every push to every branch,
#  and its "Build All Other Changed Projects" step had NO changesets filter, so
#  it looped over every directory in this 300+ app monorepo running
#  `npm install && npm run build` on each. Every push rebuilt a large slice of
#  the monorepo; multiple pushes ran up a ~$335 bill.
#
#  There is intentionally no `default:`, `branches:`, or `pull-requests:`
#  section here, so NO pipeline runs automatically on push or PR. Only the
#  manual `custom:` pipelines below run, and only when you trigger them by hand
#  from the Bitbucket UI (Pipelines → Run pipeline → custom).
#
#  Repo-wide disable is also set in the Bitbucket UI
#  (Repository settings → Pipelines → Settings → Enable Pipelines: OFF), which
#  is the authoritative kill switch across all branches.
#
#  To restore proper CI later, reintroduce per-app steps WITH `changesets:
#  includePaths:` on every step (including any catch-all) and restrict deploys
#  to the master branch only.
# ============================================================================

image: node:22-alpine

pipelines:
  # Manual-only. Nothing here runs automatically — invoke from the Bitbucket UI.
  custom:
    deploy-all-war-projects:
      - parallel:
          - step:
              name: Deploy All WAR Projects
              script:
                - echo "Deploying all WAR projects to Tomcat..."
                - |
                  for project in fees-comparison-dashboard aucdt-analytics-dashboard kanban-app; do
                    if [ -d "$project" ]; then
                      echo "Deploying $project..."
                      cd "$project"
                      npm install
                      npm run build
                      mkdir -p dist/WEB-INF
                      cp -rf WEB-INF/* dist/WEB-INF/ 2>/dev/null || true
                      cd dist
                      apk add --no-cache zip openssh-client
                      zip -r "${project}.war" *
                      scp "${project}.war" root@66.226.72.199:/opt/tomcat/webapps/
                      cd ../..
                    fi
                  done

    build-all-projects:
      - step:
          name: Build All 89 Projects
          size: 2x
          caches:
            - node
            - pnpm
          script:
            - echo "Building all 89 Vite projects..."
            - apk add --no-cache bash
            - |
              SUCCESS=0
              FAILED=0
              SKIPPED=0

              for dir in */; do
                dir_name="${dir%/}"

                if [ ! -f "${dir}package.json" ]; then
                  echo "⏭️  Skipping $dir_name (no package.json)"
                  SKIPPED=$((SKIPPED + 1))
                  continue
                fi

                echo "========================================="
                echo "📦 Building: $dir_name"
                echo "========================================="

                cd "$dir"

                if npm install 2>&1; then
                  if npm run build 2>&1; then
                    echo "✅ SUCCESS: $dir_name"
                    SUCCESS=$((SUCCESS + 1))
                  else
                    echo "❌ FAILED: $dir_name (build failed)"
                    FAILED=$((FAILED + 1))
                  fi
                else
                  echo "❌ FAILED: $dir_name (install failed)"
                  FAILED=$((FAILED + 1))
                fi

                cd ..
              done

              echo "========================================="
              echo "📊 BUILD SUMMARY"
              echo "========================================="
              echo "✅ Successful: $SUCCESS"
              echo "❌ Failed: $FAILED"
              echo "⏭️  Skipped: $SKIPPED"
              echo "📦 Total Projects: $((SUCCESS + FAILED + SKIPPED))"
              echo "========================================="

              if [ $FAILED -gt 0 ]; then
                echo "⚠️  Some builds failed!"
                exit 1
              fi
