<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8fafc"/>
  
  <!-- Entities -->
  <rect x="100" y="50" width="250" height="120" rx="8" fill="#ffffff" stroke="#4f46e5" stroke-width="2"/>
  <text x="225" y="80" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">LinkItem Entity</text>
  <text x="120" y="105" font-family="Courier" font-size="11">- id: UUID</text>
  <text x="120" y="120" font-family="Courier" font-size="11">- path: string</text>
  <text x="120" y="135" font-family="Courier" font-size="11">- category: string</text>
  <text x="120" y="150" font-family="Courier" font-size="11">- status: enum</text>

  <rect x="100" y="220" width="250" height="100" rx="8" fill="#ffffff" stroke="#4f46e5" stroke-width="2"/>
  <text x="225" y="250" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">AuditLog Entity</text>
  <text x="120" y="275" font-family="Courier" font-size="11">- timestamp: DateTime</text>
  <text x="120" y="290" font-family="Courier" font-size="11">- action: string</text>
  <text x="120" y="305" font-family="Courier" font-size="11">- details: object</text>

  <!-- Flow -->
  <path d="M 350 110 L 450 110" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="400" y="100" font-family="Arial" font-size="10" text-anchor="middle" fill="#64748b">In-Memory Store</text>
</svg>
