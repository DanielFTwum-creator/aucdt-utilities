<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8fafc"/>
  
  <!-- Client Layer -->
  <rect x="50" y="50" width="200" height="300" rx="10" fill="#ffffff" stroke="#4f46e5" stroke-width="2"/>
  <text x="150" y="80" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#1e293b">CLIENT (REACT 19)</text>
  <rect x="70" y="100" width="160" height="40" rx="5" fill="#f1f5f9"/>
  <text x="150" y="125" font-family="Arial" font-size="12" text-anchor="middle" fill="#475569">UI Components</text>
  <rect x="70" y="150" width="160" height="40" rx="5" fill="#f1f5f9"/>
  <text x="150" y="175" font-family="Arial" font-size="12" text-anchor="middle" fill="#475569">Theme Context</text>
  <rect x="70" y="200" width="160" height="40" rx="5" fill="#f1f5f9"/>
  <text x="150" y="225" font-family="Arial" font-size="12" text-anchor="middle" fill="#475569">React Router</text>

  <!-- Server Layer -->
  <rect x="300" y="50" width="200" height="300" rx="10" fill="#ffffff" stroke="#4f46e5" stroke-width="2"/>
  <text x="400" y="80" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#1e293b">SERVER (EXPRESS)</text>
  <rect x="320" y="100" width="160" height="40" rx="5" fill="#f1f5f9"/>
  <text x="400" y="125" font-family="Arial" font-size="12" text-anchor="middle" fill="#475569">Axios Proxy</text>
  <rect x="320" y="150" width="160" height="40" rx="5" fill="#f1f5f9"/>
  <text x="400" y="175" font-family="Arial" font-size="12" text-anchor="middle" fill="#475569">Auth Middleware</text>
  <rect x="320" y="200" width="160" height="40" rx="5" fill="#f1f5f9"/>
  <text x="400" y="225" font-family="Arial" font-size="12" text-anchor="middle" fill="#475569">Audit Logger</text>

  <!-- External -->
  <rect x="550" y="150" width="200" height="100" rx="10" fill="#1e1b4b" stroke="#312e81" stroke-width="2"/>
  <text x="650" y="205" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">TECHBRIDGE PORTAL</text>

  <!-- Connectors -->
  <path d="M 250 200 L 300 200" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 500 200 L 550 200" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
</svg>
