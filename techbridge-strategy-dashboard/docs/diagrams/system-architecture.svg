<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#0f172a"/>
  
  <!-- Boxes -->
  <rect x="50" y="250" width="150" height="100" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="125" y="305" fill="white" font-family="Arial" font-size="14" text-anchor="middle">Browser (Client)</text>
  
  <rect x="325" y="100" width="150" height="100" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="155" fill="white" font-family="Arial" font-size="14" text-anchor="middle">React (Vite)</text>
  
  <rect x="325" y="400" width="150" height="100" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="455" fill="white" font-family="Arial" font-size="14" text-anchor="middle">Local Storage/State</text>
  
  <rect x="600" y="250" width="150" height="100" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="675" y="305" fill="white" font-family="Arial" font-size="14" text-anchor="middle">Simulated Backend</text>
  
  <!-- Connectors -->
  <path d="M 200 300 L 325 150" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 400 200 L 400 400" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 475 150 L 600 300" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>
</svg>
