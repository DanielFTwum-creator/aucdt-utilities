<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .db { fill: #F8FAFC; stroke: #D4AF37; stroke-width: 2; rx: 8; }
      .text-title { fill: #0F172A; font-family: Inter, serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
      .text-field { fill: #475569; font-family: monospace; font-size: 11px; }
      .line { stroke: #D4AF37; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D4AF37" />
    </marker>
  </defs>

  <rect width="1000" height="600" class="bg" />

  <text x="400" y="40" fill="#0F172A" font-family="Inter" font-size="24" font-weight="bold" text-anchor="middle" letter-spacing="2">STRATEGIC DATA SCHEMAS &amp; FLOW</text>
  <text x="400" y="60" fill="#64748b" font-family="Inter" font-size="10" text-anchor="middle" letter-spacing="2">TECHBRIDGE STRATEGY DASHBOARD v3.0.0</text>

  <!-- Dashboard State -->
  <rect x="50" y="100" width="220" height="350" class="db" />
  <rect x="50" y="100" width="220" height="40" fill="#D4AF37" rx="8" />
  <rect x="50" y="120" width="220" height="20" fill="#D4AF37" />
  <text x="160" y="125" fill="#fff" font-family="Inter" font-size="14" font-weight="bold" text-anchor="middle">Application State</text>
  
  <text x="70" y="170" class="text-field" font-weight="bold">financials:</text>
  <text x="90" y="190" class="text-field">{ year, revenue, cost }</text>
  
  <text x="70" y="220" class="text-field" font-weight="bold">budget:</text>
  <text x="90" y="240" class="text-field">{ name, value }</text>

  <text x="70" y="270" class="text-field" font-weight="bold">marketing:</text>
  <text x="90" y="290" class="text-field">{ name, value, leads }</text>

  <text x="70" y="320" class="text-field" font-weight="bold">risks:</text>
  <text x="90" y="340" class="text-field">{ id, title, impact, ... }</text>

  <!-- AI Ingestion -->
  <rect x="350" y="220" width="100" height="40" fill="#0F172A" rx="20" />
  <text x="400" y="245" fill="#fff" font-family="Inter" font-size="10" text-anchor="middle" letter-spacing="1">INGEST</text>

  <!-- Output Artifacts -->
  <rect x="530" y="120" width="240" height="310" class="db" />
  <rect x="530" y="120" width="240" height="40" fill="#0F172A" rx="8" />
  <rect x="530" y="140" width="240" height="20" fill="#0F172A" />
  <text x="650" y="145" fill="#D4AF37" font-family="Inter" font-size="14" font-weight="bold" text-anchor="middle">Strategic Output</text>

  <text x="550" y="190" class="text-field" font-weight="bold">PDF Briefing:</text>
  <text x="570" y="210" class="text-field">- Exec Cover Page</text>
  <text x="570" y="230" class="text-field">- High-Fidelity Charts</text>
  
  <text x="550" y="270" class="text-field" font-weight="bold">PPTX Deck:</text>
  <text x="570" y="290" class="text-field">- Editable Strategy Grid</text>
  <text x="570" y="310" class="text-field">- Dynamic Financials</text>

  <text x="550" y="350" class="text-field" font-weight="bold">Audit Trails:</text>
  <text x="570" y="370" class="text-field">- LocalStorage Persistence</text>

  <!-- Connectors -->
  <path d="M 270 240 L 340 240" class="line" marker-end="url(#arrowhead)" />
  <path d="M 450 240 L 520 240" class="line" marker-end="url(#arrowhead)" />

</svg>