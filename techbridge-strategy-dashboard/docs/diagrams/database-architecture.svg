<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#0f172a"/>
  
  <!-- Tables -->
  <rect x="50" y="50" width="200" height="150" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="150" y="80" fill="white" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Requirements</text>
  <line x1="50" y1="90" x2="250" y2="90" stroke="#3b82f6" stroke-width="1"/>
  <text x="60" y="115" fill="#94a3b8" font-family="Arial" font-size="12">id (String)</text>
  <text x="60" y="140" fill="#94a3b8" font-family="Arial" font-size="12">category (String)</text>
  <text x="60" y="165" fill="#94a3b8" font-family="Arial" font-size="12">status (String)</text>
  <text x="60" y="190" fill="#94a3b8" font-family="Arial" font-size="12">progress (Number)</text>
  
  <rect x="550" y="50" width="200" height="150" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="650" y="80" fill="white" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Audit Logs</text>
  <line x1="550" y1="90" x2="750" y2="90" stroke="#10b981" stroke-width="1"/>
  <text x="560" y="115" fill="#94a3b8" font-family="Arial" font-size="12">id (String)</text>
  <text x="560" y="140" fill="#94a3b8" font-family="Arial" font-size="12">timestamp (String)</text>
  <text x="560" y="165" fill="#94a3b8" font-family="Arial" font-size="12">action (String)</text>
  <text x="560" y="190" fill="#94a3b8" font-family="Arial" font-size="12">user (String)</text>
  
  <rect x="300" y="350" width="200" height="120" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="380" fill="white" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">System Status</text>
  <line x1="300" y1="390" x2="500" y2="390" stroke="#f59e0b" stroke-width="1"/>
  <text x="310" y="415" fill="#94a3b8" font-family="Arial" font-size="12">agent_name (Key)</text>
  <text x="310" y="440" fill="#94a3b8" font-family="Arial" font-size="12">status (Value)</text>
  
  <!-- Relationships -->
  <path d="M 250 125 L 550 125" stroke="#475569" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
</svg>
