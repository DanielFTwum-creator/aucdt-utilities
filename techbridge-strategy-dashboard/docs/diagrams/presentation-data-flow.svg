<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#0a0a0a"/>
  
  <!-- Flow Container -->
  <rect x="50" y="50" width="900" height="400" rx="20" fill="#111" stroke="#333" stroke-width="2"/>
  <text x="500" y="35" fill="#666" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">BOARD-LEVEL DATA PRIVACY & FLOW</text>

  <!-- External World -->
  <circle cx="150" cy="250" r="60" fill="#1e1b4b" stroke="#4f46e5" stroke-width="4"/>
  <text x="150" y="255" fill="white" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">External Access</text>

  <!-- Security Perimeter -->
  <rect x="300" y="100" width="400" height="300" rx="15" fill="#020617" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="500" y="130" fill="#3b82f6" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">SECURE PERIMETER (AUCDT-NET)</text>

  <!-- Core Dashboard -->
  <rect x="350" y="180" width="300" height="150" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="3"/>
  <text x="500" y="240" fill="white" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">AUCDT Dashboard Suite</text>
  <text x="500" y="265" fill="#10b981" font-family="Arial" font-size="12" text-anchor="middle">Phases 1-4 Implementation</text>

  <!-- Private Agent Cloud -->
  <circle cx="850" cy="250" r="60" fill="#1e1b4b" stroke="#f59e0b" stroke-width="4"/>
  <text x="850" y="255" fill="white" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">AI Agent Hub</text>

  <!-- Flow Arrows -->
  <path d="M 210 250 L 300 250" stroke="#4f46e5" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <path d="M 700 250 L 790 250" stroke="#f59e0b" stroke-width="4" marker-end="url(#arrow-orange)"/>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f46e5" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b" />
    </marker>
  </defs>
</svg>
