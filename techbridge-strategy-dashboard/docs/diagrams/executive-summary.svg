<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <!-- Background -->
  <rect width="800" height="450" fill="#ffffff" />
  
  <!-- Title -->
  <text x="400" y="40" font-family="sans-serif" font-size="22" text-anchor="middle" font-weight="bold" fill="#1e293b">TechBridge Strategic Transformation Flow</text>

  <!-- Section 1: Inputs -->
  <g transform="translate(50, 100)">
    <rect width="200" height="250" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" />
    <text x="100" y="30" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#334155">Strategic Inputs</text>
    
    <rect x="20" y="60" width="160" height="40" rx="5" fill="#3b82f6" />
    <text x="100" y="85" font-family="sans-serif" font-size="12" text-anchor="middle" fill="white">Rebrand Strategy</text>
    
    <rect x="20" y="110" width="160" height="40" rx="5" fill="#8b5cf6" />
    <text x="100" y="135" font-family="sans-serif" font-size="12" text-anchor="middle" fill="white">Financial Capital</text>
    
    <rect x="20" y="160" width="160" height="40" rx="5" fill="#10b981" />
    <text x="100" y="185" font-family="sans-serif" font-size="12" text-anchor="middle" fill="white">AI Curriculum</text>

    <text x="100" y="230" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#64748b" font-style="italic">Market Validation</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M 250 225 L 300 225" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Section 2: Engine -->
  <g transform="translate(300, 80)">
    <circle cx="100" cy="145" r="90" fill="#eff6ff" stroke="#2563eb" stroke-width="3" stroke-dasharray="5,5" />
    <text x="100" y="125" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e40af">Dashboard Engine</text>
    <text x="100" y="145" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3b82f6">Real-time Analytics</text>
    <text x="100" y="160" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3b82f6">Risk Mitigation</text>
    <text x="100" y="175" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#3b82f6">Performance Tracking</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M 500 225 L 550 225" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Section 3: Outputs -->
  <g transform="translate(550, 100)">
    <rect width="200" height="250" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2" />
    <text x="100" y="30" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#065f46">Business Outcomes</text>
    
    <rect x="20" y="60" width="160" height="40" rx="5" fill="#ffffff" stroke="#10b981" stroke-width="2" />
    <text x="100" y="85" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#047857">Enrollment (350+)</text>
    
    <rect x="20" y="110" width="160" height="40" rx="5" fill="#ffffff" stroke="#10b981" stroke-width="2" />
    <text x="100" y="135" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#047857">Break-even (Yr 2)</text>
    
    <rect x="20" y="160" width="160" height="40" rx="5" fill="#ffffff" stroke="#10b981" stroke-width="2" />
    <text x="100" y="185" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#047857">Brand Legitimacy</text>

    <text x="100" y="230" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#047857" font-weight="bold">1,735% ROI</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
  </defs>
</svg>