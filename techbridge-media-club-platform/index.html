    <style>
      :root {
        --font-main: 'Inter';
      }
      body {
        font-family: var(--font-main), sans-serif;

      h1, h2, h3, h4, h5, h6 {

      /* Cinematic Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 3px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #334155; 
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #7A0019; 
      }

      /* Glassmorphism Utilities */
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .dark .glass {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      /* Card Hover Glow */
      .card-hover {
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .card-hover:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      }
      .dark .card-hover:hover {
        box-shadow: 0 0 20px rgba(122, 0, 25, 0.2); /* Maroon Glow */
      }

      /* High Contrast Mode Overrides - Strict accessibility */
      .high-contrast {
        --bg-primary: #000000;
        --text-primary: #ffffff;
        --accent: #ffff00;
        background-color: var(--bg-primary) !important;
        color: var(--text-primary) !important;
      }
      .high-contrast * {
        background: transparent !important;
        background-image: none !important;
        box-shadow: none !important;
        backdrop-filter: none !important;
        text-shadow: none !important;
        border-color: #ffffff !important;
      }
      .high-contrast .bg-white, 
      .high-contrast .bg-gray-50, 
      .high-contrast .bg-gray-100,
      .high-contrast .bg-gray-800,
      .high-contrast .bg-gray-900,
      .high-contrast .glass {
        background-color: #000000 !important;
        color: #ffffff !important;
      }
      .high-contrast button, 
      .high-contrast input, 
      .high-contrast select {
        border: 2px solid #ffffff !important;
        background-color: #000000 !important;
        color: #ffff00 !important;
      }
      .high-contrast a,
      .high-contrast .text-blue-600,
      .high-contrast .text-[#7A0019],
      .high-contrast .text-techbridge-maroon {
        color: #ffff00 !important;
        text-decoration: underline !important;
      }
    </style>

    <style id="tuc-splash-styles">
      body { background-color: #0F0C07 !important; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: serif; }
      .tuc-splash { text-align: center; border: 1px solid rgba(200,168,75,0.2); padding: 60px; background: #141210; position: relative; }
      .tuc-splash::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: #C8A84B; }
      .tuc-logo { color: #C8A84B; font-size: 3rem; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 10px; display: block; }
      .tuc-status { color: #D4C4A0; font-family: sans-serif; text-transform: uppercase; letter-spacing: 0.4em; font-size: 0.7rem; opacity: 0.6; }
      .tuc-loading { margin-top: 30px; height: 1px; width: 100px; background: rgba(200,168,75,0.2); margin-left: auto; margin-right: auto; position: relative; overflow: hidden; }
      .tuc-loading::after { content: ""; position: absolute; left: -100%; width: 50%; height: 100%; background: #C8A84B; animation: tuc-load 2s infinite; }
      @keyframes tuc-load { to { left: 150%; } }
    </style>
