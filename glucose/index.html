<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Rophe Sugar Logger — Real-time blood glucose monitoring, trend analysis, and health insights powered by AI." />
    <meta name="keywords" content="glucose monitoring, blood sugar, health tracking, diabetes management, glucose meter, TUC" />
    <meta name="author" content="Techbridge University College" />
    <meta name="publisher" content="TUC ICT Department" />
    <!-- Auth-gated (WMS SSO): patient data behind login, keep it out of the index.
         Canonical points at the URL actually served (/glucose/ under ai-tools),
         not the unserved glucose.techbridge.edu.gh subdomain. -->
    <meta name="robots" content="noindex, nofollow" />
    <link rel="canonical" href="https://ai-tools.techbridge.edu.gh/glucose/" />
    <meta name="geo.region" content="GH-AA" />
    <meta name="geo.placename" content="Accra, Ghana" />
    <meta name="geo.position" content="5.6037;-0.1870" />
    <meta name="ICBM" content="5.6037, -0.1870" />
    <meta name="theme-color" content="#D4AF37" />
    <meta name="msapplication-TileColor" content="#D4AF37" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Glucose Monitor | Real-Time Health Tracking" />
    <meta property="og:description" content="Track your blood glucose levels in real-time with advanced analytics and trend prediction." />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:url" content="https://ai-tools.techbridge.edu.gh/glucose/" />
    <meta property="og:site_name" content="Techbridge University College" />
    <meta property="og:image" content="https://techbridge.edu.gh/static/TUC_LOGO.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@TUCGhana" />
    <meta name="twitter:creator" content="@TUCGhana" />
    <meta name="twitter:image" content="https://techbridge.edu.gh/static/TUC_LOGO.png" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Rophe Sugar Logger — Blood Glucose Monitoring</title>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FKXTELQ71R"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-FKXTELQ71R');</script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root, [data-theme='gold-luxury'] {
        --font-sans: 'Lora', serif;
        --color-bg-primary: #F5F0E8;
        --color-bg-secondary: #FFFBF5;
        --color-text-primary: #3D2817;
        --color-accent-primary: #D4AF37;
      }
      [data-theme='dark'] {
        --color-bg-primary: #1A1A1A;
        --color-bg-secondary: #2D2D2D;
        --color-text-primary: #FFFFFF;
        --color-accent-primary: #64FFDA;
      }
      body {
        font-family: var(--font-sans, 'Lora'), serif;
        margin: 0;
        padding: 0;
        background-color: var(--color-bg-primary);
        color: var(--color-text-primary);
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      #root {
        min-height: 100vh;
      }
    </style>
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('rophe-sugar-logger-theme') || 'gold-luxury';
          const themeSlug = theme.toLowerCase().replace(/\s+/g, '-');
          document.documentElement.setAttribute('data-theme', themeSlug);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'gold-luxury');
        }
      })();
    </script>
    <style id="glucose-splash-styles">
      body.loading {
        background: linear-gradient(135deg, #f5f0e8 0%, #fffbf5 100%) !important;
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: 'Lora', serif;
        overflow: hidden;
      }
      .glucose-splash {
        text-align: center;
        border: 1px solid rgba(227, 76, 60, 0.2);
        padding: 60px 80px;
        background: rgba(255, 251, 245, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(46, 117, 182, 0.08);
        position: relative;
      }
      .glucose-splash::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 6px;
        background: linear-gradient(90deg, #E74C3C, #2E75B6);
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
      }
      .glucose-logo {
        color: #2E75B6;
        font-size: 2.8rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        margin-bottom: 8px;
        display: block;
      }
      .glucose-logo span {
        color: #E74C3C;
      }
      .glucose-status {
        color: #52525B;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        font-size: 0.75rem;
        font-weight: 600;
        opacity: 0.8;
      }
      .glucose-loading {
        margin-top: 25px;
        height: 3px;
        width: 120px;
        background: rgba(46, 117, 182, 0.15);
        margin-left: auto;
        margin-right: auto;
        position: relative;
        overflow: hidden;
        border-radius: 3px;
      }
      .glucose-loading::after {
        content: "";
        position: absolute;
        left: -100%;
        width: 50%;
        height: 100%;
        background: #2E75B6;
        animation: glucose-load 1.6s infinite ease-in-out;
      }
      @keyframes glucose-load {
        to { left: 150%; }
      }
    </style>
    <script>
      if (document.body) {
        document.body.classList.add('loading');
      }
      document.addEventListener('DOMContentLoaded', () => {
        if (document.body) {
          document.body.classList.remove('loading');
        }
      });
      window.addEventListener('load', () => {
        if (document.body) {
          document.body.classList.remove('loading');
        }
      });
    </script>
  </head>
  <body>
    <div id="root">
      <div class="glucose-splash">
        <span class="glucose-logo">Glu<span>cose</span></span>
        <div class="glucose-status">Health Monitor</div>
        <div class="glucose-loading"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        var theme = localStorage.getItem('glucose-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </body>
</html>
