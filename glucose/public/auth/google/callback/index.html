<!DOCTYPE html>
<html>
<head><title>Authenticating...</title></head>
<body style="font-family: Arial; padding: 20px;">
<p id="status">Processing authentication...</p>
<script>
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const access_token = params.get('access_token');
  const error = params.get('error');
  const error_description = params.get('error_description');
  const status = document.getElementById('status');

  console.log('[Callback] Hash:', hash);
  console.log('[Callback] access_token:', access_token);
  console.log('[Callback] error:', error);
  console.log('[Callback] window.opener:', !!window.opener);

  if (access_token) {
    status.textContent = 'Authenticated. Closing...';
    localStorage.setItem('oauth_token_temp', access_token);
    console.log('[Callback] Sending postMessage to parent with token');
    if (window.opener) {
      window.opener.postMessage({ type: 'OAUTH_TOKEN_SUCCESS', access_token }, window.location.origin);
      console.log('[Callback] postMessage sent');
    } else {
      console.log('[Callback] No window.opener, cannot send postMessage');
    }
    setTimeout(() => {
      window.close();
    }, 500);
  } else if (error) {
    status.textContent = `Error: ${error}`;
    localStorage.setItem('oauth_error_temp', error);
    if (window.opener) {
      window.opener.postMessage({ type: 'OAUTH_TOKEN_ERROR', error, error_description }, window.location.origin);
    }
    setTimeout(() => window.close(), 1000);
  } else {
    status.textContent = 'No authentication token was returned.';
  }
</script>
</body>
</html>
