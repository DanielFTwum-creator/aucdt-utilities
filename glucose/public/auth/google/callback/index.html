<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authenticating...</title>
</head>
<body>
<script>
  (function() {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const access_token = params.get('access_token');
    const error = params.get('error');
    const error_description = params.get('error_description');

    if (access_token && window.opener) {
      localStorage.setItem('oauth_token_temp', access_token);
      window.opener.postMessage(
        { type: 'OAUTH_TOKEN_SUCCESS', access_token },
        window.location.origin
      );
      setTimeout(() => window.close(), 300);
    } else if (error && window.opener) {
      localStorage.setItem('oauth_error_temp', error);
      window.opener.postMessage(
        { type: 'OAUTH_TOKEN_ERROR', error, error_description },
        window.location.origin
      );
      setTimeout(() => window.close(), 300);
    } else {
      window.close();
    }
  })();
</script>
</body>
</html>
