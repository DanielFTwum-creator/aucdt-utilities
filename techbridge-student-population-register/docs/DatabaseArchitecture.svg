<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .db { fill: #FBF8F1; stroke: #7A1B1E; stroke-width: 2; rx: 8; }
      .text-title { fill: #0F172A; font-family: serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
      .text-field { fill: #333333; font-family: monospace; font-size: 11px; }
      .line { stroke: #7A1B1E; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7A1B1E" />
    </marker>
  </defs>

  <rect width="1000" height="600" class="bg" />

  <text x="400" y="40" fill="#0F172A" font-family="serif" font-size="24" font-weight="bold" text-anchor="middle" letter-spacing="2">REGISTRY DATA SCHEMAS</text>
  <text x="400" y="60" fill="#666" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="2">TUC POPULATION REGISTER v3.0.0</text>

  <!-- Student State -->
  <rect x="50" y="100" width="220" height="350" class="db" />
  <rect x="50" y="100" width="220" height="40" fill="#7A1B1E" rx="8" />
  <rect x="50" y="120" width="220" height="20" fill="#7A1B1E" />
  <text x="160" y="125" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Student (JSON)</text>
  
  <text x="70" y="170" class="text-field" font-weight="bold">identity:</text>
  <text x="90" y="190" class="text-field">id: string (PK)</text>
  <text x="90" y="210" class="text-field">name: string</text>
  
  <text x="70" y="240" class="text-field" font-weight="bold">academic:</text>
  <text x="90" y="260" class="text-field">department: enum</text>
  <text x="90" y="280" class="text-field">programme: string</text>
  <text x="90" y="300" class="text-field">level: number</text>

  <text x="70" y="330" class="text-field" font-weight="bold">metadata:</text>
  <text x="90" y="350" class="text-field">nationality: string</text>
  <text x="90" y="370" class="text-field">type: Degree|Dip|Cert</text>

  <!-- Transformation -->
  <rect x="350" y="220" width="100" height="40" fill="#0F172A" rx="20" />
  <text x="400" y="245" fill="#fff" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="1">PERSIST</text>

  <!-- Audit State -->
  <rect x="530" y="150" width="220" height="250" class="db" />
  <rect x="530" y="150" width="220" height="40" fill="#0F172A" rx="8" />
  <rect x="530" y="170" width="220" height="20" fill="#0F172A" />
  <text x="640" y="175" fill="#B48600" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">AuditLog (Storage)</text>

  <text x="550" y="220" class="text-field" font-weight="bold">event:</text>
  <text x="570" y="240" class="text-field">timestamp: ISO8601</text>
  <text x="570" y="260" class="text-field">action: string</text>
  <text x="570" y="280" class="text-field">details: string</text>
  
  <text x="550" y="310" class="text-field" font-weight="bold">actor:</text>
  <text x="570" y="330" class="text-field">user: string</text>
  <text x="570" y="350" class="text-field">source: browser|sim</text>

  <!-- Connectors -->
  <path d="M 270 240 L 340 240" class="line" marker-end="url(#arrowhead)" />
  <path d="M 450 240 L 520 240" class="line" marker-end="url(#arrowhead)" />

</svg>