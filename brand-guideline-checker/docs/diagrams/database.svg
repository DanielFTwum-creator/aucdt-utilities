<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #FDFCF9; }
      .db { fill: #ffffff; stroke: #2C1810; stroke-width: 2; rx: 8; }
      .text-title { fill: #2C1810; font-family: serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
      .text-field { fill: #475569; font-family: monospace; font-size: 11px; }
      .line { stroke: #C8A84B; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C8A84B" />
    </marker>
  </defs>

  <rect width="1000" height="600" class="bg" />

  <text x="400" y="40" fill="#2C1810" font-family="serif" font-size="24" font-weight="bold" text-anchor="middle" letter-spacing="2">INSTITUTIONAL COMPLIANCE FLOW</text>
  <text x="400" y="60" fill="#64748b" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="2">BRAND CHECKER v3.0.0</text>

  <!-- Asset Input -->
  <rect x="50" y="100" width="220" height="350" class="db" />
  <rect x="50" y="100" width="220" height="40" fill="#2C1810" rx="8" />
  <rect x="50" y="120" width="220" height="20" fill="#2C1810" />
  <text x="160" y="125" fill="#C8A84B" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">AssetPayload</text>
  
  <text x="70" y="170" class="text-field" font-weight="bold">input:</text>
  <text x="90" y="190" class="text-field">fileType: PNG|JPG|SVG</text>
  <text x="90" y="210" class="text-field">base64: binary_string</text>
  
  <text x="70" y="240" class="text-field" font-weight="bold">metadata:</text>
  <text x="90" y="260" class="text-field">origin: Dept_MarCom</text>
  <text x="90" y="280" class="text-field">timestamp: ISO8601</text>

  <!-- AI Analysis -->
  <rect x="350" y="220" width="100" height="40" fill="#C8A84B" rx="20" />
  <text x="400" y="245" fill="#2C1810" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="1">ANALYZE</text>

  <!-- Results -->
  <rect x="530" y="150" width="240" height="250" class="db" />
  <rect x="530" y="150" width="240" height="40" fill="#C8A84B" rx="8" />
  <rect x="530" y="170" width="240" height="20" fill="#C8A84B" />
  <text x="650" y="175" fill="#2C1810" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">AnalysisReport</text>

  <text x="550" y="220" class="text-field" font-weight="bold">scores:</text>
  <text x="570" y="240" class="text-field">overall: 0-100</text>
  <text x="570" y="260" class="text-field">alignment: boolean</text>
  
  <text x="550" y="290" class="text-field" font-weight="bold">audit:</text>
  <text x="570" y="310" class="text-field">- LocalStorage Persistence</text>
  <text x="570" y="330" class="text-field">- PDF Certificate</text>

  <!-- Connectors -->
  <path d="M 270 240 L 340 240" class="line" marker-end="url(#arrowhead)" />
  <path d="M 450 240 L 520 240" class="line" marker-end="url(#arrowhead)" />

</svg>