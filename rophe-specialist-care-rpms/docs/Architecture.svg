<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="grad-ui" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="#f8fafc" rx="20"/>
  <text x="400" y="50" font-family="Inter, sans-serif" font-size="28" font-weight="900" text-anchor="middle" fill="#0f172a">ROPHE SYSTEM ARCHITECTURE</text>
  
  <g filter="url(#shadow)">
    <rect x="100" y="90" width="600" height="100" rx="16" fill="url(#grad-ui)" />
    <text x="400" y="125" font-family="Inter, sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#ffffff">PRESENTATION LAYER (SPA)</text>
    <text x="400" y="155" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#ecfdf5">React 19 • Tailwind CSS • Recharts • Lucide Icons</text>
    <text x="400" y="172" font-family="Inter, sans-serif" font-size="11" font-weight="500" text-anchor="middle" fill="#ecfdf5">Accessibility Engine (ARIA 1.2 Compliant)</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="100" y="230" width="600" height="160" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="400" y="260" font-family="Inter, sans-serif" font-size="16" font-weight="800" text-anchor="middle" fill="#0f172a">LOGIC & INTEGRATION HUB</text>
    
    <rect x="130" y="280" width="160" height="80" rx="12" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
    <text x="210" y="315" font-family="Inter, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#1e40af">GEMINI AI</text>
    <text x="210" y="335" font-family="Inter, sans-serif" font-size="10" text-anchor="middle" fill="#3b82f6">Clinical Insights & Coding</text>

    <rect x="320" y="280" width="160" height="80" rx="12" fill="#f1f5f9" stroke="#8b5cf6" stroke-width="2"/>
    <text x="400" y="315" font-family="Inter, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#5b21b6">TELEHEALTH</text>
    <text x="400" y="335" font-family="Inter, sans-serif" font-size="10" text-anchor="middle" fill="#8b5cf6">WebRTC & Recording</text>

    <rect x="510" y="280" width="160" height="80" rx="12" fill="#f1f5f9" stroke="#10b981" stroke-width="2"/>
    <text x="590" y="315" font-family="Inter, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#065f46">SELF-TEST</text>
    <text x="590" y="335" font-family="Inter, sans-serif" font-size="10" text-anchor="middle" fill="#10b981">Puppeteer Integration</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="100" y="430" width="280" height="100" rx="16" fill="#0f172a" />
    <text x="240" y="465" font-family="Inter, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#f8fafc">EXTERNAL API</text>
    <text x="240" y="490" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#94a3b8">Google GenAI Platform</text>
    <text x="240" y="510" font-family="Inter, sans-serif" font-size="10" text-anchor="middle" fill="#64748b">Model: gemini-3-pro-preview</text>

    <rect x="420" y="430" width="280" height="100" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="560" y="465" font-family="Inter, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#0f172a">STATE PERSISTENCE</text>
    <text x="560" y="490" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#64748b">React Hook-Based Management</text>
    <text x="560" y="510" font-family="Inter, sans-serif" font-size="10" text-anchor="middle" fill="#94a3b8">Mock Data + Audit Engine</text>
  </g>

  <path d="M400 190 L400 230" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M240 390 L240 430" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M560 390 L560 430" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowhead)"/>
</svg>