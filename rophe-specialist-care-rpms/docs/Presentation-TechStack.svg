    <g transform="translate(20, 60)">
      <rect width="110" height="35" rx="10" fill="#0ea5e9" fill-opacity="0.1" stroke="#0ea5e9" />
      <text x="55" y="22" font-family="Inter, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#0ea5e9">React 19</text>
    </g>
    <g transform="translate(150, 60)">
      <rect width="110" height="35" rx="10" fill="#38bdf8" fill-opacity="0.1" stroke="#38bdf8" />
      <text x="55" y="22" font-family="Inter, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#38bdf8">Tailwind CSS</text>
    </g>
    <g transform="translate(20, 110)">
