      :root, [data-theme='gold-luxury'] {
        --font-sans: 'Lora', serif;

        --color-bg-secondary: #FFFBF5;

      [data-theme='dark'] {
        --font-sans: 'Inter', sans-serif;
        --color-bg-primary: #1A1A1A;

        --color-text-primary: #FFFFFF;

    <script>
      (function() {
        try {
          const theme = localStorage.getItem('rophe-specialist-care-rpms-theme') || 'gold-luxury';
          const themeSlug = theme.toLowerCase().replace(/\s+/g, '-');
          document.documentElement.setAttribute('data-theme', themeSlug);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'gold-luxury');
        }
      })();
    </script>

    <script type="module" src="./index.tsx"></script>
  
    <style id="rpms-splash-styles">
      body {
        background: radial-gradient(circle at 50% 50%, #fafafa 0%, #f4f4f5 100%) !important;
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: 'Lora', serif;
        overflow: hidden;
      }
      .rpms-splash {
        text-align: center;
        border: 1px solid rgba(228, 228, 231, 0.8);
        padding: 55px 75px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: 24px;
        box-shadow: 0 10px 30px -10px rgba(9, 9, 11, 0.05);
        position: relative;
      }
      .rpms-splash::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 5px;
        background: linear-gradient(90deg, #2563eb, #3b82f6);
        border-top-left-radius: 24px;
        border-top-right-radius: 24px;
      }
      .rpms-logo {
        color: #18181b;
        font-size: 2.3rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 6px;
        display: block;
      }
      .rpms-logo span {
        color: #2563eb;
      }
      .rpms-status {
        color: #71717a;
        text-transform: uppercase;
        letter-spacing: 0.35em;
        font-size: 0.75rem;
        font-weight: 600;
        opacity: 0.9;
      }
      .rpms-loading {
        margin-top: 25px;
        height: 3px;
        width: 130px;
        background: rgba(37, 99, 235, 0.1);
        margin-left: auto;
        margin-right: auto;
        position: relative;
        overflow: hidden;
        border-radius: 3px;
      }
      .rpms-loading::after {
        content: "";
        position: absolute;
        left: -100%;
        width: 50%;
        height: 100%;
        background: #2563eb;
        border-radius: 3px;
        animation: rpms-load 1.5s infinite ease-in-out;
      }
      @keyframes rpms-load {
        0% { left: -100%; }
        100% { left: 150%; }
      }
    </style>
</head>
  <body>

    <div id="root">
