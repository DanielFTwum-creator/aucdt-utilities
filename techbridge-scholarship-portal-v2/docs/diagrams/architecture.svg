<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #0F0C07; }
      .box { fill: rgba(200,168,75,0.05); stroke: #C8A84B; stroke-width: 2; rx: 8; }
      .text-title { fill: #ffffff; font-family: serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
      .text-sub { fill: #C8A84B; font-family: sans-serif; font-size: 12px; letter-spacing: 2px; text-anchor: middle; }
      .line { stroke: #C8A84B; stroke-width: 2; stroke-dasharray: 4; fill: none; }
      .arrow { fill: #C8A84B; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
    </marker>
  </defs>
  
  <rect width="1000" height="600" class="bg" />
  
  <!-- Presentation Title -->
  <text x="400" y="40" fill="#C8A84B" font-family="serif" font-size="24" font-weight="bold" text-anchor="middle" letter-spacing="4">TECHBRIDGE SCHOLARSHIP PORTAL</text>
  <text x="400" y="60" fill="#ffffff" opacity="0.6" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="2">SYSTEM ARCHITECTURE • REACT 19.2.4</text>

  <!-- Client Layer -->
  <rect x="50" y="100" width="200" height="300" class="box" />
  <text x="150" y="130" class="text-title">Client Layer</text>
  <text x="150" y="150" class="text-sub">REACT 19.2.4 SPA</text>
  
  <rect x="70" y="180" width="160" height="40" fill="rgba(255,255,255,0.1)" rx="4" />
  <text x="150" y="205" fill="#fff" font-family="sans-serif" font-size="12" text-anchor="middle">Form UI &amp; Masking</text>

  <rect x="70" y="240" width="160" height="40" fill="rgba(255,255,255,0.1)" rx="4" />
  <text x="150" y="265" fill="#fff" font-family="sans-serif" font-size="12" text-anchor="middle">html2canvas Engine</text>

  <rect x="70" y="300" width="160" height="40" fill="rgba(255,255,255,0.1)" rx="4" />
  <text x="150" y="325" fill="#fff" font-family="sans-serif" font-size="12" text-anchor="middle">#/admin Diagnostics</text>

  <!-- Integration Layer -->
  <rect x="300" y="100" width="200" height="300" class="box" />
  <text x="400" y="130" class="text-title">Integration Layer</text>
  <text x="400" y="150" class="text-sub">API &amp; SERVICES</text>

  <rect x="320" y="180" width="160" height="40" fill="rgba(200,168,75,0.2)" rx="4" />
  <text x="400" y="205" fill="#C8A84B" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Gemini 3.0 Flash</text>

  <rect x="320" y="240" width="160" height="40" fill="rgba(200,168,75,0.2)" rx="4" />
  <text x="400" y="265" fill="#C8A84B" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Puppeteer E2E Suite</text>

  <rect x="320" y="300" width="160" height="40" fill="rgba(200,168,75,0.2)" rx="4" />
  <text x="400" y="325" fill="#C8A84B" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">LocalStorage Cache</text>

  <!-- Backend Layer -->
  <rect x="550" y="100" width="200" height="300" class="box" />
  <text x="650" y="130" class="text-title">Backend Layer</text>
  <text x="650" y="150" class="text-sub">EXTERNAL APIS</text>

  <rect x="570" y="180" width="160" height="40" fill="#ffffff" rx="4" />
  <text x="650" y="205" fill="#000" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">AUCDT SMTP Relay</text>

  <rect x="570" y="240" width="160" height="40" fill="#ffffff" rx="4" />
  <text x="650" y="265" fill="#000" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Google AI Studio</text>

  <!-- Connections -->
  <path d="M 250 200 L 310 200" class="line" marker-end="url(#arrowhead)" />
  <path d="M 500 200 L 560 200" class="line" marker-end="url(#arrowhead)" />
  
  <path d="M 250 260 L 310 260" class="line" marker-end="url(#arrowhead)" />
  <path d="M 500 260 L 560 260" class="line" marker-end="url(#arrowhead)" />

  <path d="M 250 320 L 310 320" class="line" marker-end="url(#arrowhead)" />
  <path d="M 310 320 L 250 320" class="line" marker-end="url(#arrowhead)" />
</svg>