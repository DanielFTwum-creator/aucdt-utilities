<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <defs>
    <style>
      .bg { fill: #0F0C07; }
      .layer-box { fill: rgba(200,168,75,0.05); stroke: #C8A84B; stroke-width: 2; rx: 12; }
      .component-box { fill: rgba(255,255,255,0.05); stroke: #C8A84B; stroke-width: 1; rx: 6; }
      .text-header { fill: #C8A84B; font-family: serif; font-size: 22px; font-weight: bold; text-anchor: middle; letter-spacing: 2px; }
      .text-label { fill: #ffffff; font-family: sans-serif; font-size: 14px; font-weight: bold; }
      .text-desc { fill: #D4C4A0; font-family: sans-serif; font-size: 11px; font-style: italic; }
      .line { stroke: #C8A84B; stroke-width: 1.5; stroke-dasharray: 4; fill: none; }
      .arrow { fill: #C8A84B; }
      .highlight { fill: #E8C96A; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="600" class="bg" />
  
  <text x="500" y="40" class="text-header">TESTING FRAMEWORK ARCHITECTURE</text>
  <text x="500" y="60" fill="#ffffff" opacity="0.4" font-family="sans-serif" font-size="10" text-anchor="middle">TECHBRIDGE SCHOLARSHIP PORTAL v2.0</text>

  <!-- External E2E Layer (Puppeteer) -->
  <rect x="50" y="100" width="420" height="420" class="layer-box" />
  <text x="260" y="130" class="text-header" style="font-size: 18px;">External E2E (Puppeteer)</text>
  
  <rect x="80" y="160" width="360" height="70" class="component-box" />
  <text x="100" y="185" class="text-label">Critical Path Suite</text>
  <text x="100" y="205" class="text-desc">scholarship_form.test.js - Validates full application flow</text>
  
  <rect x="80" y="250" width="360" height="70" class="component-box" />
  <text x="100" y="275" class="text-label">Visual Catalogue Gen</text>
  <text x="100" y="295" class="text-desc">catalogue_generator.test.js - Multi-step screenshot capture</text>
  
  <rect x="80" y="340" width="360" height="70" class="component-box" />
  <text x="100" y="365" class="text-label">Theme Validation</text>
  <text x="100" y="385" class="text-desc">theme_validation.test.js - Dark/Light/High-Contrast verification</text>

  <rect x="80" y="430" width="360" height="60" class="component-box" style="stroke-dasharray: 2;"/>
  <text x="100" y="455" class="text-label">Output Artifacts</text>
  <text x="100" y="475" class="text-desc">/tests/results/catalogue.html &amp; PNG buffers</text>

  <!-- Internal Simulation Layer (React) -->
  <rect x="530" y="100" width="420" height="420" class="layer-box" />
  <text x="740" y="130" class="text-header" style="font-size: 18px;">Internal Simulation (React)</text>

  <rect x="560" y="160" width="360" height="70" class="component-box" />
  <text x="580" y="185" class="text-label">State Injector Engine</text>
  <text x="580" y="205" class="text-desc">testRunner.ts - Direct React state manipulation (MOCK_DATA)</text>
  
  <rect x="560" y="250" width="360" height="70" class="component-box" />
  <text x="580" y="275" class="text-label">Admin Test Dashboard</text>
  <text x="580" y="295" class="text-desc">TestDashboard.tsx - UI for manual simulation triggers</text>
  
  <rect x="560" y="340" width="360" height="70" class="component-box" />
  <text x="580" y="365" class="text-label">Audit Log Integration</text>
  <text x="580" y="385" class="text-desc">auditLog.ts - Records SIMULATION_STARTED/PASSED events</text>

  <rect x="560" y="430" width="360" height="60" class="component-box" style="stroke-dasharray: 2;"/>
  <text x="580" y="455" class="text-label">Diagnostic Telemetry</text>
  <text x="580" y="475" class="text-desc">In-browser console monitoring &amp; localStorage persistence</text>

  <!-- Connectors -->
  <path d="M 470 310 L 530 310" class="line" marker-end="url(#arrowhead)" />
  <path d="M 530 310 L 470 310" class="line" marker-end="url(#arrowhead)" />
  <text x="500" y="300" fill="#C8A84B" font-size="10" text-anchor="middle">Cross-Verification</text>

  <!-- Footer Info -->
  <text x="50" y="560" fill="#ffffff" opacity="0.3" font-family="sans-serif" font-size="10">REQUIREMENT: React 19.2.4 strictly enforced</text>
  <text x="950" y="560" fill="#ffffff" opacity="0.3" font-family="sans-serif" font-size="10" text-anchor="end">UK British English Compliance</text>
</svg>
