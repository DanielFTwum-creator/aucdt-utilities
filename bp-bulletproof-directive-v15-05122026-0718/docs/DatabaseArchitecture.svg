<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

  <rect width="1000" height="600" fill="#f8fafc" />
  <text x="500" y="40" textAnchor="middle" fontFamily="sans-serif" fontSize="24" fontWeight="bold" fill="#1e293b">TUC Project Refresh - Database Architecture</text>

  <!-- Users Table -->
  <g transform="translate(100, 100)">
    <rect width="250" height="150" rx="5" fill="#ffffff" stroke="#94a3b8" strokeWidth="2" />
    <rect width="250" height="30" rx="5" fill="#e2e8f0" stroke="#94a3b8" strokeWidth="2" />
    <text x="125" y="20" textAnchor="middle" fontFamily="monospace" fontSize="14" fontWeight="bold" fill="#0f172a">users</text>
    
    <text x="10" y="50" fontFamily="monospace" fontSize="12" fill="#1e293b">PK  id (UUID)</text>
    <text x="10" y="70" fontFamily="monospace" fontSize="12" fill="#1e293b">    email (VARCHAR 255)</text>
    <text x="10" y="90" fontFamily="monospace" fontSize="12" fill="#1e293b">    password_hash (VARCHAR 255)</text>
    <text x="10" y="110" fontFamily="monospace" fontSize="12" fill="#1e293b">    role (ENUM 'ADMIN', 'USER')</text>
    <text x="10" y="130" fontFamily="monospace" fontSize="12" fill="#1e293b">    created_at (TIMESTAMP)</text>
  </g>

  <!-- Frameworks Table -->
  <g transform="translate(550, 100)">
    <rect width="250" height="130" rx="5" fill="#ffffff" stroke="#94a3b8" strokeWidth="2" />
    <rect width="250" height="30" rx="5" fill="#e2e8f0" stroke="#94a3b8" strokeWidth="2" />
    <text x="125" y="20" textAnchor="middle" fontFamily="monospace" fontSize="14" fontWeight="bold" fill="#0f172a">frameworks</text>

    <text x="10" y="50" fontFamily="monospace" fontSize="12" fill="#1e293b">PK  id (UUID)</text>
    <text x="10" y="70" fontFamily="monospace" fontSize="12" fill="#1e293b">    name (VARCHAR 100)</text>
    <text x="10" y="90" fontFamily="monospace" fontSize="12" fill="#1e293b">    description (TEXT)</text>
    <text x="10" y="110" fontFamily="monospace" fontSize="12" fill="#1e293b">    version (VARCHAR 50)</text>
  </g>

  <!-- Phases Table -->
  <g transform="translate(550, 300)">
    <rect width="250" height="150" rx="5" fill="#ffffff" stroke="#94a3b8" strokeWidth="2" />
    <rect width="250" height="30" rx="5" fill="#e2e8f0" stroke="#94a3b8" strokeWidth="2" />
    <text x="125" y="20" textAnchor="middle" fontFamily="monospace" fontSize="14" fontWeight="bold" fill="#0f172a">phases</text>

    <text x="10" y="50" fontFamily="monospace" fontSize="12" fill="#1e293b">PK  id (UUID)</text>
    <text x="10" y="70" fontFamily="monospace" fontSize="12" fill="#1e293b">FK  framework_id (UUID)</text>
    <text x="10" y="90" fontFamily="monospace" fontSize="12" fill="#1e293b">    title (VARCHAR 200)</text>
    <text x="10" y="110" fontFamily="monospace" fontSize="12" fill="#1e293b">    status (ENUM 'PENDING', 'COMPLETE')</text>
    <text x="10" y="130" fontFamily="monospace" fontSize="12" fill="#1e293b">    order_index (INT)</text>
  </g>

  <!-- Audit Logs Table -->
  <g transform="translate(100, 300)">
    <rect width="250" height="150" rx="5" fill="#ffffff" stroke="#94a3b8" strokeWidth="2" />
    <rect width="250" height="30" rx="5" fill="#e2e8f0" stroke="#94a3b8" strokeWidth="2" />
    <text x="125" y="20" textAnchor="middle" fontFamily="monospace" fontSize="14" fontWeight="bold" fill="#0f172a">audit_logs</text>

    <text x="10" y="50" fontFamily="monospace" fontSize="12" fill="#1e293b">PK  id (UUID)</text>
    <text x="10" y="70" fontFamily="monospace" fontSize="12" fill="#1e293b">FK  user_id (UUID)</text>
    <text x="10" y="90" fontFamily="monospace" fontSize="12" fill="#1e293b">    action (VARCHAR 100)</text>
    <text x="10" y="110" fontFamily="monospace" fontSize="12" fill="#1e293b">    resource_affected (VARCHAR 255)</text>
    <text x="10" y="130" fontFamily="monospace" fontSize="12" fill="#1e293b">    ip_address (VARCHAR 45)</text>
  </g>

  <!-- Relationships -->
  <!-- frameworks to phases -->
  <path d="M 675 230 L 675 300" fill="none" stroke="#64748b" strokeWidth="2" marker-end="url(#arrow)" />
  <text x="690" y="265" fontFamily="sans-serif" fontSize="12" fill="#475569">1 : N</text>

  <!-- users to audit_logs -->
  <path d="M 225 250 L 225 300" fill="none" stroke="#64748b" strokeWidth="2" marker-end="url(#arrow)" />
  <text x="240" y="280" fontFamily="sans-serif" fontSize="12" fill="#475569">1 : N</text>

</svg>
