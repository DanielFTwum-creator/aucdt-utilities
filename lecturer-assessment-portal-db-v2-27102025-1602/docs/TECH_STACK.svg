<svg width="1000" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
    <style>
        .bg { fill: #F8FAFC; }
        .category-title { font-size: 20px; font-weight: bold; text-anchor: middle; fill: #1E293B; }
        .tech-box { stroke: #CBD5E1; stroke-width: 1.5; rx: 8; ry: 8; filter: url(#dropshadow); }
        .tech-title { font-size: 16px; font-weight: bold; text-anchor: middle; fill: #1E293B; }
        .tech-item { font-size: 14px; text-anchor: middle; fill: #334155; }
        .frontend-fill { fill: #F0F9FF; }
        .frontend-stroke { stroke: #0EA5E9; }
        .backend-fill { fill: #F0FDF4; }
        .backend-stroke { stroke: #10B981; }
        .database-fill { fill: #FFFBEB; }
        .database-stroke { stroke: #F59E0B; }
        .services-fill { fill: #FEF2F2; }
        .services-stroke { stroke: #EF4444; }
        .testing-fill { fill: #F5F3FF; }
        .testing-stroke { stroke: #7C3AED; }
        .deployment-fill { fill: #F1F5F9; }
        .deployment-stroke { stroke: #64748B; }

        @media (prefers-color-scheme: dark) {
            .bg { fill: #020617; }
            .category-title { fill: #E2E8F0; }
            .tech-box { stroke: #334155; }
            .tech-title { fill: #E2E8F0; }
            .tech-item { fill: #94A3B8; }
            .frontend-fill { fill: #0C4A6E; }
            .frontend-stroke { stroke: #38BDF8; }
            .backend-fill { fill: #064E3B; }
            .backend-stroke { stroke: #34D399; }
            .database-fill { fill: #78350F; }
            .database-stroke { stroke: #FBBF24; }
            .services-fill { fill: #881337; }
            .services-stroke { stroke: #F472B6; }
            .testing-fill { fill: #5B21B6; }
            .testing-stroke { stroke: #A78BFA; }
            .deployment-fill { fill: #1E293B; }
            .deployment-stroke { stroke: #64748B; }
        }
    </style>
    <defs>
        <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#00000020"/>
        </filter>
    </defs>
    
    <rect x="0" y="0" width="1000" height="600" class="bg"/>

    <text x="500" y="40" font-size="28" font-weight="bold" text-anchor="middle" class="category-title">
        Lecturer Evaluation Portal - Technology Stack
    </text>

    <!-- Frontend -->
    <g id="frontend">
        <text x="175" y="100" class="category-title">Frontend</text>
        <rect x="50" y="120" width="250" height="150" class="tech-box frontend-fill frontend-stroke" />
        <text x="175" y="150" class="tech-title">React & TypeScript</text>
        <text x="175" y="180" class="tech-item">Modern, type-safe UI</text>
        <text x="175" y="210" class="tech-title">Tailwind CSS</text>
        <text x="175" y="240" class="tech-item">Responsive & Themed Design</text>
    </g>

    <!-- Backend -->
    <g id="backend">
        <text x="500" y="100" class="category-title">Backend</text>
        <rect x="375" y="120" width="250" height="150" class="tech-box backend-fill backend-stroke" />
        <text x="500" y="150" class="tech-title">Java & Spring Boot</text>
        <text x="500" y="180" class="tech-item">Robust Business Logic</text>
        <text x="500" y="210" class="tech-title">Spring Data JPA</text>
        <text x="500" y="240" class="tech-item">Database Interaction</text>
    </g>

    <!-- Database -->
    <g id="database">
        <text x="825" y="100" class="category-title">Database</text>
        <rect x="700" y="120" width="250" height="150" class="tech-box database-fill database-stroke" />
        <text x="825" y="170" class="tech-title">MySQL</text>
        <text x="825" y="200" class="tech-item">Reliable & Relational Storage</text>
    </g>
    
    <!-- Testing -->
    <g id="testing">
        <text x="175" y="320" class="category-title">Testing</text>
        <rect x="50" y="340" width="250" height="150" class="tech-box testing-fill testing-stroke" />
        <text x="175" y="370" class="tech-title">Vitest</text>
        <text x="175" y="400" class="tech-item">Unit & Integration Testing</text>
        <text x="175" y="430" class="tech-title">React Testing Library</text>
        <text x="175" y="460" class="tech-item">User-centric Assertions</text>
    </g>

    <!-- External Services -->
    <g id="services">
        <text x="500" y="320" class="category-title">External Services</text>
        <rect x="375" y="340" width="250" height="150" class="tech-box services-fill services-stroke" />
        <text x="500" y="390" class="tech-title">Google Gemini API</text>
        <text x="500" y="420" class="tech-item">AI-Powered PDF Extraction</text>
    </g>

    <!-- Deployment -->
    <g id="deployment">
        <text x="825" y="320" class="category-title">Deployment</text>
        <rect x="700" y="340" width="250" height="150" class="tech-box deployment-fill deployment-stroke" />
        <text x="825" y="370" class="tech-title">Ubuntu Server</text>
        <text x="825" y="400" class="tech-item">Hosting Environment</text>
        <text x="825" y="430" class="tech-title">Nginx / Vercel</text>
        <text x="825" y="460" class="tech-item">Web Server & Static Hosting</text>
    </g>

</svg>