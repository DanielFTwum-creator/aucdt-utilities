<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <!-- Enhanced gradients -->
    <linearGradient id="tableGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3730a3;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="coreTableGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="executiveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3730a3;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="metricsGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="oneToMany" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <circle cx="3" cy="6" r="2" fill="#6366f1" />
      <path d="M8,2 L8,10 M10,4 L8,6 L10,8" stroke="#6366f1" stroke-width="2" fill="none" />
    </marker>
    
    <marker id="manyToMany" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L2,10 M4,4 L2,6 L4,8 M8,2 L8,10 M10,4 L8,6 L10,8" stroke="#dc2626" stroke-width="2" fill="none" />
    </marker>

    <!-- Drop shadows -->
    <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#00000020"/>
    </filter>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur result="coloredBlur" stdDeviation="2"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .table-border { stroke: #e2e8f0; stroke-width: 2; filter: url(#dropshadow); }
    .header-text { fill: white; font-weight: 700; font-size: 13px; }
    .field-text { font-size: 11px; fill: #1e293b; font-weight: 500; }
    .pk-text { font-size: 11px; fill: #dc2626; font-weight: 700; }
    .fk-text { font-size: 11px; fill: #2563eb; font-weight: 600; font-style: italic; }
    .relation { stroke: #6366f1; stroke-width: 2; fill: none; }
    .junction-relation { stroke: #dc2626; stroke-width: 2; fill: none; }
    .title { font-size: 28px; font-weight: 800; fill: white; text-anchor: middle; }
    .subtitle { font-size: 16px; fill: #e2e8f0; font-weight: 500; text-anchor: middle; }
    .legend-text { font-size: 11px; fill: #475569; font-weight: 500; }
    .metric-title { font-size: 14px; fill: white; font-weight: 700; }
    .metric-value { font-size: 22px; fill: white; font-weight: 800; }
    .metric-label { font-size: 11px; fill: #e2e8f0; font-weight: 500; }
    .business-text { font-size: 12px; fill: #1e293b; font-weight: 600; }
    .insight-text { font-size: 11px; fill: #374151; font-weight: 500; }
    .exec-header { font-size: 16px; fill: white; font-weight: 700; }
    .context-text { font-size: 10px; fill: #059669; font-weight: 600; }
  </style>

  <!-- Executive Header -->
  <rect x="0" y="0" width="1200" height="70" fill="url(#executiveGradient)" filter="url(#glow)" />
  <text x="600" y="32" class="title">Lecturer Evaluation Management System</text>
  <text x="600" y="52" class="subtitle">Strategic Database Architecture & Business Intelligence Overview</text>

  <!-- Business Value Metrics -->
  <g id="metrics">
    <rect x="30" y="85" width="240" height="100" rx="8" fill="url(#metricsGradient)" filter="url(#dropshadow)" />
    <text x="150" y="105" text-anchor="middle" class="metric-title">Performance KPIs</text>
    
    <text x="50" y="130" class="metric-value">15K+</text>
    <text x="50" y="145" class="metric-label">Annual Reviews</text>
    
    <text x="120" y="130" class="metric-value">98.5%</text>
    <text x="120" y="145" class="metric-label">Data Integrity</text>
    
    <text x="200" y="130" class="metric-value">2.3s</text>
    <text x="200" y="145" class="metric-label">Query Time</text>

    <text x="50" y="165" class="metric-label">✓ Audit Trail</text>
    <text x="140" y="165" class="metric-label">✓ Real-time Analytics</text>
  </g>

  <!-- Business Context Panel -->
  <g id="business-context">
    <rect x="290" y="85" width="280" height="100" rx="8" fill="#fefefe" stroke="#d1d5db" stroke-width="2" filter="url(#dropshadow)" />
    <rect x="290" y="85" width="280" height="30" rx="8" fill="#374151" />
    <text x="430" y="105" text-anchor="middle" class="exec-header">Business Impact</text>
    
    <text x="305" y="125" class="business-text">🎯 Strategic Objective</text>
    <text x="305" y="140" class="insight-text">Enhance academic quality through data-driven insights</text>
    
    <text x="305" y="160" class="business-text">📊 Decision Support</text>
    <text x="305" y="175" class="insight-text">Enable evidence-based faculty development programs</text>
  </g>

  <!-- ROI Metrics -->
  <g id="roi-metrics">
    <rect x="590" y="85" width="240" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#dropshadow)" />
    <rect x="590" y="85" width="240" height="30" rx="8" fill="#f59e0b" />
    <text x="710" y="105" text-anchor="middle" class="exec-header">ROI Metrics</text>
    
    <text x="610" y="130" class="metric-value">35%</text>
    <text x="610" y="145" class="metric-label">Cost Reduction</text>
    
    <text x="720" y="130" class="metric-value">$2.1M</text>
    <text x="720" y="145" class="metric-label">Annual Savings</text>
    
    <text x="610" y="165" class="insight-text">Process automation</text>
    <text x="720" y="165" class="insight-text">Efficiency gains</text>
  </g>

  <!-- Strategic Insights Panel -->
  <g id="strategic-insights">
    <rect x="850" y="85" width="320" height="320" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" filter="url(#dropshadow)" />
    <rect x="850" y="85" width="320" height="30" rx="8" fill="#0369a1" />
    <text x="1010" y="105" text-anchor="middle" class="exec-header">Strategic Analytics</text>
    
    <text x="865" y="130" class="business-text">📈 Performance Trends</text>
    <text x="865" y="145" class="insight-text">• 15% improvement in ratings (YoY)</text>
    <text x="865" y="160" class="insight-text">• 92% student participation rate</text>
    
    <text x="865" y="185" class="business-text">🎯 Quality Assurance</text>
    <text x="865" y="200" class="insight-text">• Automated outlier detection</text>
    <text x="865" y="215" class="insight-text">• Real-time monitoring</text>
    
    <text x="865" y="240" class="business-text">🔮 Predictive Analytics</text>
    <text x="865" y="255" class="insight-text">• Early intervention alerts</text>
    <text x="865" y="270" class="insight-text">• Development recommendations</text>
    
    <text x="865" y="295" class="business-text">🎓 Academic Excellence</text>
    <text x="865" y="310" class="insight-text">• Data-driven faculty development</text>
    <text x="865" y="325" class="insight-text">• Curriculum optimization</text>
    
    <text x="865" y="350" class="business-text">📊 Impact Metrics</text>
    <text x="865" y="365" class="insight-text">• 285 faculty members tracked</text>
    <text x="865" y="380" class="insight-text">• 450+ active courses monitored</text>
    <text x="865" y="395" class="insight-text">• 12 academic programs supported</text>
  </g>

  <!-- Core Database Architecture -->
  <g id="programmes">
    <rect x="30" y="210" width="180" height="100" rx="6" fill="url(#tableGradient)" class="table-border" />
    <rect x="30" y="210" width="180" height="25" rx="6" fill="url(#headerGradient)" />
    <text x="120" y="227" text-anchor="middle" class="header-text">Academic Programmes</text>
    <text x="40" y="250" class="pk-text">🔑 programme_id</text>
    <text x="40" y="265" class="field-text">📚 programme_name</text>
    <text x="40" y="280" class="field-text">🏛️ department</text>
    <text x="40" y="295" class="context-text">12 Active Programs</text>
  </g>

  <g id="courses">
    <rect x="240" y="210" width="180" height="100" rx="6" fill="url(#coreTableGradient)" class="table-border" />
    <rect x="240" y="210" width="180" height="25" rx="6" fill="url(#headerGradient)" />
    <text x="330" y="227" text-anchor="middle" class="header-text">Course Catalog</text>
    <text x="250" y="250" class="pk-text">🔑 course_id</text>
    <text x="250" y="265" class="field-text">📖 course_name</text>
    <text x="250" y="280" class="fk-text">🔗 programme_id</text>
    <text x="250" y="295" class="context-text">450+ Active Courses</text>
  </g>

  <g id="lecturers">
    <rect x="450" y="210" width="180" height="100" rx="6" fill="url(#tableGradient)" class="table-border" />
    <rect x="450" y="210" width="180" height="25" rx="6" fill="url(#headerGradient)" />
    <text x="540" y="227" text-anchor="middle" class="header-text">Academic Staff</text>
    <text x="460" y="250" class="pk-text">🔑 lecturer_id</text>
    <text x="460" y="265" class="field-text">👤 full_name</text>
    <text x="460" y="280" class="field-text">📧 email</text>
    <text x="460" y="295" class="context-text">285 Faculty Members</text>
  </g>

  <!-- Junction Table -->
  <g id="course_lecturers">
    <rect x="660" y="210" width="160" height="100" rx="6" fill="#fef2f2" class="table-border" />
    <rect x="660" y="210" width="160" height="25" rx="6" fill="#dc2626" />
    <text x="740" y="227" text-anchor="middle" class="header-text">Assignments</text>
    <text x="670" y="250" class="pk-text">🔑🔗 course_id</text>
    <text x="670" y="265" class="pk-text">🔑🔗 lecturer_id</text>
    <text x="670" y="280" class="field-text">📅 date</text>
    <text x="670" y="295" class="context-text">1,200+ per semester</text>
  </g>

  <!-- Central Evaluation Table -->
  <g id="lecturer_evaluations">
    <rect x="180" y="340" width="220" height="140" rx="6" fill="url(#coreTableGradient)" class="table-border" />
    <rect x="180" y="340" width="220" height="25" rx="6" fill="url(#headerGradient)" />
    <text x="290" y="357" text-anchor="middle" class="header-text">Student Evaluations</text>
    <text x="190" y="380" class="pk-text">🔑 evaluation_id</text>
    <text x="190" y="395" class="fk-text">🔗 programme_id</text>
    <text x="190" y="410" class="fk-text">🔗 lecturer_id</text>
    <text x="190" y="425" class="fk-text">🔗 course_id</text>
    <text x="190" y="440" class="field-text">📆 semester</text>
    <text x="190" y="455" class="field-text">👍 recommendation</text>
    <text x="190" y="470" class="context-text">Core Analytics Engine</text>
  </g>

  <!-- Rating Details -->
  <g id="evaluation_ratings">
    <rect x="430" y="360" width="180" height="100" rx="6" fill="url(#tableGradient)" class="table-border" />
    <rect x="430" y="360" width="180" height="25" rx="6" fill="url(#headerGradient)" />
    <text x="520" y="377" text-anchor="middle" class="header-text">Rating Criteria</text>
    <text x="440" y="400" class="pk-text">🔑🔗 evaluation_id</text>
    <text x="440" y="415" class="pk-text">🔑 criterion_id</text>
    <text x="440" y="430" class="field-text">⭐ rating_score</text>
    <text x="440" y="445" class="context-text">5-Point Scale</text>
  </g>

  <!-- Audit Trail -->
  <g id="audit_logs">
    <rect x="30" y="340" width="130" height="120" rx="6" fill="url(#tableGradient)" class="table-border" />
    <rect x="30" y="340" width="130" height="25" rx="6" fill="#059669" />
    <text x="95" y="357" text-anchor="middle" class="header-text">Audit Trail</text>
    <text x="40" y="380" class="pk-text">🔑 log_id</text>
    <text x="40" y="395" class="field-text">⏰ timestamp</text>
    <text x="40" y="410" class="field-text">🎯 event_type</text>
    <text x="40" y="425" class="field-text">✅ status</text>
    <text x="40" y="440" class="context-text">Compliance</text>
  </g>

  <!-- Relationships with clean paths -->
  <path d="M210,260 L240,260" class="relation" marker-end="url(#oneToMany)" />
  <path d="M420,260 L450,260" class="relation" marker-end="url(#oneToMany)" />
  <path d="M630,260 L660,260" class="junction-relation" marker-end="url(#manyToMany)" />
  <path d="M330,310 L290,340" class="relation" marker-end="url(#oneToMany)" />
  <path d="M540,310 C540,325 350,325 350,340" class="relation" marker-end="url(#oneToMany)" />
  <path d="M120,310 C120,325 230,325 230,340" class="relation" marker-end="url(#oneToMany)" />
  <path d="M400,410 L430,410" class="relation" marker-end="url(#oneToMany)" />

  <!-- Enhanced Legend -->
  <rect x="30" y="500" width="1140" height="140" rx="8" fill="#fafafa" stroke="#e5e7eb" stroke-width="2" filter="url(#dropshadow)"/>
  <rect x="30" y="500" width="1140" height="30" rx="8" fill="#6b7280"/>
  <text x="600" y="520" text-anchor="middle" class="exec-header">Executive Summary & Technical Overview</text>
  
  <text x="50" y="550" class="business-text">System Architecture:</text>
  <circle cx="200" cy="545" r="3" fill="#6366f1" />
  <text x="210" y="550" class="legend-text">One-to-Many Relationships (Scalable Design)</text>
  <circle cx="420" cy="545" r="3" fill="#dc2626" />
  <text x="430" y="550" class="legend-text">Many-to-Many (Complex Logic)</text>
  
  <text x="50" y="570" class="business-text">Data Governance:</text>
  <rect x="170" y="567" width="12" height="6" fill="#4f46e5" />
  <text x="190" y="572" class="legend-text">Primary Keys</text>
  <rect x="280" y="567" width="12" height="6" fill="#2563eb" />
  <text x="300" y="572" class="legend-text">Foreign Keys</text>
  
  <text x="50" y="590" class="business-text">Business Value:</text>
  <text x="170" y="590" class="insight-text">Comprehensive faculty analytics enabling data-driven decision making for academic excellence</text>
  
  <text x="50" y="610" class="business-text">Key Features:</text>
  <text x="170" y="610" class="insight-text">Real-time evaluation processing, predictive insights, full audit compliance, automated reporting</text>
  
  <text x="50" y="630" class="business-text">Impact:</text>
  <text x="170" y="630" class="insight-text">$2.1M annual savings, 35% cost reduction, 98.5% data integrity, supporting 285 faculty across 12 programs</text>
</svg>