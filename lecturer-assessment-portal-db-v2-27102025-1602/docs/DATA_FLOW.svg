<svg width="1000" height="700" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
    <style>
        .bg { fill: #F1F5F9; }
        .box { stroke: #94A3B8; stroke-width: 1.5; rx: 8; ry: 8; filter: url(#dropshadow); }
        .student-box { fill: #F0F9FF; stroke: #0EA5E9; }
        .admin-box { fill: #FEF3C7; stroke: #F59E0B; }
        .api-box { fill: #EEF2FF; stroke: #4F46E5; }
        .db-box { fill: #F0FDF4; stroke: #10B981; }
        .external-box { fill: #FDF2F8; stroke: #DB2777; }
        .title-text { font-size: 20px; font-weight: bold; text-anchor: middle; fill: #1E293B; }
        .box-title { font-size: 14px; font-weight: bold; fill: #334155; }
        .box-text { font-size: 12px; fill: #475569; }
        .arrow { stroke: #64748B; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
        .arrow-label { font-size: 11px; font-style: italic; fill: #475569; text-anchor: middle; }

        @media (prefers-color-scheme: dark) {
            .bg { fill: #0F172A; }
            .box { stroke: #475569; }
            .student-box { fill: #0C4A6E; stroke: #38BDF8; }
            .admin-box { fill: #78350F; stroke: #FBBF24; }
            .api-box { fill: #3730A3; stroke: #818CF8; }
            .db-box { fill: #064E3B; stroke: #34D399; }
            .external-box { fill: #831843; stroke: #F472B6; }
            .title-text { fill: #E2E8F0; }
            .box-title { fill: #CBD5E1; }
            .box-text { fill: #94A3B8; }
            .arrow { stroke: #64748B; marker-end: url(#arrowhead-dark); }
            .arrow-label { fill: #94A3B8; }
        }
    </style>
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748B" />
        </marker>
        <marker id="arrowhead-dark" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748B" />
        </marker>
        <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#00000020"/>
        </filter>
    </defs>

    <rect x="0" y="0" width="1000" height="700" class="bg" />

    <!-- Flow 1: Student Evaluation -->
    <text x="250" y="40" class="title-text">Flow 1: Student Evaluation Submission</text>
    <rect x="0" y="60" width="500" height="2" fill="#94A3B8" opacity="0.5"/>
    
    <!-- Student -->
    <g transform="translate(50, 80)">
        <rect width="120" height="80" class="box student-box" />
        <text x="60" y="20" text-anchor="middle" class="box-title">1. Student</text>
        <text x="10" y="40" class="box-text">Fills React Form</text>
        <text x="10" y="55" class="box-text">Clicks "Submit"</text>
    </g>
    
    <!-- API -->
    <g transform="translate(250, 150)">
        <rect width="200" height="90" class="box api-box" />
        <text x="100" y="20" text-anchor="middle" class="box-title">2. Spring Boot API</text>
        <text x="10" y="40" class="box-text">Receives POST /evaluations</text>
        <text x="10" y="55" class="box-text">Validates DTO</text>
        <text x="10" y="70" class="box-text">Orchestrates services</text>
    </g>

    <!-- Database -->
    <g transform="translate(150, 300)">
        <rect width="180" height="110" class="box db-box" />
        <text x="90" y="20" text-anchor="middle" class="box-title">3. MySQL Database</text>
        <text x="10" y="40" class="box-text">INSERT INTO Evaluations</text>
        <text x="10" y="55" class="box-text">INSERT INTO Ratings</text>
        <text x="10" y="70" class="box-text">INSERT INTO Audit_Logs</text>
        <text x="10" y="85" class="box-text">(Transactional)</text>
    </g>
    
    <!-- External Email -->
    <g transform="translate(50, 480)">
        <rect width="180" height="80" class="box external-box" />
        <text x="90" y="20" text-anchor="middle" class="box-title">4. External Email API</text>
        <text x="10" y="40" class="box-text">Receives request</text>
        <text x="10" y="55" class="box-text">Sends email notification</text>
    </g>
    
    <!-- Student Success -->
    <g transform="translate(280, 550)">
        <rect width="180" height="80" class="box student-box" />
        <text x="90" y="20" text-anchor="middle" class="box-title">5. Student</text>
        <text x="10" y="40" class="box-text">Receives 201 Created</text>
        <text x="10" y="55" class="box-text">Sees success message</text>
    </g>

    <!-- Arrows for Flow 1 -->
    <path d="M170,120 L 245,165" class="arrow"/>
    <text x="230" y="135" class="arrow-label">POST Request</text>
    <path d="M290,240 L 250,295" class="arrow"/>
    <text x="290" y="270" class="arrow-label">Save Data</text>
    <path d="M250,240 L 150,295" class="arrow"/>
    <text x="170" y="270" class="arrow-label">Send Email Req</text>
    <path d="M140,410 L 140,475" class="arrow" />
    <path d="M370,240 L 370,545" class="arrow" />


    <!-- Flow 2: Admin Curriculum Update -->
    <text x="750" y="40" class="title-text">Flow 2: Admin Curriculum Update</text>
    <rect x="500" y="60" width="500" height="2" fill="#94A3B8" opacity="0.5"/>
    
    <!-- Admin -->
    <g transform="translate(550, 80)">
        <rect width="120" height="80" class="box admin-box" />
        <text x="60" y="20" text-anchor="middle" class="box-title">1. Admin</text>
        <text x="10" y="40" class="box-text">Uploads PDF file</text>
        <text x="10" y="55" class="box-text">Confirms action</text>
    </g>
    
    <!-- API -->
    <g transform="translate(750, 150)">
        <rect width="200" height="90" class="box api-box" />
        <text x="100" y="20" text-anchor="middle" class="box-title">2. Spring Boot API</text>
        <text x="10" y="40" class="box-text">Receives POST /upload</text>
        <text x="10" y="55" class="box-text">(multipart/form-data)</text>
        <text x="10" y="70" class="box-text">Calls GeminiService</text>
    </g>
    
    <!-- Gemini API -->
    <g transform="translate(550, 300)">
        <rect width="180" height="80" class="box external-box" />
        <text x="90" y="20" text-anchor="middle" class="box-title">3. Google Gemini API</text>
        <text x="10" y="40" class="box-text">Processes PDF</text>
        <text x="10" y="55" class="box-text">Returns structured JSON</text>
    </g>
    
    <!-- Database -->
    <g transform="translate(750, 400)">
        <rect width="200" height="110" class="box db-box" />
        <text x="100" y="20" text-anchor="middle" class="box-title">4. MySQL Database</text>
        <text x="10" y="40" class="box-text">DELETE old curriculum</text>
        <text x="10" y="55" class="box-text">INSERT new curriculum</text>
        <text x="10" y="70" class="box-text">INSERT INTO Audit_Logs</text>
        <text x="10" y="85" class="box-text">(Transactional)</text>
    </g>
    
    <!-- Admin Success -->
    <g transform="translate(550, 550)">
        <rect width="180" height="80" class="box admin-box" />
        <text x="90" y="20" text-anchor="middle" class="box-title">5. Admin</text>
        <text x="10" y="40" class="box-text">Receives 200 OK</text>
        <text x="10" y="55" class="box-text">Sees success message</text>
    </g>

    <!-- Arrows for Flow 2 -->
    <path d="M670,120 L 745,165" class="arrow"/>
    <text x="730" y="135" class="arrow-label">POST Request</text>
    <path d="M790,240 L 700,295" class="arrow" />
    <text x="720" y="270" class="arrow-label">Call External API</text>
    <path d="M730,340 L 780,395" class="arrow" />
    <text x="770" y="370" class="arrow-label">Parse JSON & Save</text>
    <path d="M850,240 L 850,395" class="arrow"/>
    <path d="M850,510 L 850,590" class="arrow"/>
    <text x="890" y="550" class="arrow-label">Return to UI</text>
    <path d="M730,590 L 670,590" class="arrow" />


</svg>