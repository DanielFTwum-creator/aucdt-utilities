<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
    <style>
        .tier-bg { fill: #F1F5F9; }
        .box { stroke: #64748B; stroke-width: 2; fill: #FFFFFF; filter: url(#dropshadow); }
        .db-box { stroke: #059669; stroke-width: 2; fill: #F0FDF4; }
        .api-box { stroke: #4F46E5; stroke-width: 2; fill: #EEF2FF; }
        .client-box { stroke: #0EA5E9; stroke-width: 2; fill: #F0F9FF; }
        .text { fill: #1E293B; font-size: 14px; text-anchor: middle; }
        .title { font-weight: bold; font-size: 16px; }
        .tier-title { font-weight: 800; font-size: 18px; fill: #475569; text-anchor: middle; }
        .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
        .label { font-size: 11px; fill: #475569; text-anchor: middle; }

        @media (prefers-color-scheme: dark) {
            .tier-bg { fill: #1E293B; }
            .box { stroke: #94A3B8; fill: #334155; }
            .db-box, .api-box, .client-box { border-width: 2px; }
            .db-box { stroke: #34D399; fill: #064E3B; }
            .api-box { stroke: #818CF8; fill: #3730A3; }
            .client-box { stroke: #38BDF8; fill: #0C4A6E; }
            .text { fill: #E2E8F0; }
            .tier-title { fill: #94A3B8; }
            .arrow { stroke: #94A3B8; marker-end: url(#arrowhead-dark); }
            .label { fill: #94A3B8; }
        }
    </style>
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
        </marker>
        <marker id="arrowhead-dark" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8" />
        </marker>
        <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#00000020"/>
        </filter>
    </defs>

    <!-- Backgrounds and Titles for Tiers -->
    <rect x="0" y="0" width="800" height="500" class="tier-bg" />
    <text x="140" y="40" class="tier-title">Client Tier (Browser)</text>
    <text x="400" y="40" class="tier-title">Application Tier (Ubuntu Server)</text>
    <text x="660" y="40" class="tier-title">Data Tier (Ubuntu Server)</text>

    <!-- User -->
    <text x="50" y="240" font-size="48">🧑‍💻</text>
    <text x="50" y="280" class="text" text-anchor="middle" font-weight="bold">User</text>

    <!-- Client Tier -->
    <g id="client-tier">
        <rect x="180" y="150" width="160" height="180" rx="8" class="client-box box" />
        <text x="260" y="180" class="text title">React SPA</text>
        <line x1="190" y1="195" x2="330" y2="195" stroke="#94A3B8" stroke-width="1"/>
        <text x="260" y="220" class="text" font-size="12">Assessment Form</text>
        <text x="260" y="240" class="text" font-size="12">Admin Dashboard</text>
        <text x="260" y="260" class="text" font-size="12">Analytics UI</text>
    </g>

    <!-- Application Tier -->
    <g id="app-tier">
        <rect x="360" y="100" width="160" height="280" rx="8" class="api-box box" />
        <text x="440" y="130" class="text title">Java Spring Boot</text>
        <text x="440" y="148" class="text title">API</text>
        <line x1="370" y1="165" x2="510" y2="165" stroke="#94A3B8" stroke-width="1"/>
        <text x="440" y="190" class="text" font-size="12">REST Controllers</text>
        <text x="440" y="210" class="text" font-size="12">Business Logic</text>
        <text x="440" y="230" class="text" font-size="12">Data Services</text>
        <text x="440" y="250" class="text" font-size="12">Security</text>
        <text x="440" y="280" class="text" font-size="11" font-style="italic">Communicates with</text>
        <text x="440" y="295" class="text" font-size="11" font-style="italic">External APIs</text>
        <text x="440" y="310" class="text" font-size="11" font-style="italic">(Gemini, Email)</text>
    </g>

    <!-- Data Tier -->
    <g id="data-tier">
        <rect x="620" y="180" width="120" height="120" rx="8" class="db-box box" />
        <text x="680" y="210" class="text title">MySQL DB</text>
        <text x="680" y="228" class="text title">(LEMS)</text>
        <text x="680" y="255" font-size="36">🗃️</text>
    </g>

    <!-- Arrows and Labels -->
    <path d="M100,240 H 175" class="arrow" />
    <text x="138" y="230" class="label">HTTP/S</text>

    <path d="M345,240 H 355" class="arrow" />
    <text x="380" y="230" class="label">REST API Call</text>
    <text x="380" y="245" class="label">(JSON)</text>

    <path d="M525,240 H 615" class="arrow" />
    <text x="570" y="230" class="label">JDBC</text>
    <text x="570" y="245" class="label">(SQL Queries)</text>
</svg>