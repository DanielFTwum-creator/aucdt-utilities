<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#666" />
        </marker>
        <marker id="biarrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 5 L 10 0 L 10 10 z" fill="#666" />
        </marker>
        <marker id="biarrow_start" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 10 5 L 0 0 L 0 10 z" fill="#666" />
        </marker>
    </defs>

    <style>
        .box { fill: #f9f9f9; stroke: #333; stroke-width: 1.5; rx: 8; }
        .state-box { fill: #cde4ff; stroke: #6a8ebf; stroke-width: 2; }
        .storage-box { fill: #dae8fc; stroke: #6c8ebf; stroke-width: 2; }
        .api-box { fill: #fff2cc; stroke: #d6b656; stroke-width: 2; }
        .text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; text-anchor: middle; }
        .title { font-size: 16px; font-weight: bold; }
        .line { stroke: #666; stroke-width: 1.5; marker-end: url(#arrow); }
        .bi-line { stroke: #666; stroke-width: 1.5; marker-end: url(#arrow); marker-start: url(#biarrow_start); }
        .group-box { fill: none; stroke: #999; stroke-width: 1; stroke-dasharray: 4 4; rx: 12; }
        .group-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #555; text-anchor: middle; }
    </style>
    
    <!-- Groups -->
    <rect x="20" y="20" width="220" height="410" class="group-box" />
    <text x="130" y="40" class="group-text">User Interaction</text>

    <rect x="280" y="20" width="240" height="410" class="group-box" />
    <text x="400" y="40" class="group-text">State Management (In-Memory)</text>
    
    <rect x="560" y="20" width="220" height="200" class="group-box" />
    <text x="670" y="40" class="group-text">Browser Storage</text>
    
    <rect x="560" y="230" width="220" height="200" class="group-box" />
    <text x="670" y="250" class="group-text">External API & Rendering</text>

    <!-- UI Components -->
    <rect x="50" y="180" width="160" height="80" class="box" />
    <text x="130" y="210" class="text title">UI Components</text>
    <text x="130" y="230" class="text">(e.g., Buttons, Inputs)</text>

    <!-- App State -->
    <rect x="310" y="180" width="180" height="80" class="state-box" />
    <text x="400" y="215" class="text title">App.tsx State</text>
    <text x="400" y="235" class="text">(React Hooks)</text>
    <line x1="210" y1="220" x2="310" y2="220" class="bi-line" />
    <text x="260" y="215" class="text" font-size="12px">Events</text>
    <text x="260" y="235" class="text" font-size="12px">Props</text>
    
    <!-- localStorage -->
    <rect x="590" y="70" width="160" height="60" class="storage-box" />
    <text x="670" y="100" class="text title">localStorage</text>
    <line x1="490" y1="200" x2="590" y2="100" class="bi-line" />
    <text x="530" y="135" class="text" font-size="12px">Persist/Hydrate</text>

    <rect x="590" y="150" width="160" height="50" class="box" />
    <text x="670" y="170" class="text">Theme Preference</text>
    <text x="670" y="190" class="text">Audit Logs</text>
    <line x1="670" y1="130" x2="670" y2="150" class="line" />

    <!-- Gemini API -->
    <rect x="590" y="280" width="160" height="60" class="api-box" />
    <text x="670" y="310" class="text title">Gemini API</text>
    <line x1="490" y1="240" x2="590" y2="310" class="bi-line" />
    <text x="530" y="280" class="text" font-size="12px">HTTPS Call /</text>
    <text x="530" y="295" class="text" font-size="12px">SVG Path Response</text>

    <!-- Canvas Rendering -->
    <rect x="590" y="360" width="160" height="60" class="box" />
    <text x="670" y="390" class="text title">Canvas Rendering</text>
    <line x1="400" y1="260" x2="400" y2="390" class="line" />
    <path d="M 400 390 L 590 390" stroke="#666" fill="none" class="line" />
    <text x="495" y="380" class="text" font-size="12px">Read State</text>
</svg>