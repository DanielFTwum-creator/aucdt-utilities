<svg width="900" height="700" xmlns="http://www.w3.org/2000/svg">
    <!-- Define markers for arrowheads -->
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#666" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626" />
        </marker>
    </defs>

    <!-- Styles -->
    <style>
        .box { fill: #f9f9f9; stroke: #333; stroke-width: 1.5; rx: 8; }
        .main-box { fill: #cde4ff; stroke: #6a8ebf; stroke-width: 2; }
        .component-box { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
        .hook-box { fill: #fef3c7; stroke: #f59e0b; stroke-width: 1.5; }
        .util-box { fill: #ddd6fe; stroke: #7c3aed; stroke-width: 1.5; }
        .api-box { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
        .text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; text-anchor: middle; }
        .title { font-size: 15px; font-weight: bold; }
        .small { font-size: 11px; }
        .line { stroke: #666; stroke-width: 1.5; marker-end: url(#arrow); }
        .line-api { stroke: #dc2626; stroke-width: 2; marker-end: url(#arrow-red); stroke-dasharray: 4 4; }
        .group-box { fill: none; stroke: #999; stroke-width: 1; stroke-dasharray: 4 4; rx: 12; }
        .group-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #555; text-anchor: middle; }
    </style>

    <!-- Title -->
    <text x="450" y="20" class="text" style="font-size: 20px; font-weight: bold;">ClipAI Architecture (Actual Implementation)</text>

    <!-- Entry Point -->
    <rect x="375" y="45" width="150" height="35" class="box" />
    <text x="450" y="67" class="text">index.tsx</text>

    <!-- App.tsx -->
    <rect x="350" y="105" width="200" height="45" class="main-box" />
    <text x="450" y="132" class="text title">App.tsx (Orchestrator)</text>
    <line x1="450" y1="80" x2="450" y2="105" class="line" />

    <!-- Custom Hooks Group -->
    <rect x="20" y="175" width="860" height="130" class="group-box" />
    <text x="450" y="195" class="group-text">Custom Hooks (src/hooks/)</text>

    <rect x="60" y="215" width="130" height="35" class="hook-box" />
    <text x="125" y="237" class="text small">useImageLoader</text>
    <line x1="400" y1="150" x2="125" y2="215" class="line" />

    <rect x="230" y="215" width="150" height="35" class="hook-box" />
    <text x="305" y="237" class="text small">useCanvasTransforms</text>
    <line x1="430" y1="150" x2="305" y2="215" class="line" />
    
    <rect x="420" y="215" width="130" height="35" class="hook-box" />
    <text x="485" y="237" class="text small">useCustomShape</text>
    <line x1="460" y1="150" x2="485" y2="215" class="line" />

    <rect x="590" y="215" width="160" height="35" class="hook-box" />
    <text x="670" y="237" class="text small">useKeyboardShortcuts</text>
    <line x1="490" y1="150" x2="670" y2="215" class="line" />
    
    <rect x="180" y="260" width="120" height="35" class="hook-box" />
    <text x="240" y="282" class="text small">useAppNavigation</text>

    <rect x="520" y="260" width="120" height="35" class="hook-box" />
    <text x="580" y="282" class="text small">useTheme</text>


    <!-- UI Components passed props from hooks via App.tsx -->
     <text x="450" y="325" class="group-text">↓ Props &amp; Handlers passed down to UI Components ↓</text>
     <rect x="20" y="340" width="860" height="80" class="group-box" />
     <text x="450" y="360" class="group-text">UI Components (src/components/)</text>
     <text x="450" y="385" class="text small">ImageUploadSection, ShapeSelector, CustomShapeControls, Preview, etc.</text>


    <!-- External API -->
    <rect x="325" y="475" width="250" height="70" class="api-box" />
    <text x="450" y="505" class="text title">Google Gemini AI API</text>
    <text x="450" y="525" class="text small">Shape Generation Service</text>
    
    <line x1="485" y1="250" x2="450" y2="475" class="line-api" />
    <text x="450" y="400" class="text small" fill="#dc2626">Client-side HTTPS Call</text>

    <!-- Legend -->
    <rect x="650" y="475" width="220" height="100" class="group-box" />
    <text x="760" y="495" class="group-text">Legend</text>
    
    <rect x="670" y="510" width="60" height="20" class="main-box" style="stroke-width: 1;" />
    <text x="740" y="523" class="text small" text-anchor="start">Main Orchestrator</text>
    
    <rect x="670" y="535" width="60" height="20" class="hook-box" style="stroke-width: 1;" />
    <text x="740" y="548" class="text small" text-anchor="start">Hooks (Logic)</text>
    
    <rect x="670" y="560" width="60" height="20" class="component-box" style="stroke-width: 1; fill: #fff;" />
    <text x="740" y="573" class="text small" text-anchor="start">Components (UI)</text>

    <!-- Security Note -->
    <text x="450" y="600" class="text small" fill="#059669" font-weight="bold">✓ Security: API Key is not in the code.</text>
    <text x="450" y="617" class="text small" fill="#059669">It is loaded from process.env.API_KEY by the build environment.</text>
</svg>