<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .box { fill: #1e293b; stroke: #475569; stroke-width: 2; rx: 12; ry: 12; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
      .box-user { fill: #7c3aed; stroke: #a78bfa; }
      .box-gemini { fill: #2563eb; stroke: #60a5fa; }
      .box-ui { fill: #059669; stroke: #34d399; }
      .box-state { fill: #dc2626; stroke: #f87171; }
      .box-data { fill: #d97706; stroke: #fbbf24; }
      .text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 15px; fill: #f1f5f9; text-anchor: middle; dominant-baseline: middle; font-weight: 500; }
      .text-title { font-size: 28px; font-weight: 700; fill: #ffffff; letter-spacing: -0.5px; }
      .text-label { font-size: 13px; fill: #cbd5e1; font-weight: 600; }
      .arrow-line { stroke: #64748b; stroke-width: 2.5; }
      .arrow-line-highlight { stroke: #60a5fa; stroke-width: 2.5; }
      .arrow-head { fill: #64748b; }
      .arrow-head-highlight { fill: #60a5fa; }
      .icon-text { font-size: 24px; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head" />
    </marker>
    <marker id="arrow-highlight" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head-highlight" />
    </marker>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGradient)" />

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.3"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Title -->
  <text x="400" y="45" class="text text-title">myVBCI App Architecture</text>
  <text x="400" y="75" class="text-label">Data Flow & Component Interaction</text>

  <!-- User Box -->
  <g>
    <rect x="80" y="250" width="140" height="100" class="box box-user" />
    <text x="150" y="285" class="icon-text">👤</text>
    <text x="150" y="315" class="text" font-size="16" font-weight="600">User</text>
  </g>

  <!-- React UI Components -->
  <g>
    <rect x="290" y="250" width="180" height="100" class="box box-ui" />
    <text x="380" y="285" class="icon-text">⚛️</text>
    <text x="380" y="315" class="text" font-size="16" font-weight="600">React UI</text>
    <text x="380" y="335" class="text text-label">Components</text>
  </g>

  <!-- React Context (State) -->
  <g>
    <rect x="540" y="140" width="180" height="100" class="box box-state" />
    <text x="630" y="175" class="icon-text">🔄</text>
    <text x="630" y="205" class="text" font-size="16" font-weight="600">React Context</text>
    <text x="630" y="225" class="text text-label">State Management</text>
  </g>

  <!-- Mock Data Store -->
  <g>
    <rect x="540" y="360" width="180" height="100" class="box box-data" />
    <text x="630" y="395" class="icon-text">💾</text>
    <text x="630" y="425" class="text" font-size="16" font-weight="600">Data Store</text>
    <text x="630" y="445" class="text text-label">Mock Data Layer</text>
  </g>

  <!-- Gemini Service -->
  <g>
    <rect x="290" y="450" width="180" height="100" class="box box-gemini" />
    <text x="380" y="485" class="icon-text">🤖</text>
    <text x="380" y="515" class="text" font-size="16" font-weight="600">Gemini Service</text>
    <text x="380" y="535" class="text text-label">AI Integration</text>
  </g>

  <!-- Gemini API -->
  <g>
    <rect x="40" y="450" width="180" height="100" class="box box-gemini" />
    <text x="130" y="485" class="icon-text">🌐</text>
    <text x="130" y="515" class="text" font-size="16" font-weight="600">Gemini API</text>
    <text x="130" y="535" class="text text-label">External Service</text>
  </g>

  <!-- Arrows -->
  
  <!-- User to UI -->
  <path d="M 220 300 L 290 300" class="arrow-line" marker-end="url(#arrow)" />
  <text x="255" y="285" class="text-label">Interact</text>

  <!-- UI to State (read) -->
  <path d="M 470 270 Q 510 250 540 210" class="arrow-line-highlight" marker-end="url(#arrow-highlight)" fill="none" />
  <text x="510" y="235" class="text-label">Read</text>

  <!-- State to UI (update) -->
  <path d="M 540 180 Q 500 180 470 240" class="arrow-line-highlight" marker-end="url(#arrow-highlight)" fill="none" />
  <text x="495" y="165" class="text-label">Update</text>

  <!-- UI to Data Store (dispatch) -->
  <path d="M 470 320 Q 510 350 540 390" class="arrow-line" marker-end="url(#arrow)" fill="none" />
  <text x="515" y="355" class="text-label">Dispatch</text>

  <!-- Data Store to State (update) -->
  <path d="M 630 360 V 240" class="arrow-line" marker-end="url(#arrow)" />
  <text x="655" y="300" class="text-label">Update State</text>

  <!-- UI to Gemini Service -->
  <path d="M 380 350 V 450" class="arrow-line" marker-end="url(#arrow)" />
  <text x="410" y="400" class="text-label">Query</text>

  <!-- Gemini Service to UI -->
  <path d="M 360 450 V 350" class="arrow-line" marker-end="url(#arrow)" />
  <text x="335" y="400" class="text-label">Response</text>

  <!-- Gemini Service to API -->
  <path d="M 290 500 H 220" class="arrow-line-highlight" marker-end="url(#arrow-highlight)" />
  <text x="255" y="485" class="text-label">Call API</text>

  <!-- API to Gemini Service -->
  <path d="M 220 520 H 290" class="arrow-line-highlight" marker-end="url(#arrow-highlight)" />
  <text x="255" y="545" class="text-label">Results</text>

  <!-- Legend -->
  <g transform="translate(580, 520)">
    <rect x="0" y="0" width="200" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5" opacity="0.9"/>
    <text x="10" y="20" class="text-label" text-anchor="start">Legend:</text>
    <line x1="10" y1="35" x2="50" y2="35" stroke="#64748b" stroke-width="2.5"/>
    <text x="55" y="37" class="text-label" text-anchor="start" font-size="11">Data Flow</text>
    <line x1="110" y1="35" x2="150" y2="35" stroke="#60a5fa" stroke-width="2.5"/>
    <text x="155" y="37" class="text-label" text-anchor="start" font-size="11">Key Path</text>
  </g>

</svg>