<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1A1209"/>
  <text x="400" y="40" font-family="Arial" font-size="24" fill="#C9A84C" text-anchor="middle" font-weight="bold">DATABASE & DATA FLOW</text>

  <!-- User Action -->
  <circle cx="100" cy="200" r="40" stroke="#C9A84C" stroke-width="2" fill="#2A1E14"/>
  <text x="100" y="205" font-family="Arial" font-size="12" fill="#F5F0E8" text-anchor="middle">USER ACTION</text>

  <!-- GameContext -->
  <path d="M140 200 H240" stroke="#C9A84C" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="240" y="160" width="120" height="80" rx="5" stroke="#C9A84C" stroke-width="2" fill="#2A1E14"/>
  <text x="300" y="205" font-family="Arial" font-size="12" fill="#F5F0E8" text-anchor="middle">CONTEXT STATE</text>

  <!-- Firestore Collections -->
  <path d="M360 200 H460" stroke="#C9A84C" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="460" y="80" width="140" height="240" rx="5" stroke="#C9A84C" stroke-width="2" fill="#2A1E14"/>
  <text x="530" y="110" font-family="Arial" font-size="14" fill="#C9A84C" text-anchor="middle" font-weight="bold">FIRESTORE</text>
  <text x="530" y="140" font-family="Arial" font-size="12" fill="#F5F0E8" text-anchor="middle">/leaderboard</text>
  <text x="530" y="170" font-family="Arial" font-size="12" fill="#F5F0E8" text-anchor="middle">/challenges</text>
  <text x="530" y="200" font-family="Arial" font-size="12" fill="#F5F0E8" text-anchor="middle">/daily_scores</text>
  <text x="530" y="230" font-family="Arial" font-size="12" fill="#F5F0E8" text-anchor="middle">/admin_logs</text>
  <text x="530" y="260" font-family="Arial" font-size="12" fill="#F5F0E8" text-anchor="middle">/users</text>

  <!-- Admin View -->
  <path d="M600 230 H700" stroke="#C9A84C" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="700" y="200" width="80" height="60" rx="5" stroke="#C9A84C" stroke-width="2" fill="#2A1E14"/>
  <text x="740" y="235" font-family="Arial" font-size="12" fill="#F5F0E8" text-anchor="middle">ADMIN</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C9A84C" />
    </marker>
  </defs>
</svg>
