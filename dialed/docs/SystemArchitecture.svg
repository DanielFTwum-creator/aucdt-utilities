<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1A1209"/>
  <text x="400" y="40" font-family="Arial" font-size="24" fill="#C9A84C" text-anchor="middle" font-weight="bold">DIALED SYSTEM ARCHITECTURE</text>
  
  <!-- Client Tier -->
  <rect x="50" y="100" width="200" height="200" rx="10" stroke="#C9A84C" stroke-width="2" fill="#2A1E14"/>
  <text x="150" y="130" font-family="Arial" font-size="16" fill="#F5F0E8" text-anchor="middle">CLIENT TIER</text>
  <text x="150" y="160" font-family="Arial" font-size="14" fill="#8A8A8A" text-anchor="middle">React 19.2.4</text>
  <text x="150" y="185" font-family="Arial" font-size="14" fill="#8A8A8A" text-anchor="middle">Tailwind CSS</text>
  <text x="150" y="210" font-family="Arial" font-size="14" fill="#8A8A8A" text-anchor="middle">Motion (Animations)</text>
  <text x="150" y="235" font-family="Arial" font-size="14" fill="#8A8A8A" text-anchor="middle">GameContext State</text>

  <!-- Logic Tier -->
  <path d="M250 200 H350" stroke="#C9A84C" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Backend Tier -->
  <rect x="350" y="100" width="200" height="200" rx="10" stroke="#C9A84C" stroke-width="2" fill="#2A1E14"/>
  <text x="450" y="130" font-family="Arial" font-size="16" fill="#F5F0E8" text-anchor="middle">BACKEND TIER</text>
  <text x="450" y="160" font-family="Arial" font-size="14" fill="#8A8A8A" text-anchor="middle">Firebase Auth</text>
  <text x="450" y="185" font-family="Arial" font-size="14" fill="#8A8A8A" text-anchor="middle">Cloud Firestore</text>
  <text x="450" y="210" font-family="Arial" font-size="14" fill="#8A8A8A" text-anchor="middle">Security Rules</text>
  <text x="450" y="235" font-family="Arial" font-size="14" fill="#8A8A8A" text-anchor="middle">Audit Logging</text>

  <!-- AI Tier -->
  <path d="M550 200 H650" stroke="#C9A84C" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="650" y="150" width="100" height="100" rx="10" stroke="#C9A84C" stroke-width="2" fill="#2A1E14"/>
  <text x="700" y="180" font-family="Arial" font-size="16" fill="#F5F0E8" text-anchor="middle">AI TIER</text>
  <text x="700" y="210" font-family="Arial" font-size="14" fill="#8A8A8A" text-anchor="middle">Gemini 1.5</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C9A84C" />
    </marker>
  </defs>
</svg>
