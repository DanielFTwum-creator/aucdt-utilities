    <!-- Theme Persistence & Auto-Apply -->
    <script>
      (function() {
        const theme = localStorage.getItem('luxthumb-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const effectiveTheme = theme || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', effectiveTheme);
      })();
    </script>

    <!-- Main Styles -->
    <style>
      :root {
        --color-background-main: #050505;
        --color-background-secondary: #0A0A0A;
        --color-background-tertiary: #0F0F0F;
        --color-background-quaternary: #111111;
        --color-foreground: #F5F5F5;
        --color-foreground-secondary: #C9C9C9;
        --color-foreground-muted: #999999;
        --color-primary: #C9A84C;
        --color-primary-hover: #D4B96A;
        --color-primary-active: #B89836;
        --color-accent: #1A1A1A;
        --color-accent-subtle: #2A2A2A;
        --color-border: #2A2A2A;
        --color-border-subtle: #1A1A1A;
        --color-success: #22C55E;
        --color-error: #EF4444;
        --color-warning: #F59E0B;
        --color-info: #3B82F6;
        --transition-fast: 0.15s ease;
        --transition-normal: 0.3s ease;
        --transition-slow: 0.5s ease;
      }

      [data-theme='dark'] {
        --color-background-main: #050505;
        --color-background-secondary: #0A0A0A;
        --color-background-tertiary: #0F0F0F;
        --color-background-quaternary: #111111;
        --color-foreground: #F5F5F5;
        --color-foreground-secondary: #C9C9C9;
        --color-foreground-muted: #999999;
        --color-primary: #C9A84C;
        --color-primary-hover: #D4B96A;
        --color-primary-active: #B89836;
        --color-accent: #1A1A1A;
        --color-accent-subtle: #2A2A2A;
        --color-border: #2A2A2A;
        --color-border-subtle: #1A1A1A;
      }

      [data-theme='light'] {
        --color-background-main: #FFFFFF;
        --color-background-secondary: #F5F5F5;
        --color-background-tertiary: #EEEEEE;
        --color-background-quaternary: #E5E5E5;
        --color-foreground: #050505;
        --color-foreground-secondary: #333333;
        --color-foreground-muted: #666666;
        --color-primary: #C9A84C;
        --color-primary-hover: #D4B96A;
        --color-primary-active: #B89836;
        --color-accent: #E5E5E5;
        --color-accent-subtle: #CCCCCC;
        --color-border: #CCCCCC;
        --color-border-subtle: #E5E5E5;
      }

      [data-theme='high-contrast'] {
        --color-background-main: #000000;
        --color-background-secondary: #1A1A1A;
        --color-background-tertiary: #333333;
        --color-background-quaternary: #4D4D4D;
        --color-foreground: #FFFFFF;
        --color-foreground-secondary: #E5E5E5;
        --color-foreground-muted: #CCCCCC;
        --color-primary: #FFFF00;
        --color-primary-hover: #FFFFCC;
        --color-primary-active: #CCCC00;
        --color-accent: #FFFFFF;
        --color-accent-subtle: #E5E5E5;
        --color-border: #FFFFFF;
        --color-border-subtle: #CCCCCC;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: var(--color-background-main);
        color: var(--color-foreground);
        transition: background-color var(--transition-normal), color var(--transition-normal);
        overflow: hidden;
      }

      #root {
        width: 100%;
        height: 100vh;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes slideIn {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .animate-fade-in {
        animation: fadeIn var(--transition-normal) ease;
      }

      .animate-slide-in {
        animation: slideIn var(--transition-normal) ease;
      }

      .font-playfair {
        font-family: 'Playfair Display', ui-serif, Georgia, serif;
      }

      .font-outfit {
        font-family: 'Outfit', sans-serif;
      }

      .font-space-grotesk {
        font-family: 'Space Grotesk', monospace;
      }

      /* Scrollbar Styling */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: var(--color-background-secondary);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--color-accent-subtle);
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-foreground-muted);
      }

      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }

      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      #luxthumb-splash-styles {
        body {
          background: radial-gradient(circle at 50% 50%, #fafafa 0%, #f4f4f5 100%) !important;
          margin: 0;
          padding: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          font-family: 'Inter', sans-serif;
          overflow: hidden;
        }
        .luxthumb-splash {
          text-align: center;
          border: 1px solid rgba(228, 228, 231, 0.8);
          padding: 55px 75px;
          background: rgba(255, 255, 255, 0.9);
          backdrop-filter: blur(10px);
          -webkit-backdrop-filter: blur(10px);
          border-radius: 24px;
          box-shadow: 0 10px 30px -10px rgba(9, 9, 11, 0.05);
          position: relative;
        }
        .luxthumb-splash::before {
          content: "";
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 5px;
          background: linear-gradient(90deg, #2563eb, #3b82f6);
          border-top-left-radius: 24px;
          border-top-right-radius: 24px;
        }
        .luxthumb-logo {
          color: #18181b;
          font-size: 2.3rem;
          font-weight: 800;
          letter-spacing: -0.02em;
          margin-bottom: 6px;
          display: block;
        }
        .luxthumb-logo span {
          color: #2563eb;
        }
        .luxthumb-status {
          color: #71717a;
          text-transform: uppercase;
          letter-spacing: 0.35em;
          font-size: 0.75rem;
          font-weight: 600;
          opacity: 0.9;
        }
        .luxthumb-loading {
          margin-top: 25px;
          height: 3px;
          width: 130px;
          background: rgba(37, 99, 235, 0.1);
          margin-left: auto;
          margin-right: auto;
          position: relative;
          overflow: hidden;
          border-radius: 3px;
        }
        .luxthumb-loading::after {
          content: "";
          position: absolute;
          left: -100%;
          width: 50%;
          height: 100%;
          background: #2563eb;
          border-radius: 3px;
          animation: luxthumb-load 1.5s infinite ease-in-out;
        }
        @keyframes luxthumb-load {
          0% { left: -100%; }
          100% { left: 150%; }
        }
      }
    </style>
