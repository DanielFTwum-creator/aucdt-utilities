version: '3.8'

services:
  luxthumb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luxthumb-agent
    ports:
      - "3001:80"
    environment:
      - NODE_ENV=production
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: reverse proxy (uncomment if behind another proxy)
  # proxy:
  #   image: nginx:alpine
  #   container_name: luxthumb-proxy
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./proxy.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - luxthumb
  #   restart: unless-stopped
