<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- SEO Meta Tags -->
    <meta name="description" content="Official DaaRo Water distribution portal for managing bulk water orders, local distribution networks, and logistics. Natural mineral water from Begoro mountain aquifers." />
    <meta name="keywords" content="Daaro Water, DaaRo Water, water distributor, Stephanie's Daaro Water, water delivery Accra, Begoro spring water, bulk water order Ghana" />
    <meta name="author" content="DAA and Sons Ltd" />
    <meta name="publisher" content="Techbridge University College" />
    <meta name="robots" content="index, follow" />
    <!-- Geographic Coordinates for Accra/Begoro -->
    <meta name="language" content="English" />
    <meta name="geo.region" content="GH-AA" />
    <meta name="geo.placename" content="Accra" />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Stephanie's DaaRo Water - Distributor Portal" />
    <meta property="og:description" content="Natural mineral water from Begoro, delivered fresh. Order sachets, bottles, and dispenser jars directly on WhatsApp." />
    <meta property="og:locale" content="en_GB" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stephanie's DaaRo Water | Distributor Portal</title>

    <!-- Google Fonts: Nunito for base design & Plus Jakarta Sans for dashboards -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <style>
      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
      #root {
        min-height: 100vh;
      }
      .skip-to-main {
        position: absolute;
        left: -9999px;
        top: auto;
        width: 1px;
        height: 1px;
        overflow: hidden;
        z-index: 9999;
      }
      .skip-to-main:focus {
        left: 8px;
        width: auto;
        height: auto;
      }
    </style>

    <script type="module" src="./src/main.tsx"></script>
  
    <style id="daaro-splash-styles">
      body { 
        background: linear-gradient(135deg, #f0f7fc 0%, #ddeef8 100%) !important; 
        margin: 0; 
        padding: 0; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        min-height: 100vh; 
        font-family: 'Nunito', sans-serif; 
        overflow: hidden; 
      }
      .daaro-splash { 
        text-align: center; 
        border: 1px solid rgba(30, 136, 229, 0.2); 
        padding: 50px 80px; 
        background: rgba(255, 255, 255, 0.85); 
        backdrop-filter: blur(10px);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(10, 61, 92, 0.08);
        position: relative; 
      }
      .daaro-splash::before { 
        content: ""; 
        position: absolute; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 6px; 
        background: linear-gradient(90deg, #3b82f6, #10b981); 
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
      }
      .daaro-logo { 
        color: #1e3a8a; 
        font-size: 2.8rem; 
        font-weight: 800; 
        letter-spacing: 0.05em; 
        margin-bottom: 5px; 
        display: block; 
      }
      .daaro-logo span {
        color: #3b82f6;
      }
      .daaro-status { 
        color: #475569; 
        text-transform: uppercase; 
        letter-spacing: 0.3em; 
        font-size: 0.75rem; 
        font-weight: 700;
        opacity: 0.8; 
      }
      .daaro-loading { 
        margin-top: 25px; 
        height: 3px; 
        width: 120px; 
        background: rgba(59, 130, 246, 0.15); 
        margin-left: auto; 
        margin-right: auto; 
        position: relative; 
        overflow: hidden; 
        border-radius: 3px;
      }
      .daaro-loading::after { 
        content: ""; 
        position: absolute; 
        left: -100%; 
        width: 50%; 
        height: 100%; 
        background: #3b82f6; 
        animation: daaro-load 1.6s infinite ease-in-out; 
      }
      @keyframes daaro-load { 
        to { left: 150%; } 
      }
    </style>
</head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <a href="#main-content" class="skip-to-main">Skip to main content</a>
    
    <div id="root">
      <div class="daaro-splash">
        <span class="daaro-logo">DaaRo <span>Water</span></span>
        <div class="daaro-status">distributor portal</div>
        <div class="daaro-loading"></div>
      </div>
    </div>
  </body>
</html>
