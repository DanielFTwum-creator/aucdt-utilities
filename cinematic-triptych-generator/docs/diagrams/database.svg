<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .db { fill: #FBF8F1; stroke: #C8A84B; stroke-width: 2; rx: 8; }
      .text-title { fill: #0c0a09; font-family: serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
      .text-field { fill: #333333; font-family: monospace; font-size: 11px; }
      .line { stroke: #C8A84B; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C8A84B" />
    </marker>
  </defs>

  <rect width="1000" height="600" class="bg" />

  <text x="400" y="40" fill="#0c0a09" font-family="serif" font-size="24" font-weight="bold" text-anchor="middle" letter-spacing="2">CREATIVE DATA FLOW</text>
  <text x="400" y="60" fill="#666" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="2">CINEMATIC TRIPTYCH v3.0.0</text>

  <!-- Input State -->
  <rect x="50" y="100" width="220" height="350" class="db" />
  <rect x="50" y="100" width="220" height="40" fill="#C8A84B" rx="8" />
  <rect x="50" y="120" width="220" height="20" fill="#C8A84B" />
  <text x="160" y="125" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">CreativeState (Live)</text>
  
  <text x="70" y="170" class="text-field" font-weight="bold">variations:</text>
  <text x="90" y="190" class="text-field">lighting: string</text>
  <text x="90" y="210" class="text-field">palette: string</text>
  <text x="90" y="230" class="text-field">lens: string</text>
  
  <text x="70" y="270" class="text-field" font-weight="bold">prompts:</text>
  <text x="90" y="290" class="text-field">panel_1: wide_shot</text>
  <text x="90" y="310" class="text-field">panel_2: extreme_cu</text>
  <text x="90" y="330" class="text-field">panel_3: atmospheric</text>

  <!-- AI Synthesis -->
  <rect x="350" y="220" width="100" height="40" fill="#0c0a09" rx="20" />
  <text x="400" y="245" fill="#fff" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="1">SYNTHESIZE</text>

  <!-- Output Assets -->
  <rect x="530" y="120" width="240" height="310" class="db" />
  <rect x="530" y="120" width="240" height="40" fill="#0c0a09" rx="8" />
  <rect x="530" y="140" width="240" height="20" fill="#0c0a09" />
  <text x="650" y="145" fill="#C8A84B" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Storyboarding Assets</text>

  <text x="550" y="190" class="text-field" font-weight="bold">images:</text>
  <text x="570" y="210" class="text-field">image_1.png (base64)</text>
  <text x="570" y="230" class="text-field">image_2.png (base64)</text>
  <text x="570" y="250" class="text-field">image_3.png (base64)</text>
  
  <text x="550" y="290" class="text-field" font-weight="bold">archives:</text>
  <text x="570" y="310" class="text-field">triptych.zip (JSZip)</text>

  <text x="550" y="350" class="text-field" font-weight="bold">auditLogs:</text>
  <text x="570" y="370" class="text-field">- LocalStorage Persistence</text>

  <!-- Connectors -->
  <path d="M 270 240 L 340 240" class="line" marker-end="url(#arrowhead)" />
  <path d="M 450 240 L 520 240" class="line" marker-end="url(#arrowhead)" />

</svg>