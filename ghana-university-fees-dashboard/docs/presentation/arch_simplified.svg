<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <style>
      .block { fill: #2563eb; stroke: none; rx: 10; }
      .text { fill: #ffffff; font-family: sans-serif; font-weight: bold; font-size: 24px; text-anchor: middle; }
      .conn { stroke: #cbd5e1; stroke-width: 4; }
    </style>
  </defs>
  <rect width="800" height="600" fill="#1e293b" />
  
  <text x="400" y="60" fill="#fff" font-family="sans-serif" font-size="32px" text-anchor="middle" font-weight="bold">System Overview</text>

  <!-- Center Hub: React App -->
  <circle cx="400" cy="300" r="100" fill="#3b82f6" />
  <text x="400" y="310" class="text">React App</text>

  <!-- Connecting Lines -->
  <line x1="400" y1="200" x2="400" y2="150" class="conn" />
  <line x1="300" y1="300" x2="200" y2="300" class="conn" />
  <line x1="500" y1="300" x2="600" y2="300" class="conn" />

  <!-- Nodes -->
  <rect x="300" y="80" width="200" height="70" class="block" fill="#10b981" />
  <text x="400" y="125" class="text">Browser / Client</text>

  <rect x="50" y="265" width="200" height="70" class="block" fill="#f59e0b" />
  <text x="150" y="310" class="text">Admin Context</text>

  <rect x="550" y="265" width="200" height="70" class="block" fill="#8b5cf6" />
  <text x="650" y="310" class="text">Data Visualization</text>

  <text x="400" y="550" fill="#94a3b8" font-family="sans-serif" font-size="18px" text-anchor="middle">EduData Ghana - High Level View</text>
</svg>