<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .actor { fill: #1f2937; }
      .usecase { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 50; ry: 25; }
      .system { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 5,5; }
      .label { font-family: 'Segoe UI', sans-serif; text-anchor: middle; font-size: 14px; }
      .line { stroke: #4b5563; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="800" height="500" fill="#ffffff" />
  <text x="400" y="30" class="label" font-size="18px" font-weight="bold">UML Use Case Diagram</text>

  <!-- System Boundary -->
  <rect x="200" y="50" width="400" height="420" class="system" />
  <text x="400" y="70" class="label" font-weight="bold">EduData System</text>

  <!-- Actor: Public User -->
  <g transform="translate(80, 200)">
    <circle cx="20" cy="20" r="20" class="actor" fill="none" stroke="#000" stroke-width="2"/>
    <line x1="20" y1="40" x2="20" y2="80" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="50" x2="40" y2="50" stroke="#000" stroke-width="2"/>
    <line x1="20" y1="80" x2="0" y2="110" stroke="#000" stroke-width="2"/>
    <line x1="20" y1="80" x2="40" y2="110" stroke="#000" stroke-width="2"/>
    <text x="20" y="130" class="label">Public User</text>
  </g>

  <!-- Actor: Admin -->
  <g transform="translate(680, 200)">
    <circle cx="20" cy="20" r="20" class="actor" fill="none" stroke="#000" stroke-width="2"/>
    <line x1="20" y1="40" x2="20" y2="80" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="50" x2="40" y2="50" stroke="#000" stroke-width="2"/>
    <line x1="20" y1="80" x2="0" y2="110" stroke="#000" stroke-width="2"/>
    <line x1="20" y1="80" x2="40" y2="110" stroke="#000" stroke-width="2"/>
    <text x="20" y="130" class="label">Administrator</text>
  </g>

  <!-- Use Cases -->
  <g transform="translate(0,0)">
    <ellipse cx="400" cy="120" rx="90" ry="30" class="usecase" />
    <text x="400" y="125" class="label">View Charts</text>
    
    <ellipse cx="400" cy="200" rx="90" ry="30" class="usecase" />
    <text x="400" y="205" class="label">Filter Data</text>

    <ellipse cx="400" cy="280" rx="90" ry="30" class="usecase" />
    <text x="400" y="285" class="label">Log In (Secure)</text>

    <ellipse cx="400" cy="360" rx="90" ry="30" class="usecase" />
    <text x="400" y="365" class="label">Update Fees</text>

    <ellipse cx="400" cy="440" rx="90" ry="30" class="usecase" />
    <text x="400" y="445" class="label">Run Self-Test</text>
  </g>

  <!-- Connections -->
  <!-- Public User -->
  <line x1="120" y1="200" x2="310" y2="120" class="line" />
  <line x1="120" y1="200" x2="310" y2="200" class="line" />

  <!-- Admin -->
  <line x1="680" y1="200" x2="490" y2="120" class="line" /> <!-- Admin can also view -->
  <line x1="680" y1="200" x2="490" y2="280" class="line" />
  <line x1="680" y1="200" x2="490" y2="360" class="line" />
  <line x1="680" y1="200" x2="490" y2="440" class="line" />

</svg>