<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background-color:#0F0C07; font-family:'DM Sans', sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C8A84B" />
    </marker>
  </defs>

  <text x="400" y="60" fill="#C8A84B" font-family="'Playfair Display', serif" font-size="28" font-weight="bold" text-anchor="middle" letter-spacing="3">DATA FLOW DIAGRAM</text>
  <text x="400" y="85" fill="#F5E6B8" font-family="'Cormorant Garamond', serif" font-size="18" font-style="italic" text-anchor="middle">Ajumapro Student Management System</text>
  
  <!-- User Node -->
  <circle cx="150" cy="300" r="60" fill="rgba(200,168,75,0.05)" stroke="#C8A84B" stroke-width="2"/>
  <text x="150" y="305" fill="#F2EBD9" font-size="16" font-weight="bold" text-anchor="middle">USER</text>

  <!-- API Gateway Node -->
  <rect x="300" y="250" width="200" height="100" fill="rgba(200,168,75,0.05)" stroke="#E8C96A" stroke-width="2" rx="8"/>
  <text x="400" y="295" fill="#F2EBD9" font-size="16" font-weight="bold" text-anchor="middle">API GATEWAY</text>
  <text x="400" y="320" fill="#F5E6B8" font-size="12" text-anchor="middle">Auth &amp; Validation</text>

  <!-- Flow: User to API -->
  <path d="M210 300 L290 300" stroke="#C8A84B" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="250" y="290" fill="#C8A84B" font-size="12" text-anchor="middle">Requests</text>

  <!-- Audit DB Node -->
  <rect x="600" y="150" width="150" height="80" fill="rgba(200,168,75,0.05)" stroke="#C8A84B" stroke-width="2" rx="8"/>
  <text x="675" y="195" fill="#F2EBD9" font-size="14" font-weight="bold" text-anchor="middle">AUDIT DB</text>
  <text x="675" y="215" fill="#F5E6B8" font-size="11" text-anchor="middle">Immutable Logs</text>

  <!-- Main DB Node -->
  <rect x="600" y="370" width="150" height="80" fill="rgba(200,168,75,0.05)" stroke="#C8A84B" stroke-width="2" rx="8"/>
  <text x="675" y="415" fill="#F2EBD9" font-size="14" font-weight="bold" text-anchor="middle">MAIN DB</text>
  <text x="675" y="435" fill="#F5E6B8" font-size="11" text-anchor="middle">PostgreSQL</text>

  <!-- Flow: API to Audit -->
  <path d="M480 250 L590 190" stroke="#C8A84B" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="520" y="210" fill="#C8A84B" font-size="12" text-anchor="middle" transform="rotate(-30 520 210)">Log Events</text>

  <!-- Flow: API to Main DB -->
  <path d="M480 350 L590 410" stroke="#C8A84B" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="520" y="395" fill="#C8A84B" font-size="12" text-anchor="middle" transform="rotate(30 520 395)">CRUD Ops</text>

</svg>
