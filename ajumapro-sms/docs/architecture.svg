<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background-color:#0F0C07; font-family:'DM Sans', sans-serif;">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C96A" />
      <stop offset="100%" stop-color="#C8A84B" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C8A84B" />
    </marker>
  </defs>
  
  <text x="400" y="60" fill="#C8A84B" font-family="'Playfair Display', serif" font-size="28" font-weight="bold" text-anchor="middle" letter-spacing="3">SYSTEM ARCHITECTURE</text>
  <text x="400" y="85" fill="#F5E6B8" font-family="'Cormorant Garamond', serif" font-size="18" font-style="italic" text-anchor="middle">Ajumapro Student Management System</text>
  
  <!-- Client Tier -->
  <rect x="100" y="140" width="600" height="100" fill="rgba(200,168,75,0.05)" stroke="#C8A84B" stroke-width="2" rx="8"/>
  <text x="400" y="185" fill="#F2EBD9" font-size="18" font-weight="bold" text-anchor="middle" letter-spacing="1">PRESENTATION TIER</text>
  <text x="400" y="210" fill="#F5E6B8" font-size="14" text-anchor="middle">React 19.2.4 / Vite / Tailwind CSS / Motion</text>
  
  <path d="M400 240 L400 290" stroke="#C8A84B" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="415" y="270" fill="#C8A84B" font-size="12">HTTPS / REST</text>
  
  <!-- App Tier -->
  <rect x="100" y="290" width="600" height="100" fill="rgba(200,168,75,0.05)" stroke="#C8A84B" stroke-width="2" rx="8"/>
  <text x="400" y="335" fill="#F2EBD9" font-size="18" font-weight="bold" text-anchor="middle" letter-spacing="1">APPLICATION TIER</text>
  <text x="400" y="360" fill="#F5E6B8" font-size="14" text-anchor="middle">Django / Node.js / Business Logic / RBAC</text>

  <path d="M400 390 L400 440" stroke="#C8A84B" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="415" y="420" fill="#C8A84B" font-size="12">TCP / IP</text>

  <!-- Data Tier -->
  <rect x="100" y="440" width="600" height="100" fill="rgba(200,168,75,0.05)" stroke="#C8A84B" stroke-width="2" rx="8"/>
  <text x="400" y="485" fill="#F2EBD9" font-size="18" font-weight="bold" text-anchor="middle" letter-spacing="1">DATA TIER</text>
  <text x="400" y="510" fill="#F5E6B8" font-size="14" text-anchor="middle">PostgreSQL / Redis / Audit Logs</text>
</svg>
