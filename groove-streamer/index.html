    <style id="groove-splash-styles">
      body.loading {
        background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%) !important;
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: 'Space Mono', monospace;
        overflow: hidden;
      }
      .groove-splash {
        text-align: center;
        border: 1px solid rgba(100, 116, 139, 0.3);
        padding: 60px 80px;
        background: rgba(30, 30, 30, 0.95);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        position: relative;
      }
      .groove-splash::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: linear-gradient(90deg, #06b6d4, #8b5cf6);
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
      }
      .groove-logo {
        color: #f0f9ff;
        font-size: 2.6rem;
        font-weight: 900;
        letter-spacing: -0.03em;
        margin-bottom: 8px;
        display: block;
        font-family: 'Playfair Display', serif;
      }
      .groove-logo span {
        color: #06b6d4;
      }
      .groove-status {
        color: #cbd5e1;
        text-transform: uppercase;
        letter-spacing: 0.4em;
        font-size: 0.75rem;
        font-weight: 600;
        opacity: 0.8;
      }
      .groove-loading {
        margin-top: 30px;
        height: 2px;
        width: 160px;
        background: rgba(6, 182, 212, 0.1);
        margin-left: auto;
        margin-right: auto;
        position: relative;
        overflow: hidden;
        border-radius: 2px;
      }
      .groove-loading::after {
        content: "";
        position: absolute;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(90deg, #06b6d4, #8b5cf6);
        animation: groove-load 1.8s infinite cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes groove-load {
        0% { left: -100%; }
        100% { left: 150%; }
      }
    </style>
    <script>
      document.body.classList.add('loading');
      document.addEventListener('DOMContentLoaded', () => {
        document.body.classList.remove('loading');
      });
      window.addEventListener('load', () => {
        document.body.classList.remove('loading');
      });
    </script>
  </head>
  <body>
    <div id="root">
      <div class="groove-splash">
        <span class="groove-logo">Groove <span>Streamer</span></span>
        <div class="groove-status">AI Groove Generator</div>
        <div class="groove-loading"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
