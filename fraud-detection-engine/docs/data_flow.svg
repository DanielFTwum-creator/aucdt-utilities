<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <style>
      .bg { fill: #0F0C07; }
      .text-title { font-family: 'Playfair Display', serif; font-size: 24px; fill: #C8A84B; font-weight: bold; }
      .text-body { font-family: 'Inter', sans-serif; font-size: 14px; fill: #F2EBD9; }
      .table-box { fill: #141210; stroke: #C8A84B; stroke-width: 2; rx: 8; ry: 8; }
      .field { font-family: 'Inter', sans-serif; font-size: 12px; fill: #9CA3AF; }
      .pk { fill: #C8A84B; font-weight: bold; }
      .fk { fill: #60A5FA; }
      .line { stroke: #4B5563; stroke-width: 2; marker-end: url(#arrow); stroke-dasharray: 4; }
      .line-solid { stroke: #C8A84B; stroke-width: 2; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C8A84B" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />

  <!-- Title -->
  <text x="400" y="50" class="text-title" text-anchor="middle">Database Schema &amp; Data Flow</text>

  <!-- Entities Table -->
  <rect x="50" y="100" width="220" height="150" class="table-box" />
  <rect x="50" y="100" width="220" height="30" fill="#C8A84B" fill-opacity="0.1" stroke="#C8A84B" stroke-width="2" rx="8" />
  <text x="160" y="120" class="text-body" text-anchor="middle" font-weight="bold">entities</text>
  <text x="65" y="150" class="field pk">id (PK, TEXT)</text>
  <text x="65" y="170" class="field">name (TEXT)</text>
  <text x="65" y="190" class="field">status (TEXT)</text>
  <text x="65" y="210" class="field">data (TEXT)</text>
  <text x="65" y="230" class="field">created_at (TIMESTAMP)</text>

  <!-- Metrics Table -->
  <rect x="350" y="100" width="220" height="130" class="table-box" />
  <rect x="350" y="100" width="220" height="30" fill="#C8A84B" fill-opacity="0.1" stroke="#C8A84B" stroke-width="2" rx="8" />
  <text x="460" y="120" class="text-body" text-anchor="middle" font-weight="bold">metrics</text>
  <text x="365" y="150" class="field pk">id (PK, INTEGER)</text>
  <text x="365" y="170" class="field fk">entity_id (FK, TEXT)</text>
  <text x="365" y="190" class="field">timestamp (TIMESTAMP)</text>
  <text x="365" y="210" class="field">value (REAL)</text>

  <!-- Health Scores Table -->
  <rect x="350" y="270" width="220" height="130" class="table-box" />
  <rect x="350" y="270" width="220" height="30" fill="#C8A84B" fill-opacity="0.1" stroke="#C8A84B" stroke-width="2" rx="8" />
  <text x="460" y="290" class="text-body" text-anchor="middle" font-weight="bold">health_scores</text>
  <text x="365" y="320" class="field pk">id (PK, INTEGER)</text>
  <text x="365" y="340" class="field fk">entity_id (FK, TEXT)</text>
  <text x="365" y="360" class="field">timestamp (TIMESTAMP)</text>
  <text x="365" y="380" class="field">score (REAL)</text>

  <!-- Audit Logs Table -->
  <rect x="50" y="320" width="220" height="170" class="table-box" />
  <rect x="50" y="320" width="220" height="30" fill="#C8A84B" fill-opacity="0.1" stroke="#C8A84B" stroke-width="2" rx="8" />
  <text x="160" y="340" class="text-body" text-anchor="middle" font-weight="bold">audit_logs</text>
  <text x="65" y="370" class="field pk">id (PK, INTEGER)</text>
  <text x="65" y="390" class="field">timestamp (TIMESTAMP)</text>
  <text x="65" y="410" class="field">user (TEXT)</text>
  <text x="65" y="430" class="field">action (TEXT)</text>
  <text x="65" y="450" class="field">severity (TEXT)</text>
  <text x="65" y="470" class="field">ip_address (TEXT)</text>

  <!-- Relations -->
  <!-- entities to metrics -->
  <path d="M 270 150 L 350 150" class="line-solid" />
  <text x="310" y="140" class="field" style="fill: #C8A84B;">1:N</text>

  <!-- entities to health_scores -->
  <path d="M 200 250 L 350 310" class="line-solid" />
  <text x="280" y="270" class="field" style="fill: #C8A84B;">1:N</text>
</svg>
