<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
      .box-db { fill: #fef08a; stroke: #eab308; stroke-width: 2; rx: 8; }
      .text-title { font-family: sans-serif; font-size: 24px; font-weight: bold; fill: #0f172a; }
      .text-label { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #334155; }
      .text-desc { font-family: sans-serif; font-size: 12px; fill: #64748b; }
      .line { stroke: #94a3b8; stroke-width: 2; fill: none; }
      .arrow { fill: #94a3b8; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" class="text-title">Database Architecture Diagram</text>

  <!-- Explanation -->
  <text x="400" y="80" text-anchor="middle" class="text-desc">The application uses browser-based storage (Local Storage & Session Storage) instead of a traditional backend database.</text>

  <!-- Local Storage -->
  <rect x="150" y="120" width="500" height="200" class="box-db" />
  <text x="400" y="150" text-anchor="middle" class="text-label">Local Storage (Persistent)</text>
  <text x="400" y="170" text-anchor="middle" class="text-desc">Stores long-term application state</text>

  <!-- Local Storage Tables -->
  <rect x="180" y="200" width="200" height="100" class="box" />
  <text x="280" y="225" text-anchor="middle" class="text-label">Key: 'app-theme'</text>
  <text x="280" y="245" text-anchor="middle" class="text-desc">Value: String</text>
  <text x="280" y="265" text-anchor="middle" class="text-desc">('light', 'dark', 'high-contrast')</text>

  <rect x="420" y="200" width="200" height="100" class="box" />
  <text x="520" y="225" text-anchor="middle" class="text-label">Key: 'audit-logs'</text>
  <text x="520" y="245" text-anchor="middle" class="text-desc">Value: JSON Array</text>
  <text x="520" y="265" text-anchor="middle" class="text-desc">[{ timestamp, action }]</text>

  <!-- Session Storage -->
  <rect x="150" y="360" width="500" height="180" class="box-db" />
  <text x="400" y="390" text-anchor="middle" class="text-label">Session Storage (Temporary)</text>
  <text x="400" y="410" text-anchor="middle" class="text-desc">Stores state for the current browser session</text>

  <!-- Session Storage Tables -->
  <rect x="300" y="440" width="200" height="80" class="box" />
  <text x="400" y="465" text-anchor="middle" class="text-label">Key: 'admin-auth'</text>
  <text x="400" y="485" text-anchor="middle" class="text-desc">Value: String ('true')</text>
  <text x="400" y="505" text-anchor="middle" class="text-desc">Controls admin access</text>

</svg>
