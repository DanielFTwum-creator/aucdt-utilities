<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
      .box-highlight { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 8; }
      .box-server { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; rx: 8; }
      .text-title { font-family: sans-serif; font-size: 24px; font-weight: bold; fill: #0f172a; }
      .text-label { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #334155; }
      .text-desc { font-family: sans-serif; font-size: 12px; fill: #64748b; }
      .line { stroke: #94a3b8; stroke-width: 2; fill: none; }
      .arrow { fill: #94a3b8; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" class="text-title">System Architecture Diagram</text>

  <!-- Client Side -->
  <rect x="50" y="100" width="300" height="450" class="box-highlight" />
  <text x="200" y="130" text-anchor="middle" class="text-label">Client (Browser)</text>
  <text x="200" y="150" text-anchor="middle" class="text-desc">React 19.2.4 SPA</text>

  <!-- Components -->
  <rect x="70" y="180" width="260" height="60" class="box" />
  <text x="200" y="205" text-anchor="middle" class="text-label">Timer Component</text>
  <text x="200" y="225" text-anchor="middle" class="text-desc">Displays countdown UI</text>

  <rect x="70" y="260" width="260" height="60" class="box" />
  <text x="200" y="285" text-anchor="middle" class="text-label">Admin Dashboard</text>
  <text x="200" y="305" text-anchor="middle" class="text-desc">Diagnostics & Settings</text>

  <rect x="70" y="340" width="260" height="60" class="box" />
  <text x="200" y="365" text-anchor="middle" class="text-label">Testing Interface</text>
  <text x="200" y="385" text-anchor="middle" class="text-desc">Triggers Puppeteer tests</text>

  <rect x="70" y="420" width="260" height="60" class="box" />
  <text x="200" y="445" text-anchor="middle" class="text-label">Local Storage</text>
  <text x="200" y="465" text-anchor="middle" class="text-desc">Audit logs & Theme state</text>

  <!-- Server Side -->
  <rect x="450" y="100" width="300" height="450" class="box-server" />
  <text x="600" y="130" text-anchor="middle" class="text-label">Server (Node.js/Express)</text>
  <text x="600" y="150" text-anchor="middle" class="text-desc">API & Static Hosting</text>

  <!-- Server Components -->
  <rect x="470" y="180" width="260" height="60" class="box" />
  <text x="600" y="205" text-anchor="middle" class="text-label">Vite Middleware</text>
  <text x="600" y="225" text-anchor="middle" class="text-desc">Serves React SPA</text>

  <rect x="470" y="260" width="260" height="60" class="box" />
  <text x="600" y="285" text-anchor="middle" class="text-label">API Routes</text>
  <text x="600" y="305" text-anchor="middle" class="text-desc">/api/run-tests</text>

  <rect x="470" y="340" width="260" height="140" class="box" />
  <text x="600" y="365" text-anchor="middle" class="text-label">Puppeteer Instance</text>
  <text x="600" y="385" text-anchor="middle" class="text-desc">Headless Chrome</text>
  <text x="600" y="415" text-anchor="middle" class="text-desc">- Navigates to app</text>
  <text x="600" y="435" text-anchor="middle" class="text-desc">- Takes screenshots</text>
  <text x="600" y="455" text-anchor="middle" class="text-desc">- Returns results</text>

  <!-- Connections -->
  <path d="M 330 210 L 470 210" class="line" marker-end="url(#arrowhead)" />
  <text x="400" y="200" text-anchor="middle" class="text-desc">Serves App</text>

  <path d="M 330 370 L 470 290" class="line" marker-end="url(#arrowhead)" />
  <text x="400" y="320" text-anchor="middle" class="text-desc">POST /api/run-tests</text>

  <path d="M 470 410 L 330 410" class="line" marker-end="url(#arrowhead)" />
  <text x="400" y="400" text-anchor="middle" class="text-desc">Test Results</text>

</svg>
