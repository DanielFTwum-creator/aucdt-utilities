<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- BioChemAI - Molecule/DNA helix symbol -->
  <rect width="256" height="256" fill="#0a0f1e"/>

  <!-- DNA-like helix -->
  <g stroke="#00d9ff" stroke-width="2" fill="none">
    <!-- Left strand -->
    <path d="M 100 60 Q 85 80 100 100 Q 115 120 100 140 Q 85 160 100 180 Q 115 200 100 220"/>
    <!-- Right strand -->
    <path d="M 156 60 Q 171 80 156 100 Q 141 120 156 140 Q 171 160 156 180 Q 141 200 156 220"/>
  </g>

  <!-- Connecting bonds -->
  <g stroke="#00d9ff" stroke-width="1" opacity="0.6">
    <line x1="100" y1="80" x2="156" y2="80"/>
    <line x1="100" y1="120" x2="156" y2="120"/>
    <line x1="100" y1="160" x2="156" y2="160"/>
    <line x1="100" y1="200" x2="156" y2="200"/>
  </g>

  <!-- Atoms at nodes -->
  <circle cx="100" cy="80" r="3" fill="#00d9ff" opacity="0.8"/>
  <circle cx="156" cy="80" r="3" fill="#00d9ff" opacity="0.8"/>
  <circle cx="100" cy="120" r="3" fill="#00d9ff" opacity="0.8"/>
  <circle cx="156" cy="120" r="3" fill="#00d9ff" opacity="0.8"/>
</svg>
