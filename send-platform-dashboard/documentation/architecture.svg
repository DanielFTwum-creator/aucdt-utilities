<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc" />
  
  <!-- Title -->
  <text x="400" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" font-weight="bold" fill="#0f172a">SEND Platform Admin Console - Architecture</text>
  <text x="400" y="65" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#64748b">React 19.2.4 SPA Structure</text>

  <!-- Client Browser Container -->
  <rect x="50" y="100" width="700" height="450" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
  <text x="70" y="130" font-family="sans-serif" font-size="16" font-weight="bold" fill="#334155">Client Browser (Runtime)</text>

  <!-- Context Layer -->
  <rect x="100" y="160" width="600" height="80" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" />
  <text x="120" y="190" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Context Providers (State Management)</text>
  
  <rect x="150" y="200" width="150" height="30" rx="3" fill="#ffffff" stroke="#93c5fd" />
  <text x="225" y="220" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1e40af">AuthContext</text>
  
  <rect x="325" y="200" width="150" height="30" rx="3" fill="#ffffff" stroke="#93c5fd" />
  <text x="400" y="220" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1e40af">ThemeContext</text>

  <!-- Router Layer -->
  <rect x="100" y="260" width="600" height="180" rx="5" fill="#f0fdf4" stroke="#22c55e" stroke-width="1" />
  <text x="120" y="290" font-family="sans-serif" font-size="14" font-weight="bold" fill="#15803d">React Router (v7)</text>

  <!-- Public Routes -->
  <rect x="130" y="310" width="120" height="100" rx="3" fill="#ffffff" stroke="#86efac" />
  <text x="190" y="330" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold" fill="#15803d">Public</text>
  <text x="190" y="350" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#334155">/login</text>

  <!-- Protected Routes -->
  <rect x="280" y="310" width="390" height="100" rx="3" fill="#ffffff" stroke="#86efac" />
  <text x="475" y="330" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold" fill="#15803d">Protected (Layout)</text>
  
  <!-- Core Modules -->
  <rect x="300" y="340" width="160" height="60" rx="3" fill="#f1f5f9" stroke="#cbd5e1" />
  <text x="380" y="360" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="bold" fill="#475569">Core Modules</text>
  <text x="380" y="375" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#64748b">Dashboard, Jobs</text>
  <text x="380" y="388" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#64748b">Schedules, Executions</text>

  <!-- Admin Modules -->
  <rect x="490" y="340" width="160" height="60" rx="3" fill="#f1f5f9" stroke="#cbd5e1" />
  <text x="570" y="360" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="bold" fill="#475569">Admin Console</text>
  <text x="570" y="375" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#64748b">Gateway, Diagnostics</text>
  <text x="570" y="388" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#64748b">Logs, Testing, Perf</text>

  <!-- Services Layer -->
  <rect x="100" y="460" width="600" height="60" rx="5" fill="#fef2f2" stroke="#ef4444" stroke-width="1" />
  <text x="120" y="480" font-family="sans-serif" font-size="14" font-weight="bold" fill="#b91c1c">Services Layer (Mocked)</text>
  
  <rect x="150" y="485" width="120" height="25" rx="3" fill="#ffffff" stroke="#fca5a5" />
  <text x="210" y="502" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#b91c1c">AuditService</text>

  <rect x="300" y="485" width="120" height="25" rx="3" fill="#ffffff" stroke="#fca5a5" />
  <text x="360" y="502" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#b91c1c">MockData</text>

  <rect x="450" y="485" width="120" height="25" rx="3" fill="#ffffff" stroke="#fca5a5" />
  <text x="510" y="502" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#b91c1c">PuppeteerScenarios</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
    </marker>
  </defs>
  
  <line x1="400" y1="240" x2="400" y2="260" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="400" y1="440" x2="400" y2="460" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

</svg>