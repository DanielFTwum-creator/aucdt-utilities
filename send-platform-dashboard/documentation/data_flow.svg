<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8fafc" />
  <text x="400" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" font-weight="bold" fill="#0f172a">SEND Platform - Data Flow & Architecture</text>
  
  <!-- Layers -->
  <g transform="translate(50, 80)">
    <!-- UI Layer -->
    <rect x="0" y="0" width="200" height="350" rx="10" fill="#eff6ff" stroke="#3b82f6" />
    <text x="100" y="30" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1e40af">Frontend (UI)</text>
    
    <rect x="20" y="60" width="160" height="40" rx="5" fill="white" stroke="#93c5fd" />
    <text x="100" y="85" font-family="sans-serif" font-size="12" text-anchor="middle">React 19.2.4</text>
    
    <rect x="20" y="110" width="160" height="40" rx="5" fill="white" stroke="#93c5fd" />
    <text x="100" y="135" font-family="sans-serif" font-size="12" text-anchor="middle">Pages (Jobs, Dash)</text>
    
    <rect x="20" y="160" width="160" height="40" rx="5" fill="white" stroke="#93c5fd" />
    <text x="100" y="185" font-family="sans-serif" font-size="12" text-anchor="middle">Admin Diagnostics</text>

    <!-- Context -->
    <rect x="20" y="250" width="160" height="80" rx="5" fill="#dbeafe" stroke="#60a5fa" />
    <text x="100" y="275" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">State Management</text>
    <text x="100" y="295" font-family="sans-serif" font-size="10" text-anchor="middle">AuthContext</text>
    <text x="100" y="310" font-family="sans-serif" font-size="10" text-anchor="middle">ThemeContext</text>
  </g>

  <!-- Service Layer -->
  <g transform="translate(300, 80)">
    <rect x="0" y="0" width="200" height="350" rx="10" fill="#f0fdf4" stroke="#22c55e" />
    <text x="100" y="30" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#15803d">Service Layer</text>

    <rect x="20" y="100" width="160" height="50" rx="5" fill="white" stroke="#86efac" />
    <text x="100" y="130" font-family="sans-serif" font-size="12" text-anchor="middle">AuditService</text>

    <rect x="20" y="180" width="160" height="50" rx="5" fill="white" stroke="#86efac" />
    <text x="100" y="210" font-family="sans-serif" font-size="12" text-anchor="middle">Puppeteer Scenarios</text>
  </g>

  <!-- Data Layer (Mock) -->
  <g transform="translate(550, 80)">
    <rect x="0" y="0" width="200" height="350" rx="10" fill="#fef2f2" stroke="#ef4444" />
    <text x="100" y="30" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#b91c1c">Data (Mock)</text>

    <path d="M40,100 L160,100 L160,140 L40,140 Z" fill="white" stroke="#fca5a5" />
    <path d="M40,90 L160,90 L160,100 L40,100 Z" fill="#fee2e2" stroke="#fca5a5" /> <!-- Cylinder Top -->
    <text x="100" y="125" font-family="sans-serif" font-size="12" text-anchor="middle">Jobs DB</text>

    <path d="M40,180 L160,180 L160,220 L40,220 Z" fill="white" stroke="#fca5a5" />
    <path d="M40,170 L160,170 L160,180 L40,180 Z" fill="#fee2e2" stroke="#fca5a5" />
    <text x="100" y="205" font-family="sans-serif" font-size="12" text-anchor="middle">Execution Logs</text>
    
    <path d="M40,260 L160,260 L160,300 L40,300 Z" fill="white" stroke="#fca5a5" />
    <path d="M40,250 L160,250 L160,260 L40,260 Z" fill="#fee2e2" stroke="#fca5a5" />
    <text x="100" y="285" font-family="sans-serif" font-size="12" text-anchor="middle">Audit Trails</text>
  </g>

  <!-- Arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
  </defs>

  <line x1="200" y1="200" x2="300" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="500" y1="200" x2="550" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  
  <text x="250" y="190" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#64748b">Events</text>
  <text x="525" y="190" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#64748b">Queries</text>

</svg>