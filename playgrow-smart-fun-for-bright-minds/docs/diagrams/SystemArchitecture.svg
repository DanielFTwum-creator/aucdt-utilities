<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
    <defs>
        <style>
            .title { font: bold 24px sans-serif; fill: #111827; text-anchor: middle; }
            .box { fill: #ffffff; stroke: #9ca3af; stroke-width: 2; rx: 8; }
            .box-title { font: bold 16px sans-serif; fill: #1f2937; text-anchor: middle; }
            .box-text { font: 14px sans-serif; fill: #4b5563; text-anchor: middle; }
            .arrow { stroke: #4b5563; stroke-width: 2; marker-end: url(#arrowhead); }
            .label { font: 14px sans-serif; fill: #374151; text-anchor: middle; }
        </style>
        <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
        </marker>
    </defs>

    <rect width="100%" height="100%" fill="#f9fafb"/>
    <text x="400" y="40" class="title">PlayGrow System Architecture</text>

    <!-- User -->
    <g transform="translate(80, 250)">
        <circle cx="50" cy="50" r="50" class="box" fill="#e0f2fe"/>
        <text x="50" y="55" class="box-title">User</text>
        <text x="50" y="75" class="box-text">(Child/Parent)</text>
    </g>
    
    <!-- Browser -->
    <g transform="translate(250, 250)">
        <rect width="120" height="100" class="box" fill="#dbeafe"/>
        <text x="60" y="50" class="box-title">Web Browser</text>
        <text x="60" y="70" class="box-text">(Chrome, Firefox, etc.)</text>
    </g>

    <!-- React App -->
    <g transform="translate(450, 80)">
        <rect width="320" height="480" class="box" fill="#eef2ff"/>
        <text x="160" y="30" class="box-title">React Application (Client-Side)</text>

        <!-- Components -->
        <rect x="20" y="60" width="280" height="60" class="box" fill="#ffffff"/>
        <text x="160" y="85" class="box-title">App.tsx</text>
        <text x="160" y="105" class="box-text">State & View Management</text>

        <rect x="20" y="140" width="130" height="80" class="box" fill="#ffffff"/>
        <text x="85" y="170" class="box-title">WorldMap.tsx</text>
        <text x="85" y="190" class="box-text">Main Menu</text>

        <rect x="170" y="140" width="130" height="80" class="box" fill="#ffffff"/>
        <text x="235" y="170" class="box-title">ZoneDetail.tsx</text>
        <text x="235" y="190" class="box-text">Game List</text>
        
        <rect x="20" y="240" width="280" height="80" class="box" fill="#fef9c3"/>
        <text x="160" y="270" class="box-title">Admin Components</text>
        <text x="160" y="290" class="box-text">(Login, Dashboard)</text>

        <rect x="20" y="340" width="280" height="60" class="box" fill="#dcfce7"/>
        <text x="160" y="365" class="box-title">SelfTestDashboard.tsx</text>
        <text x="160" y="385" class="box-text">Automated Testing UI</text>

        <rect x="20" y="420" width="280" height="40" class="box" fill="#fae8ff"/>
        <text x="160" y="445" class="box-text">Static Data (data/zones.ts)</text>

    </g>

    <!-- Arrows -->
    <line x1="180" y1="300" x2="250" y2="300" class="arrow"/>
    <text x="215" y="290" class="label">Interacts</text>

    <line x1="370" y1="300" x2="450" y2="300" class="arrow"/>
    <text x="410" y="290" class="label">Renders</text>

    <path d="M 580 120 Q 520 130 580 140" fill="none" class="arrow"/>
    <path d="M 580 220 Q 520 230 580 240" fill="none" class="arrow"/>
</svg>