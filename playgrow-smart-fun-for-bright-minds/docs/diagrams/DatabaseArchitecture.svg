<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
    <defs>
        <style>
            .title { font: bold 28px sans-serif; fill: #111827; text-anchor: middle; }
            .subtitle { font: bold 20px sans-serif; fill: #dc2626; text-anchor: middle; }
            .text { font: 16px sans-serif; fill: #4b5563; text-anchor: middle; }
            .code { font: 16px monospace; fill: #1d4ed8; text-anchor: middle; }
        </style>
    </defs>
    <rect width="100%" height="100%" fill="#f9fafb"/>
    
    <g transform="translate(400, 100)">
        <text y="0" class="title">PlayGrow Database Architecture</text>
    </g>

    <g transform="translate(400, 180)">
        <rect x="-250" y="-40" width="500" height="80" fill="#fee2e2" stroke="#f87171" stroke-width="2" rx="10"/>
        <text y="5" class="subtitle">No Database Implemented</text>
    </g>
    
    <g transform="translate(400, 270)">
        <text class="text" y="0">All game data is currently managed as a static, in-memory</text>
        <text class="text" y="25">TypeScript object. There is no persistent storage or backend</text>
        <text class="text" y="50">server communication in this version of the application.</text>
        <text class="text" y="90">Data Source:</text>
        <text class="code" y="115">src/data/zones.ts</text>
    </g>
</svg>