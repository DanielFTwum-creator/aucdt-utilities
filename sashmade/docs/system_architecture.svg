<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa" />
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">SashMade System Architecture</text>
  
  <!-- Client Layer -->
  <rect x="50" y="80" width="700" height="150" fill="#e3f2fd" stroke="#2196f3" rx="10" />
  <text x="400" y="100" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold" fill="#1565c0">Client Layer (React 19.2.4)</text>
  
  <rect x="100" y="120" width="150" height="80" fill="#ffffff" stroke="#2196f3" rx="5" />
  <text x="175" y="150" font-family="Arial" font-size="14" text-anchor="middle">Public Storefront</text>
  <text x="175" y="170" font-family="Arial" font-size="10" text-anchor="middle">(Home, Shop, AI Studio)</text>
  
  <rect x="325" y="120" width="150" height="80" fill="#ffffff" stroke="#2196f3" rx="5" />
  <text x="400" y="150" font-family="Arial" font-size="14" text-anchor="middle">Admin Console</text>
  <text x="400" y="170" font-family="Arial" font-size="10" text-anchor="middle">(Dashboard, Testing, Audit)</text>
  
  <rect x="550" y="120" width="150" height="80" fill="#ffffff" stroke="#2196f3" rx="5" />
  <text x="625" y="150" font-family="Arial" font-size="14" text-anchor="middle">AI Services</text>
  <text x="625" y="170" font-family="Arial" font-size="10" text-anchor="middle">(Gemini Integration)</text>

  <!-- Service Layer -->
  <rect x="50" y="280" width="700" height="120" fill="#fff3e0" stroke="#ff9800" rx="10" />
  <text x="400" y="300" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold" fill="#e65100">Service Layer</text>
  
  <rect x="150" y="320" width="120" height="60" fill="#ffffff" stroke="#ff9800" rx="5" />
  <text x="210" y="355" font-family="Arial" font-size="12" text-anchor="middle">Auth Service</text>
  
  <rect x="340" y="320" width="120" height="60" fill="#ffffff" stroke="#ff9800" rx="5" />
  <text x="400" y="355" font-family="Arial" font-size="12" text-anchor="middle">Product Service</text>
  
  <rect x="530" y="320" width="120" height="60" fill="#ffffff" stroke="#ff9800" rx="5" />
  <text x="590" y="355" font-family="Arial" font-size="12" text-anchor="middle">Gemini API Proxy</text>

  <!-- Data Layer -->
  <rect x="50" y="450" width="700" height="120" fill="#e8f5e9" stroke="#4caf50" rx="10" />
  <text x="400" y="470" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold" fill="#1b5e20">Data Layer</text>
  
  <rect x="200" y="490" width="100" height="60" fill="#ffffff" stroke="#4caf50" rx="5" />
  <text x="250" y="525" font-family="Arial" font-size="12" text-anchor="middle">Local Storage</text>
  
  <rect x="500" y="490" width="100" height="60" fill="#ffffff" stroke="#4caf50" rx="5" />
  <text x="550" y="525" font-family="Arial" font-size="12" text-anchor="middle">Mock Data</text>

  <!-- Arrows -->
  <line x1="400" y1="230" x2="400" y2="280" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="400" y1="400" x2="400" y2="450" stroke="#666" stroke-width="2" marker-end="url(#arrow)" />
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666" />
    </marker>
  </defs>
</svg>
